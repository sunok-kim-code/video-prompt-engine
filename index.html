        }
        if (changes.length > 0 || maintained.length > 0) {
          stateDirective = '\n[STATE] ';
          if (maintained.length > 0) stateDirective += 'KEEP: ' + maintained.join('; ') + '. ';
          if (changes.length > 0) stateDirective += 'CHANGED: ' + changes.join('; ') + '.';
        }
      }

      // Enrich prompt with expression/mood/camera keywords for more dynamic panels
      let anchoredPrompt = enhancePanelExpression(panel.imagePrompt, panel);
      if (stateDirective) anchoredPrompt += stateDirective;
      if (styleAnchor) anchoredPrompt += ' Maintain consistent style: ' + styleAnchor;
      log(`패널 ${i+1}/${sb.length} 생성 중... (${panel.type}, ${panel.shotSize})`);

      const {refImages, assetDescriptions, charIds: panelCharIds} = buildPanelRefs(panel, sharedAssets, analysis, refs, charStates);
      log(`패널 ${i+1}: 레퍼런스 이미지 ${refImages.length}개, 에셋 설명 ${assetDescriptions.length}개, 캐릭터 ${panelCharIds.length}명`);

      try {
        const images = await callImage(anchoredPrompt, {referenceImages: refImages, assetDescriptions, aspectRatio: '3:4', characterIds: panelCharIds});
        // callImage returns null when content filter blocks — skip this panel
        const img0 = images?.[0];
        if (!img0 || img0 === 'undefined' || img0.endsWith(',undefined')) {
          log(`패널 ${i+1} 유효하지 않은 이미지 — 건너뜀`, 'warn');
        } else {
          newPanels[i] = img0;
          // Capture style anchor from first successful panel
          if (!styleAnchor && panel.imagePrompt) {
            const sm = panel.imagePrompt.match(/(manhwa|webtoon|anime|illustration|digital painting|cel.shad|cartoon)[^.]*\./i);
            if (sm) { styleAnchor = sm[0]; log(`스타일 앵커 설정: "${styleAnchor}"`, 'info'); }
          }
          log(`패널 ${i+1} 완료 (레퍼런스 ${refImages.length}개 사용)`, 'success');
        }
      } catch(e) {
        log(`패널 ${i+1} 실패: ${e.message}`, 'error');
        if (e.message.includes('429')) await new Promise(r => setTimeout(r, 10000));
        try {
          // Retry without reference images but keep asset descriptions + style anchor
          const images = await callImage(anchoredPrompt, {assetDescriptions, aspectRatio: '3:4', characterIds: panelCharIds});
          const retryImg = images?.[0];
          if (!retryImg || retryImg === 'undefined' || retryImg.endsWith(',undefined')) {
            log(`패널 ${i+1} 유효하지 않은 이미지 — 건너뜀`, 'warn');
          } else {
            newPanels[i] = retryImg;
            if (!styleAnchor && panel.imagePrompt) {
              const sm = panel.imagePrompt.match(/(manhwa|webtoon|anime|illustration|digital painting|cel.shad|cartoon)[^.]*\./i);
              if (sm) { styleAnchor = sm[0]; log(`스타일 앵커 설정: "${styleAnchor}"`, 'info'); }
            }
            log(`패널 ${i+1} 레퍼런스 없이 재생성 완료`, 'success');
          }
        } catch(e2) {
          log(`패널 ${i+1} 최종 실패: ${e2.message}`, 'error');
        }
      }
      setPanels([...newPanels]);
      // Delay between panels to avoid API rate limits
      if (i < sb.length - 1) await new Promise(r => setTimeout(r, 3000));
    }

    setCompletedSteps(prev => new Set([...prev, 3]));
    setStep(4);
    log(`패널 ${newPanels.filter(Boolean).length}개 생성 완료! Firebase 저장 버튼으로 저장하세요.`, 'success');
    return newPanels;
  };

  // ======== Full Pipeline ========
  const runFullPipeline = async () => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      const a = await runStep1();
      if (abortRef.current) return;
      const r = await runStep2(a);
      if (abortRef.current) return;
      const s = await runStep3(a);
      if (abortRef.current) return;
      await runStep4(s, r);
      setCompletedSteps(prev => new Set([...prev, 4]));
      // Final save after full pipeline
      if (projectId && currentEpisode) {
        try {
          await fbSaveEpisode(projectId, currentEpisode, {step: 4, completedSteps: [0,1,2,3,4]});
          log('전체 파이프라인 저장 완료', 'info');
        } catch(e) { log('저장 실패: ' + e.message, 'error'); }
      }
      log(`웹툰 ${currentEpisode || 1}화 생성 완료!`, 'success');
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Storyboard Editing Helpers ========
  const startSbEdit = (idx) => {
    setEditingSbPanel(idx);
    setEditingSbData({...storyboard[idx], dialogue: [...(storyboard[idx].dialogue || [])]});
  };
  const cancelSbEdit = () => { setEditingSbPanel(null); setEditingSbData({}); };
  const saveSbEdit = (idx) => {
    const newSb = [...storyboard];
    newSb[idx] = {...newSb[idx], ...editingSbData};
    setStoryboard(newSb);
    setEditingSbPanel(null);
    setEditingSbData({});
    log(`패널 ${idx+1} 수정됨`, 'success');
    // Auto-save to Firebase
    if (projectId && currentEpisode) {
      fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
    }
  };
  const deleteSbPanel = (idx) => {
    if (!confirm(`패널 ${idx+1}을 삭제하시겠습니까?`)) return;
    const newSb = storyboard.filter((_, i) => i !== idx);
    const newPanels = panels.filter((_, i) => i !== idx);
    setStoryboard(newSb);
    setPanels(newPanels);
    setEditingSbPanel(null);
    log(`패널 ${idx+1} 삭제됨`, 'info');
    if (projectId && currentEpisode) {
      fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
      fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels: newPanels, bubbleOverlays}).catch(() => {});
    }
  };
  const insertSbPanel = (atIdx) => {
    const newPanel = {
      _uid: 'sb_' + Date.now(),
      panelNumber: atIdx + 1,
      type: 'action',
      shotSize: 'medium',
      cameraAngle: 'eye level',
      mood: 'neutral',
      description: '(새 패널 - 클릭하여 수정)',
      dialogue: [],
      narration: '',
      imagePrompt: '',
      characters: [],
      background: '',
    };
    const newSb = [...storyboard];
    newSb.splice(atIdx, 0, newPanel);
    // Renumber
    newSb.forEach((p, i) => { p.panelNumber = i + 1; });
    const newPanels = [...panels];
    newPanels.splice(atIdx, 0, null);
    setStoryboard(newSb);
    setPanels(newPanels);
    // Auto-save both storyboard AND panels to Firebase to keep indices in sync
    if (projectId && currentEpisode) {
      fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
      fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels: newPanels, bubbleOverlays}).catch(() => {});
    }
    // Auto-open editor for new panel
    setEditingSbPanel(atIdx);
    setEditingSbData({...newPanel, dialogue: []});
    log(`패널 ${atIdx+1} 위치에 새 패널 추가됨`, 'info');
  };
  const handleSbDrop = (targetIdx) => {
    if (draggingSbIdx === null || draggingSbIdx === targetIdx) return;
    const newSb = [...storyboard];
    const newPanels = [...panels];
    const [movedSb] = newSb.splice(draggingSbIdx, 1);
    const [movedPanel] = newPanels.splice(draggingSbIdx, 1);
    const insertAt = targetIdx > draggingSbIdx ? targetIdx - 1 : targetIdx;
    newSb.splice(insertAt, 0, movedSb);
    newPanels.splice(insertAt, 0, movedPanel);
    newSb.forEach((p, i) => { p.panelNumber = i + 1; });
    setStoryboard(newSb);
    setPanels(newPanels);
    setDraggingSbIdx(null);
    log(`패널 순서 변경됨`, 'info');
    if (projectId && currentEpisode) {
      fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
      fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels: newPanels, bubbleOverlays}).catch(() => {});
    }
  };

  // ======== Batch Sequential Run (연속 실행 모드) ========
  // Runs full pipeline across multiple episodes with per-step provider overrides
  const [batchRunning, setBatchRunning] = useState(false);
  const [batchProgress, setBatchProgress] = useState(null); // {current, total, episode, step}
  const [showBatchModal, setShowBatchModal] = useState(false);
  const [batchConfig, setBatchConfig] = useState({
    step1Provider:'imagen4', step2Provider:'imagen4', step3Provider:'grokImage', step4Provider:'grokImage',
    step1ArtStyle:'', step2ArtStyle:'', step3ArtStyle:'', step4ArtStyle:'',
    forceRerun: false, // 이미 완료된 에피소드도 강제 재실행
  });
  const [batchEpisodeList, setBatchEpisodeList] = useState([]);
  // Storyboard editing state
  const [editingSbPanel, setEditingSbPanel] = useState(null); // index of panel being edited
  const [editingSbData, setEditingSbData] = useState({});
  const [draggingSbIdx, setDraggingSbIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const runBatchPipeline = async (config) => {
    // config: { episodes: [episodeNum, ...], step1Provider, step2Provider, step3Provider, step4Provider, artStyle }
    if (!projectId) { log('프로젝트를 먼저 선택하세요.', 'error'); return; }
    setBatchRunning(true);
    setRunning(true);
    abortRef.current = false;

    const targetEpisodes = config.episodes || [];
    const originalProvider = imageProvider;
    const originalArtStyle = artStyle;
    let completedCount = 0;

    log(`\n===== 연속 실행 모드 시작: ${targetEpisodes.length}개 에피소드 =====`, 'info');
    log(`설정: Step1 ${config.step1Provider}/${config.step1ArtStyle||artStyle}, Step2 ${config.step2Provider}/${config.step2ArtStyle||artStyle}, Step3 ${config.step3Provider}/${config.step3ArtStyle||artStyle}, Step4 ${config.step4Provider}/${config.step4ArtStyle||artStyle}`, 'info');

    try {

      for (let i = 0; i < targetEpisodes.length; i++) {
        if (abortRef.current) { log('연속 실행 중단됨', 'warn'); break; }

        const epNum = targetEpisodes[i];
        setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: '로드 중'});
        log(`\n----- ${epNum}화 시작 (${i+1}/${targetEpisodes.length}) -----`, 'info');

        // Load episode
        setCurrentEpisode(epNum);
        await loadEpisode(epNum);
        // Wait for state to settle
        await new Promise(r => setTimeout(r, 1000));

        // Check if sourceText exists (loaded from Firebase)
        const s1Data = await fbLoadPhase(projectId, epNum, 'step1_analysis');
        const epSourceText = s1Data?.sourceText || '';
        const epInputMode = s1Data?.inputMode || 'scene';

        if (!epSourceText.trim()) {
          log(`${epNum}화: 소스 텍스트 없음 — 건너뜀`, 'warn');
          continue;
        }

        // Check if already fully completed (ALL panels generated)
        if (!config.forceRerun) {
          const s4Data = await fbLoadPhase(projectId, epNum, 'step4_panels');
          const panelArr = s4Data?.panels || [];
          const generated = panelArr.filter(Boolean).length;
          const total = panelArr.length;
          if (total > 0 && generated === total) {
            log(`${epNum}화: 이미 완료됨 (${generated}/${total} 패널) — 건너뜀`, 'info');
            completedCount++;
            continue;
          } else if (generated > 0) {
            log(`${epNum}화: 미완료 (${generated}/${total} 패널) — 처음부터 재실행`, 'info');
          }
        } else {
          log(`${epNum}화: 강제 재실행 모드`, 'info');
        }

        // Set source text for this episode
        setSourceText(epSourceText);
        setInputMode(epInputMode);

        try {
          // Step 1: Story Analysis
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 1: 스토리 분석'});
          setImageProvider(config.step1Provider || 'imagen4');
          if (config.step1ArtStyle) setArtStyle(config.step1ArtStyle);
          log(`${epNum}화 Step 1: 스토리 분석 (${config.step1Provider} / ${ART_STYLES[config.step1ArtStyle || artStyle]?.name})`, 'info');
          const analysisResult = await runStep1();
          if (abortRef.current) break;

          // Step 2: Reference Generation
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 2: 레퍼런스 생성'});
          setImageProvider(config.step2Provider || 'imagen4');
          if (config.step2ArtStyle) setArtStyle(config.step2ArtStyle);
          log(`${epNum}화 Step 2: 레퍼런스 생성 (${config.step2Provider} / ${ART_STYLES[config.step2ArtStyle || artStyle]?.name})`, 'info');
          const refsResult = await runStep2(analysisResult);
          if (abortRef.current) break;

          // Step 3: Storyboard
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 3: 스토리보드'});
          setImageProvider(config.step3Provider || 'grokImage');
          if (config.step3ArtStyle) setArtStyle(config.step3ArtStyle);
          log(`${epNum}화 Step 3: 스토리보드 생성 (${config.step3Provider} / ${ART_STYLES[config.step3ArtStyle || artStyle]?.name})`, 'info');
          const sbResult = await runStep3(analysisResult);
          if (abortRef.current) break;

          // Step 4: Panel Generation
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 4: 패널 이미지 생성'});
          setImageProvider(config.step4Provider || 'grokImage');
          if (config.step4ArtStyle) setArtStyle(config.step4ArtStyle);
          log(`${epNum}화 Step 4: 패널 이미지 생성 (${config.step4Provider} / ${ART_STYLES[config.step4ArtStyle || artStyle]?.name})`, 'info');
          const panelsResult = await runStep4(sbResult, refsResult);
          if (abortRef.current) break;

          // Save panels & storyboard to Firebase (use return values, not stale closure state)
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Firebase 저장 중...'});
          log(`${epNum}화 패널 Firebase 저장 중...`, 'info');
          const panelCount = (panelsResult || []).filter(Boolean).length;
          await fbSavePhase(projectId, epNum, 'step4_panels', {panels: panelsResult || [], bubbleOverlays: []});
          if (sbResult && sbResult.length > 0) {
            await fbSavePhase(projectId, epNum, 'step3_storyboard', {storyboard: sbResult});
          }
          await fbSaveEpisode(projectId, epNum, {step: 4, completedSteps: [0,1,2,3,4]});
          log(`${epNum}화 패널 ${panelCount}개 Firebase 저장 완료`, 'success');

          completedCount++;
          log(`${epNum}화 완료! ✅`, 'success');

        } catch(epErr) {
          log(`${epNum}화 오류: ${epErr.message}`, 'error');
          // Continue to next episode on error
          continue;
        }

        // Delay between episodes to avoid rate limits
        if (i < targetEpisodes.length - 1) {
          log('다음 에피소드 대기 중 (5초)...', 'info');
          await new Promise(r => setTimeout(r, 5000));
        }
      }

      log(`\n===== 연속 실행 완료: ${completedCount}/${targetEpisodes.length}개 에피소드 완료 =====`, 'success');
    } catch(e) {
      log('연속 실행 오류: ' + e.message, 'error');
    } finally {
      // Restore original settings
      setImageProvider(originalProvider);
      setArtStyle(originalArtStyle);
      setBatchRunning(false);
      setRunning(false);
      setBatchProgress(null);
    }
  };

  // Find episodes with sourceText for batch run UI
  // forceAll=true: show all episodes with sourceText (including completed ones)
  const getUnprocessedEpisodes = useCallback(async (forceAll = false) => {
    if (!projectId) return [];
    const result = [];
    for (const ep of episodes) {
      try {
        const s1 = await fbLoadPhase(projectId, ep.number, 'step1_analysis');
        const s4 = await fbLoadPhase(projectId, ep.number, 'step4_panels');
        const s3 = await fbLoadPhase(projectId, ep.number, 'step3_storyboard');
        const hasSource = !!(s1?.sourceText?.trim());
        const hasAnalysis = !!(s1?.analysis);
        const hasStoryboard = !!(s3?.storyboard?.length > 0);
        const panelArr = s4?.panels || [];
        const generatedPanels = panelArr.filter(Boolean).length;
        const totalPanels = panelArr.length;
        // "Complete" means ALL panels are generated (not just some)
        const isFullyComplete = totalPanels > 0 && generatedPanels === totalPanels;
        const status = isFullyComplete ? 'complete' : hasStoryboard ? 'step3' : hasAnalysis ? 'step1' : 'none';

        if (hasSource && (forceAll || !isFullyComplete)) {
          result.push({
            number: ep.number,
            title: ep.title || `${ep.number}화`,
            hasAnalysis, hasSource, hasStoryboard, isFullyComplete,
            generatedPanels, totalPanels, status,
          });
        }
      } catch(e) { /* skip */ }
    }
    return result;
  }, [projectId, episodes]);

  const openBatchModal = async () => {
    const eps = await getUnprocessedEpisodes(batchConfig.forceRerun);
    setBatchEpisodeList(eps.map(e => ({...e, selected: !e.isFullyComplete})));
    setShowBatchModal(true);
  };

  const startBatchRun = () => {
    const selectedEps = batchEpisodeList.filter(e => e.selected).map(e => e.number);
    if (selectedEps.length === 0) { log('실행할 에피소드를 선택하세요.', 'warn'); return; }
    setShowBatchModal(false);
    runBatchPipeline({
      episodes: selectedEps,
      step1Provider: batchConfig.step1Provider, step2Provider: batchConfig.step2Provider,
      step3Provider: batchConfig.step3Provider, step4Provider: batchConfig.step4Provider,
      step1ArtStyle: batchConfig.step1ArtStyle || undefined, step2ArtStyle: batchConfig.step2ArtStyle || undefined,
      step3ArtStyle: batchConfig.step3ArtStyle || undefined, step4ArtStyle: batchConfig.step4ArtStyle || undefined,
      forceRerun: batchConfig.forceRerun,
    });
  };

  // ======== Run Single Step ========
  const runSingleStep = async (stepIdx) => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      if (stepIdx === 0) await runStep1();
      else if (stepIdx === 1) await runStep2();
      else if (stepIdx === 2) await runStep3();
      else if (stepIdx === 3) await runStep4();
      else if (stepIdx === 4) { setStep(4); setCompletedSteps(prev => new Set([...prev, 4])); }
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Regenerate single panel ========
  const regeneratePanel = async (idx, customPrompt) => {
    if (!storyboard[idx]) return;
    setRunning(true);
    try {
      const panel = storyboard[idx];
      const usePrompt = customPrompt || panel.imagePrompt;
      // Update storyboard prompt if custom
      if (customPrompt) {
        const newSb = [...storyboard];
        newSb[idx] = {...newSb[idx], imagePrompt: customPrompt};
        setStoryboard(newSb);
      }
      // Build character states accumulated up to this panel
      const charStates = buildCharacterStates(storyboard, analysis, idx);
      const {refImages, assetDescriptions, charIds: panelCharIds} = buildPanelRefs(panel, sharedAssets, analysis, references, charStates);
      log(`패널 ${idx+1} 재생성 중... (asset ${assetDescriptions.length}개 참조)`);
      const images = await callImage(usePrompt, {referenceImages: refImages, assetDescriptions, aspectRatio: '3:4', characterIds: panelCharIds});
      const newPanels = [...panels];
      newPanels[idx] = images[0];
      setPanels(newPanels);
      log(`패널 ${idx+1} 재생성 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single character reference (updates shared asset) ========
  const regenerateCharRef = async (charId, customPrompt) => {
    if (!analysis) return;
    const char = analysis.characters.find(c => c.id === charId);
    if (!char) return;
    setRunning(true);
    try {
      const basePrompt = customPrompt || char.refPrompt;
      // Add differentiation context from other characters
      let contrastSuffix = '';
      if (!customPrompt) {
        const otherChars = analysis.characters.filter(c => c.id !== charId);
        if (otherChars.length > 0) {
          const otherDescs = otherChars.map(oc =>
            `${oc.name}: ${oc.appearance?.substring(0, 100)}${oc.distinctFeatures ? ' [distinct: ' + oc.distinctFeatures + ']' : ''}`
          ).join('; ');
          contrastSuffix = `\n\nIMPORTANT: This character must look COMPLETELY DIFFERENT from: ${otherDescs}. Ensure distinct hair color, hairstyle, face shape, and body type.`;
        }
        const distinctInfo = char.distinctFeatures ? `\nThis character's unique visual identity: ${char.distinctFeatures}.` : '';
        contrastSuffix = distinctInfo + contrastSuffix;
      }
      const finalPrompt = customPrompt ? customPrompt : (basePrompt + getCharSuffix() + contrastSuffix);
      log(`${char.name} 레퍼런스 재생성 중...`);
      const images = await callImage(finalPrompt);
      setReferences(prev => ({...prev, characters: {...prev.characters, [charId]: images[0]}}));
      const updatedRefPrompt = customPrompt || char.refPrompt;
      const assetData = {name: char.name, role: char.role, age: char.age, gender: char.gender, appearance: char.appearance, outfit: char.outfit, personality: char.personality, refPrompt: updatedRefPrompt, image: images[0]};
      setSharedAssets(prev => ({...prev, characters: {...prev.characters, [charId]: {...assetData, assetId: charId, type: 'characters'}}}));
      if (projectId) await fbSaveAsset(projectId, 'characters', charId, assetData);
      log(`${char.name} 레퍼런스 재생성 → 공유 에셋 업데이트 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single asset from library ========
  const regenerateAsset = async (assetType, assetId, customPrompt) => {
    const asset = sharedAssets[assetType]?.[assetId];
    if (!asset) return;
    setRunning(true);
    try {
      log(`${asset.name} 에셋 재생성 중...`);
      let finalPrompt, opts = {};
      if (customPrompt) {
        finalPrompt = customPrompt;
        if (assetType === 'backgrounds') opts.aspectRatio = '16:9';
        else if (assetType === 'props') opts.aspectRatio = '1:1';
      } else {
        let suffix = '';
        if (assetType === 'characters') suffix = getCharSuffix();
        else if (assetType === 'backgrounds') { suffix = getBgSuffix(); opts.aspectRatio = '16:9'; }
        else if (assetType === 'props') { suffix = getPropSuffix(); opts.aspectRatio = '1:1'; }
        finalPrompt = asset.refPrompt + suffix;
      }
      const images = await callImage(finalPrompt, opts);
      const updated = {...asset, image: images[0], refPrompt: customPrompt || asset.refPrompt};
      setSharedAssets(prev => ({...prev, [assetType]: {...prev[assetType], [assetId]: updated}}));
      if (assetType === 'characters') setReferences(prev => ({...prev, characters: {...prev.characters, [assetId]: images[0]}}));
      if (assetType === 'backgrounds') setReferences(prev => ({...prev, backgrounds: {...prev.backgrounds, [assetId]: images[0]}}));
      if (projectId) await fbSaveAsset(projectId, assetType, assetId, updated);
      log(`${asset.name} 에셋 재생성 완료`, 'success');
    } catch(e) { log(`에셋 재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // Save Project & Episodes
  const saveProject = async () => {
    try {
      if (!projectId || !projectTitle) {
        const id = projectId || 'proj_' + Date.now();
        if (!projectId) setProjectId(id);
        await fbSaveProject(id, {title: projectTitle || '무제'});
      }

      // If no episode selected, create first one
      if (!currentEpisode) {
        await createNewEpisode();
        return;
      }

      // Save episode metadata
      const episodeTitle = analysis?.title || `${currentEpisode}화`;
      const episodeData = {
        title: episodeTitle,
        number: currentEpisode,
        step,
        completedSteps: [...completedSteps],
        createdAt: episodes.find(e => e.number === currentEpisode)?.createdAt || new Date().toISOString(),
      };
      await fbSaveEpisode(projectId, currentEpisode, episodeData);

      // Save phases
      if (sourceText.trim() || analysis) await fbSavePhase(projectId, currentEpisode, 'step1_analysis', {analysis, sourceText, inputMode});
      if (Object.keys(references.characters).length > 0) await fbSavePhase(projectId, currentEpisode, 'step2_references', {characterIds: Object.keys(references.characters), backgroundIds: Object.keys(references.backgrounds), hasImages: true}, true);
      if (storyboard.length > 0) await fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard});
      if (panels.some(p => p)) await fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels});

      // Update episodes state with saved info
      setEpisodes(prev => prev.map(e =>
        e.number === currentEpisode
          ? {...e, title: episodeTitle, step, completedSteps: [...completedSteps]}
          : e
      ));

      log('프로젝트 저장 완료', 'success');
    } catch(e) { log('저장 실패: ' + e.message, 'error'); }
  };

  const loadProject = async (pid) => {
    try {
      log('프로젝트 로드 중...');
      const proj = await fbLoadProject(pid);
      setProjectId(pid);
      setProjectTitle(proj.title || '');

      // Load shared assets
      try {
        const assets = await fbLoadAllAssets(pid);
        setSharedAssets(assets);
        const totalAssets = Object.keys(assets.characters).length + Object.keys(assets.backgrounds).length + Object.keys(assets.props).length;
        if (totalAssets > 0) log(`공유 에셋 ${totalAssets}개 로드 완료`, 'success');
      } catch(e) { log('공유 에셋 로드 실패: ' + e.message, 'error'); }

      // Load LoRA models
      try { await loadLoraModels(pid); } catch(e) { /* ignore */ }

      // Load episodes
      const episodeList = await fbListEpisodes(pid);
      setEpisodes(episodeList);

      if (episodeList.length > 0) {
        await loadEpisode(episodeList[0].number, pid);
      } else {
        // Create first episode if none exist
        const newEpisode = {number: 1, title: '1화', createdAt: new Date().toISOString()};
        setEpisodes([newEpisode]);
        setCurrentEpisode(1);
      }

      setShowProjects(false);
      log('프로젝트 로드 완료', 'success');
    } catch(e) { log('로드 실패: ' + e.message, 'error'); }
  };

  const loadProjectList = async () => {
    try { setProjectList(await fbListProjects()); } catch(e) { /* Firebase not configured yet */ }

      if (synced > 0) {
        log(`API 키 ${synced}개가 서버에서 동기화되었습니다`, 'success');

  // Firebase에 전체 패널 명시적 저장
  const savePanelsToFirebase = async () => {

    try {
      setRunning(true);

      // 스토리보드도 함께 저장 (프롬프트 수정사항 포함)
      if (storyboard.length > 0) {
        await fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard});
      }
      const cs = [...new Set([...completedSteps, 0, 1, 2, 3])];
      await fbSaveEpisode(projectId, currentEpisode, {step: 4, completedSteps: cs});
      updateEpisodeState(4, cs);
      log(`✓ 패널 ${count}개 Firebase 저장 완료! 다시 불러올 수 있습니다.`, 'success');
    } catch(e) { log(`Firebase 저장 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // Firebase에 개별 패널 이미지 저장
  const saveSinglePanelToFirebase = async (panelIdx) => {

    try {
      setRunning(true);
      log(`패널 ${panelIdx+1} Firebase 저장 중...`, 'info');

      await fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels, bubbleOverlays});

  const exportWebtoonPDF = async () => {
    const validPanels = storyboard.map((sb, i) => panels[i] ? {img: panels[i], sb, idx: i} : null).filter(Boolean);
    if (validPanels.length === 0) { log('내보낼 패널 이미지가 없습니다', 'error'); return; }
    try {
      setRunning(true);
      log(`PDF 내보내기 시작... (${validPanels.length}개 패널, 말풍선 합성 포함)`, 'info');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({orientation: 'portrait', unit: 'mm', format: 'a4'});
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const margin = 5;
      const contentW = pageW - margin * 2;

      for (let i = 0; i < validPanels.length; i++) {
        if (i > 0) pdf.addPage();
        const {img, sb, idx} = validPanels[i];

        // 말풍선 오버레이가 있으면 합성된 이미지 사용
        let finalImg = img;
        if (bubbleOverlays.length > 0) {
          try {
            const merged = await flattenPanelWithBubbles(idx);
            if (merged && merged !== img) finalImg = merged;
          } catch(e) { /* use original */ }
        }

        const image = await new Promise((resolve, reject) => {
          const im = new Image(); im.crossOrigin = 'anonymous';
          im.onload = () => resolve(im); im.onerror = reject; im.src = finalImg;
        });

        const imgRatio = image.width / image.height;
        let drawW = contentW;
        let drawH = drawW / imgRatio;
        const maxH = pageH - margin * 2 - 4;
        if (drawH > maxH) { drawH = maxH; drawW = drawH * imgRatio; }
        const x = (pageW - drawW) / 2;
        const y = margin;

        const format = finalImg.startsWith('data:image/png') ? 'PNG' : 'JPEG';
        pdf.addImage(finalImg, format, x, y, drawW, drawH);

        log(`패널 ${idx + 1}/${validPanels.length} 추가 완료`, 'info');
      }

      const title = analysis?.title || 'webtoon';
      const epLabel = currentEpisode ? `_ep${currentEpisode}` : '';
      pdf.save(`${title}${epLabel}.pdf`);
      log(`✓ PDF 내보내기 완료! (${validPanels.length}개 패널)`, 'success');
    } catch(e) {
      log(`PDF 내보내기 실패: ${e.message}`, 'error');

              <button className="btn btn-outline btn-sm" onClick={closePromptEditor}>취소</button>
              {promptEditor.onSaveOnly && (
                <button className="btn btn-outline btn-sm" onClick={() => {
                  const p = editedPrompt.trim();
                  if (!p) return;
                  closePromptEditor();
                  promptEditor.onSaveOnly(p);

              <button className="btn btn-primary btn-sm" disabled={running} onClick={() => {
                const p = editedPrompt.trim();
                if (!p) return;
                closePromptEditor();

            </div>

        </div>

      {/* Image Preview Modal */}
      {previewImage && (

            <button className="img-modal-close" onClick={() => setPreviewImage(null)}>×</button>
            <img src={previewImage} alt={previewTitle} />
            <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:12,padding:'8px 0'}}>
              {previewTitle && <span className="img-modal-title" style={{padding:0,margin:0}}>{previewTitle}</span>}
              <button onClick={()=>savePanelImage(previewImage, (previewTitle || 'image').replace(/[^a-zA-Z0-9가-힣]/g,'_') + '.png')} style={{background:'#27ae60',color:'#fff',border:'none',borderRadius:8,padding:'6px 16px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>💾 이미지 저장</button>
            </div>
          </div>
        </div>

      {/* Header */}
      <div className="app-header">

        <div style={{flex:1}}></div>
        {projectId && <button className="api-key-btn" onClick={()=>setShowAssetLibrary(true)} style={{background:'linear-gradient(135deg,#00b894,#00cec9)',color:'#fff',borderColor:'transparent'}}>에셋 라이브러리 ({Object.keys(sharedAssets.characters).length + Object.keys(sharedAssets.backgrounds).length + Object.keys(sharedAssets.props).length})</button>}
        <button className="api-key-btn" onClick={()=>setShowApiModal(true)}>API 설정</button>
      </div>

      {/* Toolbar */}
      <div className="toolbar">

        <select className="form-select" style={{width:160}} value={imageProvider} onChange={e=>setImageProvider(e.target.value)}>

          <option value="a2eImage">A2E (Manga/General + 레퍼런스)</option>
          <option value="a2eNanoBanana">A2E Gemini (레퍼런스 반영)</option>

        </select>
        {imageProvider === 'a2eImage' && (

            <div className="be-ctrl">
              <label className="be-ctrl-label">줌</label>
              <input type="range" min="50" max="200" value={editorPanelScale} onChange={e => setEditorPanelScale(parseInt(e.target.value))} style={{width:60,height:3}} />
              <span className="be-ctrl-val" style={{minWidth:24}}>{editorPanelScale}%</span>
            </div>
            <div className="be-divider" />
            <button className="btn btn-outline btn-sm" onClick={saveEditorLayout} style={{fontSize:12}}>배치 저장</button>
            <button className="btn btn-outline btn-sm" onClick={async () => {
              if (!confirm('현재 배치를 초기화하고 패널에서 다시 생성하시겠습니까?')) return;
              log('에디터 초기화 중...', 'info');
              const newPages = await initEditorPages();
              setEditorPages(newPages);
              setCurrentPageIdx(0);
              log(`에디터 재초기화 완료: ${newPages.length}페이지`, 'success');
            }} style={{fontSize:12}}>배치 초기화</button>
            <div className="be-divider" />
            <button className="btn btn-outline btn-sm be-btn-export" onClick={async () => {
              for (let i = 0; i < editorPages.length; i++) {
                const jpegUrl = await exportPageAsJpeg(i);
                if (jpegUrl) downloadDataUrl(jpegUrl, `${analysis?.title || 'page'}_${i+1}.jpg`);
              }
              log(`전체 ${editorPages.length}페이지 JPG 내보내기 완료`, 'success');
            }}>전체 페이지 JPG 내보내기</button>
            <button className="btn btn-success btn-sm" onClick={() => { saveEditorLayout(); closeBubbleEditor(); }} style={{fontSize:12}}>저장 후 완료</button>
          </div>

          <div className="be-body">
            {/* Main canvas area — all pages stacked vertically */}
            <div className="be-canvas" ref={editorCanvasRef}>
              {editorPages.map((page, pageIdx) => {
                const scale = editorPanelScale / 100;
                const displayW = PAGE_W * scale;
                const displayH = PAGE_H * scale;
                const isFocused = pageIdx === currentPageIdx;
                return (
                  <React.Fragment key={page.id}>
                    {/* Page header bar */}
                    <div className={`be-page-bar${isFocused ? ' focused' : ''}`}
                      onClick={() => setCurrentPageIdx(pageIdx)}>
                      <span style={{fontWeight:700}}>페이지 {pageIdx + 1}</span>
                      <span style={{fontSize:10,color:'#888'}}>({(page.objects||[]).length}개 객체)</span>
                      <div style={{flex:1}} />
                      <button className="be-page-bar-btn" onClick={async (e) => {
                        e.stopPropagation();
                        const jpegUrl = await exportPageAsJpeg(pageIdx);
                        if (jpegUrl) { downloadDataUrl(jpegUrl, `${analysis?.title || 'page'}_${pageIdx+1}.jpg`); log(`페이지 ${pageIdx+1} JPG 내보내기 완료`, 'success'); }
                      }}>JPG 저장</button>
                      {editorPages.length > 1 && (
                        <button className="be-page-bar-btn del" onClick={(e) => { e.stopPropagation(); deletePage(pageIdx); }}>삭제</button>
                      )}
                    </div>
                    {/* Page canvas */}
                    <div className={`be-page-canvas${isFocused ? ' focused' : ''}${dropTargetPageIdx === pageIdx ? ' drop-target' : ''}`}
                      style={{width: displayW, height: displayH, position:'relative'}}
                      onClick={() => setCurrentPageIdx(pageIdx)}>
                      {/* Render all objects in z-order */}
                      {[...(page.objects||[])].sort((a, b) => (a.zIndex || 1) - (b.zIndex || 1)).map(obj => {
                        const isSelected = selectedObjectId === obj.id;
                        if (obj.type === 'panel' || obj.type === 'image') {
                          return (
                            <div key={obj.id} className={`be-obj${isSelected ? ' selected' : ''}`}
                              style={{
                                left: obj.x * scale, top: obj.y * scale, width: obj.w * scale, height: obj.h * scale,
                                zIndex: obj.zIndex || 1
                              }}
                              onMouseDown={(e) => {
                                setCurrentPageIdx(pageIdx);
                                setSelectedObjectId(obj.id);
                                setSelectedObjectType(obj.type);
                                if (['TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.dataset.resize) return;
                                e.preventDefault();
                                dragRef.current = {type:'move', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origX:obj.x, origY:obj.y, crossPage:true};
                              }}>
                              {obj.src && obj.src !== 'undefined' && !obj.src.endsWith(',undefined') ? (
                                <img src={obj.src} className="be-obj-img" draggable={false} />
                              ) : (
                                <div className="be-obj-img" style={{display:'flex',alignItems:'center',justifyContent:'center',background:'#333',color:'#999',fontSize:11,height:'100%'}}>이미지 없음</div>
                              )}
                              {isSelected && <>
                                <div data-resize="true" className="be-resize"
                                  onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                    dragRef.current = {type:'resize', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origW:obj.w, origH:obj.h, aspectRatio: obj.w / obj.h};
                                  }}/>
                                <button className="be-delete" onClick={(e) => {e.stopPropagation(); deletePageObject(pageIdx, obj.id);}}>×</button>
                              </>}
                            </div>
                          );
                        } else if (obj.type === 'bubble') {
                          const bt = BUBBLE_TYPES[obj.bubbleStyle] || BUBBLE_TYPES.speech;
                          const tailPos = obj.tailPos ?? 0.3;
                          const tailSz = obj.tailSize ?? 1.0;
                          const tailLen = obj.tailLength ?? tailSz;
                          const tailWid = obj.tailWidth ?? tailSz;
                          const svgH = (obj.h + (bt.tail ? 18 * tailLen : 0)) * scale;
                          // Compute effective bg color: use customBg+opacity for plainText types
                          const effBg = (() => {
                            if (bt.plainText && obj.customBg) {
                              const op = (obj.customBgOpacity ?? 100) / 100;
                              const hex = obj.customBg;
                              const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b2 = parseInt(hex.slice(5,7),16);
                              return `rgba(${r},${g},${b2},${op})`;
                            }
                            if (bt.plainText && obj.customBgOpacity !== undefined) {
                              const op = obj.customBgOpacity / 100;
                              return `rgba(255,255,255,${op})`;
                            }
                            return bt.bg;
                          })();
                          return (
                            <div key={obj.id} className={`be-bubble${isSelected ? ' selected' : ''}`}
                              style={{left: obj.x * scale, top: obj.y * scale, width: obj.w * scale, height: svgH, zIndex: obj.zIndex || 1}}
                              onMouseDown={(e) => {
                                setCurrentPageIdx(pageIdx);
                                setSelectedObjectId(obj.id);
                                setSelectedObjectType('bubble');
                                if (['TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.dataset.resize) return;
                                e.preventDefault();
                                dragRef.current = {type:'move', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origX:obj.x, origY:obj.y, crossPage:true};
                              }}>
                              <svg width={obj.w * scale} height={svgH} className="be-bubble-svg" style={{filter: bt.shadow ? 'drop-shadow(0 2px 4px rgba(0,0,0,0.4))' : 'none'}}>
                                {(() => {
                                  const bw2 = bt.borderWidth || 2;
                                  const strokeColor = bt.border==='none'?'transparent':bt.border;
                                  const dash = bt.dashed ? '6 4' : 'none';
                                  const W = obj.w*scale, H = obj.h*scale;
                                  if (bt.plainText && !bt.ellipse) {
                                    return <rect x="0" y="0" width={W} height={H} rx={(bt.radius||2)*scale} ry={(bt.radius||2)*scale} fill={effBg} stroke="none"/>;
                                  } else if (bt.plainText && bt.ellipse) {
                                    return <ellipse cx={W/2} cy={H/2} rx={W/2} ry={H/2} fill={effBg} stroke="none"/>;
                                  } else if (bt.spiky) {
                                    const pathD = buildSpikyPath(W, H, bt.spikeCount||16, tailPos, tailLen, tailWid, 1);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round" fillRule="evenodd"/>;
                                  } else if (bt.cloudShape) {
                                    const pathD = buildCloudPath(W, H, tailPos, tailLen, tailWid, 1);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round" fillRule="evenodd"/>;
                                  } else if (bt.boxShape) {
                                    const pathD = buildBoxPath(W, H, (bt.radius||10)*scale, tailPos, tailLen, tailWid, 1);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round"/>;
                                  } else if (bt.waveShape) {
                                    const pathD = buildWavePath(W, H, tailPos, tailLen, tailWid, scale);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round"/>;
                                  } else if (bt.ellipse) {
                                    const cx2 = W/2, cy2 = H/2, rx2 = W/2 - 2, ry2 = H/2 - 2;
                                    const rn2 = obj.roundness ?? 100;
                                    if (bt.tail) {
                                      const pathD = buildBubblePath(cx2, cy2, rx2, ry2, tailPos, tailLen, tailWid, W, H, 1, obj.roundness, obj.tailStyle);
                                      return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash} strokeLinejoin="round"/>;
                                    } else {
                                      const cr2 = Math.min(rx2, ry2) * Math.max(0.04, rn2 / 100);
                                      return <rect x="2" y="2" width={W-4} height={H-4} rx={cr2} ry={cr2} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash}/>;
                                    }
                                  } else if (bt.tail) {
                                    const rrRx = W/2 - 2, rrRy = H/2 - 2;
                                    const rrRn = obj.roundness ?? 30;
                                    const pathD = buildBubblePath(W/2, H/2, rrRx, rrRy, tailPos, tailLen, tailWid, W, H, 1, rrRn, obj.tailStyle);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash} strokeLinejoin="round"/>;
                                  } else {
                                    return <rect x="1" y="1" width={W-2} height={H-2} rx={(bt.radius||8)*scale} ry={(bt.radius||8)*scale}
                                        fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash}/>;
                                  }
                                })()}
                              </svg>
                              <textarea className="be-bubble-text" value={obj.text} onChange={(e) => updatePageObject(pageIdx, obj.id, {text: e.target.value})}
                                placeholder={bt.name+'...'} onClick={() => { setCurrentPageIdx(pageIdx); setSelectedObjectId(obj.id); }}
                                style={{width:obj.w*scale-12, height:obj.h*scale-8, fontWeight:bt.fontWeight, fontSize:(obj.fontSize||25)*scale, color:obj.customColor||bt.color||'#111', fontFamily:obj.fontFamily||"'Noto Sans KR',sans-serif",
                                  transform:`translate(${(obj.textOffsetX||0)*scale}px, ${(obj.textOffsetY||0)*scale}px)`}}/>
                              {isSelected && <>
                                <div data-resize="true" className="be-resize"
                                  onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                    dragRef.current = {type:'resize', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origW:obj.w, origH:obj.h};
                                  }}/>
                                {bt.tail && (() => {
                                  const tx = obj.w * scale * tailPos;
                                  const tipY = obj.h * scale + 18 * tailLen * scale;
                                  const midY = obj.h * scale + 9 * tailLen * scale;
                                  const midX = tx + 12 * tailWid * scale * 0.5;
                                  return <>
                                    {/* Tail tip handle: drag to change position (horizontal) and length (vertical) */}
                                    <div style={{position:'absolute', left:tx-7, top:tipY-7, width:14, height:14, background:'#ff6b6b', border:'2px solid #fff', borderRadius:'50%', cursor:'grab', zIndex:31, boxShadow:'0 1px 4px rgba(0,0,0,0.5)'}}
                                      onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                        dragRef.current = {type:'tail_pos', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origTailPos:tailPos, origTailLength:tailLen, objW:obj.w};
                                      }} title="위치/길이" />
                                    {/* Tail width handle: drag horizontally to change thickness */}
                                    <div style={{position:'absolute', left:midX-6, top:midY-6, width:12, height:12, background:'#ffaa33', border:'2px solid #fff', borderRadius:'50%', cursor:'ew-resize', zIndex:31, boxShadow:'0 1px 4px rgba(0,0,0,0.5)'}}
                                      onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                        dragRef.current = {type:'tail_width', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origTailWidth:tailWid};
                                      }} title="두께" />
                                  </>;
                                })()}
                                <button className="be-delete" onClick={(e) => {e.stopPropagation(); deletePageObject(pageIdx, obj.id);}}>×</button>
                              </>}
                            </div>
                          );
                        } else if (obj.type === 'sfx') {
                          // [WebtoonSFX 추가] 붓글씨 스타일 SFX 렌더링
                          const rot = obj.rotate || 0;
                          const skw = obj.skew || 0;
                          const fs = (obj.fontSize || 48) * scale;
                          const cssFilter = getSfxCssFilter(obj.filterType || '', obj.stroke || '#000', obj.color || '#ff2222');
                          return (
                            <div key={obj.id} className={`be-sfx${isSelected ? ' selected' : ''}`}
                              style={{left: obj.x * scale, top: obj.y * scale, width: obj.w * scale, height: obj.h * scale, zIndex: obj.zIndex || 1}}
                              onMouseDown={(e) => {
                                setCurrentPageIdx(pageIdx);
                                setSelectedObjectId(obj.id);
                                setSelectedObjectType('sfx');
                                if (e.target.dataset.resize) return;
                                e.preventDefault();
                                dragRef.current = {type:'move', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origX:obj.x, origY:obj.y, crossPage:true};
                              }}>
                              <div className="be-sfx-text" style={{
                                transform: `rotate(${rot}deg) skewX(${skw}deg)`,
                                fontSize: fs,
                                fontFamily: obj.fontFamily || "'Nanum Brush Script',cursive",
                                fontWeight: 900,
                                color: obj.color || '#cc2200',
                                WebkitTextStroke: `${(obj.strokeWidth||1.5)*scale}px ${obj.stroke||'#5c0000'}`,
                                paintOrder: 'stroke fill',
                                filter: cssFilter,
                                lineHeight: 1.1,
                              }}>{obj.text}</div>
                              {isSelected && <>
                                <div data-resize="true" className="be-resize"
                                  onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                    dragRef.current = {type:'resize', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origW:obj.w, origH:obj.h};
                                  }}/>
                                <button className="be-delete" onClick={(e) => {e.stopPropagation(); deletePageObject(pageIdx, obj.id);}}>×</button>
                              </>}
                            </div>
                          );
                        }
                      })}
                    </div>
                  </React.Fragment>
                );
              })}
              {/* Add page button at bottom */}
              <div className="be-add-page-bottom" onClick={addPage}>
                + 새 페이지 추가
              </div>
            </div>

            {/* Right sidebar — shows focused page objects */}
            <div className="be-sidebar">
              <div className="be-sidebar-title">페이지 {currentPageIdx + 1} 객체</div>
              {(editorPages[currentPageIdx]?.objects?.length || 0) === 0 && <div className="be-sidebar-empty">상단 버튼으로 말풍선이나 이미지를 추가하세요.</div>}
              {(editorPages[currentPageIdx]?.objects || []).map((obj, oi) => {
                const isSelected = selectedObjectId === obj.id;
                if (obj.type === 'bubble') {
                  const bt = BUBBLE_TYPES[obj.bubbleStyle] || BUBBLE_TYPES.speech;
                  return (
                    <div key={obj.id} className={`be-item${isSelected?' selected':''}`} onClick={() => setSelectedObjectId(obj.id)}>
                      <div className="be-item-header">
                        <span className={`be-item-label${isSelected?' selected':''}`}>{oi+1}. 말풍선 ({bt.name})</span>
                        <button className="be-item-del" onClick={(e) => {e.stopPropagation(); deletePageObject(currentPageIdx, obj.id);}}>삭제</button>
                      </div>
                      {editorPages.length > 1 && (
                        <div className="be-ctrl-row" style={{padding:'4px 6px'}}>
                          <label className="be-ctrl-label" style={{flexShrink:0}}>페이지 이동</label>
                          <select className="be-select" value="" onClick={e=>e.stopPropagation()}
                            onChange={e => {
                              const toPage = parseInt(e.target.value);
                              if (!isNaN(toPage) && toPage !== currentPageIdx) {
                                moveObjectToPage(currentPageIdx, obj.id, toPage);
                              }
                            }}>
                            <option value="">선택...</option>
                            {editorPages.map((_, pi) => pi !== currentPageIdx && (
                              <option key={pi} value={pi}>페이지 {pi + 1}</option>
                            ))}
                          </select>
                        </div>
                      )}
                      <textarea className="be-textarea" value={obj.text} onChange={(e) => updatePageObject(currentPageIdx, obj.id, {text: e.target.value})}
                        placeholder="텍스트 입력..." onClick={(e) => e.stopPropagation()} />
                      <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>폰트</label>
                        <select className="be-select" value={obj.fontFamily || "'Noto Sans KR',sans-serif"} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {fontFamily: e.target.value})}>
                          {FONT_LIST.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
                        </select>
                      </div>
                      <div className="be-ctrl-row">
                        <label className="be-ctrl-label">크기</label>
                        <input type="range" min="8" max="48" value={obj.fontSize||25} onChange={e => updatePageObject(currentPageIdx, obj.id, {fontSize: parseInt(e.target.value)})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:20}}>{obj.fontSize||25}</span>
                      </div>
                      <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>글자색</label>
                        <input type="color" value={obj.customColor || bt.color || '#111111'} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {customColor: e.target.value})} style={{width:28,height:22,border:'1px solid #555',borderRadius:3,padding:0,cursor:'pointer'}}/>
                        {obj.customColor && <button className="be-ctrl-reset" onClick={e=>{e.stopPropagation(); updatePageObject(currentPageIdx, obj.id, {customColor: null});}}>초기화</button>}
                      </div>
                      <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>텍스트X</label>
                        <input type="range" min="-50" max="50" value={obj.textOffsetX||0} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {textOffsetX: parseInt(e.target.value)})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:24}}>{obj.textOffsetX||0}</span>
                      </div>
                      <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>텍스트Y</label>
                        <input type="range" min="-50" max="50" value={obj.textOffsetY||0} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {textOffsetY: parseInt(e.target.value)})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:24}}>{obj.textOffsetY||0}</span>
                      </div>
                      {bt.plainText && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>배경색</label>
                        <input type="color" value={obj.customBg || '#ffffff'} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {customBg: e.target.value})} style={{width:28,height:22,border:'1px solid #555',borderRadius:3,padding:0,cursor:'pointer'}}/>
                      </div>}
                      {bt.plainText && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>투명도</label>
                        <input type="range" min="0" max="100" value={obj.customBgOpacity ?? 100} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {customBgOpacity: parseInt(e.target.value)})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:28}}>{obj.customBgOpacity ?? 100}%</span>
                      </div>}
                      {bt.tail && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>꼬리위치</label>
                        <input type="range" min="10" max="90" value={Math.round((obj.tailPos??0.3)*100)}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {tailPos: parseInt(e.target.value)/100})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:24}}>{Math.round((obj.tailPos??0.3)*100)}%</span>
                      </div>}
                      {bt.tail && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>꼬리크기</label>
                        <input type="range" min="30" max="250" value={Math.round((obj.tailSize??1.0)*100)}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {tailSize: parseInt(e.target.value)/100})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:24}}>{Math.round((obj.tailSize??1.0)*100)}%</span>
                      </div>}
                      {bt.tail && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>꼬리모양</label>
                        <select className="be-select" value={obj.tailStyle || 'normal'} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {tailStyle: e.target.value})}>
                          <option value="normal">곡선</option>
                          <option value="straight">직선</option>
                          <option value="round">둥근</option>
                        </select>
                      </div>}
                      {bt.ellipse && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>둥근정도</label>
                        <input type="range" min="0" max="100" value={obj.roundness ?? 100} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {roundness: parseInt(e.target.value)})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:28}}>{obj.roundness ?? 100}%</span>
                      </div>}
                      <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                        {Object.entries(BUBBLE_TYPES).map(([key, t]) => (
                          <button key={key} className={`be-type-btn${obj.bubbleStyle===key?' active':''}`}
                            onClick={(e) => {e.stopPropagation(); updatePageObject(currentPageIdx, obj.id, {bubbleStyle: key});}}>{t.name}</button>
                        ))}
                      </div>
                    </div>
                  );

                                    <button className="btn btn-primary btn-xs" onClick={()=>regeneratePanel(i)} disabled={running}>생성</button>

                                </div>
                              </div>
                            </div>
                          </React.Fragment>
                        );

                      {/* Final drop zone + add button */}
                      <div className={`sb-drop-zone ${dragOverIdx === storyboard.length ? 'active' : ''}`}

                        onDrop={e => { e.preventDefault(); handleSbDrop(storyboard.length); setDragOverIdx(null); }}>
                        <button className="sb-insert-btn sb-insert-end" onClick={() => insertSbPanel(storyboard.length)} title="마지막에 패널 추가">+ 패널 추가</button>
                      </div>
                    </div>

                    {panels.filter(Boolean).length > 0 && <>
                      <button className="btn btn-success btn-sm" onClick={savePanelsToFirebase} disabled={running} style={{display:'flex',alignItems:'center',gap:4}}>💾 Firebase 저장</button>

                      <button className="btn btn-outline btn-sm" onClick={exportWebtoonPDF} disabled={running} style={{display:'flex',alignItems:'center',gap:4}}>📄 PDF 내보내기</button>
                      <button className="btn btn-outline btn-sm" onClick={() => openViewerLocal()} style={{display:'flex',alignItems:'center',gap:4}}>🔗 새 창으로 보기</button>
                      {projectId && currentEpisode &&
                        <button className="btn btn-outline btn-sm" onClick={() => {
                          const url = `${window.location.origin}/viewer.html?project=${encodeURIComponent(projectId)}&episode=${currentEpisode}`;
                          navigator.clipboard.writeText(url).then(() => log('공유 URL이 클립보드에 복사되었습니다!', 'success')).catch(() => { window.prompt('공유 URL을 복사하세요:', url); });
                        }} style={{display:'flex',alignItems:'center',gap:4}}>📋 공유 URL 복사</button>
                      }
                    </>}
                  </div>

                  {panels.filter(Boolean).length === 0 && <div className="placeholder">패널 이미지를 먼저 생성하세요</div>}

                  <div className="webtoon-strip">
                    {storyboard.map((panel, i) => {
                      if (!panels[i]) return null;
                      return (
                        <div key={i} style={{position:'relative'}}>
                          <img className="clickable-img" src={panels[i]} alt={`Panel ${i+1}`} onClick={() => showPreview(panels[i], `패널 ${i+1}: ${panel.description?.substring(0,60) || ""}`)} />
                          <div style={{position:'absolute',top:6,right:6,display:'flex',gap:4}}>
                            <button onClick={()=>saveSinglePanelToFirebase(i)} disabled={running} style={{background:'rgba(39,174,96,0.85)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4,transition:'background 0.2s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(39,174,96,1)'} onMouseOut={e=>e.currentTarget.style.background='rgba(39,174,96,0.85)'}>💾 Firebase</button>
                            <button onClick={()=>savePanelImage(panels[i], `${analysis?.title || 'webtoon'}_panel_${i+1}.png`)} style={{background:'rgba(0,0,0,0.7)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4,transition:'background 0.2s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,0,0,0.9)'} onMouseOut={e=>e.currentTarget.style.background='rgba(0,0,0,0.7)'}>⬇ 다운로드</button>
                          </div>
                          {/* Dialogue overlay */}
                          {panel.dialogue?.length > 0 && (
                            <div style={{position:'absolute',bottom:8,left:8,right:8,display:'flex',flexDirection:'column',gap:4}}>
                              {panel.dialogue.map((d, di) => (
                                <div key={di} style={{background:'rgba(255,255,255,0.92)',padding:'6px 12px',borderRadius:16,fontSize:13,fontWeight:500,boxShadow:'0 2px 8px rgba(0,0,0,.15)',maxWidth:'80%',alignSelf:di%2===0?'flex-start':'flex-end'}}>
                                  <span style={{fontSize:10,color:'var(--accent)',fontWeight:700}}>{d.speaker}</span><br/>{d.text}
                                </div>
                              ))}
                            </div>
                          )}
                          {panel.narration && (
                            <div style={{position:'absolute',top:8,left:8,right:8,background:'rgba(0,0,0,0.7)',color:'#fff',padding:'6px 12px',borderRadius:8,fontSize:12,fontStyle:'italic'}}>
                              {panel.narration}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}
        </div>

        {/* Log Panel */}
        <div style={{marginTop:12}}>
          <div className="log-toggle" onClick={() => setLogCollapsed(!logCollapsed)}>
            <span>{logCollapsed ? '▶' : '▼'}</span>
            <span>로그 ({logs.length})</span>
            <button className="btn btn-xs" onClick={(e) => {e.stopPropagation(); setLogs([]);}} style={{marginLeft:'auto'}}>초기화</button>
          </div>
          {!logCollapsed && <LogPanel logs={logs} />}
        </div>
      </div>

      {/* Prompt Helper Toggle Button */}
      {!promptHelperOpen && (
        <button className="prompt-helper-toggle" onClick={() => setPromptHelperOpen(true)}>
          프롬프트 도우미
        </button>
      )}

      {/* Prompt Helper Panel */}
      <div className={`prompt-helper-panel${promptHelperOpen ? '' : ' closed'}`}>
        <div className="prompt-helper-header">
          <h3>프롬프트 수정 도우미</h3>
          <button onClick={() => setPromptHelperOpen(false)} style={{background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',padding:'0 4px'}}>×</button>
        </div>
        <div className="prompt-helper-body">
          {/* Step 1: Paste original prompt */}
          <div className="prompt-helper-section">
            <div className="prompt-helper-label">① 기존 이미지 프롬프트 (영어)</div>
            <textarea className="prompt-helper-textarea"
              placeholder="기존 이미지 생성 프롬프트를 여기에 붙여넣으세요..."
              value={phOriginalPrompt}
              onChange={e => setPhOriginalPrompt(e.target.value)} />
            <button className="prompt-helper-btn primary" onClick={phTranslateToKorean} disabled={phLoading || !phOriginalPrompt.trim()}>
              {phLoading ? '번역 중...' : '한국어로 번역'}
            </button>
          </div>

          {/* Step 2: Korean translation */}
          {phKoreanTranslation && (
            <div className="prompt-helper-section">
              <div className="prompt-helper-label">② 한국어 번역 결과</div>
              <textarea className="prompt-helper-textarea korean" value={phKoreanTranslation} readOnly />
            </div>
          )}

          <hr className="prompt-helper-divider" />

          {/* Step 3: User changes */}
          <div className="prompt-helper-section">
            <div className="prompt-helper-label">③ 변경하고 싶은 내용 (한국어)</div>
            <textarea className="prompt-helper-textarea"
              placeholder="예: 머리색을 금발로 변경, 배경을 카페로, 더 따뜻한 조명으로..."
              value={phUserChanges}
              onChange={e => setPhUserChanges(e.target.value)} />
            <button className="prompt-helper-btn primary" onClick={phGenerateOptimized} disabled={phLoading || (!phOriginalPrompt.trim() && !phUserChanges.trim())}>
              {phLoading ? '생성 중...' : '최적 프롬프트 생성'}
            </button>
          </div>

          {/* Step 4: Result */}
          {phResultPrompt && (
            <div className="prompt-helper-section">
              <div className="prompt-helper-label">④ 최적화된 프롬프트 (영어)</div>
              <textarea className="prompt-helper-textarea result" value={phResultPrompt}
                onChange={e => setPhResultPrompt(e.target.value)} />
              <div style={{display:'flex',gap:8}}>
                <button className="prompt-helper-btn copy" style={{flex:1}} onClick={() => {
                  navigator.clipboard.writeText(phResultPrompt);
                  log('프롬프트가 클립보드에 복사되었습니다', 'success');
                }}>📋 복사</button>
                <button className="prompt-helper-btn secondary" style={{flex:1}} onClick={() => {
                  setPhOriginalPrompt(phResultPrompt);
                  setPhKoreanTranslation('');
                  setPhResultPrompt('');
                  setPhUserChanges('');
                }}>🔄 이 프롬프트로 다시 수정</button>
              </div>
            </div>
          )}

          <hr className="prompt-helper-divider" />
          <button className="prompt-helper-btn secondary" style={{width:'100%'}} onClick={() => {
            setPhOriginalPrompt(''); setPhKoreanTranslation(''); setPhUserChanges(''); setPhResultPrompt('');
          }}>전체 초기화</button>
        </div>
      </div>

      {/* ===== Batch Progress Floating Bar ===== */}
      {batchRunning && batchProgress && (
        <div className="batch-progress-bar">
          <div className="batch-progress-inner">
            <div className="batch-progress-text">
              <strong>연속 실행 중</strong> — {batchProgress.episode}화 ({batchProgress.current}/{batchProgress.total})
            </div>
            <div className="batch-progress-step">{batchProgress.step}</div>
            <div className="batch-progress-track">
              <div className="batch-progress-fill" style={{width: `${((batchProgress.current - 1) / batchProgress.total) * 100}%`}} />
            </div>
            <button className="btn btn-danger btn-xs" onClick={() => { abortRef.current = true; }}>중지</button>
          </div>
        </div>
      )}

      {/* ===== Batch Configuration Modal ===== */}
      {showBatchModal && (
        <div className="batch-overlay" onClick={() => setShowBatchModal(false)}>
          <div className="batch-modal" onClick={e => e.stopPropagation()}>
            <div className="batch-modal-header">
              <h3 style={{margin:0,fontSize:16}}>연속 실행 설정</h3>
              <button style={{background:'none',border:'none',color:'var(--text2)',fontSize:20,cursor:'pointer'}} onClick={() => setShowBatchModal(false)}>×</button>
            </div>

            <div className="batch-modal-body">
              {/* Per-step config */}
              {[
                {num: 1, label: 'Step 1: 스토리 분석', provKey: 'step1Provider', artKey: 'step1ArtStyle', defProv: 'imagen4'},
                {num: 2, label: 'Step 2: 레퍼런스 생성', provKey: 'step2Provider', artKey: 'step2ArtStyle', defProv: 'imagen4'},
                {num: 3, label: 'Step 3: 스토리보드', provKey: 'step3Provider', artKey: 'step3ArtStyle', defProv: 'grokImage'},
                {num: 4, label: 'Step 4: 패널 이미지', provKey: 'step4Provider', artKey: 'step4ArtStyle', defProv: 'grokImage'},
              ].map(st => (
                <div key={st.num} className="batch-config-section" style={{padding:10,background:'var(--surface2)',borderRadius:8}}>
                  <div className="batch-config-label" style={{fontSize:13,fontWeight:700,marginBottom:6}}>{st.label}</div>
                  <div style={{display:'flex',gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:'var(--text2)',marginBottom:2}}>이미지 모델</div>
                      <select className="form-select" style={{width:'100%',fontSize:12}} value={batchConfig[st.provKey]} onChange={e => setBatchConfig(prev => ({...prev, [st.provKey]: e.target.value}))}>
                        <option value="imagen4">Imagen 4</option>
                        <option value="grokImage">Grok Image (xAI)</option>
                        <option value="falAI">FLUX (fal.ai)</option>
                        <option value="stableDiffusion">Stable Diffusion 3.5</option>
                        <option value="nanoBanana">Gemini (레퍼런스)</option>
                        <option value="a2eImage">A2E (Manga/General + 레퍼런스)</option>
                        <option value="a2eNanoBanana">A2E Gemini (레퍼런스)</option>
                        <option value="flux2Pro">Flux 2 Pro (fal.ai)</option>
                        <option value="ninjaChat">NinjaChat (다중 모델)</option>
                      </select>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:'var(--text2)',marginBottom:2}}>아트 스타일</div>
                      <select className="form-select" style={{width:'100%',fontSize:12}} value={batchConfig[st.artKey]} onChange={e => setBatchConfig(prev => ({...prev, [st.artKey]: e.target.value}))}>
                        <option value="">현재 ({ART_STYLES[artStyle]?.name})</option>
                        {Object.entries(ART_STYLES).map(([key, style]) => (
                          <option key={key} value={key}>{style.name}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                </div>
              ))}

              {/* Force rerun toggle */}
              <div style={{padding:'8px 10px',background:'var(--surface2)',borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
                <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13}}>
                  <input type="checkbox" checked={!!batchConfig.forceRerun}
                    onChange={e => {
                      const val = e.target.checked;
                      setBatchConfig(prev => ({...prev, forceRerun: val}));
                      // Refresh episode list with new force setting
                      getUnprocessedEpisodes(val).then(eps => {
                        setBatchEpisodeList(eps.map(ep => ({...ep, selected: !ep.isFullyComplete})));
                      });
                    }} />
                  <span style={{fontWeight:600}}>완료된 에피소드도 강제 재실행</span>
                </label>
                <span style={{fontSize:10,color:'var(--text2)'}}>이미 패널이 생성된 에피소드를 처음부터 다시 실행</span>
              </div>

              {/* Episode list */}
              <div className="batch-config-section">
                <div className="batch-config-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>대상 에피소드 ({batchEpisodeList.filter(e => e.selected).length}/{batchEpisodeList.length} 선택)</span>
                  <button className="btn btn-xs btn-outline" onClick={() => {
                    const allSelected = batchEpisodeList.every(e => e.selected);
                    setBatchEpisodeList(prev => prev.map(e => ({...e, selected: !allSelected})));
                  }}>{batchEpisodeList.every(e => e.selected) ? '전체 해제' : '전체 선택'}</button>
                </div>
                {batchEpisodeList.length === 0 ? (
                  <div style={{padding:16,textAlign:'center',color:'var(--text2)',fontSize:13}}>
                    미처리 에피소드가 없습니다. 에피소드에 소스 텍스트를 먼저 입력하세요.
                  </div>
                ) : (
                  <div className="batch-episode-list">
                    {batchEpisodeList.map((ep, idx) => (
                      <label key={ep.number} className={`batch-episode-item ${ep.selected ? 'selected' : ''}`}>
                        <input type="checkbox" checked={!!ep.selected}
                          onChange={() => setBatchEpisodeList(prev => prev.map((e, i) => i === idx ? {...e, selected: !e.selected} : e))} />
                        <span className="batch-ep-num">{ep.number}화</span>
                        <span className="batch-ep-title">{ep.title}</span>
                        {ep.status === 'complete' && <span className="batch-ep-badge" style={{background:'#d4edda',color:'#155724'}}>완료 ({ep.generatedPanels}패널)</span>}
                        {ep.status === 'step3' && <span className="batch-ep-badge" style={{background:'#fff3cd',color:'#856404'}}>스토리보드 {ep.generatedPanels > 0 ? `(${ep.generatedPanels}/${ep.totalPanels})` : ''}</span>}
                        {ep.status === 'step1' && <span className="batch-ep-badge" style={{background:'#cce5ff',color:'#004085'}}>분석완료</span>}
                        {ep.status === 'none' && <span className="batch-ep-badge" style={{background:'#f8d7da',color:'#721c24'}}>미처리</span>}
                      </label>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="batch-modal-footer">
              <button className="btn btn-outline btn-sm" onClick={() => setShowBatchModal(false)}>취소</button>
              <button className="btn btn-primary" onClick={startBatchRun}
                disabled={batchEpisodeList.filter(e => e.selected).length === 0}>
                {batchEpisodeList.filter(e => e.selected).length}개 에피소드 연속 실행
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
