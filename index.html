<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#f5f5fa;--surface:#ffffff;--surface2:#f0f0f8;--surface3:#e8e8f0;
--border:#d0d0e0;--text:#1a1a2e;--text2:#666688;

--success:#00a8a8;--warn:#d4a017;--err:#e74c3c;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),#e0457b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-tabs{display:flex;gap:4px;margin-left:24px;flex:1;}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.api-key-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;}
.api-key-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

.tabs-container{display:flex;gap:12px;height:100%;min-height:0;}
.tab-content{flex:1;display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.tab-content.active{display:flex;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}

.log-panel{background:#1a1a2e;border-radius:8px;padding:12px;max-height:150px;overflow-y:auto;font-family:'Consolas','Monaco',monospace;font-size:11px;color:#a0a0c0;border:1px solid var(--border);}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;}

.key-status{display:flex;align-items:center;gap:6px;margin:10px 0;font-size:12px;color:var(--text2);}
.key-status .dot{width:8px;height:8px;border-radius:50%;background:#e03030;}
.key-status .dot.on{background:#27ae60;}
.edit-prompt-area{display:flex;flex-direction:column;gap:8px;background:var(--surface2);padding:10px;border-radius:6px;}

.placeholder{padding:40px;text-align:center;color:var(--text2);font-size:13px;background:var(--surface);border-radius:8px;border:1px dashed var(--border);}
::-webkit-scrollbar{width:6px;}

@media(max-width:900px){
.grid-2,.grid-3{grid-template-columns:1fr;}
.scene-grid{grid-template-columns:1fr;}
.nav-tabs{flex-wrap:wrap;}

<body>
<div id="root"></div>
<script type="text/babel">

// ============================================================
// Firebase / Firestore Project Management
// ============================================================
let _db = null;
function getFirebaseConfig() {
  try {
    const raw = localStorage.getItem('firebase_config');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function saveFirebaseConfig(cfg) {
  localStorage.setItem('firebase_config', JSON.stringify(cfg));
  _db = null;
  initFirebase();
}
function initFirebase() {
  const cfg = getFirebaseConfig();
  if (!cfg || !cfg.apiKey || !cfg.projectId) return null;
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(cfg);
    }
    _db = firebase.firestore();
    return _db;
  } catch(e) { console.error('Firebase init error:', e); return null; }
}
function getDb() {
  if (_db) return _db;
  return initFirebase();
}

async function fbListProjects() {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const snap = await db.collection('webtoon_projects').orderBy('updatedAt','desc').get();
  return snap.docs.map(d => ({id: d.id, ...d.data()}));
}

async function fbSaveProject(projectId, data) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const ref = db.collection('webtoon_projects').doc(projectId);
  const payload = {
    ...data,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  if (payload.scenes) {
    payload.sceneCount = payload.scenes.length;
  }
  await ref.set(payload, {merge: true});
  return projectId;
}

async function fbLoadProject(projectId) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const doc = await db.collection('webtoon_projects').doc(projectId).get();
  if (!doc.exists) throw new Error('Project not found');
  return {id: doc.id, ...doc.data()};
}

async function fbDeleteProject(projectId) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const phases = await db.collection('webtoon_projects').doc(projectId).collection('phases').get();
  const batch = db.batch();
  phases.docs.forEach(d => batch.delete(d.ref));
  batch.delete(db.collection('webtoon_projects').doc(projectId));
  await batch.commit();
}

// Strip base64 for metadata docs, but collect images separately
function stripBase64(obj, collectedImages) {
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(item => stripBase64(item, collectedImages));
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (typeof v === 'string' && v.startsWith('data:') && v.length > 500) {
      const imgId = 'img_' + Math.random().toString(36).substring(2, 10);
      out[k] = '[img:' + imgId + ']';
      if (collectedImages) collectedImages.push({id: imgId, data: v, key: k});
    } else if (typeof v === 'object' && v !== null) {
      out[k] = stripBase64(v, collectedImages);
    } else if (typeof v === 'string' && v.length > 900000) {
      out[k] = v.substring(0, 900000) + '...[truncated]';
    } else {
      out[k] = v;
    }
  }
  return out;
}

// Restore base64 images from collected image docs back into data
function restoreBase64(obj, imageMap) {
  if (!obj || typeof obj !== 'object') {
    if (typeof obj === 'string' && obj.startsWith('[img:') && obj.endsWith(']')) {
      const imgId = obj.slice(5, -1);
      return imageMap[imgId] || obj;
    }
    return obj;
  }
  if (Array.isArray(obj)) return obj.map(item => restoreBase64(item, imageMap));
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    out[k] = restoreBase64(v, imageMap);
  }
  return out;
}

async function fbSavePhase(projectId, phaseName, phaseData) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const phaseRef = db.collection('webtoon_projects').doc(projectId).collection('phases').doc(phaseName);
  const collectedImages = [];
  const safeData = stripBase64(phaseData, collectedImages);
  // Save metadata (without base64)
  await phaseRef.set({
    ...safeData,
    imageCount: collectedImages.length,
    savedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  // Save images as separate documents in subcollection (each < 1MB)
  const imgColl = phaseRef.collection('images');
  // Delete old images first
  const oldImgs = await imgColl.get();
  const delBatch = db.batch();
  oldImgs.docs.forEach(d => delBatch.delete(d.ref));
  if (oldImgs.docs.length > 0) await delBatch.commit();
  // Save new images in batches of 5
  for (let i = 0; i < collectedImages.length; i += 5) {
    const batch = db.batch();
    for (let j = i; j < Math.min(i + 5, collectedImages.length); j++) {
      const img = collectedImages[j];
      // Split large images into chunks if needed (Firestore 1MB limit)
      const data = img.data;
      if (data.length > 900000) {
        // Store in multiple chunks
        const chunkSize = 800000;
        const chunks = Math.ceil(data.length / chunkSize);
        batch.set(imgColl.doc(img.id), {key: img.key, chunks, totalLength: data.length});
        for (let c = 0; c < chunks; c++) {
          batch.set(imgColl.doc(img.id + '_chunk_' + c), {data: data.substring(c * chunkSize, (c + 1) * chunkSize), idx: c});
        }
      } else {
        batch.set(imgColl.doc(img.id), {key: img.key, data});
      }
    }
    await batch.commit();
  }
}

async function fbLoadPhase(projectId, phaseName) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const phaseRef = db.collection('webtoon_projects').doc(projectId).collection('phases').doc(phaseName);
  const doc = await phaseRef.get();
  if (!doc.exists) return null;
  const phaseData = doc.data();
  // Load images from subcollection
  const imgSnap = await phaseRef.collection('images').get();
  const imageMap = {};
  const chunkMeta = {};
  const chunkData = {};
  imgSnap.docs.forEach(d => {
    const dData = d.data();
    if (d.id.includes('_chunk_')) {
      // This is a chunk
      const parentId = d.id.split('_chunk_')[0];
      if (!chunkData[parentId]) chunkData[parentId] = {};
      chunkData[parentId][dData.idx] = dData.data;
    } else if (dData.chunks) {
      // This is chunk metadata
      chunkMeta[d.id] = dData;
    } else if (dData.data) {
      // Regular image doc
      imageMap[d.id] = dData.data;
    }
  });
  // Reassemble chunked images
  for (const [imgId, meta] of Object.entries(chunkMeta)) {
    const chunks = chunkData[imgId] || {};
    let assembled = '';
    for (let i = 0; i < meta.chunks; i++) {
      assembled += (chunks[i] || '');
    }
    if (assembled.length > 0) imageMap[imgId] = assembled;
  }
  // Restore base64 into phase data
  return restoreBase64(phaseData, imageMap);
}

async function fbListPhases(projectId) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const snap = await db.collection('webtoon_projects').doc(projectId).collection('phases').orderBy('savedAt','desc').get();
  return snap.docs.map(d => ({id: d.id, ...d.data()}));
}

// Load all phase data for a project and return reconstructed state
async function fbLoadAllPhases(projectId) {
  const result = {globalAsset: null, scenes: [], sourceText: '', phase: 'IDLE'};
  try {
    const p1 = await fbLoadPhase(projectId, 'phase1_assets');
    if (p1) {
      result.globalAsset = p1.globalAsset || null;
      result.sourceText = p1.sourceTextFull || '';
      result.phase = 'PHASE_1_COMPLETE';
    }
    const p2 = await fbLoadPhase(projectId, 'phase2_scenes');
    if (p2 && p2.scenes) {
      result.scenes = p2.scenes;
      result.phase = 'PHASE_2_COMPLETE';
    }
    const p3 = await fbLoadPhase(projectId, 'phase3_prompts');
    if (p3 && p3.scenes) {
      // Merge P3 data (prompts) into scenes
      for (const s3 of p3.scenes) {
        const existing = result.scenes.find(s => s.sceneNumber === s3.sceneNumber);
        if (existing) {
          existing.imagePrompt = s3.imagePrompt || existing.imagePrompt;
          existing.status = s3.status || existing.status;
        }
      }
      result.phase = 'PHASE_3_COMPLETE';
    }
    const p3img = await fbLoadPhase(projectId, 'phase3_images');
    if (p3img && p3img.scenes) {
      for (const si of p3img.scenes) {
        const existing = result.scenes.find(s => s.sceneNumber === si.sceneNumber);
        if (existing) {
          existing.anchorImage = si.anchorImage || existing.anchorImage;
          existing.status = si.status || existing.status;
        }
      }
    }
    const p4 = await fbLoadPhase(projectId, 'phase4_video');
    if (p4 && p4.scenes) {
      for (const s4 of p4.scenes) {
        const existing = result.scenes.find(s => s.sceneNumber === s4.sceneNumber);
        if (existing) {
          existing.video = s4.video || existing.video;
          existing.status = s4.status || existing.status;
        }
      }
      result.phase = 'PHASE_4_COMPLETE';
    }
    const p5 = await fbLoadPhase(projectId, 'phase5_webtoon');
    if (p5 && p5.scenes) {
      for (const s5 of p5.scenes) {
        const existing = result.scenes.find(s => s.sceneNumber === s5.sceneNumber);
        if (existing) {
          existing.webtoonAssets = s5.webtoonAssets || existing.webtoonAssets;
        }
      }
      result.phase = 'PHASE_5_COMPLETE';
    }
  } catch(e) { console.warn('[fbLoadAllPhases] Error:', e); }
  return result;
}

async function autoLoadServerConfig() {
  try {
    const res = await fetch('/api/firebase-config');
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    console.log('[Config] Server config loaded:', data.status);
    if (data.firebase) {
      saveFirebaseConfig(data.firebase);
      console.log('[Config] Firebase auto-configured from server');
    }
    if (data.vertex) {
      if (data.vertex.projectId) localStorage.setItem('VERTEX_PROJECT_ID', data.vertex.projectId);
      if (data.vertex.location) localStorage.setItem('VERTEX_LOCATION', data.vertex.location);
      if (data.vertex.accessToken) localStorage.setItem('VERTEX_ACCESS_TOKEN', data.vertex.accessToken);
      if (data.vertex.grokApiKey) localStorage.setItem('GROK_API_KEY', data.vertex.grokApiKey);
      console.log('[Config] Vertex AI auto-configured from server');
    }
  } catch(e) {
    console.log('[Config] Server config not available, using localStorage:', e.message);
    try { initFirebase(); } catch(e2) {}
  }
}
autoLoadServerConfig();

const {useState,useCallback,useRef,useEffect,useMemo} = React;

// ============================================================
// TOKEN & API KEY MANAGEMENT
// ============================================================

let _cachedToken = null;
let _tokenExpiry = 0;

async function fetchFreshToken() {
  const now = Date.now();
  if (_cachedToken && _tokenExpiry > now + 300000) {
    return _cachedToken;
  }
  try {
    const res = await fetch('/api/vertex-token');
    if (res.ok) {
      const data = await res.json();
      if (data.access_token) {
        _cachedToken = data.access_token;
        _tokenExpiry = now + (data.expires_in || 3600) * 1000;
        localStorage.setItem('VERTEX_ACCESS_TOKEN', data.access_token);
        console.log('[Token] Fresh token obtained from server');
        return _cachedToken;
      }
    }
  } catch(e) {
    console.warn('[Token] Server token fetch failed, falling back to localStorage:', e.message);
  }
  return localStorage.getItem('VERTEX_ACCESS_TOKEN');
}

async function getVertexConfig() {
  const projectId = localStorage.getItem('VERTEX_PROJECT_ID');
  const location = localStorage.getItem('VERTEX_LOCATION') || 'us-central1';
  const accessToken = await fetchFreshToken();
  if (!projectId || !accessToken) throw new Error('Vertex AI config not set');
  return {projectId, location, accessToken};
}

async function getGeminiKey() {
  return (await getVertexConfig()).accessToken;
}

function setGeminiKey(k) { localStorage.setItem('GEMINI_API_KEY', k); }
function hasGeminiKey() { return !!(localStorage.getItem('VERTEX_PROJECT_ID') || localStorage.getItem('GEMINI_API_KEY')); }

function getXaiKey() {
  const k = localStorage.getItem('XAI_API_KEY');
  if (!k) throw new Error('XAI_KEY_MISSING');
  return k;
}

function setXaiKey(k) { localStorage.setItem('XAI_API_KEY', k); }
function hasXaiKey() { return !!localStorage.getItem('XAI_API_KEY'); }

// ============================================================
// API CLIENTS
// ============================================================

async function callGemini(systemPrompt, userPrompt, opts={}) {
  const model = opts.model || 'gemini-2.5-flash';
  const thinkBudget = opts.thinkBudget ?? 0;
  const {projectId, location, accessToken} = await getVertexConfig();
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:generateContent`;
  const body = {
    systemInstruction: {parts:[{text:systemPrompt}]},
    contents: [{role:'user',parts:[{text:userPrompt}]}],
    generationConfig: {
      temperature: opts.temperature || 0.7,
      topP: opts.topP || 0.9,
      maxOutputTokens: opts.maxTokens || 8192,
      thinkingConfig: {thinkingBudget: thinkBudget}
    }
  };
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(body)});
  if(!res.ok) {
    const errText = await res.text();
    throw new Error('Gemini API ' + res.status + ': ' + errText.substring(0,200));
  }
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const textParts = parts.filter(p => p.text && !p.thought);
  return textParts.map(p => p.text).join('');
}

function extractBase64(dataUrl) {
  if (!dataUrl || typeof dataUrl !== 'string') return null;
  const m = dataUrl.match(/^data:image\/\w+;base64,(.+)$/);
  return m ? m[1] : null;
}

async function callImagen(prompt, opts = {}) {
  const {projectId, location, accessToken} = await getVertexConfig();
  const model = opts.model || 'imagen-4.0-ultra-generate-001';
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:predict`;
  const instance = {prompt};
  if (opts.referenceImages && opts.referenceImages.length > 0) {
    instance.referenceImages = opts.referenceImages.slice(0, 3).map(ref => ({
      referenceImage: {bytesBase64Encoded: extractBase64(ref.image) || ''},
      referenceType: 'REFERENCE_TYPE_SUBJECT',
      subjectDescription: ref.description || ''
    })).filter(r => r.referenceImage.bytesBase64Encoded);
  }
  const body = {instances:[instance], parameters:{sampleCount: opts.sampleCount||1, aspectRatio: opts.aspectRatio||'1:1', personGeneration:'allow_all'}};
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(body)});
  if (!res.ok) {
    const errText = await res.text();
    if (errText.includes('referenceImages') || errText.includes('REFERENCE_TYPE')) {
      console.warn('[Imagen] Reference image not supported, retrying without...');
      delete instance.referenceImages;
      const retryBody = {instances:[instance], parameters:{sampleCount: opts.sampleCount||1, aspectRatio: opts.aspectRatio||'1:1', personGeneration:'allow_all'}};
      const res2 = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(retryBody)});
      if (!res2.ok) throw new Error('Imagen API ' + res2.status + ': ' + (await res2.text()).substring(0,200));
      const data2 = await res2.json();
      if (!data2.predictions || !data2.predictions.length) throw new Error('No predictions returned');
      return data2.predictions.map(p => `data:image/png;base64,${p.bytesBase64Encoded}`);
    }
    throw new Error('Imagen API ' + res.status + ': ' + errText.substring(0, 200));
  }
  const data = await res.json();
  const predictions = data.predictions;
  if (!predictions || predictions.length === 0) throw new Error('No predictions returned');
  return predictions.map(p => `data:image/png;base64,${p.bytesBase64Encoded}`);
}

async function callNanoBanana(prompt, opts = {}) {
  const {projectId, location, accessToken} = await getVertexConfig();
  const model = opts.model || 'gemini-2.0-flash-preview-image-generation';
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:generateContent`;
  const parts = [];
  if (opts.referenceImages && opts.referenceImages.length > 0) {
    parts.push({text: 'Reference character/background images for visual consistency. Generate new image matching these characters exactly:'});
    for (const ref of opts.referenceImages.slice(0, 3)) {
      const b64 = extractBase64(ref.image);
      if (b64) {
        parts.push({inlineData: {mimeType: 'image/png', data: b64}});
        if (ref.description) parts.push({text: '[Ref: ' + ref.description.substring(0, 200) + ']'});
      }
    }
  }
  parts.push({text: prompt});
  const body = {
    contents: [{role:'user', parts}],
    generationConfig: {responseModalities: ['TEXT','IMAGE'], temperature: 1.0}
  };
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(body)});
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('NanoBanana API ' + res.status + ': ' + errText.substring(0, 200));
  }
  const data = await res.json();
  const resParts = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) || [];
  const imgParts = resParts.filter(p => p.inlineData && p.inlineData.mimeType && p.inlineData.mimeType.startsWith('image/'));
  if (imgParts.length === 0) throw new Error('No image generated');
  return imgParts.map(p => `data:${p.inlineData.mimeType};base64,${p.inlineData.data}`);
}

async function callVeo(prompt, imageBase64, opts={}) {
  const {projectId, location, accessToken} = await getVertexConfig();
  const model = opts.model || 'veo-2.0-generate-001';
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:predictLongRunning`;
  console.log('[callVeo] URL:', url);
  const instances = [{prompt: prompt}];
  if(imageBase64) {
    let b64 = imageBase64.replace(/^data:image\/[^;]+;base64,/,'');
    if (b64.length > 3000000) {
      console.warn('[callVeo] Image base64 too large ('+Math.round(b64.length/1024)+'KB), skipping image');
    } else {
      instances[0].image = {bytesBase64Encoded: b64, mimeType: 'image/jpeg'};
      console.log('[callVeo] Image included: ' + Math.round(b64.length/1024) + 'KB');
    }
  }
  const body = {
    instances,
    parameters: {
      aspectRatio: opts.aspectRatio || '16:9',
      personGeneration: 'allow_all',
      durationSeconds: opts.duration || 5
    }
  };
  const bodyStr = JSON.stringify(body);
  console.log('[callVeo] Request body size: ' + Math.round(bodyStr.length/1024) + 'KB');
  let res;
  try {
    res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:bodyStr});
  } catch(fetchErr) {
    console.error('[callVeo] Fetch failed:', fetchErr);
    // Retry without image if payload was too large
    if (imageBase64) {
      console.log('[callVeo] Retrying without image...');
      const retryBody = JSON.stringify({instances:[{prompt}], parameters:body.parameters});
      res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:retryBody});
    } else {
      throw new Error('Veo fetch failed: ' + fetchErr.message);
    }
  }
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('Veo API ' + res.status + ': ' + errText.substring(0, 300));
  }
  const opData = await res.json();
  if (!opData.name) throw new Error('No operation name returned');
  const pollUrl = `https://${location}-aiplatform.googleapis.com/v1/${opData.name}`;
  let attempt = 0;
  while(attempt < 30) {
    await new Promise(r => setTimeout(r, 2000));
    const pollRes = await fetch(pollUrl, {method:'GET', headers:{'Authorization':'Bearer '+accessToken}});
    if (!pollRes.ok) throw new Error('Poll failed: ' + pollRes.status);
    const pollData = await pollRes.json();
    if (pollData.done) {
      if (pollData.response) {
        const predictions = pollData.response.predictions || [];
        if (predictions.length > 0 && predictions[0].mpeg4Bytes) {
          return predictions[0].mpeg4Bytes;
        }
      }
      throw new Error('No video generated');
    }
    attempt++;
  }
  throw new Error('Veo generation timeout');
}

    const timer = setTimeout(checkConfig, 2000);
    return () => clearTimeout(timer);
  }, []);

  const callTextLF = useCallback(async (systemPrompt, userPrompt, opts={}) => {
    if (textProvider === 'grok') {
      return await callGrok(systemPrompt, userPrompt, opts);
    } else {
      return await callGemini(systemPrompt, userPrompt, opts);
    }
  }, [textProvider]);

  const callImageLF = useCallback(async (prompt, opts) => {
    opts = opts || {};
    const refs = opts.referenceImages || [];
    if (imageProvider === 'grok') {
      return await callGrokImage(prompt);
    } else if (imageProvider === 'nanoBananaPro') {
      return await callNanoBanana(prompt, {model: 'gemini-2.0-pro-preview-image-generation', referenceImages: refs});
    } else if (imageProvider === 'nanoBanana') {
      return await callNanoBanana(prompt, {model: 'gemini-2.0-flash-preview-image-generation', referenceImages: refs});
    } else {
      const model = imageProvider === 'imagen4ultra' ? 'imagen-4.0-ultra-generate-001' : 'imagen-4.0-generate-001';
      return await callImagen(prompt, Object.assign({aspectRatio:'9:16', model, referenceImages: refs}, opts));
    }
  }, [imageProvider]);

  const phaseRef = useRef('IDLE');
  useEffect(() => { phaseRef.current = phase; }, [phase]);
  const transition = useCallback((newPhase, errorMessage='') => {
    const cur = phaseRef.current;
    const allowed = STATE_TRANSITIONS[cur];
    if (!allowed || !allowed.includes(newPhase)) { log('[FSM] Invalid: '+cur+' -> '+newPhase, 'error'); return false; }
    phaseRef.current = newPhase;
    setPhase(newPhase);
    setPhaseHistory(prev => [...prev, { phase: newPhase, stamp: new Date().toISOString(), ...(errorMessage && { error: errorMessage }) }]);
    if (newPhase === 'ERROR') setErrorMsg(errorMessage || 'Unknown error');
    log('[FSM] '+cur+' -> '+newPhase, newPhase === 'ERROR' ? 'error' : 'info');
    return true;
  }, [log]);

  const runPhase1 = useCallback(async () => {
    transition('PHASE_1_ANALYZING');
    log('[Phase 1-A] Extracting characters from story...');
    const charRaw = await callTextLF(PROMPTS.CHARACTER_EXTRACTION, sourceText);
    let characters;
    try { characters = JSON.parse(charRaw.replace(/```json\n?|```/g, '').trim()); }
    catch(e) { throw new Error('Character JSON parse failed: '+e.message); }
    log('[Phase 1-A] '+characters.length+' characters extracted');
    if (abortRef.current) throw new Error('Aborted');

    log('[Phase 1-A] Extracting locations...');
    const locRaw = await callTextLF(PROMPTS.LOCATION_EXTRACTION, sourceText);
    let backgrounds;
    try { backgrounds = JSON.parse(locRaw.replace(/```json\n?|```/g, '').trim()); }
    catch(e) { throw new Error('Location JSON parse failed: '+e.message); }
    log('[Phase 1-A] '+backgrounds.length+' locations extracted');
    if (abortRef.current) throw new Error('Aborted');

    transition('PHASE_1_GENERATING_ASSETS');
    for (let i=0; i<characters.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      log('[Phase 1-B] Character image '+(i+1)+'/'+characters.length+': '+characters[i].name);
      try { const urls = await callImageLF(characters[i].referencePrompt+', character sheet, multiple angles, white background, manhwa style');
        characters[i].referenceImageUrl = urls[0]; }
      catch(e) { log('[Phase 1-B] Char image failed: '+e.message, 'warn'); characters[i].referenceImageUrl = null; }
    }
    for (let i=0; i<backgrounds.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      log('[Phase 1-B] Background image '+(i+1)+'/'+backgrounds.length+': '+backgrounds[i].name);
      try { const urls = await callImageLF(backgrounds[i].referencePrompt+', detailed background, no characters, manhwa style');
        backgrounds[i].referenceImageUrl = urls[0]; }
      catch(e) { log('[Phase 1-B] BG image failed: '+e.message, 'warn'); backgrounds[i].referenceImageUrl = null; }
    }
    const asset = { characters, backgrounds, styleGuide:{artStyle:'manhwa',colorPalette:[],moodBoard:''}, createdAt:new Date().toISOString(), version:1 };
    setGlobalAsset(asset);
    transition('PHASE_1_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase1_assets', {globalAsset: asset, sourceTextFull: sourceText}); log('[AutoSave] Phase 1 saved'); } catch(e){log('[AutoSave] Phase 1 error: '+e.message,'warn');} }
    log('[Phase 1] Complete: '+characters.length+' characters, '+backgrounds.length+' backgrounds');
  }, [sourceText, callTextLF, callImageLF, transition, log, currentProjectId]);

  const runPhase2 = useCallback(async () => {
    transition('PHASE_2_SPLITTING');
    log('[Phase 2-A] Splitting story into scenes...');
    const sceneRaw = await callTextLF(PIPELINE_A_SYSTEM.sceneSplit, sourceText, {maxTokens: 16384});
    let scenes;
    try {
      let cleaned = sceneRaw.replace(/```json\n?|```/g, '').trim();
      const arrStart = cleaned.indexOf('[');
      const arrEnd = cleaned.lastIndexOf(']');
      if (arrStart >= 0 && arrEnd > arrStart) { cleaned = cleaned.substring(arrStart, arrEnd + 1); }
      try { scenes = JSON.parse(cleaned); } catch(e1) {
        const lastBrace = cleaned.lastIndexOf('}');
        if (lastBrace > 0) { cleaned = cleaned.substring(0, lastBrace+1) + ']'; scenes = JSON.parse(cleaned); log('[Phase 2] Recovered truncated JSON','warn'); }
        else { throw e1; }
      }
    } catch(e) { throw new Error('Scene split JSON parse failed: ' + e.message); }
    log('[Phase 2-A] '+scenes.length+' scenes identified');
    if (abortRef.current) throw new Error('Aborted');

    transition('PHASE_2_DIRECTING');
    for (let i=0; i<scenes.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = scenes[i];
      log('[Phase 2-B] DP analysis for scene '+(i+1)+'/'+scenes.length);
      const charInfo = (globalAsset?.characters||[]).filter(c=>(sc.keyCharacters||[]).includes(c.id)).map(c=>c.name+': '+c.referencePrompt).join('\n');
      const bgInfo = (globalAsset?.backgrounds||[]).filter(b=>b.id===sc.primaryLocation).map(b=>b.name+': '+b.referencePrompt)[0]||'generic background';
      const dpInput = 'Scene: '+sc.summary+'\nDialogues: '+JSON.stringify(sc.dialogues)+'\nMood: '+sc.narrativeMood+'\n\nAvailable Characters:\n'+charInfo+'\n\nBackground:\n'+bgInfo;
      try { const compRaw = await callTextLF(PROMPTS.DP_COMPOSITION, dpInput, {maxTokens: 16384});
        sc.compositionData = JSON.parse(compRaw.replace(/```json\n?|```/g, '').trim()); }
      catch(e) { log('[Phase 2-B] DP failed scene '+(i+1)+': '+e.message, 'warn'); sc.compositionData = null; }
      sc.status = 'composed';
    }
    lfScenesRef.current = scenes; setLfScenes(scenes);
    transition('PHASE_2_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase2_scenes', {scenes}); log('[AutoSave] Phase 2 saved'); } catch(e){log('[AutoSave] Phase 2 error: '+e.message,'warn');} }
    log('[Phase 2] Complete: '+scenes.length+' scenes with composition data');
  }, [sourceText, globalAsset, callTextLF, transition, log, currentProjectId]);

  const runPhase3 = useCallback(async () => {
    transition('PHASE_3_GENERATING');
    log('[Phase 3] Generating image prompts...');
    const updated = [...lfScenesRef.current];
    for (let i=0; i<updated.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = updated[i];
      log('[Phase 3] Prompt ' + (i+1) + '/' + updated.length);
      if (!sc.compositionData) { log('[Phase 3] Scene ' + (i+1) + ' no composition - skip'); continue; }
      try {
        const comp = sc.compositionData;
        const charDescs = (comp.characterPoses||[]).map(cp => {
          const cr = (globalAsset||{}).characters ? globalAsset.characters.find(ch=>ch.id===cp.characterId) : null;
          return (cr ? cr.referencePrompt : '') + ' ' + (cp.pose||'') + ' pose, ' + (cp.expression||'') + ' expression';
        }).filter(Boolean).join('; ');
        const bgRef = (globalAsset||{}).backgrounds ? globalAsset.backgrounds.find(b=>b.id===sc.primaryLocation) : null;
        const bgDesc = bgRef ? bgRef.referencePrompt : 'detailed background';
        const userMsg = 'Scene: ' + sc.summary + '\nComposition: ' + JSON.stringify(comp) + '\nCharacter prompts: ' + charDescs + '\nBackground: ' + bgDesc;
        const pRaw = await callTextLF(PIPELINE_A_SYSTEM.imagePrompt, userMsg, {maxTokens:4096});
        try { sc.imagePrompt = JSON.parse(pRaw.replace(/```json|\n|```/g,'')); } catch { sc.imagePrompt = {prompt: pRaw}; }
        sc.status = 'prompt_ready';
        log('[Phase 3] Scene ' + (i+1) + ' prompt generated');
      } catch(e) { log('[Phase 3] Scene ' + (i+1) + ' prompt failed: ' + e.message, 'warn'); }
    }
    lfScenesRef.current = updated;
    setLfScenes([...updated]);
    transition('PHASE_3_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase3_prompts', {scenes: updated}); log('[AutoSave] Phase 3 saved'); } catch(e){log('[AutoSave] Phase 3 error: '+e.message,'warn');} }
    log('[Phase 3] Complete - prompts ready');
  }, [globalAsset, callTextLF, transition, log, currentProjectId]);

  const runPhase4 = useCallback(async () => {
    transition('PHASE_4_GENERATING');
    log('[Phase 4] Preparing video motion prompts...');
    const updated = [...lfScenesRef.current];
    for (let i=0; i<updated.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = updated[i];
      log('[Phase 4] Video prompt ' + (i+1) + '/' + updated.length);
      try {
        const sceneInfo = 'Scene: ' + sc.summary + '\nComposition: ' + JSON.stringify(sc.compositionData||{});
        const motionRaw = await callTextLF(PIPELINE_B_SYSTEM.motionPrompt, sceneInfo, {maxTokens:2048});
        sc.videoPrompt = { motionPrompt: motionRaw.trim(), aspectRatio:'9:16', duration:5 };
        log('[Phase 4] Scene ' + (i+1) + ' video prompt ready');
      } catch(e) { log('[Phase 4] Scene ' + (i+1) + ' failed: ' + e.message, 'warn'); }
    }
    lfScenesRef.current = updated;
    setLfScenes([...updated]);
    transition('PHASE_4_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase4_video', {scenes: updated}); log('[AutoSave] Phase 4 saved'); } catch(e){log('[AutoSave] Phase 4 error: '+e.message,'warn');} }
    log('[Phase 4] Complete - video prompts ready');
  }, [callTextLF, transition, log, currentProjectId]);

  // === Scene-type panel configurations ===
  const PANEL_CONFIGS = {
    dialogue: {label:'대화', panels:[
      {type:'medium_two_shot', prompt:'medium two-shot of characters talking face to face, eye-level angle, warm lighting, manhwa style, speech bubble composition'},
      {type:'close_up_speaker', prompt:'close-up portrait of the speaking character, expressive face, detailed eyes, manhwa style panel'},
      {type:'over_shoulder', prompt:'over-the-shoulder shot, listener POV, depth of field background blur, manhwa style'},
      {type:'reaction_close', prompt:'extreme close-up reaction shot, dramatic expression, speed lines, manhwa emotion panel'},
      {type:'environment_context', prompt:'wide establishing shot showing the conversation setting, atmospheric lighting, manhwa style'}
    ]},
    action: {label:'액션', panels:[
      {type:'dynamic_wide', prompt:'dynamic wide-angle action shot, dramatic perspective, speed lines, impact effects, manhwa action panel'},
      {type:'impact_close', prompt:'extreme close-up of impact moment, motion blur, debris particles, intense manhwa style'},
      {type:'sequence_motion', prompt:'multi-frame motion sequence, character in dynamic pose mid-action, manga speed lines'},
      {type:'aerial_establishing', prompt:'dramatic aerial/bird-eye view of the action scene, epic scale, manhwa cinematic composition'},
      {type:'aftermath_detail', prompt:'detail shot of aftermath, broken objects or settling dust, tense atmosphere, manhwa style'},
      {type:'character_power', prompt:'dramatic character power-up or attack pose, glowing effects, energy lines, manhwa style'}
    ]},
    emotion: {label:'감정', panels:[
      {type:'extreme_close_eyes', prompt:'extreme close-up of eyes showing emotion, detailed iris, tears or sparkle, manhwa emotional art'},
      {type:'symbolic_atmosphere', prompt:'symbolic atmospheric panel, visual metaphor for the emotion, abstract background, manhwa style'},
      {type:'full_body_posture', prompt:'full body shot showing emotional posture, body language expressing feelings, soft lighting, manhwa'},
      {type:'memory_flashback', prompt:'soft-focus flashback or memory panel, dreamy vignette effect, faded colors, manhwa style'},
      {type:'close_up_hands', prompt:'detail close-up of hands showing emotion (clenching, trembling, reaching), manhwa style'},
      {type:'silent_wide', prompt:'wide silent panel, character alone in environment, atmospheric mood, cinematic manhwa composition'},
      {type:'face_shadow', prompt:'half-shadow face portrait, dramatic chiaroscuro lighting, intense gaze, manhwa emotional panel'}

    establishing: {label:'배경전환', panels:[
      {type:'panoramic_wide', prompt:'panoramic ultra-wide establishing shot, detailed environment, atmospheric perspective, manhwa background art'},
      {type:'detail_texture', prompt:'architectural or nature detail close-up, texture and material focus, ambient lighting, manhwa style'},
      {type:'time_indicator', prompt:'sky/weather establishing shot indicating time of day, clouds, sun/moon position, atmospheric manhwa'},

      {type:'slice_of_life_wide', prompt:'slice-of-life wide shot, everyday activity, warm natural lighting, cozy manhwa style'},
      {type:'object_detail', prompt:'still-life detail of meaningful object in scene, shallow depth of field, soft lighting, manhwa'},
      {type:'character_candid', prompt:'candid character moment, natural relaxed pose, gentle expression, soft manhwa art style'},
      {type:'environment_mood', prompt:'environment establishing shot with mood lighting, peaceful atmosphere, manhwa background'},
      {type:'interaction_medium', prompt:'medium shot of characters interacting casually, comfortable body language, warm tones, manhwa style'}
    ]},
    tense: {label:'긴장', panels:[
      {type:'dutch_angle', prompt:'dutch angle tilted shot creating unease, dramatic shadows, suspenseful composition, manhwa thriller style'},
      {type:'extreme_close_detail', prompt:'extreme close-up of tension-revealing detail (sweating, gripping, eye twitch), manhwa suspense'},
      {type:'silhouette_shadow', prompt:'silhouette or heavy shadow composition, mysterious figure, backlit dramatic, noir manhwa style'},
      {type:'split_panel', prompt:'split composition showing two opposing forces or perspectives, tension between subjects, manhwa style'},
      {type:'low_angle_threat', prompt:'low-angle menacing shot, looming presence, exaggerated perspective, dark atmosphere, manhwa thriller'},
      {type:'clock_urgency', prompt:'time pressure composition, visual urgency cues, ticking countdown feel, intense manhwa panel'}
    ]}
  };

  function getMoodPanelConfig(mood) {
    const m = (mood || 'calm').toLowerCase();
    if (m.includes('action') || m.includes('fight') || m.includes('battle') || m.includes('chase')) return PANEL_CONFIGS.action;
    if (m.includes('tense') || m.includes('suspense') || m.includes('thriller') || m.includes('horror') || m.includes('dark')) return PANEL_CONFIGS.tense;
    if (m.includes('emotion') || m.includes('sad') || m.includes('romantic') || m.includes('love') || m.includes('heartbreak') || m.includes('grief')) return PANEL_CONFIGS.emotion;
    if (m.includes('establishing') || m.includes('transition') || m.includes('travel') || m.includes('arrival')) return PANEL_CONFIGS.establishing;
    if (m.includes('dialogue') || m.includes('conversation') || m.includes('talk') || m.includes('meeting') || m.includes('warm')) return PANEL_CONFIGS.dialogue;
    return PANEL_CONFIGS.calm;
  }

  const runPhase5 = useCallback(async () => {
    if (!enableWebtoon) { log('[Phase 5] Webtoon disabled, skipping'); transition('COMPLETED'); return; }
    transition('PHASE_5_EXPANDING');
    log('[Phase 5] Expanding to webtoon multi-panels...');
    const updated = [...lfScenesRef.current];
    for (let i=0; i<updated.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = updated[i];
      if (!sc.anchorImage) continue;
      const mood = sc.narrativeMood || 'calm';
      const config = getMoodPanelConfig(mood);
      const hasDialogue = sc.dialogues && sc.dialogues.length > 0;
      let panels = [...config.panels];
      // If scene has dialogue but isn't dialogue-typed, inject a dialogue close-up
      if (hasDialogue && config !== PANEL_CONFIGS.dialogue) {
        panels.splice(1, 0, PANEL_CONFIGS.dialogue.panels[3]); // reaction_close
      }
      // Cap at 7 panels max
      panels = panels.slice(0, 7);
      log('[Phase 5] Scene '+(i+1)+'/'+updated.length+' mood="'+mood+'" type="'+config.label+'" panels='+panels.length);
      // Collect character reference images
      const refImages = [];
      const comp = sc.compositionData || {};
      if ((globalAsset||{}).characters) {
        const charIds = sc.keyCharacters || (comp.characterPoses||[]).map(cp=>cp.characterId);
        for (const cid of charIds) {
          const ch = globalAsset.characters.find(c=>c.id===cid);
          if (ch && ch.referenceImageUrl) { refImages.push({image: ch.referenceImageUrl, description: ch.name+': '+ch.referencePrompt}); }
        }
      }
      const bgRef = (globalAsset||{}).backgrounds ? globalAsset.backgrounds.find(b=>b.id===sc.primaryLocation) : null;
      if (bgRef && bgRef.referenceImageUrl) { refImages.push({image: bgRef.referenceImageUrl, description: 'Background: '+bgRef.referencePrompt}); }
      // Build base scene prompt
      const basePrompt = sc.imagePrompt?.prompt || sc.summary;
      const charRefs = [];
      if ((globalAsset||{}).characters) {
        const charIds = sc.keyCharacters || (comp.characterPoses||[]).map(cp=>cp.characterId);
        for (const cid of charIds) {
          const ch = globalAsset.characters.find(c=>c.id===cid);
          if (ch && ch.referencePrompt) charRefs.push(ch.name+': '+ch.referencePrompt);
        }
      }
      const charCtx = charRefs.length > 0 ? '\nCharacter details: '+charRefs.join('; ') : '';
      const bgCtx = bgRef && bgRef.referencePrompt ? '\nBackground: '+bgRef.referencePrompt : '';
      sc.webtoonAssets = [];
      // Include anchor image as first panel
      sc.webtoonAssets.push({templateId:'anchor', panelLabel:'메인 앵커', url: sc.anchorImage.url});
      for (const panel of panels) {
        if (abortRef.current) throw new Error('Aborted');
        try {
          const fullPrompt = basePrompt + ', ' + panel.prompt + charCtx + bgCtx;
          const urls = await callImageLF(fullPrompt, {referenceImages: refImages, aspectRatio: '9:16'});
          sc.webtoonAssets.push({templateId: panel.type, panelLabel: panel.prompt.split(',')[0], url: urls[0]});
          log('[Phase 5] Panel '+panel.type+' done for scene '+(i+1));
        } catch(e) { log('[Phase 5] Panel '+panel.type+' failed: '+e.message, 'warn'); }
        // Update UI progressively
        lfScenesRef.current = [...updated]; setLfScenes([...updated]);
      }
      sc.status = 'complete';
    }
    lfScenesRef.current = updated; setLfScenes([...updated]);
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase5_webtoon', {scenes: updated.map(s=>({sceneNumber:s.sceneNumber, webtoonAssets:(s.webtoonAssets||[]).map(a=>({templateId:a.templateId,panelLabel:a.panelLabel}))}))}); log('[AutoSave] Phase 5 saved'); } catch(e){log('[AutoSave] Phase 5 error: '+e.message,'warn');} }
    transition('PHASE_5_COMPLETE');
    transition('COMPLETED');
    log('[Phase 5] Complete - '+updated.reduce((n,s)=>(n+(s.webtoonAssets||[]).length),0)+' total panels generated');
  }, [enableWebtoon, callImageLF, globalAsset, transition, log, currentProjectId]);

  const runFullPipeline = useCallback(async () => {
    if (!sourceText.trim()) { log('Source text empty', 'error'); return; }
    // Auto-create project if none exists
    if (!currentProjectId && getDb()) {
      const newId = 'proj_' + Date.now();
      setCurrentProjectId(newId);
      const title = projectTitle || sourceText.trim().substring(0, 30);
      setProjectTitle(title);
      try { await fbSaveProject(newId, {title, phase: 'IDLE', createdAt: firebase.firestore.FieldValue.serverTimestamp()}); log('[Project] Auto-created: '+newId); } catch(e){}
    }
    setRunning(true); abortRef.current = false; setErrorMsg('');
    try {
      await runPhase1(); if(abortRef.current)return;
      await runPhase2(); if(abortRef.current)return;
      await runPhase3(); if(abortRef.current)return;
      await runPhase4(); if(abortRef.current)return;
      await runPhase5();
    } catch(e) { if(e.message!=='Aborted'){transition('ERROR',e.message);setErrorMsg(e.message);log('Pipeline error: '+e.message,'error');} }
    finally { setRunning(false); }
  }, [sourceText, runPhase1, runPhase2, runPhase3, runPhase4, runPhase5, transition, log]);

  const stopPipeline = () => { abortRef.current=true; setRunning(false); };

  // === Per-scene image generation ===
  const generateSceneImage = useCallback(async (idx) => {
    const scenes = lfScenesRef.current;
    const sc = scenes[idx];
    if (!sc) { setErrorMsg('Scene data not ready'); return; }
    if (!sc.imagePrompt && !sc.compositionData) { setErrorMsg('씬c 분할과 P3을 먼저 실행하세요'); return; }
    log('[GenImg] Generating image for scene ' + (idx+1));
    sc.status = 'generating_image';
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    try {
      let prompt;
      if (sc.imagePrompt && typeof sc.imagePrompt === 'object' && sc.imagePrompt.prompt) { prompt = sc.imagePrompt.prompt; }
      else if (typeof sc.imagePrompt === 'string') { prompt = sc.imagePrompt; }
      else { prompt = 'manhwa webtoon style, ' + sc.summary; }
      const comp = sc.compositionData || {};
      const charRefs = ((comp.characterPoses||[]).map(cp => { const cr = (globalAsset||{}).characters ? globalAsset.characters.find(ch=>ch.id===cp.characterId) : null; return cr ? cr.referencePrompt : ''; })).filter(Boolean);
      if (charRefs.length > 0) { prompt += '\nCharacter details: ' + charRefs.join('; '); }
      if (!charRefs.length && sc.keyCharacters && (globalAsset||{}).characters) {
        const kcRefs = sc.keyCharacters.map(cid => { const cr = globalAsset.characters.find(ch=>ch.id===cid); return cr ? cr.referencePrompt : ''; }).filter(Boolean);
        if (kcRefs.length > 0) { prompt += '\nCharacter details: ' + kcRefs.join('; '); }
      }
      const bgRef = (globalAsset||{}).backgrounds ? globalAsset.backgrounds.find(b=>b.id===sc.primaryLocation) : null;
      if (bgRef && bgRef.referencePrompt) { prompt += '\nBackground: ' + bgRef.referencePrompt; }
      const refImages = [];
      if ((globalAsset||{}).characters) {
        const charIds = sc.keyCharacters || (comp.characterPoses||[]).map(cp=>cp.characterId);
        for (const cid of charIds) {
          const ch = globalAsset.characters.find(c=>c.id===cid);
          if (ch && ch.referenceImageUrl) { refImages.push({image: ch.referenceImageUrl, description: ch.name+': '+ch.referencePrompt}); }
        }
      }
      if (bgRef && bgRef.referenceImageUrl) { refImages.push({image: bgRef.referenceImageUrl, description: 'Background: '+bgRef.referencePrompt}); }
      log('[GenImg] Using '+refImages.length+' reference images for consistency');
      const imgResult = await callImageLF(prompt, {referenceImages: refImages});
      const imgUrl = Array.isArray(imgResult) ? imgResult[0] : imgResult;
      sc.anchorImage = { url: imgUrl, prompt };
      sc.status = sc.video ? 'complete' : 'image_done';
      log('[GenImg] Scene ' + (idx+1) + ' image done');
      // Auto-save scene images
      if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase3_images', {scenes: scenes.filter(s=>s.anchorImage).map(s=>({sceneNumber:s.sceneNumber, anchorImage:s.anchorImage, status:s.status}))}); log('[AutoSave] Scene images saved'); } catch(e){log('[AutoSave] Image save error: '+e.message,'warn');} }
    } catch(e) { log('[GenImg] Error: ' + e.message); sc.status = 'error'; setErrorMsg('Image gen failed: ' + e.message); }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
  }, [callImageLF, globalAsset, log, currentProjectId]);

  // === Regenerate image with edited prompt ===
  const regenerateSceneImageWithPrompt = useCallback(async (idx, newPrompt) => {
    const scenes = lfScenesRef.current;
    const sc = scenes[idx];
    if (!sc) { setErrorMsg('Scene data not ready'); return; }
    log('[RegenImg] Regenerating image for scene ' + (idx+1));
    sc.status = 'generating_image';
    if (sc.imagePrompt && typeof sc.imagePrompt === 'object') { sc.imagePrompt.prompt = newPrompt; }
    else { sc.imagePrompt = { prompt: newPrompt }; }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    try {
      let prompt = newPrompt;
      const comp = sc.compositionData || {};
      const charRefs = ((comp.characterPoses||[]).map(cp => { const cr = (globalAsset||{}).characters ? globalAsset.characters.find(ch=>ch.id===cp.characterId) : null; return cr ? cr.referencePrompt : ''; })).filter(Boolean);
      if (charRefs.length > 0) { prompt += '\nCharacter details: ' + charRefs.join('; '); }
      if (!charRefs.length && sc.keyCharacters && (globalAsset||{}).characters) {
        const kcRefs = sc.keyCharacters.map(cid => { const cr = globalAsset.characters.find(ch=>ch.id===cid); return cr ? cr.referencePrompt : ''; }).filter(Boolean);
        if (kcRefs.length > 0) { prompt += '\nCharacter details: ' + kcRefs.join('; '); }
      }
      const bgRef = (globalAsset||{}).backgrounds ? globalAsset.backgrounds.find(b=>b.id===sc.primaryLocation) : null;
      if (bgRef && bgRef.referencePrompt) { prompt += '\nBackground: ' + bgRef.referencePrompt; }
      const refImages = [];
      if ((globalAsset||{}).characters) {
        const charIds = sc.keyCharacters || (comp.characterPoses||[]).map(cp=>cp.characterId);
        for (const cid of charIds) {
          const ch = globalAsset.characters.find(c=>c.id===cid);
          if (ch && ch.referenceImageUrl) { refImages.push({image: ch.referenceImageUrl, description: ch.name+': '+ch.referencePrompt}); }
        }
      }
      if (bgRef && bgRef.referenceImageUrl) { refImages.push({image: bgRef.referenceImageUrl, description: 'Background: '+bgRef.referencePrompt}); }
      const imgResult = await callImageLF(prompt, {referenceImages: refImages});
      const imgUrl = Array.isArray(imgResult) ? imgResult[0] : imgResult;
      sc.anchorImage = { url: imgUrl, prompt: newPrompt };
      sc.status = sc.video ? 'complete' : 'image_done';
      log('[RegenImg] Scene ' + (idx+1) + ' image regenerated');
    } catch(e) { log('[RegenImg] Error: ' + e.message); sc.status = 'error'; setErrorMsg('Image regen failed: ' + e.message); }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    setEditingPromptIdx(-1);
  }, [callImageLF, globalAsset, log]);

  // === Resize image for video generation (keep under 1MB) ===
  function resizeImageForVeo(dataUrl, maxWidth, maxHeight) {
    return new Promise((resolve) => {
      if (!dataUrl || !dataUrl.startsWith('data:')) { resolve(null); return; }
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth || h > maxHeight) {
          const ratio = Math.min(maxWidth / w, maxHeight / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const resized = canvas.toDataURL('image/jpeg', 0.85);
        resolve(resized.split(',')[1]);
      };
      img.onerror = () => resolve(null);
      img.src = dataUrl;
    });
  }

  // === Per-scene video generation ===
  const generateSceneVideo = useCallback(async (idx) => {
    const scenes = lfScenesRef.current;
    const sc = scenes[idx];
    if (!sc) { setErrorMsg('Scene data not ready'); return; }
    if (!sc.anchorImage) { setErrorMsg('이미지를 먼저 생성하세요'); return; }
    log('[GenVid] Generating video for scene ' + (idx+1));
    sc.status = 'generating_video';
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    try {
      const motionPrompt = (sc.videoPrompt && sc.videoPrompt.motionPrompt) || (sc.compositionData && sc.compositionData.motionHint) || sc.summary;
      let imageB64 = null;
      if (sc.anchorImage && sc.anchorImage.url) {
        const imgUrl = typeof sc.anchorImage.url === 'string' ? sc.anchorImage.url : String(sc.anchorImage.url || '');
        if (imgUrl.startsWith('data:')) {
          // Resize to reasonable dimensions to avoid payload too large
          imageB64 = await resizeImageForVeo(imgUrl, 1280, 720);
          if (imageB64) log('[GenVid] Image resized for Veo, size: ' + Math.round(imageB64.length/1024) + 'KB');
        }
      }
      log('[GenVid] Calling Veo API...');
      const videoUrls = await callVeo(motionPrompt, imageB64, {aspectRatio:'9:16', duration:5});
      if (videoUrls && videoUrls.length > 0) { sc.video = { url: videoUrls[0], durationSec: 5, motionPrompt }; sc.status = 'complete'; log('[GenVid] Scene ' + (idx+1) + ' video done'); }
      else { sc.status = sc.anchorImage ? 'image_done' : 'pending'; log('[GenVid] No video returned'); }
    } catch(e) { log('[GenVid] Error: ' + e.message); sc.status = 'error'; setErrorMsg('Video gen failed: ' + e.message); }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
  }, [log]);

  }, []);

  // === localStorage save/load ===
  const SAVE_KEY = 'LF_PIPELINE_STATE';

      if (saved.sourceText) setSourceText(saved.sourceText);
      if (saved.globalAsset) setGlobalAsset(saved.globalAsset);

      if (saved.phaseHistory) setPhaseHistory(saved.phaseHistory);
      if (saved.phase && saved.phase !== 'IDLE') setPhase(saved.phase.includes('COMPLETE') || saved.phase === 'COMPLETED' ? saved.phase : 'IDLE');
      log('[System] restored pipeline state');
    }} catch(e) {}
  }, []);

    }

  return (

      <div style={{flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden'}}>

              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase3();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={lfScenes.length === 0 || running} className="btn btn-primary btn-sm">P3 이미지프롬프트 재실행</button>

                    </div>

                    {/* Action Buttons */}
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <button onClick={()=>generateSceneImage(i)} disabled={scene.status==='generating_image'||running} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid var(--accent)',background:scene.status==='generating_image'?'var(--accent)':'transparent',color:scene.status==='generating_image'?'#fff':'var(--accent)',cursor:'pointer',fontWeight:600}}>{scene.status==='generating_image'?'생성 중...':'🖼️ 이미지 생성'}</button>
                      {scene.anchorImage && <button onClick={()=>downloadMedia(scene.anchorImage.url,'scene_'+(i+1)+'_image.png')} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid #238636',background:'transparent',color:'#238636',cursor:'pointer'}}>⬇ 저장</button>}
                    </div>
                  </div>
                );})}
              </div>
            )}
          </div>
        )}

        {activeTab === 'videos' && (
          <div style={{flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 12}}>
            <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase4();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={lfScenes.length === 0 || running} className="btn btn-primary btn-sm">P4 영상프롬프트 재실행</button>
              {running && <span className="spinner" />}
            </div>
            {lfScenes.length === 0 && <div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>Phase 4를 실행하면 영상 프롬프트가 생성됩니다</div>}
            {lfScenes.length > 0 && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:12}}>
                {lfScenes.map((scene, i) => (
                  <div key={i} className="card" style={{marginBottom:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                      <span style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:scene.video?'#238636':scene.videoPrompt?'var(--accent)':'var(--border)',color:'#fff',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</span>
                      <span style={{fontSize:13,fontWeight:600,flex:1}}>{scene.summary?.substring(0,60)}</span>
                      <span style={{padding:'2px 8px',borderRadius:4,fontSize:10,background:scene.status==='generating_video'?'var(--warn)':scene.video?'#238636':'var(--border)',color:'#fff'}}>{scene.status||'pending'}</span>
                    </div>
                    {scene.videoPrompt && (
                      <div style={{background:'#fafaff',borderRadius:6,border:'1px solid #e0e0f0',padding:8,marginBottom:8}}>
                        <span style={{fontSize:11,fontWeight:600,color:'var(--romance)'}}>🎬 모션 프롬프트</span>
                        <div style={{fontSize:10,color:'var(--text2)',lineHeight:1.5,marginTop:4,fontFamily:'monospace',wordBreak:'break-all'}}>{scene.videoPrompt.motionPrompt}</div>
                      </div>
                    )}
                    {scene.anchorImage?.url && <div style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',marginBottom:8}}><img src={scene.anchorImage.url} style={{width:'100%',height:120,objectFit:'cover',display:'block'}} /></div>}
                    {scene.video?.url && (
                      <div style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',marginBottom:8}}>
                        <video src={scene.video.url} controls muted style={{width:'100%',display:'block'}} />
                      </div>
                    )}
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <button onClick={()=>generateSceneVideo(i)} disabled={scene.status==='generating_video'||!scene.anchorImage||running} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid var(--romance)',background:scene.status==='generating_video'?'var(--romance)':'transparent',color:scene.status==='generating_video'?'#fff':'var(--romance)',cursor:'pointer',fontWeight:600}}>{scene.status==='generating_video'?'생성 중...':'🎬 영상 생성'}</button>
                      {scene.video?.url && <button onClick={()=>downloadMedia(scene.video.url,'scene_'+(i+1)+'_video.mp4')} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid #238636',background:'transparent',color:'#238636',cursor:'pointer'}}>⬇ 저장</button>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {activeTab === 'webtoon' && (
          <div style={{flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 16}}>
            <div style={{display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap'}}>
              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase5();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={lfScenes.length === 0 || !enableWebtoon || running} className="btn btn-primary btn-sm">P5 웹툰 멀티패널 생성</button>
              {running && phase === 'PHASE_5_EXPANDING' && <span className="status-badge running">패널 생성 중... 씬 {currentSceneIdx+1}/{lfScenes.length}</span>}
              <span style={{fontSize:11,color:'var(--text2)'}}>씬 유형별 5~7장 자동 생성 + 캐릭터 레퍼런스 적용</span>
            </div>
            {!enableWebtoon && <div className="placeholder">Phase 5 웹툰확장을 활성화해주세요</div>}
            {lfScenes.length === 0 && <div className="placeholder">전체 파이프라인을 실행하면 씬별 웹툰 패널을 자동 생성됩니다</div>}
            {lfScenes.length > 0 && (
              <div style={{display: 'flex', flexDirection: 'column', gap: 20}}>
                {lfScenes.map((scene, i) => {
                  const mood = scene.narrativeMood || 'calm';
                  const config = getMoodPanelConfig(mood);
                  const totalPanels = (scene.webtoonAssets||[]).length;
                  return (
                  <div key={i} className="card" style={{padding: 16}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                      <div>
                        <h3 style={{fontSize:15,fontWeight:700,margin:0}}>씬 #{scene.sceneNumber} <span style={{fontSize:12,fontWeight:400,color:'var(--text2)',marginLeft:8}}>{scene.summary}</span></h3>
                        <div style={{display:'flex',gap:6,marginTop:4}}>
                          <span className="status-badge" style={{background:'var(--accent)',color:'#fff',fontSize:10}}>{config.label}</span>
                          <span className="status-badge" style={{fontSize:10}}>{mood}</span>
                          {totalPanels > 0 && <span className="status-badge done" style={{fontSize:10}}>{totalPanels}장</span>}
                        </div>
                      </div>
                    </div>
                    {totalPanels > 0 ? (
                      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:8}}>
                        {scene.webtoonAssets.map((asset, j) => (
                          <div key={j} style={{minWidth:140,maxWidth:180,flex:'0 0 auto',borderRadius:8,overflow:'hidden',border:j===0?'2px solid var(--accent)':'1px solid var(--border)',background:'var(--surface2)',position:'relative'}}>
                            {asset.url ? <img src={asset.url} alt={asset.templateId} style={{width:'100%',height:220,objectFit:'cover',display:'block'}} /> : <div style={{width:'100%',height:220,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text2)',fontSize:11}}>생성 중...</div>}
                            <div style={{padding:'6px 8px',fontSize:10,color:'var(--text2)',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                              <span style={{fontWeight:600}}>{j===0?'앵커':('P'+(j))}</span>
                              <span style={{maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{asset.panelLabel||asset.templateId}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div style={{padding:20,textAlign:'center',color:'var(--text2)',fontSize:13,background:'var(--surface2)',borderRadius:8}}>
                        {scene.anchorImage ? '웹툰 패널 대기 중' : '앵커 이미지가 필요합니다 (P3/P4 먼저 실행)'}
                      </div>
                    )}
                  </div>
                );})}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// RENDER APP
// ============================================================

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
