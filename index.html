<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹툰 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#f5f5fa;--surface:#ffffff;--surface2:#f0f0f8;--surface3:#e8e8f0;
--border:#d0d0e0;--text:#1a1a2e;--text2:#666688;
--accent:#6c5ce7;--accent2:#7c6cf7;
--romance:#e0457b;--action:#e03030;--horror:#8e44ad;--slice:#27ae60;--drama:#2980b9;
--success:#00a8a8;--warn:#d4a017;--err:#e74c3c;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--romance));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.app-logo span{font-size:12px;font-weight:400;-webkit-text-fill-color:var(--text2);margin-left:4px;}
.nav-tabs{display:flex;gap:4px;margin-left:24px;}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.nav-tab .tab-icon{margin-right:6px;}
.main-content{max-width:1400px;margin:0 auto;padding:20px;}

/* Pipeline indicator */
.pipeline-bar{display:flex;align-items:center;gap:0;margin-bottom:20px;background:var(--surface);border-radius:var(--radius);padding:12px 20px;border:1px solid var(--border);}
.pipeline-step{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;transition:all .3s;}
.pipeline-step.done{background:#e8f5e9;color:#2e7d32;}
.pipeline-step.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3);}
.pipeline-step.pending{background:var(--surface2);color:var(--text2);}
.pipeline-arrow{margin:0 4px;color:var(--text2);font-size:16px;}

/* Cards and panels */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title .badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;}

/* Form elements */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.1);}
.form-textarea{resize:vertical;min-height:80px;font-family:inherit;}

/* Buttons */
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,92,231,.4);}
.btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--surface3);}
.btn-success{background:linear-gradient(135deg,#00a8a8,#00c9a7);color:#fff;}
.btn-danger{background:var(--err);color:#fff;}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-block{width:100%;}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-23{display:grid;grid-template-columns:2fr 3fr;gap:16px;}
.grid-32{display:grid;grid-template-columns:3fr 2fr;gap:16px;}

/* Genre chips */
.genre-chips{display:flex;gap:6px;flex-wrap:wrap;}
.genre-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.genre-chip.romance{background:#fce4ec;color:var(--romance);border-color:transparent;}
.genre-chip.romance.active{border-color:var(--romance);box-shadow:0 2px 8px rgba(224,69,123,.3);}
.genre-chip.action{background:#ffebee;color:var(--action);}
.genre-chip.action.active{border-color:var(--action);box-shadow:0 2px 8px rgba(224,48,48,.3);}
.genre-chip.horror{background:#f3e5f5;color:var(--horror);}
.genre-chip.horror.active{border-color:var(--horror);box-shadow:0 2px 8px rgba(142,68,173,.3);}
.genre-chip.slice{background:#e8f5e9;color:var(--slice);}
.genre-chip.slice.active{border-color:var(--slice);box-shadow:0 2px 8px rgba(39,174,96,.3);}
.genre-chip.drama{background:#e3f2fd;color:var(--drama);}
.genre-chip.drama.active{border-color:var(--drama);box-shadow:0 2px 8px rgba(41,128,185,.3);}

/* Emotion selectors */
.emotion-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.emotion-btn{padding:4px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;text-align:center;transition:all .2s;}
.emotion-btn:hover{border-color:var(--accent);}
.emotion-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Scene list */
.scene-list{display:flex;flex-direction:column;gap:8px;max-height:500px;overflow-y:auto;padding-right:4px;}
.scene-item{padding:12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--surface);}
.scene-item:hover{border-color:var(--accent);}
.scene-item.active{border-color:var(--accent);background:rgba(108,92,231,.05);box-shadow:0 0 0 3px rgba(108,92,231,.1);}
.scene-item .scene-num{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.scene-item .scene-preview{font-size:12px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.scene-item .scene-status{display:flex;gap:4px;margin-top:6px;}
.scene-item .status-dot{width:8px;height:8px;border-radius:50%;}
.status-dot.empty{background:var(--border);}
.status-dot.ready{background:var(--success);}
.status-dot.processing{background:var(--warn);animation:pulse 1s infinite;}
.status-dot.error{background:var(--err);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* Dialogue editor */
.dialogue-list{display:flex;flex-direction:column;gap:6px;}
.dialogue-row{display:flex;gap:8px;align-items:center;}
.dialogue-row select{width:100px;padding:6px;border-radius:6px;border:1px solid var(--border);font-size:12px;}
.dialogue-row input{flex:1;}
.dialogue-row .remove-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--err);font-size:14px;}

/* Result panels */
.result-panel{background:var(--surface2);border-radius:8px;padding:14px;margin-top:12px;border:1px solid var(--border);}
.result-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.result-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.result-text.korean{color:#444;}
.result-text.english{color:var(--text);font-family:'Consolas','Monaco',monospace;font-size:12px;}
.copy-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;color:var(--text2);float:right;}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Camera dictionary */
.camera-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.camera-card{padding:8px;border-radius:6px;border:1px solid var(--border);cursor:pointer;text-align:center;font-size:11px;transition:all .2s;background:var(--surface);}
.camera-card:hover{border-color:var(--accent);background:rgba(108,92,231,.05);}
.camera-card.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.camera-card .cam-icon{font-size:16px;display:block;margin-bottom:2px;}

/* Progress/Status */
.progress-bar{height:4px;border-radius:2px;background:var(--surface3);overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--success));transition:width .5s ease;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.status-badge.idle{background:var(--surface2);color:var(--text2);}
.status-badge.running{background:#fff3cd;color:#856404;}
.status-badge.done{background:#d4edda;color:#155724;}
.status-badge.error{background:#f8d7da;color:#721c24;}

/* Workbench */
.wb-timeline{display:flex;flex-direction:column;gap:0;}
.wb-scene-row{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:12px;padding:12px;border-bottom:1px solid var(--border);align-items:center;}
.wb-scene-row:hover{background:rgba(108,92,231,.03);}
.wb-scene-num{font-weight:700;color:var(--accent);font-size:14px;text-align:center;}
.wb-cell{padding:8px;border-radius:6px;background:var(--surface2);font-size:12px;min-height:60px;position:relative;}
.wb-cell .cell-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:4px;}
.wb-cell .cell-content{color:var(--text);line-height:1.5;}
.wb-cell.has-result{background:#e8f5e9;border:1px solid #c8e6c9;}
.wb-cell.processing{background:#fff3cd;border:1px solid #ffeeba;}
.wb-cell.error{background:#f8d7da;border:1px solid #f5c6cb;}

/* Template panel */
.template-categories{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.template-cat{padding:4px 10px;border-radius:12px;font-size:11px;border:1px solid var(--border);cursor:pointer;background:var(--surface);transition:all .2s;}
.template-cat.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.template-list{max-height:300px;overflow-y:auto;}
.template-item{padding:8px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;cursor:pointer;font-size:12px;transition:all .2s;}
.template-item:hover{border-color:var(--accent);}
.template-item.active{background:rgba(108,92,231,.1);border-color:var(--accent);}
.template-item .tpl-name{font-weight:600;}
.template-item .tpl-desc{color:var(--text2);font-size:11px;margin-top:2px;}

/* Image placeholder */
.image-placeholder{width:100%;aspect-ratio:3/4;border-radius:8px;background:linear-gradient(135deg,var(--surface2),var(--surface3));border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);font-size:13px;gap:8px;}
.image-result{width:100%;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.image-result img{width:100%;display:block;}

/* Mode selector */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mode-card{padding:12px;border-radius:8px;border:2px solid var(--border);cursor:pointer;text-align:center;transition:all .2s;background:var(--surface);}
.mode-card:hover{border-color:var(--accent);}
.mode-card.active{border-color:var(--accent);background:rgba(108,92,231,.05);}
.mode-card .mode-icon{font-size:24px;margin-bottom:4px;}
.mode-card .mode-name{font-size:12px;font-weight:700;}
.mode-card .mode-desc{font-size:10px;color:var(--text2);margin-top:2px;}

/* Stats */
.stats-bar{display:flex;gap:16px;padding:8px 16px;background:var(--surface);border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text2);margin-bottom:16px;}
.stat-item{display:flex;align-items:center;gap:4px;}
.stat-value{font-weight:700;color:var(--text);}

/* Log/console */
.log-panel{background:#1a1a2e;border-radius:8px;padding:12px;max-height:200px;overflow-y:auto;font-family:'Consolas','Monaco',monospace;font-size:11px;color:#a0a0c0;}
.log-entry{margin-bottom:2px;line-height:1.4;}
.log-entry .log-time{color:#666;margin-right:8px;}
.log-entry.info{color:#69db7c;}
.log-entry.warn{color:#ffd43b;}
.log-entry.error{color:#ff6b6b;}
.log-entry.api{color:#74c0fc;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text2);}

/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:8px;}
.toggle{position:relative;width:40px;height:22px;border-radius:11px;background:var(--border);cursor:pointer;transition:background .2s;}
.toggle.on{background:var(--accent);}
.toggle .toggle-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on .toggle-knob{left:20px;}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Responsive */
@media(max-width:900px){
.grid-2,.grid-3,.grid-23,.grid-32{grid-template-columns:1fr;}
.mode-grid{grid-template-columns:repeat(2,1fr);}
.camera-grid{grid-template-columns:repeat(2,1fr);}
.emotion-grid{grid-template-columns:repeat(5,1fr);}
.nav-tabs{overflow-x:auto;}
}

.api-key-btn{margin-left:auto;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;}
.api-key-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.api-key-btn.connected{border-color:#27ae60;color:#27ae60;}
.api-key-btn.connected:hover{background:#27ae60;color:#fff;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal-box{background:var(--surface);border-radius:16px;padding:28px;width:460px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.modal-desc{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5;}
.modal-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:var(--surface2);color:var(--text);font-family:monospace;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end;}
.modal-actions button{padding:10px 20px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:13px;}
.modal-actions .btn-save{background:var(--accent);color:#fff;}
.modal-actions .btn-cancel{background:var(--surface2);color:var(--text2);}
.modal-actions .btn-delete{background:var(--err);color:#fff;}
.key-status{display:flex;align-items:center;gap:6px;margin:10px 0;font-size:12px;color:var(--text2);}
.key-status .dot{width:8px;height:8px;border-radius:50%;}
.key-status .dot.on{background:#27ae60;}
.key-status .dot.off{background:var(--err);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect,useMemo} = React;

// ============================================================
// PROMPT ENGINE LAYER
// ============================================================

// API key stored in browser localStorage (never hardcoded)
function getGeminiKey() {
  const k = localStorage.getItem('GEMINI_API_KEY');
  if (!k) throw new Error('API_KEY_MISSING');
  return k;
}
function setGeminiKey(k) { localStorage.setItem('GEMINI_API_KEY', k); }
function hasGeminiKey() { return !!localStorage.getItem('GEMINI_API_KEY'); }

// xAI (Grok) API Key Management
function getXaiKey() {
  const k = localStorage.getItem('XAI_API_KEY');
  if (!k) throw new Error('XAI_KEY_MISSING');
  return k;
}
function setXaiKey(k) { localStorage.setItem('XAI_API_KEY', k); }
function hasXaiKey() { return !!localStorage.getItem('XAI_API_KEY'); }

// Genre presets
const GENRE_PRESETS = {
  romance: {name:'로맨스',speed:0.7,color:'romance',desc:'느린 감성적 페이스',icon:'💕'},
  action: {name:'액션',speed:1.5,color:'action',desc:'빠르고 역동적',icon:'⚔️'},
  horror: {name:'호러',speed:0.8,color:'horror',desc:'느린 긴장감, 급변',icon:'👻'},
  sliceOfLife: {name:'일상',speed:1.0,color:'slice',desc:'자연스러운 리듬',icon:'☀️'},
  drama: {name:'드라마',speed:0.9,color:'drama',desc:'감정선 중심',icon:'🎭'}
};

// Expressions (15)
const EXPRESSIONS = [
  'happy','sad','angry','surprised','fear',
  'disgusted','smiling','crying','shouting','shy',
  'confused','smirking','thinking','winking','sleeping'
];
const EXPR_LABELS = {
  happy:'행복',sad:'슬픔',angry:'분노',surprised:'놀람',fear:'공포',
  disgusted:'혐오',smiling:'미소',crying:'울음',shouting:'외침',shy:'수줍',
  confused:'혼란',smirking:'능글',thinking:'생각',winking:'윙크',sleeping:'수면'
};
const EXPR_ICONS = {
  happy:'😊',sad:'😢',angry:'😠',surprised:'😲',fear:'😨',
  disgusted:'🤢',smiling:'😄',crying:'😭',shouting:'🗣️',shy:'😳',
  confused:'😵',smirking:'😏',thinking:'🤔',winking:'😉',sleeping:'😴'
};

// Camera Dictionary (18)
const CAMERA_DICT = [
  {type:'static',name:'고정',icon:'📷',desc:'카메라 움직임 없음',prompt:'static shot, no camera movement'},
  {type:'zoom_in',name:'줌 인',icon:'🔍',desc:'피사체에 가까이',prompt:'slow zoom in, gradually closer'},
  {type:'zoom_out',name:'줌 아웃',icon:'🔭',desc:'넓은 화면으로',prompt:'zoom out revealing wider scene'},
  {type:'pan_left',name:'팬 좌',icon:'⬅️',desc:'좌로 수평 이동',prompt:'camera pans left horizontally'},
  {type:'pan_right',name:'팬 우',icon:'➡️',desc:'우로 수평 이동',prompt:'camera pans right horizontally'},
  {type:'tilt_up',name:'틸트 업',icon:'⬆️',desc:'위로 수직 이동',prompt:'camera tilts upward vertically'},
  {type:'tilt_down',name:'틸트 다운',icon:'⬇️',desc:'아래로 수직',prompt:'camera tilts downward'},
  {type:'dolly_forward',name:'달리 전진',icon:'🎬',desc:'피사체 방향 전진',prompt:'dolly forward toward subject'},
  {type:'dolly_backward',name:'달리 후진',icon:'🔙',desc:'피사체에서 후진',prompt:'dolly backward from subject'},
  {type:'tracking',name:'트래킹',icon:'🏃',desc:'피사체 추적',prompt:'tracking shot following subject movement'},
  {type:'orbit',name:'궤도',icon:'🔄',desc:'피사체 주위 회전',prompt:'orbiting around the subject'},
  {type:'crane_up',name:'크레인 업',icon:'🏗️',desc:'높이 올라감',prompt:'crane shot rising upward'},
  {type:'crane_down',name:'크레인 다운',icon:'⏬',desc:'높이 내려옴',prompt:'crane shot descending'},
  {type:'shake',name:'핸듘헬드',icon:'📳',desc:'손떨림 효과',prompt:'handheld shaky camera for intensity'},

// ============================================================

async function callGemini(systemPrompt, userPrompt, opts={}) {
  const model = opts.model || 'gemini-2.5-flash';
  const thinkBudget = opts.thinkBudget ?? 0;
  let apiKey;
  try { apiKey = getGeminiKey(); } catch(e) {
    throw new Error('API key not set. Click the key button in the top right to enter your Gemini API key.');
  }
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const body = {
    systemInstruction: {parts:[{text:systemPrompt}]},
    contents: [{role:'user',parts:[{text:userPrompt}]}],
    generationConfig: {
      temperature: opts.temperature || 0.7,
      topP: opts.topP || 0.9,
      maxOutputTokens: opts.maxTokens || 8192,
      thinkingConfig: {thinkingBudget: thinkBudget}
    }
  };
  const res = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json','x-goog-api-key':apiKey},body:JSON.stringify(body)});
  if(!res.ok) throw new Error(`Gemini API ${res.status}: ${await res.text()}`);
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  return parts.filter(p=>!p.thought).map(p=>p.text).join('');
}

async function callImagen(prompt, opts = {}) {
    const apiKey = getGeminiKey();
    const models = [
      opts.model || 'imagen-4.0-generate-001',
      'imagen-4.0-fast-generate-001',
      'imagen-4.0-ultra-generate-001'
    ];
    let lastError = null;
    for (const model of models) {
      try {
        console.log('[Imagen] Trying model: ' + model);
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:predict`;
        const body = {instances:[{prompt}], parameters:{sampleCount: opts.sampleCount||1, aspectRatio: opts.aspectRatio||'1:1', personGeneration:'allow_all'}};
        const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','x-goog-api-key':apiKey}, body:JSON.stringify(body)});
        if (!res.ok) {
          const errText = await res.text();
          console.warn('[Imagen] Model ' + model + ' failed: ' + res.status + ' ' + errText.substring(0, 200));
          lastError = new Error('Imagen API ' + res.status + ': ' + errText.substring(0, 200));
          continue;
        }
        const data = await res.json();
        const predictions = data.predictions;
        if (!predictions || predictions.length === 0) { lastError = new Error('No predictions'); continue; }
        console.log('[Imagen] Success with model: ' + model);
        return predictions.map(p => `data:image/png;base64,${p.bytesBase64Encoded}`);
      } catch(e) {
        console.warn('[Imagen] Model ' + model + ' error: ' + e.message);
        lastError = e;
        continue;
      }
    }
    throw lastError || new Error('All Imagen models failed');
  }

// VEO API CLIENT (B-5: 영상 생성)
// ============================================================

async function callVeo(prompt, imageBase64, opts={}) {
  const apiKey = getGeminiKey();
  const model = opts.model || 'veo-2.0-generate-001';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:predictLongRunning`;
  const instances = [{prompt: prompt}];
  if(imageBase64) {
    instances[0].image = {bytesBase64Encoded: imageBase64.replace(/^data:image\/[^;]+;base64,/,'')};
  }
  const body = {
    instances,
    parameters: {
      aspectRatio: opts.aspectRatio || '16:9',
      personGeneration: 'allow_all',
      durationSeconds: opts.duration || 5
    }
  };
  const res = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok) {
    const errText = await res.text();
    throw new Error(`Veo API ${res.status}: ${errText}`);
  }
  const opData = await res.json();
  const opName = opData.name;
  if(!opName) throw new Error('Veo 작업 ID를 받지 못했습니다.');

  // Poll for completion
  const pollUrl = `https://generativelanguage.googleapis.com/v1beta/${opName}`;
  for(let i = 0; i < 60; i++) {
    await new Promise(r => setTimeout(r, 5000));
    const pollRes = await fetch(pollUrl, {headers:{'x-goog-api-key':apiKey}});
    if(!pollRes.ok) continue;
    const pollData = await pollRes.json();
    if(pollData.done) {
      if(pollData.error) throw new Error(`Veo 오류: ${pollData.error.message}`);
      const videos = pollData.response?.generateVideoResponse?.generatedSamples || [];
      if(videos.length === 0) throw new Error('영상 생성 결과가 없습니다.');
      return videos.map(v => `data:video/mp4;base64,${v.video.bytesBase64Encoded}`);
    }
  }
  throw new Error('영상 생성 시간 초과 (5분)');
}

// CONTEXT ANALYZER
// ============================================================

function analyzeContext(scene) {
  const desc = (scene.description||'').toLowerCase();
  const sfxCount = (scene.sfx||[]).length;
  const dialogueCount = (scene.dialogues||[]).length;

  // Action keywords
  const actionWords = ['싸움','전투','달리','폭발','충돌','격투','추격','점프','공격','방어','파괴'];
  const actionScore = actionWords.reduce((s,w)=>s+(desc.includes(w)?0.15:0),0);
  const actionLevel = Math.min(1, actionScore + sfxCount*0.1);

  // Emotion intensity from transition
  const emotionStart = scene.emotionStart || 'smiling';
  const emotionEnd = scene.emotionEnd || 'smiling';
  const emotionDiff = emotionStart !== emotionEnd ? 0.6 : 0.2;
  const highEmotions = ['crying','shouting','angry','fear','surprised'];
  const emotionalIntensity = Math.min(1, emotionDiff + (highEmotions.includes(emotionEnd)?0.3:0));

  const dialogueRatio = dialogueCount / (dialogueCount + sfxCount + 1);

  // Recommend mode
  let recommendedMode = 'single';
  if(actionLevel > 0.7) recommendedMode = 'advanced';
  else if(emotionalIntensity > 0.7) recommendedMode = 'advancedAudio';

  // Recommend camera
  let recommendedCamera = 'static';
  if(actionLevel > 0.5) recommendedCamera = 'tracking';
  else if(emotionalIntensity > 0.6) recommendedCamera = 'zoom_in';
  else if(desc.includes('풍경')||desc.includes('전경')) recommendedCamera = 'pan_right';

  return {actionLevel, emotionalIntensity, dialogueRatio, recommendedMode, recommendedCamera};
}

    ns[activeSceneIdx] = {...ns[activeSceneIdx], [field]:val};
    setScenes(ns);
  };

  const addScene = () => {
    setScenes([...scenes, {
      id: `scene_${Date.now()}`,
      description:'', dialogues:[{type:'speech',character:'',text:''}],
      sfx:[], sfxText:'',
      emotionStart:'smiling', emotionEnd:'smiling',
      cameraHint:'static', genre:'romance',
      // Pipeline results
      convertedConti:'', imagePrompt:'', imageNegative:'',
      motionConti:'', motionPrompt:'',
      imageUrl:'', videoUrl:'',
      status:{conti:'idle',image:'idle',video:'idle'}
    }]);
    setActiveSceneIdx(scenes.length);
  };

  const removeScene = (i) => {
    if(scenes.length <= 1) return;
    const ns = scenes.filter((_,j)=>j!==i);
    setScenes(ns);
    if(activeSceneIdx >= ns.length) setActiveSceneIdx(ns.length-1);
  };

  return (
    <div className="grid-23">
      <div>
        <div className="card">
          <div className="card-title">📋 장면 목록 <span className="badge">{scenes.length}장면</span></div>
          <div className="scene-list">
            {scenes.map((s,i)=>(
              <div key={i} className={`scene-item ${i===activeSceneIdx?'active':''}`} onClick={()=>setActiveSceneIdx(i)}>
                <div className="scene-num">
                  장면 #{i+1}
                  {scenes.length>1 && <button className="remove-btn" onClick={e=>{e.stopPropagation();removeScene(i);}} style={{float:'right',width:20,height:20,fontSize:12}}>×</button>}
                </div>
                <div className="scene-preview">{s.description || '(빈 장면)'}</div>
                <div className="scene-status">
                  <div className={`status-dot ${s.status?.conti==='done'?'ready':s.status?.conti==='running'?'processing':'empty'}`} title="콘티"/>
                  <div className={`status-dot ${s.status?.image==='done'?'ready':s.status?.image==='running'?'processing':'empty'}`} title="이미지"/>
                  <div className={`status-dot ${s.status?.video==='done'?'ready':s.status?.video==='running'?'processing':'empty'}`} title="영상"/>
                </div>
              </div>
            ))}
          </div>
          <button className="btn btn-secondary btn-block" onClick={addScene} style={{marginTop:8}}>+ 장면 추가</button>
        </div>
      </div>

      <div>
        <div className="card">
          <div className="card-title">✏️ 장면 #{activeSceneIdx+1} 편집</div>

          <div className="form-group">
            <label className="form-label">장르</label>
            <GenreSelector value={scene.genre||'romance'} onChange={v=>updateScene('genre',v)}/>
          </div>

          <div className="form-group">
            <label className="form-label">장면 묘사 (한국어)</label>
            <textarea className="form-textarea" rows={4} placeholder="장면을 상세히 묘사하세요. 배경, 인물, 상황 등..." value={scene.description||''} onChange={e=>updateScene('description',e.target.value)}/>
          </div>

          <div className="form-group">
            <label className="form-label">대사</label>
            <DialogueEditor dialogues={scene.dialogues||[]} onChange={v=>updateScene('dialogues',v)}/>
          </div>

          <div className="form-group">
            <label className="form-label">효과음 (SFX) — 쉼표로 구분</label>
            <input className="form-input" placeholder="쾅, 우르르, 바스락..." value={scene.sfxText||''} onChange={e=>updateScene('sfxText',e.target.value)}/>
          </div>

          <div className="grid-2">
            <EmotionPicker value={scene.emotionStart||'smiling'} onChange={v=>updateScene('emotionStart',v)} label="시작 감정"/>
            <EmotionPicker value={scene.emotionEnd||'smiling'} onChange={v=>updateScene('emotionEnd',v)} label="끝 감정"/>
          </div>

          <div className="form-group" style={{marginTop:14}}>
            <label className="form-label">카메라 힌트</label>
            <CameraSelector value={scene.cameraHint||'static'} onChange={v=>updateScene('cameraHint',v)}/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MODULE 2: 이미지G 생성기 (Pipeline A)
// ============================================================

function ImageGenerator({scenes, setScenes, activeSceneIdx, setActiveSceneIdx, addLog}) {
  const [processing, setProcessing] = useState(false);
  const [step, setStep] = useState('idle'); // idle, A2, A3, done
  const [selectedCat, setSelectedCat] = useState('character');
  const [imageProvider, setImageProvider] = React.useState('imagen');
  const [textProvider, setTextProvider] = React.useState('gemini');
  const [selectedTpl, setSelectedTpl] = useState('');
  const scene = scenes[activeSceneIdx] || {};

  const runPipelineA = async () => {
    if(!scene.description) { addLog('warn','장면 묘사를 먼저 입력하세요.'); return; }
    setProcessing(true);

    // Step A-2: 콘티 변환
    try {
      setStep('A2');
      addLog('api','[A-2] 글콘티 → 구조화 콘티 변환 시작...');
      const sfxList = (scene.sfxText||'').split(',').map(s=>s.trim()).filter(Boolean);
      const dialogueText = (scene.dialogues||[]).map(d=>`[${d.type}] ${d.character}: ${d.text}`).join('\n');
      const userInput = `장면 묘사: ${scene.description}
대사:
${dialogueText}
효과음: ${sfxList.join(', ')}
감정: ${EXPR_LABELS[scene.emotionStart]||scene.emotionStart} → ${EXPR_LABELS[scene.emotionEnd]||scene.emotionEnd}
장르: ${GENRE_PRESETS[scene.genre]?.name||scene.genre}`;

      const callText = textProvider==='grok' ? callGrok : callGemini;
      const convertedConti = await callText(PIPELINE_A_SYSTEM.contiConvert, userInput, {thinkBudget:1024});
      const ns = [...scenes];
      ns[activeSceneIdx] = {...ns[activeSceneIdx], convertedConti, status:{...scene.status, conti:'done'}};
      setScenes(ns);
      addLog('info','[A-2] 콘티 변환 완료 ✓');

      // Step A-3: 영문 프롬프트 변환
      setStep('A3');
      addLog('api','[A-3] 구조화 콘티 → 영문 이미지 프롬프트 변환...');
      const tplHint = selectedTpl ? `\n사용할 템플릿 카테고리: ${selectedCat}, 테플릿: ${selectedTpl}` : '';
      const imgPromptResult = await callText(PIPELINE_A_SYSTEM.imagePrompt, convertedConti + tplHint, {thinkBudget:1024});

      // Parse result
      const promptMatch = imgPromptResult.match(/\[PROMPT\]:\s*([\s\S]*?)(?=\[NEGATIVE\])/);
      const negMatch = imgPromptResult.match(/\[NEGATIVE\]:\s*([\s\S]*?)(?=\[STYLE\])/);
      const imgPrompt = promptMatch ? promptMatch[1].trim() : imgPromptResult;
      const imgNeg = negMatch ? negMatch[1].trim() : '';

      const ns2 = [...scenes];
      ns2[activeSceneIdx] = {...ns2[activeSceneIdx], imagePrompt:imgPrompt, imageNegative:imgNeg, imagePromptFull:imgPromptResult, status:{...ns2[activeSceneIdx].status, image:'done'}};
      setScenes(ns2);
      addLog('info','[A-3] 이미지 프롬프트 생성 완료 ✓');

      // Step A-4: 이미지 생성
      setStep('A4');
      addLog('api',`[A-4] ${imageProvider==='grok'?'Grok Aurora':'Imagen 4'} API로 이미지 생성 중...`);
      try {
        const imgUrls = imageProvider==='grok' ? await callGrokImage(imgPrompt) : await callImagen(imgPrompt, {aspectRatio:'9:16'});
        const ns3 = [...scenes];
        ns3[activeSceneIdx] = {...ns3[activeSceneIdx], imageUrl:imgUrls[0], imageUrls:imgUrls, status:{...ns3[activeSceneIdx].status, imageGen:'done'}};
        setScenes(ns3);
        addLog('info','[A-4] 이미지 생성 완료 ✓');
      } catch(imgErr) {
        addLog('warn', '[A-4] 이미지 생성 실패: ' + imgErr.message);
        addLog('info', '[A-4] 프롬프트는 생성되었으니, 외부 도구에서 사용 가능합니다.');
      }
      setStep('done');
    } catch(err) {
      addLog('error', `오류: ${err.message}`);
      setStep('idle');
    }
    setProcessing(false);
  };

  const copyToClipboard = (text) => {
    navigator.clipboard?.writeText(text);
    addLog('info','클립보드에 복사됨 ✓');
  };

  const cat = IMAGE_TEMPLATE_CATEGORIES.find(c=>c.id===selectedCat);

  return (
    <div>
      <div className="pipeline-bar">
        <div className={`pipeline-step ${currentStep==='A2'?'active':scene.convertedConti?'done':'pending'}`}>A-1 글콘티</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='A2'?'active':scene.convertedConti?'done':'pending'}`}>A-2 콘티변환</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='A3'?'active':scene.imagePrompt?'done':'pending'}`}>A-3 영문프롬프트</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='A4'?'active':scene.imageUrl?'done':'pending'}`}>A-4 이미지생성</div>
      </div>

      <div className="grid-32">
        <div>
          <div className="card">
            <div className="card-title">🖼️ 이미지 프롬프트 생성 <span className="badge">Pipeline A</span></div>

            <div className="form-group">
              <label className="form-label">현재 장면: #{activeSceneIdx+1}</label>
              <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
                {scenes.map((s,i)=>(
                  <button key={i} className={`btn btn-sm ${i===activeSceneIdx?'btn-primary':'btn-secondary'}`} onClick={()=>setActiveSceneIdx(i)}>#{i+1}</button>
                ))}
              </div>
              <p style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>
                {scene.description ? scene.description.substring(0,100)+'...' : '(장면 묘사가 비어있습니다. 글콘티 에디터에서 먼저 작성하세요.)'}
              </p>
            </div>

            <div className="form-group">
              <label className="form-label">장르 프리셋: {GENRE_PRESETS[scene.genre]?.icon} {GENRE_PRESETS[scene.genre]?.name}</label>
            </div>

            <div className="form-group">
              <label className="form-label">텍스트 생성 엔진 (A-2, A-3)</label>
              <div style={{display:'flex',gap:6}}>
                <button className={`btn btn-sm ${textProvider==='gemini'?'btn-primary':'btn-secondary'}`} onClick={()=>setTextProvider('gemini')}>💎 Gemini</button>
                <button className={`btn btn-sm ${textProvider==='grok'?'btn-primary':'btn-secondary'}`} onClick={()=>setTextProvider('grok')}>🤖 Grok</button>
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">이미지 생성 엔진</label>
              <div style={{display:'flex',gap:6}}>
                <button className={`btn btn-sm ${imageProvider==='imagen'?'btn-primary':'btn-secondary'}`} onClick={()=>setImageProvider('imagen')}>🌐 Imagen 4</button>
                <button className={`btn btn-sm ${imageProvider==='grok'?'btn-primary':'btn-secondary'}`} onClick={()=>setImageProvider('grok')}>🤖 Grok Aurora</button>
              </div>
            </div>

            <button className="btn btn-primary btn-block" onClick={runPipelineA} disabled={processing || !scene.description}>
              {processing ? <><span className="spinner"/> 변환 중...</> : '🚀 파이프라인 A 실행 (콘티→이미지 프롬프트)'}
            </button>

            {scene.convertedConti && (
              <div className="result-panel">
                <div className="result-label"><button className="copy-btn" onClick={()=>copyToClipboard(scene.convertedConti)}>복사</button>A-2 구조화 콘티</div>
                <div className="result-text korean">{scene.convertedConti}</div>
              </div>
            )}

            {scene.imagePrompt && (
              <div className="result-panel" style={{marginTop:8}}>
                <div className="result-label"><button className="copy-btn" onClick={()=>copyToClipboard(scene.imagePrompt)}>복사</button>A-3 이미지 프롬프트 (EN)</div>
                <div className="result-text english">{scene.imagePrompt}</div>
                {scene.imageNegative && (
                  <>
                    <div className="result-label" style={{marginTop:8}}>Negative Prompt</div>
                    <div className="result-text english" style={{color:'var(--err)'}}>{scene.imageNegative}</div>
                  </>
                )}
              </div>
            )}

            {scene.imageUrl && (
              <div style={{marginTop:16,padding:16,background:'var(--surface2)',borderRadius:12,textAlign:'center'}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:8,color:'var(--success)'}}>A-4 생성 이미지</div>
                <img src={scene.imageUrl} alt="생성된 이미지" style={{maxWidth:'100%',maxHeight:400,borderRadius:8,border:'1px solid var(--border)'}} />
                <div style={{marginTop:8,display:'flex',gap:8,justifyContent:'center'}}>
                  <a href={scene.imageUrl} download={`scene_${activeSceneIdx+1}.png`} className="btn btn-sm btn-success">다운로드</a>
                  <button className="btn btn-sm btn-secondary" onClick={()=>copyToClipboard(scene.imagePrompt)}>프롬프트 복사</button>
                </div>
              </div>
            )}
          </div>
        </div>

        <div>
          <div className="card">
            <div className="card-title">📚 이미지 템플릿 <span className="badge">84종</span></div>
            <div className="template-categories">
              {IMAGE_TEMPLATE_CATEGORIES.map(c=>(
                <div key={c.id} className={`template-cat ${selectedCat===c.id?'active':''}`} onClick={()=>setSelectedCat(c.id)}>
                  {c.icon} {c.name} ({c.count})
                </div>
              ))}
            </div>
            {cat && (
              <div className="template-list">
                {cat.templates.map(t=>(
                  <div key={t.id} className={`template-item ${selectedTpl===t.id?'active':''}`} onClick={()=>setSelectedTpl(t.id)}>
                    <div className="tpl-name">{t.name}</div>
                    <div className="tpl-desc">{t.desc}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-title">🎯 컨텍스트 분석</div>
            {scene.description ? (()=>{
              const ctx = analyzeContext(scene);
              return (
                <div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12}}>
                    <div>액션 레벨: <strong>{(ctx.actionLevel*100).toFixed(0)}%</strong>
                      <div className="progress-bar"><div className="progress-fill" style={{width:`${ctx.actionLevel*100}%`}}/></div>
                    </div>
                    <div>감정 강도: <strong>{(ctx.emotionalIntensity*100).toFixed(0)}%</strong>
                      <div className="progress-bar"><div className="progress-fill" style={{width:`${ctx.emotionalIntensity*100}%`}}/></div>
                    </div>
                    <div>대화 비중: <strong>{(ctx.dialogueRatio*100).toFixed(0)}%</strong></div>
                    <div>추천 모드: <strong>{ctx.recommendedMode}</strong></div>
                  </div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:8}}>
                    추천 카메라: {CAMERA_DICT.find(c=>c.type===ctx.recommendedCamera)?.icon} {CAMERA_DICT.find(c=>c.type===ctx.recommendedCamera)?.name}
                  </div>
                </div>
              );
            })() : <p style={{fontSize:12,color:'var(--text2)'}}>장면을 작성하면 자동 분석됩니다.</p>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MODULE 3: 영상G 생성기 (Pipeline B)
// ============================================================

function VideoGenerator({scenes, setScenes, activeSceneIdx, setActiveSceneIdx, addLog}) {
  const [processing, setProcessing] = useState(false);
  const [step, setStep] = useState('idle');
  const [videoMode, setVideoMode] = useState('single');
  const [textProviderB, setTextProviderB] = React.useState('gemini');
  const [audioEnabled, setAudioEnabled] = useState(false);
  const [cameraFixed, setCameraFixed] = useState(false);
  const scene = scenes[activeSceneIdx] || {};

  const runPipelineB = async () => {
    if(!scene.description) { addLog('warn','장면 묘사가 필요합니다.'); return; }
    setProcessing(true);

    try {
      // B-2: 모션 콘티 변환
      setStep('B2');
      addLog('api','[B-2] 모션 콘티 변환 시작...');
      const sfxList = (scene.sfxText||'').split(',').map(s=>s.trim()).filter(Boolean);
      const cam = CAMERA_DICT.find(c=>c.type===(scene.cameraHint||'static'));
      const genre = GENRE_PRESETS[scene.genre||'romance'];
      const userInput = `장면: ${scene.description}
대사: ${(scene.dialogues||[]).map(d=>`[${d.type}] ${d.character}: ${d.text}`).join('; ')}
효과음: ${sfxList.join(', ')}
감정: ${EXPR_LABELS[scene.emotionStart]} → ${EXPR_LABELS[scene.emotionEnd]}
카메라 힌트: ${cam?.name} (${cam?.desc})
장르: ${genre?.name} (속도 ${genre?.speed}x)
이미지 프롬프트: ${scene.imagePrompt || '(없음)'}`;

      const callTextB = textProviderB==='grok' ? callGrok : callGemini;
      const motionConti = await callTextB(PIPELINE_B_SYSTEM.motionConti, userInput, {thinkBudget:2048});
      const ns = [...scenes];
      ns[activeSceneIdx] = {...ns[activeSceneIdx], motionConti};
      setScenes(ns);
      addLog('info','[B-2] 모션 콘티 변환 완료 ✓');

      // B-3: 영문 모션 프롬프트
      setStep('B3');
      addLog('api','[B-3] 영문 모션 프롬프트 생성...');
      const modeInfo = `영상 모드: ${videoMode}, 오디오: ${audioEnabled?'ON':'OFF'}, 카메라 고정: ${cameraFixed?'ON':'OFF'}`;
      const motionPrompt = await callTextB(PIPELINE_B_SYSTEM.motionPrompt, motionConti + '\n' + modeInfo, {thinkBudget:2048});

      const ns2 = [...scenes];
      ns2[activeSceneIdx] = {...ns2[activeSceneIdx], motionPrompt, videoMode, status:{...ns2[activeSceneIdx].status, video:'done'}};
      setScenes(ns2);
      addLog('info','[B-3] 영문 모션 프롬프트 생성 완료 ✓');

      // Step B-5: 영상 생성
      setStep('B5');
      addLog('api','[B-5] Veo API로 영상 생성 중... (약 1~3분 소요)');
      try {
        const imageB64 = scene.imageUrl || null;
        const videoUrls = await callVeo(motionPrompt, imageB64, {aspectRatio:'9:16', duration:5});
        const ns3 = [...scenes];
        ns3[activeSceneIdx] = {...ns3[activeSceneIdx], videoUrl:videoUrls[0], videoUrls:videoUrls, status:{...ns3[activeSceneIdx].status, videoGen:'done'}};
        setScenes(ns3);
        addLog('info','[B-5] 영상 생성 완료 ✓');
      } catch(vidErr) {
        addLog('warn', '[B-5] 영상 생성 실패: ' + vidErr.message);
        addLog('info', '[B-5] 모션 프롬프트는 생성되었으니, 외부 도구에서 사용 가능합니다.');
      }
      setStep('done');
    } catch(err) {
      addLog('error', `오류: ${err.message}`);
      setStep('idle');
    }
    setProcessing(false);
  };

  const copyToClipboard = (text) => {
    navigator.clipboard?.writeText(text);
    addLog('info','클립보드에 복사됨 ✓');
  };

  return (
    <div>
      <div className="pipeline-bar">
        <div className={`pipeline-step ${scene.imagePrompt?'done':'pending'}`}>A완료 이미지</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='B2'?'active':scene.motionConti?'done':'pending'}`}>B-2 모션콘티</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='B3'?'active':scene.motionPrompt?'done':'pending'}`}>B-3 모션프롬프트</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='B5'?'active':scene.videoUrl?'done':'pending'}`}>B-5 영상생성</div>
      </div>

      <div className="grid-32">
        <div>
          <div className="card">
            <div className="card-title">🎬 영상 프롬프트 생성 <span className="badge">Pipeline B</span></div>

            <div className="form-group">
              <label className="form-label">장면 선택</label>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {scenes.map((s,i)=>(
                  <button key={i} className={`btn btn-sm ${i===activeSceneIdx?'btn-primary':'btn-secondary'}`} onClick={()=>setActiveSceneIdx(i)}>#{i+1}</button>
                ))}
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">영상 모드</label>
              <div className="mode-grid">
                {VIDEO_MODES.map(m=>(
                  <div key={m.id} className={`mode-card ${videoMode===m.id?'active':''}`} onClick={()=>setVideoMode(m.id)}>
                    <div className="mode-icon">{m.icon}</div>
                    <div className="mode-name">{m.name}</div>
                    <div className="mode-desc">{m.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="grid-2" style={{marginBottom:14}}>
              <div className="toggle-wrap">
                <div className={`toggle ${audioEnabled?'on':''}`} onClick={()=>setAudioEnabled(!audioEnabled)}>
                  <div className="toggle-knob"/>
                </div>
                <span style={{fontSize:13}}>🔊 오디오 포함</span>
              </div>
              <div className="toggle-wrap">

function Workbench({scenes, setScenes, addLog}) {
  const [running, setRunning] = useState(false);
  const [currentScene, setCurrentScene] = useState(-1);
  const [currentStep, setCurrentStep] = useState('');

  const runFullPipeline = async () => {
    if(scenes.every(s=>!s.description)) { addLog('warn','최소 1개 장면에 묘사를 입력하세요.'); return; }
    setRunning(true);

    for(let i = 0; i < scenes.length; i++) {
      const sc = scenes[i];
      if(!sc.description) continue;
      setCurrentScene(i);

      try {
        // Pipeline A: A-2 콘티 변환
        setCurrentStep('A-2');
        addLog('api',`[장면 ${i+1}] A-2 콘티 변환 시작`);
        const sfxList = (sc.sfxText||'').split(',').map(s=>s.trim()).filter(Boolean);
        const dialogueText = (sc.dialogues||[]).map(d=>`[${d.type}] ${d.character}: ${d.text}`).join('\n');
        const userInputA = `장면 묘사: ${sc.description}\n대사:\n${dialogueText}\n효과음: ${sfxList.join(', ')}\n감정: ${EXPR_LABELS[sc.emotionStart]||'미소'} → ${EXPR_LABELS[sc.emotionEnd]||'미소'}\n장르: ${GENRE_PRESETS[sc.genre]?.name||'로맨스'}`;

        const convertedConti = await callGemini(PIPELINE_A_SYSTEM.contiConvert, userInputA, {thinkBudget:1024});

        // A-3 이미지 프롬프트
        setCurrentStep('A-3');
        addLog('api',`[장면 ${i+1}] A-3 영문 이미지 프롬프트 생성`);
        const imgResult = await callGemini(PIPELINE_A_SYSTEM.imagePrompt, convertedConti, {thinkBudget:1024});
        const promptMatch = imgResult.match(/\[PROMPT\]:\s*([\s\S]*?)(?=\[NEGATIVE\])/);
        const negMatch = imgResult.match(/\[NEGATIVE\]:\s*([\s\S]*?)(?=\[STYLE\])/);
        const imagePrompt = promptMatch ? promptMatch[1].trim() : imgResult;
        const imageNegative = negMatch ? negMatch[1].trim() : '';

        // Step A-4: 이미지 생성
        setStep('A-4');
        addLog('api',`[장면 ${i+1}] [A-4] Imagen API로 이미지 생성 중...`);
        try {
          const imgUrls = await callImagen(imgPrompt, {aspectRatio:'9:16'});
          ns[idx] = {...ns[idx], imageUrl:imgUrls[0], imageUrls:imgUrls, status:{...ns[idx].status, imageGen:'done'}};
          setScenes([...ns]);
          addLog('info',`[장면 ${i+1}] [A-4] 이미지 생성 완료 ✓`);
        } catch(imgErr) {
          addLog('warn', `[장면 ${i+1}] [A-4] 이미지 생성 실패: ${imgErr.message}`);
        }

        addLog('info',`[장면 ${i+1}] Pipeline A 완료 ✓`);

        // Pipeline B: B-2 모션 콘티
        setCurrentStep('B-2');
        addLog('api',`[장면 ${i+1}] B-2 모션 콘티 변환`);
        const cam = CAMERA_DICT.find(c=>c.type===(sc.cameraHint||'static'));
        const genre = GENRE_PRESETS[sc.genre||'romance'];
        const userInputB = `장면: ${sc.description}\n대사: ${(sc.dialogues||[]).map(d=>`${d.character}: ${d.text}`).join('; ')}\n효과음: ${sfxList.join(', ')}\n감정: ${EXPR_LABELS[sc.emotionStart]} → ${EXPR_LABELS[sc.emotionEnd]}\n카메라: ${cam?.name}\n장르: ${genre?.name} (${genre?.speed}x)\n이미지 프롬프트: ${imagePrompt}`;

        const motionConti = await callGemini(PIPELINE_B_SYSTEM.motionConti, userInputB, {thinkBudget:2048});

        // B-3 영문 모션 프롬프트
        setCurrentStep('B-3');
        addLog('api',`[장면 ${i+1}] B-3 영문 모션 프롬프트 생성`);
        const motionPrompt = await callGemini(PIPELINE_B_SYSTEM.motionPrompt, motionConti, {thinkBudget:2048});

        // Step B-5: 영상 생성
        setStep('B-5');
        addLog('api',`[장면 ${i+1}] [B-5] Veo API로 영상 생성 중... (약 1~3분)`);
        try {
          const imageB64 = ns[idx].imageUrl || null;
          const videoUrls = await callVeo(motionPrompt, imageB64, {aspectRatio:'9:16', duration:5});
          ns[idx] = {...ns[idx], videoUrl:videoUrls[0], videoUrls:videoUrls, status:{...ns[idx].status, videoGen:'done'}};
          setScenes([...ns]);
          addLog('info',`[장면 ${i+1}] [B-5] 영상 생성 완료 ✓`);
        } catch(vidErr) {
          addLog('warn', `[장면 ${i+1}] [B-5] 영상 생성 실패: ${vidErr.message}`);
        }

        addLog('info',`[장면 ${i+1}] Pipeline B 완료 ✓`);

        // Update scene
        const ns = [...scenes];
        ns[i] = {...ns[i], convertedConti, imagePrompt, imageNegative, imagePromptFull:imgResult, motionConti, motionPrompt,
          status:{conti:'done',image:'done',video:'done'}};
        setScenes(ns);

      } catch(err) {
        addLog('error',`[장면 ${i+1}] 오류: ${err.message}`);
        const ns = [...scenes];
        ns[i] = {...ns[i], status:{...ns[i].status, conti:'error'}};
        setScenes(ns);
      }
    }

    setRunning(false);
    setCurrentScene(-1);
    setCurrentStep('');
    addLog('info','🎉 전체 파이프라인 완료!');
  };

  const completedScenes = scenes.filter(s=>s.status?.video==='done').length;
  const totalScenes = scenes.filter(s=>s.description).length;

  return (
    <div>
      <div className="pipeline-bar">
        <div className={`pipeline-step ${currentStep==='A-2'?'active':'pending'}`}>A-2 콘티변환</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='A-3'?'active':'pending'}`}>A-3 이미지프롬프트</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='A-4'?'active':scenes.every(s=>s.imageUrl)?'done':'pending'}`}>A-4 이미지생성</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='B-2'?'active':'pending'}`}>B-2 모션콘티</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='B-3'?'active':'pending'}`}>B-3 모션프롬프트</div>
        <span className="pipeline-arrow">→</span>
        <div className={`pipeline-step ${currentStep==='B-5'?'active':scenes.every(s=>s.videoUrl)?'done':'pending'}`}>B-5 영상생성</div>
      </div>

      <div className="stats-bar">
        <div className="stat-item">장면: <span className="stat-value">{totalScenes}</span></div>
        <div className="stat-item">완료: <span className="stat-value">{completedScenes}/{totalScenes}</span></div>
        <div className="stat-item">장르: <span className="stat-value">{GENRE_PRESETS[scenes[0]?.genre]?.icon} {GENRE_PRESETS[scenes[0]?.genre]?.name}</span></div>
        {running && <div className="stat-item"><span className="spinner"/> 장면 #{currentScene+1} — {currentStep}</div>}
      </div>

      <div className="card">
        <div className="card-title">🔄 통합 파이프라인: 글콘티 → 이미지 → 영상
          <button className="btn btn-primary" onClick={runFullPipeline} disabled={running} style={{marginLeft:'auto'}}>
            {running ? <><span className="spinner"/> 처리 중...</> : '🚀 전체 실행'}
          </button>
        </div>

        {totalScenes > 0 && (
          <div className="progress-bar" style={{height:6,marginBottom:16}}>
            <div className="progress-fill" style={{width:`${(completedScenes/totalScenes)*100}%`}}/>
          </div>
        )}

        <div className="wb-timeline">
          <div className="wb-scene-row" style={{fontWeight:700,fontSize:11,color:'var(--text2)',background:'var(--surface2)',borderRadius:'8px 8px 0 0'}}>
            <div style={{textAlign:'center'}}>#</div>
            <div>글콘티 / 구조화 콘티</div>
            <div>이미지 프롬프트 (EN)</div>
            <div>영상 모션 프롬프트 (EN)</div>
          </div>
          {scenes.map((sc,i)=>{
            if(!sc.description) return null;
            const isCurrent = running && currentScene === i;
            return (
              <div key={i} className="wb-scene-row" style={{background: isCurrent ? 'rgba(108,92,231,.05)' : 'transparent'}}>
                <div className="wb-scene-num">{i+1}</div>
                <div className={`wb-cell ${sc.convertedConti?'has-result':isCurrent&&(currentStep==='A-2')?'processing':''}`}>
                  <div className="cell-label">글콘티 → 구조화</div>
                  <div className="cell-content" style={{fontSize:11}}>
                    {sc.convertedConti ? sc.convertedConti.substring(0,150)+'...' : sc.description.substring(0,80)+'...'}
                  </div>
                </div>
                <div className={`wb-cell ${sc.imagePrompt?'has-result':isCurrent&&currentStep==='A-3'?'processing':''}`}>
                  <div className="cell-label">이미지 프롬프트</div>
                  <div className="cell-content" style={{fontSize:11,fontFamily:'monospace'}}>
                    {sc.imagePrompt ? sc.imagePrompt.substring(0,150)+'...' : '—'}
                  </div>
                </div>
                <div className={`wb-cell ${sc.motionPrompt?'has-result':isCurrent&&(currentStep==='B-2'||currentStep==='B-3')?'processing':''}`}>
                  <div className="cell-label">모션 프롬프트</div>
                  <div className="cell-content" style={{fontSize:11,fontFamily:'monospace'}}>
                    {sc.motionPrompt ? sc.motionPrompt.substring(0,150)+'...' : '—'}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Expanded results */}
      {scenes.some(s=>s.motionPrompt) && (
        <div className="card" style={{marginTop:16}}>
          <div className="card-title">📋 전체 결과 상세</div>
          {scenes.map((sc,i)=>{
            if(!sc.motionPrompt) return null;
            return (
              <div key={i} style={{marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
                <h4 style={{fontSize:14,marginBottom:8}}>장면 #{i+1}: {sc.description?.substring(0,60)}</h4>
                <div className="grid-3">
                  <div className="result-panel">
                    <div className="result-label">구조화 콘티 (KR)</div>
                    <div className="result-text korean" style={{fontSize:11,maxHeight:120,overflow:'auto'}}>{sc.convertedConti}</div>
                  </div>
                  <div className="result-panel">
                    <div className="result-label">이미지 프롬프트 (EN)</div>
                    <div className="result-text english" style={{fontSize:10,maxHeight:120,overflow:'auto'}}>{sc.imagePrompt}</div>
                  </div>
                  <div className="result-panel">
                    <div className="result-label">모션 프롬프트 (EN)</div>
                    <div className="result-text english" style={{fontSize:10,maxHeight:120,overflow:'auto'}}>{sc.motionPrompt}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

        React.createElement('div',{style:{flex:1,overflow:'auto',borderRadius:10,background:'#0d1117',border:'1px solid #21262d',padding:12}},
          expandView==='characters' && globalAsset?.characters && React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12}},
            ...globalAsset.characters.map((ch,i)=>React.createElement('div',{key:i,style:{background:'#161b22',borderRadius:10,overflow:'hidden',border:'1px solid #30363d'}},
              ch.referenceImageUrl && React.createElement('img',{src:ch.referenceImageUrl,style:{width:'100%',height:200,objectFit:'cover'}}),
              React.createElement('div',{style:{padding:'8px 10px'}},
                React.createElement('div',{style:{fontWeight:700,color:'#e6edf3',fontSize:13}},ch.name),
                React.createElement('div',{style:{color:'#6c5ce7',fontSize:11,marginTop:2}},ch.role),
                React.createElement('div',{style:{color:'#8b949e',fontSize:11,marginTop:4}},(ch.appearance?.hair||'')+' | '+(ch.appearance?.build||''))
              )))
          ),
          expandView==='backgrounds' && globalAsset?.backgrounds && React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12}},
            ...globalAsset.backgrounds.map((bg,i)=>React.createElement('div',{key:i,style:{background:'#161b22',borderRadius:10,overflow:'hidden',border:'1px solid #30363d'}},
              bg.referenceImageUrl && React.createElement('img',{src:bg.referenceImageUrl,style:{width:'100%',height:160,objectFit:'cover'}}),
              React.createElement('div',{style:{padding:'8px 10px'}},
                React.createElement('div',{style:{fontWeight:700,color:'#e6edf3',fontSize:13}},bg.name),
                React.createElement('div',{style:{color:'#8b949e',fontSize:11,marginTop:2}},bg.locationType+' | '+bg.timeOfDay+' | '+(bg.mood||''))
              )))
          ),
          expandView==='scenes' && lfScenes.length>0 && React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
            ...lfScenes.map((sc,i)=>React.createElement('div',{key:i,style:{display:'flex',gap:10,background:'#161b22',borderRadius:10,border:currentSceneIdx===i&&running?'2px solid #6c5ce7':'1px solid #30363d',padding:10,alignItems:'flex-start'}},
              React.createElement('div',{style:{width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:sc.status==='complete'?'#238636':sc.status==='video_ready'?'#1f6feb':sc.status==='anchor_ready'?'#6c5ce7':'#30363d',color:'#fff',fontSize:12,fontWeight:700,flexShrink:0}},i+1),
              React.createElement('div',{style:{flex:1,minWidth:0}},
                React.createElement('div',{style:{color:'#e6edf3',fontSize:12,fontWeight:600,marginBottom:4}},sc.summary||('Scene '+(i+1))),
                sc.compositionData && React.createElement('div',{style:{color:'#8b949e',fontSize:11}},sc.compositionData.shotSize+' | '+sc.compositionData.cameraAngle+' | '+sc.compositionData.lighting),
                React.createElement('div',{style:{display:'flex',gap:4,marginTop:6}},
                  React.createElement('span',{style:{padding:'2px 6px',borderRadius:4,fontSize:10,background:sc.status==='complete'?'#238636':sc.status==='prompt_ready'?'#6c5ce7':sc.status==='image_done'?'#2ea043':'#30363d',color:'#fff'}},sc.status||'pending'),
                  sc.narrativeMood && React.createElement('span',{style:{padding:'2px 6px',borderRadius:4,fontSize:10,background:'#1c2128',color:'#f0883e'}},sc.narrativeMood))
              ),
              React.createElement('div',{style:{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}},
                React.createElement('button',{onClick:(e)=>{e.stopPropagation();generateSceneImage(i)},disabled:sc.status==='generating_image',style:{padding:'3px 8px',fontSize:10,borderRadius:4,border:'1px solid #6c5ce7',background:sc.status==='generating_image'?'#6c5ce7':'transparent',color:'#fff',cursor:'pointer',whiteSpace:'nowrap'}},(sc.status==='generating_image'?'•••':sc.imagePrompt?'🖼️ 이미지 생성 (✓)':'🖼️ 이미지 생성')),
                React.createElement('button',{onClick:(e)=>{e.stopPropagation();generateSceneVideo(i)},disabled:sc.status==='generating_video'||!sc.anchorImage,style:{padding:'3px 8px',fontSize:10,borderRadius:4,border:'1px solid #e0457b',background:sc.status==='generating_video'?'#e0457b':'transparent',color:'#fff',cursor:'pointer',whiteSpace:'nowrap'}},(sc.status==='generating_video'?'•••':'🎬 영상 생성')),
                sc.anchorImage&&React.createElement('button',{onClick:(e)=>{e.stopPropagation();downloadMedia(sc.anchorImage.url,'scene_'+(i+1)+'_image.png')},style:{padding:'3px 8px',fontSize:10,borderRadius:4,border:'1px solid #238636',background:'transparent',color:'#238636',cursor:'pointer',whiteSpace:'nowrap'}},'⬇ 이미지 저장'),
                sc.video&&sc.video.url&&React.createElement('button',{onClick:(e)=>{e.stopPropagation();downloadMedia(sc.video.url,'scene_'+(i+1)+'_video.mp4')},style:{padding:'3px 8px',fontSize:10,borderRadius:4,border:'1px solid #238636',background:'transparent',color:'#238636',cursor:'pointer',whiteSpace:'nowrap'}},'⬇ 영상 저장')
              ),
              sc.anchorImage?.url && React.createElement('img',{src:sc.anchorImage.url,style:{width:60,height:80,objectFit:'cover',borderRadius:6,flexShrink:0}}),
              sc.video?.url && React.createElement('video',{src:sc.video.url,muted:true,style:{width:60,height:80,objectFit:'cover',borderRadius:6,flexShrink:0},onMouseEnter:e=>e.target.play(),onMouseLeave:e=>{e.target.pause();e.target.currentTime=0;}})
            ))
          ),
          !expandView && React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:'#484f58',gap:12}},
            React.createElement('div',{style:{fontSize:48}},'\uD83C\uDFAC'),
            React.createElement('div',{style:{fontSize:14,fontWeight:600}},'Long-Form Production Pipeline'),
            React.createElement('div',{style:{fontSize:12,textAlign:'center',lineHeight:1.8,maxWidth:400}},'Phase 1: Story Analysis & Global Asset\nPhase 2: Scene Splitting & DP Composition\nPhase 3: Anchor Image Generation\nPhase 4: Video Generation (Veo 2)\nPhase 5: Webtoon Panel Expansion'),
            React.createElement('div',{style:{fontSize:11,color:'#30363d',marginTop:8}},'Paste your story text on the left and start the pipeline')
          ),
          expandView==='characters' && !globalAsset?.characters && React.createElement('div',{style:{color:'#484f58',textAlign:'center',padding:40,fontSize:13}},'Phase 1\uC744 \uC2E4\uD589\uD558\uBA74 \uCE90\uB9AD\uD130\uAC00 \uCD94\uCD9C\uB429\uB2C8\uB2E4'),
          expandView==='backgrounds' && !globalAsset?.backgrounds && React.createElement('div',{style:{color:'#484f58',textAlign:'center',padding:40,fontSize:13}},'Phase 1\uC744 \uC2E4\uD589\uD558\uBA74 \uBC30\uACBD\uC774 \uCD94\uCD9C\uB429\uB2C8\uB2E4'),
          expandView==='scenes' && lfScenes.length===0 && React.createElement('div',{style:{color:'#484f58',textAlign:'center',padding:40,fontSize:13}},'Phase 2\uB97C \uC2E4\uD589\uD558\uBA74 \uC528\uC774 \uBD84\uD560\uB429\uB2C8\uB2E4')
        )
      )
    ),
    phaseHistory.length>0 && React.createElement('div',{style:{display:'flex',gap:4,padding:'6px 10px',background:'#161b22',borderRadius:8,overflowX:'auto',flexShrink:0}},
      ...phaseHistory.map((h,i)=>React.createElement('span',{key:i,style:{padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600,whiteSpace:'nowrap',background:h.error?'#3d1f1f':h.phase.endsWith('_COMPLETE')||h.phase==='COMPLETED'?'#0e3a1f':'#1c2333',color:h.error?'#f85149':h.phase.endsWith('_COMPLETE')||h.phase==='COMPLETED'?'#3fb950':'#6c5ce7'}},PHASE_LABELS[h.phase]||h.phase))
    )
  );
}


function ApiKeyModal({onClose, onSave}) {
  const [geminiVal, setGeminiVal] = React.useState(localStorage.getItem('GEMINI_API_KEY')||'');
  const [xaiVal, setXaiVal] = React.useState(localStorage.getItem('XAI_API_KEY')||'');
  const handleSave = () => {
    if(geminiVal.trim()) setGeminiKey(geminiVal.trim());
    if(xaiVal.trim()) setXaiKey(xaiVal.trim());
    onSave();
    onClose();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <h3 style={{marginBottom:16,fontSize:18,fontWeight:700}}>API 키 설정</h3>
        <div className="form-group">
          <label className="form-label">🔑 Google Gemini API Key</label>
          <input className="form-input" type="password" placeholder="AIzaSy..." value={geminiVal} onChange={e=>setGeminiVal(e.target.value)} />
          <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>텍스트 생성(Gemini), 이미지(Imagen), 영상(Veo) 생성에 사용</div>
        </div>
        <div className="form-group">
          <label className="form-label">🤖 xAI (Grok) API Key</label>
          <input className="form-input" type="password" placeholder="xai-..." value={xaiVal} onChange={e=>setXaiVal(e.target.value)} />
          <div style={{fontSize:11,color:'var(--text2)',marginTop:4}}>Grok 텍스트 생성, Aurora 이미지 생성에 사용</div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
          <button className="btn btn-secondary" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={handleSave}>저장</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('conti');
  const [showKeyModal, setShowKeyModal] = useState(!hasGeminiKey());
  const [keySet, setKeySet] = useState(hasGeminiKey());
  const [xaiKS, setXaiKS] = React.useState(hasXaiKey());
  const [scenes, setScenes] = useState([{
    id:'scene_1', description:'', dialogues:[{type:'speech',character:'',text:''}],
    sfx:[], sfxText:'', emotionStart:'smiling', emotionEnd:'smiling',
    cameraHint:'static', genre:'romance',
    convertedConti:'', imagePrompt:'', imageNegative:'', imagePromptFull:'',
    motionConti:'', motionPrompt:'', imageUrl:'', videoUrl:'',
    status:{conti:'idle',image:'idle',video:'idle'}
  }]);
  const [activeSceneIdx, setActiveSceneIdx] = useState(0);
  const [logs, setLogs] = useState([]);

  const addLog = useCallback((type, msg) => {
    const now = new Date();
    const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    setLogs(prev => [...prev.slice(-100), {type, msg, time}]);
  }, []);

  const tabs = [
    {id:'conti', label:'글콘티 에디터', icon:'📋'},
    {id:'imageGen', label:'이미지 생성', icon:'🖼️'},
    {id:'videoGen', label:'영상 생성', icon:'🎬'},
    {id:'workbench', label:'웹툰제작 워크벤치', icon:'🔄'}
,
    {id:'longform', label:'롱폼 프로덕션', icon:'🎬'}  ];

  return (
    <div>
      <div className="app-header">
        <div className="app-logo">웹툰 생성기</div>
        <div className="nav-tabs">
          {tabs.map(t=>(
            <button key={t.id} className={`nav-tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>
              <span className="tab-icon">{t.icon}</span>{t.label}
            </button>
          ))}
        </div>
        <button className="api-key-btn" onClick={()=>setShowKeyModal(true)} style={{display:'flex',gap:6,alignItems:'center'}}>
              {keySet && <span style={{color:'#00c853'}}>● Gemini</span>}
              {!keySet && <span style={{color:'#ff5252'}}>○ Gemini</span>}
              {xaiKS && <span style={{color:'#00c853'}}>● Grok</span>}
              {!xaiKS && <span style={{color:'#ff5252'}}>○ Grok</span>}
              🔑
            </button>
      </div>
      {showKeyModal && <ApiKeyModal onClose={()=>setShowKeyModal(false)} onSave={()=>{setKeySet(hasGeminiKey());setShowKeyModal(false);}}/>}

      <div className="main-content">
        {activeTab === 'conti' && (
          <GlContiEditor scenes={scenes} setScenes={setScenes} activeSceneIdx={activeSceneIdx} setActiveSceneIdx={setActiveSceneIdx}/>
        )}
        {activeTab === 'imageGen' && (
          <ImageGenerator scenes={scenes} setScenes={setScenes} activeSceneIdx={activeSceneIdx} setActiveSceneIdx={setActiveSceneIdx} addLog={addLog}/>
        )}
        {activeTab === 'videoGen' && (
          <VideoGenerator scenes={scenes} setScenes={setScenes} activeSceneIdx={activeSceneIdx} setActiveSceneIdx={setActiveSceneIdx} addLog={addLog}/>
        )}
        {activeTab === 'workbench' && (
          <Workbench scenes={scenes} setScenes={setScenes} addLog={addLog}/>
        )}

                {activeTab === 'longform' && <LongFormOrchestrator scenes={scenes} setScenes={setScenes} log={(msg,lvl)=>addLog(lvl||'info',msg)}/>}
{/* Log Panel */}
        <div className="card" style={{marginTop:16}}>
          <div className="card-title">🖥️ 시스템 로그
            <button className="btn btn-sm btn-secondary" onClick={()=>setLogs([])} style={{marginLeft:'auto'}}>지우기</button>
          </div>
          <LogPanel logs={logs}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
