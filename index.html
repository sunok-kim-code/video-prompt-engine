      w: bubbleStyle === 'narration' ? 300 : bubbleStyle === 'boxRound' ? 130 : 180,
      h: bubbleStyle === 'narration' ? 44 : bubbleStyle === 'boxRound' ? 110 : 80,
      fontSize: 25,
      fontFamily: "'Noto Sans KR',sans-serif",
      tailPos: 0.3,
      tailSize: 1.0,
      tailStyle: bt.defaultTailStyle || 'normal',
      textOffsetX: 0, textOffsetY: 0,
      zIndex: Math.max(...page.objects.map(o => o.zIndex || 1), 10) + 1
    };
    setEditorPages(prev => {
      const next = [...prev];
      const pi = Math.min(currentPageIdx, next.length - 1);
      if (!next[pi]) return prev;
      next[pi] = {...next[pi], objects: [...(next[pi].objects || []), newBubble]};
      return next;
    });
  };

  const addImageToPage = async (dataUrl) => {
    if (editorPages.length === 0) return;
    // Measure image to preserve aspect ratio
    let imgW = 300, imgH = 300;
    try {
      const img = await loadImage(dataUrl);
      const ratio = img.height / img.width;
      imgW = Math.min(img.width, PAGE_W - 40);
      imgH = Math.round(imgW * ratio);
    } catch(e) {}
    setEditorPages(prev => {
      const pi = Math.min(currentPageIdx, prev.length - 1);
      const page = prev[pi];
      if (!page || !page.objects) return prev;
      const pos = getInsertPosition();
      const newImage = {
        id: 'img_' + Date.now(), type: 'image', src: dataUrl, x: pos.x, y: pos.y, w: imgW, h: imgH,
        zIndex: Math.max(...page.objects.map(o => o.zIndex || 1), 5) + 1
      };
      const next = [...prev];
      next[pi] = {...next[pi], objects: [...(next[pi].objects || []), newImage]};
      return next;
    });
    log('이미지가 현재 페이지에 추가되었습니다.', 'success');
  };

  const updatePageObject = (pageIdx, objId, updates) => {
    setEditorPages(prev => {
      const next = [...prev];
      next[pageIdx] = {
        ...next[pageIdx],
        objects: next[pageIdx].objects.map(o => o.id === objId ? {...o, ...updates} : o)
      };
      return next;
    });
  };

  const deletePageObject = (pageIdx, objId) => {
    setEditorPages(prev => {
      const next = [...prev];
      next[pageIdx] = {
        ...next[pageIdx],
        objects: next[pageIdx].objects.filter(o => o.id !== objId)
      };
      return next;
    });
    if (selectedObjectId === objId) setSelectedObjectId(null);
  };

  // Cross-page: move object from one page to another
  const moveObjectToPage = (fromPageIdx, objId, toPageIdx) => {
    setEditorPages(prev => {
      const next = [...prev];
      const fromPage = next[fromPageIdx];
      const obj = fromPage.objects.find(o => o.id === objId);
      if (!obj) return prev;
      next[fromPageIdx] = {...fromPage, objects: fromPage.objects.filter(o => o.id !== objId)};
      const movedObj = {...obj, y: 20}; // Reset y near top of target page
      next[toPageIdx] = {...next[toPageIdx], objects: [...next[toPageIdx].objects, movedObj]};
      return next;
    });
    setCurrentPageIdx(toPageIdx);
    log(`객체를 페이지 ${fromPageIdx+1} → ${toPageIdx+1}로 이동`, 'info');
  };

  // Detect which page the mouse is over for cross-page drop
  // Also handles gaps between pages by finding the nearest page vertically
  const detectDropPage = (d) => {
    if (!editorCanvasRef.current) return null;
    const pageDivs = editorCanvasRef.current.querySelectorAll('.be-page-canvas');
    const mouseY = d.lastClientY || d.startY;
    const mouseX = d.lastClientX || d.startX;
    let closestPage = null;
    let closestDist = Infinity;
    for (let i = 0; i < pageDivs.length; i++) {
      const rect = pageDivs[i].getBoundingClientRect();
      // Exact hit — mouse is inside this page canvas
      if (mouseY >= rect.top && mouseY <= rect.bottom && mouseX >= rect.left && mouseX <= rect.right) {
        return i;
      }
      // Track closest page by vertical distance (for gap handling)
      const distY = mouseY < rect.top ? rect.top - mouseY : mouseY > rect.bottom ? mouseY - rect.bottom : 0;
      const distX = mouseX < rect.left ? rect.left - mouseX : mouseX > rect.right ? mouseX - rect.right : 0;
      const dist = Math.sqrt(distX * distX + distY * distY);
      if (dist < closestDist && dist < 80) { // within 80px tolerance
        closestDist = dist;
        closestPage = i;
      }
    }
    return closestPage;
  };

  // Get position near currently selected object (for adding new items nearby)
  const getInsertPosition = () => {
    if (!selectedObjectId || editorPages.length === 0) return {x: 100, y: 200};
    const page = editorPages[currentPageIdx];
    const sel = page?.objects.find(o => o.id === selectedObjectId);
    if (!sel) return {x: 100, y: 200};
    return {x: Math.min(sel.x + 20, PAGE_W - 200), y: sel.y + (sel.h || 80) + 15};
  };

  const handleImageFileInsert = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      addImageToPage(ev.target.result);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  // ── Shared helpers ──
  const loadImage = (src) => new Promise((res, rej) => {
    const im = new Image(); im.crossOrigin = 'anonymous'; im.onload = () => res(im); im.onerror = rej; im.src = src;
  });

  const downloadDataUrl = (dataUrl, filename) => {
    const a = document.createElement('a'); a.href = dataUrl; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  // Generate a unified bubble+tail SVG path with variable roundness and tail style.
  // roundness: 0 = sharp rectangle, 50 = rounded rect, 100 = full ellipse (default)
  // tailStyle: 'normal' (bezier curve), 'straight' (pointy lines), 'round' (bulbous round)
  const buildBubblePath = (cx, cy, rx, ry, tailPos, tailLen, tailWid, bubbleW, bubbleH, scale, roundness, tailStyle) => {
    const rn = roundness ?? 100;
    const ts = tailStyle || 'normal';
    const tw = 12 * tailWid * scale;
    const th = 18 * tailLen * scale;
    const tailBaseX = bubbleW * tailPos;
    const tailTipX = tailBaseX;
    const tailTipY = bubbleH + th;
    const pad = 2;

    // Helper: compute bezier tail segments that flow seamlessly from body edge
    // leftPt/rightPt = {x,y} junction points on body, leftTan/rightTan = tangent direction at junction
    const buildTailSegments = (leftPt, rightPt, leftTan, rightTan) => {
      if (ts === 'straight') {
        return [
          `L ${rightPt.x} ${rightPt.y}`,
          `L ${tailTipX} ${tailTipY}`,
          `L ${leftPt.x} ${leftPt.y}`
        ];
      } else if (ts === 'round') {
        // Rounded tip with smooth bezier approach
        const tipRadius = Math.max(tw * 0.25, 3);
        const cR1x = rightPt.x + rightTan.x * th * 0.5;
        const cR1y = rightPt.y + rightTan.y * th * 0.5;
        const cR2x = tailTipX + tipRadius * 0.8;
        const cR2y = tailTipY - th * 0.1;
        const cL1x = tailTipX - tipRadius * 0.8;
        const cL1y = tailTipY - th * 0.1;
        const cL2x = leftPt.x + leftTan.x * th * 0.5;
        const cL2y = leftPt.y + leftTan.y * th * 0.5;
        return [
          `C ${cR1x} ${cR1y} ${cR2x} ${cR2y} ${tailTipX + tipRadius * 0.3} ${tailTipY}`,
          `A ${tipRadius} ${tipRadius * 0.8} 0 1 1 ${tailTipX - tipRadius * 0.3} ${tailTipY}`,
          `C ${cL1x} ${cL1y} ${cL2x} ${cL2y} ${leftPt.x} ${leftPt.y}`
        ];
      } else {
        // Normal bezier — smooth S-curve from body to tip and back
        // Control points follow the tangent at the junction, then curve toward tip
        const handleLen = th * 0.55; // how far control points extend along tangent
        const pinchFactor = 0.2; // how narrow the tip area is
        const cR1x = rightPt.x + rightTan.x * handleLen;
        const cR1y = rightPt.y + rightTan.y * handleLen;
        const cR2x = tailTipX + tw * pinchFactor;
        const cR2y = tailTipY - th * 0.12;
        const cL1x = tailTipX - tw * pinchFactor * 1.2;
        const cL1y = tailTipY - th * 0.12;
        const cL2x = leftPt.x + leftTan.x * handleLen;
        const cL2y = leftPt.y + leftTan.y * handleLen;
        return [
          `C ${cR1x} ${cR1y} ${cR2x} ${cR2y} ${tailTipX} ${tailTipY}`,
          `C ${cL1x} ${cL1y} ${cL2x} ${cL2y} ${leftPt.x} ${leftPt.y}`
        ];
      }
    };

    // Unified approach: always use rounded-rect with variable corner radius.
    // At rn=100, corner radius = min(rx,ry) which makes it look like an ellipse.
    // This eliminates the visual jump that occurred at the old rn=95 threshold.
    const maxR = Math.min(rx, ry);
    const cr = maxR * Math.max(0.04, rn / 100);
    const L = pad, T = pad, R = bubbleW - pad, B = bubbleH - pad;

    // Tail junction points on bottom edge — stay within the straight segment between corners
    const tRight = Math.min(R - cr - 2, tailBaseX + tw);
    const tLeft = Math.max(L + cr + 2, tailBaseX - tw);

    // Bottom edge is horizontal → tangent at junction points downward
    const rightPt = {x: tRight, y: B};
    const leftPt = {x: tLeft, y: B};
    const rightTan = {x: 0.15, y: 1};
    const leftTan = {x: -0.15, y: 1};

    const tailSegs = buildTailSegments(leftPt, rightPt, leftTan, rightTan);

    // Use cubic bezier corners (approximating quarter-ellipse arcs for high roundness)
    // kappa ≈ 0.5523 gives a near-perfect circular arc approximation with cubic bezier
    const k = 0.5523;
    const crx = Math.min(cr, (R - L) / 2); // clamp so corners don't overlap
    const cry = Math.min(cr, (B - T) / 2);

    const path = [
      `M ${L + crx} ${T}`,
      `L ${R - crx} ${T}`,
      `C ${R - crx + crx * k} ${T} ${R} ${T + cry - cry * k} ${R} ${T + cry}`,
      `L ${R} ${B - cry}`,
      `C ${R} ${B - cry + cry * k} ${R - crx + crx * k} ${B} ${R - crx} ${B}`,
      // Bottom edge right → tail right junction
      `L ${tRight} ${B}`,
      // Tail segments (right junction → tip → left junction)
      ...tailSegs,
      // Bottom edge left junction → bottom-left corner
      `L ${L + crx} ${B}`,
      `C ${L + crx - crx * k} ${B} ${L} ${B - cry + cry * k} ${L} ${B - cry}`,
      `L ${L} ${T + cry}`,
      `C ${L} ${T + cry - cry * k} ${L + crx - crx * k} ${T} ${L + crx} ${T}`,
      'Z'
    ];
    return path.join(' ');
  };

  // Build cloud-shaped bubble path with bumpy edges + tail
  const buildCloudPath = (w, h, tailPos, tailLen, tailWid, scale) => {
    const bumps = 10;
    const cx = w / 2, cy = h / 2;
    const rx = w / 2 - 4, ry = h / 2 - 4;
    const pts = [];
    // Generate bumpy outline
    for (let i = 0; i <= bumps; i++) {
      const a = (Math.PI * 2 * i) / bumps - Math.PI / 2;
      const bumpR = 0.18 * (i % 2 === 0 ? 1 : 0.7);
      const px = cx + Math.cos(a) * rx;
      const py = cy + Math.sin(a) * ry;
      const bx2 = cx + Math.cos(a) * rx * (1 + bumpR);
      const by2 = cy + Math.sin(a) * ry * (1 + bumpR);
      if (i === 0) {
        pts.push(`M ${px} ${py}`);
      } else {
        const prevA = (Math.PI * 2 * (i - 1)) / bumps - Math.PI / 2;
        const midA = (prevA + a) / 2;
        const cpx = cx + Math.cos(midA) * rx * (1 + bumpR * 1.5);
        const cpy = cy + Math.sin(midA) * ry * (1 + bumpR * 1.5);
        pts.push(`Q ${cpx} ${cpy} ${px} ${py}`);
      }
    }
    pts.push('Z');
    let path = pts.join(' ');
    // Add tail as separate triangle (cloud bubbles typically have round sub-bubbles as tail)
    const tw = 10 * tailWid * scale;
    const th = 14 * tailLen * scale;
    const tx = w * tailPos;
    // Add small circles as cloud tail
    const c1x = tx, c1y = h - 2;
    const c2x = tx + tw * 0.3, c2y = h + th * 0.35;
    const c3x = tx + tw * 0.1, c3y = h + th * 0.7;
    path += ` M ${c1x + 6} ${c1y} A 6 5 0 1 1 ${c1x - 6} ${c1y} A 6 5 0 1 1 ${c1x + 6} ${c1y}`;
    path += ` M ${c2x + 4} ${c2y} A 4 3 0 1 1 ${c2x - 4} ${c2y} A 4 3 0 1 1 ${c2x + 4} ${c2y}`;
    path += ` M ${c3x + 2.5} ${c3y} A 2.5 2 0 1 1 ${c3x - 2.5} ${c3y} A 2.5 2 0 1 1 ${c3x + 2.5} ${c3y}`;
    return path;
  };

  // Build rounded-rectangle box bubble path with tail
  const buildBoxPath = (w, h, r, tailPos, tailLen, tailWid, scale) => {
    const tw = 10 * tailWid * scale;
    const th = 16 * tailLen * scale;
    const tx = Math.max(r + tw, Math.min(w - r - tw, w * tailPos));
    const pts = [
      `M ${r} 0`, `L ${w - r} 0`, `Q ${w} 0 ${w} ${r}`,
      `L ${w} ${h - r}`, `Q ${w} ${h} ${w - r} ${h}`,
      `L ${tx + tw} ${h}`,
      `C ${tx + tw * 0.6} ${h} ${tx + tw * 0.2} ${h + th * 0.3} ${tx} ${h + th}`,
      `C ${tx - tw * 0.2} ${h + th * 0.3} ${tx - tw * 0.6} ${h} ${tx - tw} ${h}`,
      `L ${r} ${h}`, `Q 0 ${h} 0 ${h - r}`,
      `L 0 ${r}`, `Q 0 0 ${r} 0`, 'Z'
    ];
    return pts.join(' ');
  };

  // Build wave-shaped bubble path with wavy edges + tail
  const buildWavePath = (w, h, tailPos, tailLen, tailWid, scale) => {
    const waves = 6;
    const amp = 4 * scale;
    const tw = 10 * tailWid * scale;
    const th = 16 * tailLen * scale;
    const tx = w * tailPos;
    const pts = [`M 0 ${amp}`];
    // Top edge (wavy)
    for (let i = 0; i < waves; i++) {
      const seg = w / waves;
      const x1 = seg * i + seg * 0.25, y1 = -amp;
      const x2 = seg * i + seg * 0.75, y2 = amp;
      const x3 = seg * (i + 1), y3 = amp;
      pts.push(`C ${x1} ${y1} ${x2} ${y2 * 0.3} ${x3} ${y3 * 0.5}`);
    }
    // Right edge (wavy)
    for (let i = 0; i < 3; i++) {
      const seg = h / 3;
      const y1 = seg * i + seg * 0.25, x1 = w + amp;
      const y2 = seg * i + seg * 0.75, x2 = w - amp;
      const y3 = seg * (i + 1);
      pts.push(`C ${x1} ${y1} ${x2} ${y2} ${w} ${y3}`);
    }
    // Bottom edge with tail
    const rightTail = Math.min(w, tx + tw);
    const leftTail = Math.max(0, tx - tw);
    pts.push(`L ${rightTail} ${h}`);
    pts.push(`C ${tx + tw * 0.5} ${h} ${tx + tw * 0.15} ${h + th * 0.4} ${tx} ${h + th}`);
    pts.push(`C ${tx - tw * 0.15} ${h + th * 0.4} ${tx - tw * 0.5} ${h} ${leftTail} ${h}`);
    pts.push(`L 0 ${h}`);
    // Left edge (wavy)
    for (let i = 2; i >= 0; i--) {
      const seg = h / 3;
      const y1 = seg * i + seg * 0.75, x1 = -amp;
      const y2 = seg * i + seg * 0.25, x2 = amp;
      const y3 = seg * i;
      pts.push(`C ${x1} ${y1} ${x2} ${y2} 0 ${y3}`);
    }
    pts.push('Z');
    return pts.join(' ');
  };

  // Build spiky/explosion bubble path with tail
  const buildSpikyPath = (w, h, spikeCount, tailPos, tailLen, tailWid, scale) => {
    const cx = w / 2, cy = h / 2;
    const n = spikeCount || 16;
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const a = (Math.PI * 2 * i) / n - Math.PI / 2;
      const outerR = i % 2 === 0 ? 1.0 : 0.65;
      const px = cx + Math.cos(a) * (w / 2) * outerR;
      const py = cy + Math.sin(a) * (h / 2) * outerR;
      pts.push(i === 0 ? `M ${px} ${py}` : `L ${px} ${py}`);
    }
    pts.push('Z');
    // Add tail
    const tw = 10 * tailWid * scale;
    const th = 16 * tailLen * scale;
    const tx = w * tailPos;
    pts.push(`M ${tx - tw} ${h * 0.85}`);
    pts.push(`L ${tx} ${h + th}`);
    pts.push(`L ${tx + tw} ${h * 0.85}`);
    pts.push('Z');
    return pts.join(' ');
  };

  // Enhanced bubble drawing with shadows and seamless ellipse+tail
  const drawBubbleOnCanvas = (ctx, b, bx, by, bw, bh, scale) => {
    const bt = BUBBLE_TYPES[b.bubbleStyle || b.type] || BUBBLE_TYPES.speech;
    const tailPos = b.tailPos ?? 0.3;
    const tailSz = b.tailSize ?? 1.0;
    const tailLen = b.tailLength ?? tailSz;
    const tailWid = b.tailWidth ?? tailSz;
    ctx.save();

    // Add drop shadow
    if (bt.shadow) {
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 4 * scale;
      ctx.shadowOffsetX = 2 * scale;
      ctx.shadowOffsetY = 2 * scale;
    }

    // Compute effective bg for plainText types with custom color/opacity
    const effBg = (() => {
      if (bt.plainText && b.customBg) {
        const op = (b.customBgOpacity ?? 100) / 100;
        const hex = b.customBg;
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), bl = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${bl},${op})`;
      }
      if (bt.plainText && b.customBgOpacity !== undefined) {
        const op = b.customBgOpacity / 100;
        return `rgba(255,255,255,${op})`;
      }
      return bt.bg;
    })();

    // plainText type: simple rect background, no border
    if (bt.plainText && !bt.ellipse) {
      ctx.fillStyle = effBg;
      ctx.fillRect(bx, by, bw, bh);
    } else if (bt.plainText && bt.ellipse) {
      ctx.beginPath();
      ctx.ellipse(bx + bw / 2, by + bh / 2, bw / 2, bh / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = effBg; ctx.fill();
    } else if (bt.spiky || bt.cloudShape || bt.boxShape || bt.waveShape) {
      // Path-based shapes: spiky, cloud, box, wave
      let pathStr;
      if (bt.spiky) pathStr = buildSpikyPath(bw, bh, bt.spikeCount||16, tailPos, tailLen, tailWid, scale);
      else if (bt.cloudShape) pathStr = buildCloudPath(bw, bh, tailPos, tailLen, tailWid, scale);
      else if (bt.boxShape) pathStr = buildBoxPath(bw, bh, (bt.radius||10)*scale, tailPos, tailLen, tailWid, scale);
      else pathStr = buildWavePath(bw, bh, tailPos, tailLen, tailWid, scale);
      ctx.save();
      ctx.translate(bx, by);
      const p2d = new Path2D(pathStr);
      ctx.fillStyle = bt.bg; ctx.fill(p2d, bt.cloudShape || bt.spiky ? 'evenodd' : 'nonzero');
      ctx.shadowColor = 'transparent';
      if (bt.border !== 'none') {
        ctx.lineWidth = (bt.borderWidth || 2) * scale;
        ctx.strokeStyle = bt.border;
        ctx.lineJoin = 'round';
        ctx.stroke(p2d);
      }
      ctx.restore();
    } else if (bt.ellipse) {
      // Ellipse with unified single-path tail (PowerPoint-style callout)
      const cx = bx + bw / 2, cy = by + bh / 2;
      const rx = bw / 2 - 2 * scale, ry = bh / 2 - 2 * scale;
      if (bt.tail) {
        // Use buildBubblePath for unified shape, then offset by bx/by
        const pathStr = buildBubblePath(bw / 2, bh / 2, rx, ry, tailPos, tailLen, tailWid, bw, bh, 1, b.roundness, b.tailStyle);
        // Apply offset transform
        ctx.save();
        ctx.translate(bx, by);
        const p2d = new Path2D(pathStr);
        ctx.fillStyle = bt.bg;
        ctx.fill(p2d);
        ctx.shadowColor = 'transparent';
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale;
          ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.stroke(p2d);
          ctx.setLineDash([]);
        }
        ctx.restore();
      } else {
        // No-tail ellipse: use roundRect with variable corner radius (consistent with buildBubblePath)
        const rn2 = b.roundness ?? 100;
        const cr2 = Math.min(rx, ry) * Math.max(0.04, rn2 / 100);
        ctx.beginPath(); ctx.roundRect(bx + 2, by + 2, bw - 4, bh - 4, cr2);
        ctx.fillStyle = bt.bg; ctx.fill();
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale; ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.stroke();
        }
      }
    } else {
      // Rounded rect (narration etc.)
      if (bt.tail) {
        // Unified path: body + tail as single shape via buildBubblePath
        const rrRx = bw / 2 - 2 * scale, rrRy = bh / 2 - 2 * scale;
        const rrRoundness = b.roundness ?? 30; // lower default for rect types
        const pathStr = buildBubblePath(bw / 2, bh / 2, rrRx, rrRy, tailPos, tailLen, tailWid, bw, bh, 1, rrRoundness, b.tailStyle);
        ctx.save();
        ctx.translate(bx, by);
        const p2d = new Path2D(pathStr);
        ctx.fillStyle = bt.bg; ctx.fill(p2d);
        ctx.shadowColor = 'transparent';
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale; ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.lineJoin = 'round';
          ctx.stroke(p2d);
          ctx.setLineDash([]);
        }
        ctx.restore();
      } else {
        const r = (bt.radius || 8) * scale / 2;
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, r);
        ctx.fillStyle = bt.bg; ctx.fill();
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale; ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.stroke();
        }
      }
    }

    // Draw text
    ctx.shadowColor = 'transparent';
    if (b.text) {
      const fs = Math.max(12, (b.fontSize || 25)) * scale;
      const ff = b.fontFamily || "'Noto Sans KR',sans-serif";
      ctx.font = `${bt.fontWeight} ${fs}px ${ff}`;
      ctx.fillStyle = b.customColor || bt.color || '#111';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const lines = b.text.split('\n');
      const lh = fs * 1.3;
      const txOff = (b.textOffsetX || 0) * scale;
      const tyOff = (b.textOffsetY || 0) * scale;
      const sy = by + bh / 2 - (lines.length - 1) * lh / 2 + tyOff;
      lines.forEach((l, li) => ctx.fillText(l, bx + bw / 2 + txOff, sy + li * lh, bw - 16 * scale));
    }
    ctx.restore();
  };

  // [WebtoonSFX 추가] SFX 캔버스 렌더링
  const drawSfxOnCanvas = (ctx, obj, ox, oy, scale) => {
    ctx.save();
    const cx = ox + obj.w * scale / 2;
    const cy = oy + obj.h * scale / 2;
    ctx.translate(cx, cy);
    if (obj.rotate) ctx.rotate(obj.rotate * Math.PI / 180);
    // Apply skew transform via setTransform (Canvas doesn't have skewX)
    if (obj.skew) {
      const skewRad = Math.tan((obj.skew || 0) * Math.PI / 180);
      ctx.transform(1, 0, skewRad, 1, 0, 0);
    }
    const fs = (obj.fontSize || 48) * scale;
    const ff = obj.fontFamily || "'Nanum Brush Script',cursive";
    ctx.font = `900 ${fs}px ${ff}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Apply filter-like effects via shadow (Canvas equivalent of CSS filter drop-shadow)
    const filterType = obj.filterType || '';
    const strokeColor = obj.stroke || '#5c0000';
    const fillColor = obj.color || '#cc2200';
    if (filterType === 'shake') {
      ctx.shadowColor = strokeColor;
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 2 * scale;
      ctx.shadowOffsetY = 2 * scale;
    } else if (filterType === 'motion') {
      ctx.shadowColor = strokeColor + '66';
      ctx.shadowBlur = 3 * scale;
      ctx.shadowOffsetX = 4 * scale;
      ctx.shadowOffsetY = 0;
    } else if (filterType === 'glow') {
      ctx.shadowColor = fillColor;
      ctx.shadowBlur = 8 * scale;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    } else if (filterType === 'outline') {
      ctx.shadowColor = strokeColor;
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 3 * scale;
      ctx.shadowOffsetY = 3 * scale;
    }
    // Stroke (outline) — paint stroke first for paint-order:stroke fill effect
    if (obj.stroke && obj.strokeWidth) {
      ctx.strokeStyle = obj.stroke;
      ctx.lineWidth = (obj.strokeWidth || 1.5) * scale * 2;
      ctx.lineJoin = 'round';
      ctx.miterLimit = 2;
      const lines = (obj.text || '').split('\n');
      const lh = fs * 1.1;
      const startY = -(lines.length - 1) * lh / 2;
      lines.forEach((l, i) => ctx.strokeText(l, 0, startY + i * lh));
    }
    // Fill
    ctx.shadowColor = 'transparent';
    ctx.fillStyle = fillColor;
    const lines = (obj.text || '').split('\n');
    const lh = fs * 1.1;
    const startY = -(lines.length - 1) * lh / 2;
    lines.forEach((l, i) => ctx.fillText(l, 0, startY + i * lh));
    ctx.restore();
  };

  // Export a single page as JPEG
  const exportPageAsJpeg = async (pageIdx) => {
    if (pageIdx < 0 || pageIdx >= editorPages.length) return null;
    const page = editorPages[pageIdx];
    const canvas = document.createElement('canvas');
    canvas.width = PAGE_W;
    canvas.height = PAGE_H;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, PAGE_W, PAGE_H);

    // Sort objects by zIndex
    const sorted = [...page.objects].sort((a, b) => (a.zIndex || 1) - (b.zIndex || 1));

    for (const obj of sorted) {
      if (obj.type === 'panel' || obj.type === 'image') {
        try {
          const img = await loadImage(obj.src);
          ctx.drawImage(img, obj.x, obj.y, obj.w, obj.h);
        } catch (e) {
          console.warn('Failed to load image:', obj.src);
        }
      } else if (obj.type === 'bubble') {
        drawBubbleOnCanvas(ctx, obj, obj.x, obj.y, obj.w, obj.h, 1);
      } else if (obj.type === 'sfx') {
        // [WebtoonSFX 추가] SFX 캔버스 렌더링

    const EDITOR_W = 720;
    const panelEditorHeights = imgs.map(im => EDITOR_W * (im.height / im.width));
    const totalEditorH = panelEditorHeights.reduce((a, b) => a + b, 0);
    const outW = Math.max(...imgs.map(im => im.width));
    const scale = outW / EDITOR_W;
    const canvas = document.createElement('canvas');
    canvas.width = outW; canvas.height = Math.round(totalEditorH * scale);
    const ctx = canvas.getContext('2d');
    let yOff = 0;
    for (let i = 0; i < imgs.length; i++) {
      const drawH = Math.round(panelEditorHeights[i] * scale);
      ctx.drawImage(imgs[i], 0, yOff, outW, drawH);
      yOff += drawH;
    }
    for (const b of bubbleOverlays) {
      drawBubbleOnCanvas(ctx, b, b.x * scale, b.y * scale, b.w * scale, b.h * scale, scale);
    }
    return canvas.toDataURL('image/png');

  const flattenPanelWithBubbles = async (panelIdx) => {
    const src = panels[panelIdx];
    if (!src || bubbleOverlays.length === 0) return src;
    let yOff = 0;
    const panelYMap = [];
    const EDITOR_W = 720;
    for (let i = 0; i < panels.length; i++) {
      if (!panels[i]) continue;
      const im = await loadImage(panels[i]);
      const eH = EDITOR_W * (im.height / im.width);
      panelYMap.push({ yStart: yOff, yEnd: yOff + eH, origIdx: i, imgW: im.width, imgH: im.height });
      yOff += eH;
    }
    const pm = panelYMap.find(p => p.origIdx === panelIdx);
    if (!pm) return src;
    const overlapping = bubbleOverlays.filter(b => b.y < pm.yEnd && (b.y + b.h) > pm.yStart);
    if (overlapping.length === 0) return src;
    const img = await loadImage(src);
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const scale = img.width / EDITOR_W;
    for (const b of overlapping) {
      drawBubbleOnCanvas(ctx, b, b.x * scale, (b.y - pm.yStart) * scale, b.w * scale, b.h * scale, scale);

  // ======== Character State System ========
  // Unified state tracker: accumulates outfit, pose, location, expression, props per character across panels
  // Each character has a "current state" that persists and only changes when explicitly overridden
  const buildCharacterStates = useCallback((storyboardData, analysisData, upToIndex) => {
    // Initialize with default state from analysis
    const states = {}; // {charId: {outfit, pose, expression, location, props, lastChangedAt, changeLog}}
    if (analysisData?.characters) {
      for (const c of analysisData.characters) {
        states[c.id] = {
          outfit: c.outfit || '',
          pose: 'standing',
          expression: 'neutral',
          location: '',
          props: [],
          lastChangedAt: 0,
          changeLog: [{panel: 0, field: 'init', from: '', to: c.outfit || '', desc: '기본 상태'}],
        };
      }
    }
    // Walk through panels up to (but not including) the target index to accumulate state
    const limit = upToIndex !== undefined ? upToIndex : storyboardData.length;
    for (let i = 0; i < limit; i++) {
      const panel = storyboardData[i];
      if (!panel?.characters) continue;
      for (const pc of panel.characters) {
        const cid = pc.id || pc;
        if (!states[cid]) {
          states[cid] = {outfit:'', pose:'standing', expression:'neutral', location:'', props:[], lastChangedAt: i, changeLog:[]};
        }
        const s = states[cid];
        // Outfit: only changes on explicit outfitOverride
        if (pc.outfitOverride) {
          s.changeLog.push({panel: i+1, field: 'outfit', from: s.outfit, to: pc.outfitOverride, desc: `패널${i+1}에서 의상 변경`});
          s.outfit = pc.outfitOverride;
          s.lastChangedAt = i;
        }
        // Pose: always updates (tracks latest base posture)
        if (pc.pose && pc.pose !== s.pose) {
          s.changeLog.push({panel: i+1, field: 'pose', from: s.pose, to: pc.pose, desc: `패널${i+1}에서 포즈 변경`});
          s.pose = pc.pose;
          s.lastChangedAt = i;
        }
        // Expression
        if (pc.expression && pc.expression !== s.expression) {
          s.expression = pc.expression;
        }
      }
      // Track location from background
      if (panel.background) {
        for (const pc of panel.characters) {
          const cid = pc.id || pc;
          if (states[cid]) states[cid].location = panel.background;
        }
      }
    }
    return states;
  }, []);

  // Generate a compact state summary string for a character (used in image prompts)
  const formatCharacterState = (charId, charState, panelCharData) => {
    const parts = [];
    // Current outfit (accumulated)
    if (charState.outfit) parts.push(`CURRENT OUTFIT: ${charState.outfit}`);
    // Pose continuity: show previous → current if different
    const curPose = panelCharData?.pose || charState.pose;
    if (charState.pose && curPose && charState.pose !== curPose) {
      parts.push(`POSE TRANSITION: ${charState.pose} → ${curPose}`);
    } else if (curPose) {
      parts.push(`POSE: ${curPose} (maintain this posture)`);
    }
    // Expression
    const curExpr = panelCharData?.expression || charState.expression;
    if (curExpr) parts.push(`expression: ${curExpr}`);
    return parts.join(', ');
  };

  // Programmatically strip Korean onomatopoeia / sound effects from image prompts
  const sanitizeImagePrompt = (prompt) => {
    if (!prompt) return prompt;
    let p = prompt;
    // Remove common Korean SFX patterns (quoted or standalone): 쾅, 끼익, 부릉, 와장창, 쿵, 탁, 펑, 빠직, etc.
    p = p.replace(/['""'][가-힣]{1,6}!?['""']/g, '');
    // Remove standalone Korean SFX words with ! (e.g., 쾅!, 끼익!, 부르르릉!)
    p = p.replace(/(?:^|\s)[가-힣]{1,8}!(?:\s|$|,|\.)/g, ' ');
    // Remove explicit sound effect phrases in English
    p = p.replace(/sound\s*(?:effect|fx)s?\s*(?:like|such as|:)?\s*['""']?[^,.'""'\n]*['""']?/gi, '');
    // Remove "with sound effect(s)" phrases
    p = p.replace(/with\s+(?:the\s+)?sound\s+(?:effect|fx)s?\s+(?:of\s+)?['""']?[^,.'""'\n]*['""']?/gi, '');
    // Remove "onomatopoeia" mentions
    p = p.replace(/onomatopoeia\s*[:.]?\s*['""']?[^,.'""'\n]*['""']?/gi, '');
    // Clean up extra spaces
    p = p.replace(/\s{2,}/g, ' ').trim();
    return p;

  };
  const CAMERA_VARIETY = {
    'eye level': ['slight low angle for drama', 'eye level with shallow depth of field', 'straight-on intimate framing'],
    'low angle': ['dramatic low angle looking up, emphasizing power', 'worm\'s eye view', 'heroic upshot angle'],
    'high angle': ['bird\'s eye view looking down', 'overhead angle showing vulnerability', 'tilted high angle'],
    'dutch angle': ['dramatic tilted dutch angle for tension', 'canted frame for unease'],
    'close-up': ['extreme close-up on eyes and expression', 'tight face close-up', 'close-up with blurred background'],
    'over the shoulder': ['over-the-shoulder shot showing both characters', 'POV over shoulder'],
  };
  const enhancePanelExpression = (prompt, panel) => {
    if (!prompt) return prompt;
    let enhanced = prompt;
    // Add mood-specific expression keywords if not already present
    const mood = (panel.mood || '').toLowerCase().trim();
    const moodKeywords = MOOD_EXPRESSIONS[mood];
    if (moodKeywords && !prompt.toLowerCase().includes(moodKeywords.split(',')[0].trim().toLowerCase())) {
      enhanced += `. Character expression: ${moodKeywords}`;
    }
    // Add camera angle variety hint
    const angle = (panel.cameraAngle || '').toLowerCase().trim();
    const angleOptions = CAMERA_VARIETY[angle];
    if (angleOptions) {
      const pick = angleOptions[Math.floor(Math.random() * angleOptions.length)];
      if (!prompt.toLowerCase().includes(pick.split(',')[0].trim().toLowerCase())) {
        enhanced += `. Camera: ${pick}`;
      }
    }
    // Ensure no "flat front-facing neutral expression" default
    if (!/expression|emotion|look|gaze|smile|frown|tears|blush/i.test(prompt)) {
      enhanced += '. Expressive dynamic facial emotion, NOT blank neutral stare.';
    }
    return enhanced;
  };

  // Strip conflicting style keywords from imagePrompt so only stylePrefix controls the look
  const stripStyleKeywords = (prompt) => {
    if (!prompt) return prompt;
    return prompt
      .replace(/\b(manhwa|webtoon|anime|manga|cartoon|comic)\s*(style|art)?\b[,.]?\s*/gi, '')
      .replace(/\b(detailed|professional|beautiful)\s+illustration[,.]?\s*/gi, '')
      .replace(/\b(digital painting|digital art|cel[- ]shad(?:ed|ing)|flat coloring)[,.]?\s*/gi, '')
      .replace(/\b(photorealistic|photo[- ]realistic|hyperrealistic|ultra[- ]realistic)[,.]?\s*/gi, '')
      .replace(/\bcinematic(?:\s+quality)?[,.]?\s*/gi, '')
      .replace(/\b(vibrant|vivid|saturated|muted)\s+colors?[,.]?\s*/gi, '')
      .replace(/\b(oil painting|watercolor|gouache|painterly)\s*(style)?[,.]?\s*/gi, '')
      .replace(/\b(semi[- ]realistic|stylized|rendered)\b[,.]?\s*/gi, '')
      .replace(/\s{2,}/g, ' ')
      .replace(/,\s*,/g, ',')
      .replace(/,\s*\./g, '.')
      .trim();
  };

  const callImage = useCallback(async (prompt, opts={}) => {
    let stylePrefix = getStylePrefix();
    const curStyleName = artStyle === 'custom' ? '사용자 정의' : (ART_STYLES[artStyle]||ART_STYLES.naverWebtoon).name;

    // For reference sheet generation (character/bg/prop), use a clean prefix
    // to avoid content filters rejecting T-pose reference images
    const isRefSheet = /character reference sheet|full body.*front view|clean.*background.*T-pose|reference sheet/i.test(prompt);
    if (isRefSheet && artStyle === 'tlWebtoon') {
      // Use romance-style prefix for reference sheets — same art quality without mature keywords
      stylePrefix = 'Korean romance webtoon style, semi-realistic detailed art, beautifully detailed eyes and hair, smooth digital painting, delicate linework, elegant composition. ';
    }

    // Strip Korean onomatopoeia / sound effects + conflicting style keywords from prompt
    const cleanPrompt = stripStyleKeywords(sanitizeImagePrompt(prompt));

    // Build asset-enriched prompt: always append asset descriptions to ensure consistency
    const assetSuffix = opts.assetDescriptions?.length > 0
      ? '\n\nVISUAL CONSISTENCY - Use these EXACT asset descriptions:\n' + opts.assetDescriptions.join('\n')
      : '';
    const basePrompt = stylePrefix + cleanPrompt + assetSuffix;
    const refs = opts.referenceImages || [];

    // ========== Gemini (Vertex AI NanoBanana — supports multiple models) ==========
    if (imageProvider === 'nanoBanana') {
      const nbInfo = NB_VERTEX_MODELS[nbVertexModel] || NB_VERTEX_MODELS['gemini-2.0-flash'];
      const geminiOpts = {...opts, model: nbInfo.vertexModel};
      const refInstruction = refs.length > 0
        ? '\n\nCRITICAL: Reference images are provided. You MUST draw the characters and backgrounds EXACTLY as they appear in the reference images. Maintain identical facial features, hairstyle, hair color, eye color, outfit, and body proportions. Do NOT change or reimagine any visual details.'
        : '';
      if (refs.length > 0) {
        log(`${nbInfo.name} 사용 (${curStyleName} 스타일 + 레퍼런스 ${refs.length}개 직접 전달)`, 'info');
      } else {
        log(`${nbInfo.name} 사용 (${curStyleName} 스타일 적용)`, 'info');
      }
      try {
        return await callNanoBanana(basePrompt + refInstruction, geminiOpts);
      } catch (gemErr) {
        const errMsg = gemErr.message || '';
        if (errMsg.includes('policy') || errMsg.includes('filtered') || errMsg.includes('Prohibited') || errMsg.includes('SAFETY')) {
          log('⛔ Google 콘텐츠 정책 필터에 의해 차단됨 — 프롬프트를 수정해주세요', 'error');
        } else {
          log(`${nbInfo.name} 오류: ${errMsg.substring(0, 200)}`, 'error');
        }
        throw gemErr;
      }
    }

    // ========== fal.ai FLUX ==========
    if (imageProvider === 'falAI') {
      let styledPrompt = basePrompt;
      log(`fal.ai FLUX: "${curStyleName}" 스타일 프롬프트 적용됨`, 'info');
      const falOpts = {
        imageSize: opts.aspectRatio === '16:9' ? {width:1024,height:576} : opts.aspectRatio === '1:1' ? {width:768,height:768} : {width:768,height:1024}
      };

      // Auto-apply LoRAs: art style LoRA + character LoRAs (max 3 total for fal.ai)
      const activeLoras = [];

      // 1) Art style LoRA from ART_STYLES
      const curStyle = ART_STYLES[artStyle] || ART_STYLES.naverWebtoon;
      if (curStyle.loras?.length > 0) {
        curStyle.loras.forEach(l => activeLoras.push({path: l.path, scale: l.scale || 0.8}));
        log(`fal.ai: 스타일 LoRA ${curStyle.loras.length}개 적용 (${curStyle.name})`, 'info');
      }

      // 2) Character-specific trained LoRAs
      if (opts.characterIds?.length > 0) {
        for (const cid of opts.characterIds) {
          if (activeLoras.length >= 3) break; // fal.ai max 3 LoRAs
          const lora = loraModels[cid];
          if (lora?.status === 'ready' && lora.url) {
            activeLoras.push({path: lora.url, scale: 0.8});
            if (lora.triggerWord && !styledPrompt.includes(lora.triggerWord)) {
              styledPrompt = styledPrompt + ', ' + lora.triggerWord;
            }
          }
        }
      }
      if (activeLoras.length > 0) {
        falOpts.loras = activeLoras;
        log(`fal.ai: LoRA 총 ${activeLoras.length}개 적용 (스타일+캐릭터)`, 'info');
      }

      // Upload reference images to fal CDN and use as IP-Adapter inputs (up to 4)
      if (refs.length > 0) {
        log(`fal.ai: 레퍼런스 이미지 ${Math.min(refs.length, 4)}개 업로드 중 (IP-Adapter)...`, 'info');
        const ipImages = [];
        for (const ref of refs.slice(0, 4)) {
          if (ref.image?.startsWith('data:')) {
            try {
              const url = await uploadToFalCDN(ref.image);
              if (url && !url.startsWith('data:')) {
                ipImages.push({url, scale: 0.85});
                log(`  ✓ 업로드 성공: ${url.substring(0, 60)}...`, 'info');
              } else {
                log(`  ✗ 업로드 실패 (data URL 반환됨)`, 'error');
              }
            } catch(e) {
              log(`  ✗ 업로드 오류: ${e.message}`, 'error');
            }
          } else if (ref.image) {
            // Already a URL
            ipImages.push({url: ref.image, scale: 0.85});
          }
        }
        if (ipImages.length > 0) {
          falOpts.ipAdapterImages = ipImages;
          const loraInfo = activeLoras.length > 0 ? ` + LoRA ${activeLoras.length}개` : '';
          log(`fal.ai FLUX 사용 (IP-Adapter ${ipImages.length}개 [scale=0.85]${loraInfo} + ${curStyleName} 스타일)`, 'info');
          return await callFalAI(styledPrompt, falOpts);
        }
      }
      const loraInfo = activeLoras.length > 0 ? ` (LoRA ${activeLoras.length}개 적용)` : '';
      log(`fal.ai FLUX 사용 (${curStyleName} 스타일${loraInfo})`, 'info');
      return await callFalAI(styledPrompt, falOpts);
    }

    // ========== Grok Image (xAI) ==========
    if (imageProvider === 'grokImage') {
      if (!hasXaiKey()) { log('xAI API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }

      const isMatureStyle = artStyle === 'tlWebtoon' || artStyle === 'blWebtoon';

      // Build COMPACT Visual ID Cards for Grok (shorter than Imagen to avoid prompt bloat)
      let visualIdCards = '';
      if (opts.assetDescriptions?.length > 0) {
        const charDescs = opts.assetDescriptions.filter(d => d.startsWith('[Character'));
        const bgDescs = opts.assetDescriptions.filter(d => d.startsWith('[Background'));
        if (charDescs.length + bgDescs.length > 0) {
          // For Grok: strip verbose pose transition text, keep core appearance only
          const compactDescs = charDescs.map(d => {
            // Remove "PREVIOUS POSE: ... → CURRENT POSE: ... (maintain...)" to keep it short
            return d.replace(/,?\s*PREVIOUS POSE:.*?(?=,\s*\[|$)/gi, '')
                    .replace(/,?\s*pose:.*?(?=,\s*\[|$)/gi, '');
          });
          visualIdCards = '\n\nCHARACTER REFS: ' + compactDescs.join(' | ');
          if (bgDescs.length > 0) visualIdCards += '\nBACKGROUND: ' + bgDescs[0];
        }
      }
      const noTextDirective = '\nNo text/letters/words in image.';

      // Clean prompt: basic SFX removal + Grok sanitization for mature styles
      let cleanedPrompt = sanitizeImagePrompt(prompt);
      if (isMatureStyle) {
        cleanedPrompt = sanitizeForGrok(cleanedPrompt);
        log('Grok: TL/BL 모드 — 콘텐츠 필터 대응 프롬프트 적용', 'info');
      }

      // Compact tone directive (shorter for Grok to keep focus on style)
      const toneDirective = '\nMaintain IDENTICAL art style, color palette, linework weight, shading technique, and skin rendering across all panels. Same artist, same episode.';

      // Style reinforcement: place style prefix at start AND end to prevent drift
      const grokPrompt = stylePrefix + cleanedPrompt + visualIdCards + toneDirective + noTextDirective + '\nStyle: ' + (stylePrefix.substring(0, 120));
      const charCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Character')).length;

      // Collect reference images for Grok Edit (character + background, max 3)
      const grokRefImages = [];
      if (opts.referenceImages?.length > 0) {
        for (const ref of opts.referenceImages) {
          if (grokRefImages.length >= 3) break;
          const img = ref.image || ref;
          if (typeof img === 'string' && img.startsWith('data:')) {
            grokRefImages.push(img);
          }
        }
      }

      if (grokRefImages.length > 0) {
        // Use Grok Edit API with reference images for better consistency
        const refLabels = [];
        if (opts.referenceImages) {
          opts.referenceImages.forEach((ref, idx) => {
            const desc = ref.description || '';
            if (desc.startsWith('character')) refLabels.push(`image ${idx+1}: character reference`);
            else if (desc.startsWith('background')) refLabels.push(`image ${idx+1}: background reference`);
            else refLabels.push(`image ${idx+1}: reference`);
          });
        }
        const refContext = refLabels.length > 0
          ? `\nRefs: ${refLabels.join(', ')}. Match character appearances, art style, colors from refs exactly.`
          : '';
        const editPrompt = stylePrefix + cleanedPrompt + refContext + visualIdCards + toneDirective + noTextDirective + '\nStyle: ' + (stylePrefix.substring(0, 120));
        log(`Grok Edit 사용 (레퍼런스 ${grokRefImages.length}개 + ${curStyleName}${charCount > 0 ? ' + 캐릭터 '+charCount+'명' : ''})`, 'info');
        try {
          return await callGrokEdit(editPrompt, grokRefImages, {aspectRatio: opts.aspectRatio || '3:4'});
        } catch (editErr) {
          const editErrMsg = editErr.message || '';
          if (editErrMsg.includes('content moderation') || editErrMsg.includes('rejected')) {
            log('⚠️ Grok Edit 콘텐츠 필터 거부 — 이 패널을 건너뜁니다.', 'warn');
            return null;
          }
          log(`Grok Edit 실패: ${editErrMsg.substring(0,100)} — 텍스트 전용으로 재시도...`, 'warn');
          // Fall through to text-only generation
        }
      }

      if (charCount > 0) {
        log(`Grok Image 사용 (${curStyleName} + 에셋 ID카드: 캐릭터 ${charCount}명)`, 'info');
      } else {
        log(`Grok Image 사용 (${curStyleName} 스타일 적용)`, 'info');
      }
      try {
        return await callGrokImage(grokPrompt, {aspectRatio: opts.aspectRatio || '3:4'});
      } catch (grokErr) {
        const errMsg = grokErr.message || '';
        if (errMsg.includes('content moderation') || errMsg.includes('rejected')) {
          log('⚠️ Grok 콘텐츠 필터 거부 — 이 패널을 건너뜁니다.', 'warn');
          return null; // Skip this panel, proceed to next
        }
        throw grokErr; // Re-throw non-moderation errors
      }
    }

    // ========== A2E Image (Text to Image only) ==========
    if (imageProvider === 'a2eImage') {
      if (!hasA2eKey()) { log('A2E API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      const isRealistic = artStyle === 'realistic' || artStyle === 'cinematic' || artStyle === 'portrait';
      const reqKey = isRealistic ? 'high_aes_general_v21_L' : 'high_aes';
      const modelName = a2eModelType === 'seedream' ? 'Seedream 5.0' : a2eModelType === 'zimage' ? 'Z-Image' : (reqKey === 'high_aes' ? 'Manga' : 'General');

      // Character refs only, max 2 for T2I
      const charRefs = refs.filter(r => !r.description?.startsWith('background') && !r.description?.includes('prop'));
      const a2eRefs = charRefs.slice(0, 2);
      const hasRefs = a2eRefs.length > 0;

      log(`A2E ${modelName} 사용 (${hasRefs ? '레퍼런스 ' + a2eRefs.length + '개, ' : ''}프롬프트 ${basePrompt.length}자)`, 'info');

      // A2E adjustments — brighter skin + slightly lighter colors
      const a2eFix = ', bright fair translucent skin tone, slightly brighter color tones';
      const a2ePrompt = basePrompt + a2eFix;

      try {
        const urls = await callA2eImage(a2ePrompt, {
          aspectRatio: opts.aspectRatio || '3:4',
          reqKey: reqKey,
          modelType: a2eModelType,
          referenceImages: hasRefs ? a2eRefs : undefined
        });
        return urls;
      } catch (a2eErr) {
        const errMsg = a2eErr.message || '';
        log(`A2E 오류: ${errMsg.substring(0, 200)}`, 'error');
        throw a2eErr;
      }
    }

    // ========== A2E NanoBanana (Gemini Flash + Reference Images via A2E) ==========
    if (imageProvider === 'a2eNanoBanana') {
      if (!hasA2eKey()) { log('A2E API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      const refCount = refs.length;
      if (refCount > 0) {
        log(`A2E NanoBanana 사용 (레퍼런스 ${refCount}개, 최대 4개)`, 'info');
      } else {
        log('A2E NanoBanana 사용 (이미지 생성)', 'info');
      }
      try {
        const urls = await callA2eNanoBanana(basePrompt, {
          referenceImages: refs.length > 0 ? refs : undefined
        });
        return urls;
      } catch (nbErr) {
        const errMsg = nbErr.message || '';
        if (errMsg.includes('policy') || errMsg.includes('filtered') || errMsg.includes('Prohibited')) {
          log('⛔ Google 콘텐츠 정책 필터에 의해 차단됨 — 프롬프트를 수정해주세요', 'error');
        } else {
          log(`A2E NanoBanana 오류: ${errMsg.substring(0, 200)}`, 'error');
        }
        throw nbErr;
      }
    }

    // ========== Flux 2 Pro (fal.ai — reference images via /edit endpoint) ==========
    if (imageProvider === 'flux2Pro') {
      if (!hasFalKey()) { log('fal.ai API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      const refCount = refs.length;
      if (refCount > 0) {
        log(`Flux 2 Pro 사용 (레퍼런스 ${refCount}개, 최대 8개)`, 'info');
      } else {
        log('Flux 2 Pro 사용 (텍스트→이미지)', 'info');
      }
      try {
        const urls = await callFlux2Pro(basePrompt, {
          referenceImages: refs.length > 0 ? refs : undefined,
          aspectRatio: opts.aspectRatio || '3:4'
        });
        return urls;
      } catch (fluxErr) {
        const errMsg = fluxErr.message || '';
        log(`Flux 2 Pro 오류: ${errMsg.substring(0, 200)}`, 'error');
        throw fluxErr;
      }
    }

    // ========== NinjaChat (다중 모델) ==========
    if (imageProvider === 'ninjaChat') {
      if (!hasNinjaChatKey()) { log('NinjaChat API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      // Character refs only (like A2E)
      const charRefs = refs.filter(r => !r.description?.startsWith('background') && !r.description?.includes('prop'));
      const njcRefs = charRefs.slice(0, 1); // NinjaChat supports 1 reference image
      const refCount = njcRefs.length;
      const modelName = ninjaChatModel.split('-').slice(0, 2).join('-');

      if (refCount > 0) {
        log(`NinjaChat ${modelName} 사용 (레퍼런스 ${refCount}개)`, 'info');
      } else {
        log(`NinjaChat ${modelName} 사용 (텍스트→이미지)`, 'info');
      }
      try {
        const urls = await callNinjaChat(basePrompt, {
          model: ninjaChatModel,
          referenceImages: refCount > 0 ? njcRefs : undefined,
          aspectRatio: opts.aspectRatio || '3:4'
        });
        return urls;
      } catch (njcErr) {
        const errMsg = njcErr.message || '';
        log(`NinjaChat 오류: ${errMsg.substring(0, 200)}`, 'error');
        throw njcErr;
      }
    }

    // ========== Stable Diffusion ==========
    if (imageProvider === 'stableDiffusion') {
      const sdOpts = {aspectRatio: opts.aspectRatio || '3:4'};
      if (refs.length > 0) {
        // Use background asset as init_image for image-to-image if available
        const bgRef = refs.find(r => r.description?.startsWith('background'));
        if (bgRef?.image?.startsWith('data:')) {
          sdOpts.initImage = bgRef.image;
          sdOpts.strength = 0.65;
          log(`SD image-to-image: 배경 asset을 init_image로 활용 (${curStyleName} 스타일)`, 'info');
        }
        // Asset descriptions are already in basePrompt via assetSuffix
        log(`Stable Diffusion 사용 (${curStyleName} 스타일 + asset 설명 ${refs.length}개)`, 'info');
      } else {
        log(`Stable Diffusion 사용 (${curStyleName} 스타일 적용)`, 'info');
      }
      return await callStableDiffusion(basePrompt, sdOpts);
    }

    // ========== Imagen 4 (default) — text-only, use detailed Character Visual ID Cards ==========
    {
      // Build Visual ID Cards for ALL assets (characters, props, backgrounds)
      let visualIdCards = '';
      if (opts.assetDescriptions?.length > 0) {
        const charDescs = opts.assetDescriptions.filter(d => d.startsWith('[Character'));
        const propDescs = opts.assetDescriptions.filter(d => d.startsWith('[Prop'));
        const bgDescs = opts.assetDescriptions.filter(d => d.startsWith('[Background'));
        const totalAssets = charDescs.length + propDescs.length + bgDescs.length;
        if (totalAssets > 0) {
          visualIdCards = '\n\n=== MANDATORY VISUAL ID CARDS (ALL ASSETS) ===\n' +
            'CRITICAL: You MUST render EVERY character, prop, and background EXACTLY as described below. ' +
            'These are the CANONICAL designs for this webtoon. They must be VISUALLY IDENTICAL every time they appear, across ALL panels. ' +
            'Do NOT change, reimagine, simplify, or add any visual details not listed here.\n\n';

          if (charDescs.length > 0) {
            visualIdCards += '--- CHARACTERS ---\n';
            for (const desc of charDescs) {
              visualIdCards += desc + '\n→ RULE: This character must look EXACTLY the same in every panel. HAIR must be identical: same color, same length, same style (straight/wavy/curly), same parting, same bangs. OUTFIT must be identical: same garments, same colors, same accessories, same footwear. FACE must be identical: same shape, same features. A reader must instantly recognize this character.\n\n';
            }
          }
          if (propDescs.length > 0) {
            visualIdCards += '--- PROPS & OBJECTS ---\n';
            for (const desc of propDescs) {
              visualIdCards += desc + '\n→ RULE: This prop must look EXACTLY the same whenever it appears — same design, same color, same shape, same material, same size proportions relative to characters.\n\n';
            }
          }
          if (bgDescs.length > 0) {
            visualIdCards += '--- BACKGROUNDS & LOCATIONS ---\n';
            for (const desc of bgDescs) {
              visualIdCards += desc + '\n→ RULE: This location must maintain consistent architectural style, color palette, spatial layout, and atmosphere whenever it appears. Key landmarks and features must be in the same positions.\n\n';
            }
          }
          visualIdCards += '=== END OF VISUAL ID CARDS ===\n';
        }
      }

      // Build the final Imagen4 prompt: style + scene + visual ID cards + tone consistency + no-text directive
      const noTextDirective = '\nIMPORTANT: Do NOT render any text, letters, words, sound effects, onomatopoeia, speech bubbles, or typography anywhere in the image. The image must be purely visual. No Korean text or characters.';
      const cleanedPrompt = sanitizeImagePrompt(prompt);
      const toneDirective = '\n\n=== RENDERING CONSISTENCY ===\n' +
        'Maintain IDENTICAL rendering style across all images in this series:\n' +
        '- Same color temperature, saturation, linework weight, shading technique, skin rendering.\n' +
        '- Consistent background detail level and lighting approach.\n' +
        '- Every panel must look like the same artist drew it in one session.\n' +
        '=== END RENDERING CONSISTENCY ===\n';
      const imagen4Prompt = stylePrefix + cleanedPrompt + visualIdCards + toneDirective + noTextDirective;
      const charCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Character')).length;
      const propCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Prop')).length;
      const bgCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Background')).length;
      if (charCount > 0 || propCount > 0 || bgCount > 0) {
        log(`Imagen 4 사용 (${curStyleName} + 에셋 ID카드: 캐릭터 ${charCount} / 소품 ${propCount} / 배경 ${bgCount})`, 'info');
      } else {
        log(`Imagen 4 사용 (${curStyleName} 스타일 적용)`, 'info');
      }

  const parseJSON = (text) => {
    if (!text || !text.trim()) throw new Error('빈 응답 수신 — 모델이 텍스트를 반환하지 않았습니다.');
    console.log('[parseJSON] Raw response length:', text.length, '| First 200 chars:', text.substring(0, 200));

    // Step 1: Strip markdown fences, HTML tags, and leading text
    let cleaned = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    // Strip any XML-like tags (e.g. <output>, <response>, etc.)
    cleaned = cleaned.replace(/<\/?[a-zA-Z_][a-zA-Z0-9_]*>/g, '').trim();

    const arrStart = cleaned.indexOf('[');
    const objStart = cleaned.indexOf('{');
    if (arrStart < 0 && objStart < 0) {
      console.error('[parseJSON] No [ or { found. Cleaned text:', cleaned.substring(0, 500));
      throw new Error('응답에서 JSON 배열/객체를 찾을 수 없습니다. 응답 첫 100자: ' + cleaned.substring(0, 100));
    }
    if (arrStart >= 0 && (objStart < 0 || arrStart < objStart)) cleaned = cleaned.substring(arrStart);
    else if (objStart >= 0) cleaned = cleaned.substring(objStart);

    // Step 2: Remove truly problematic control characters (keep \n, \r, \t — valid JSON whitespace)
    cleaned = cleaned.replace(/[\x00-\x08\x0B\x0C\x0E-\x1f]/g, '');

    // Step 3: Smart bracket matching that skips string contents
    let depth = 0, end = 0;
    const opener = cleaned[0];
    if (!opener || (opener !== '[' && opener !== '{')) {
      throw new Error('No JSON array or object found in response');
    }
    let inString = false, escaped = false;
    for (let i = 0; i < cleaned.length; i++) {
      const ch = cleaned[i];
      if (escaped) { escaped = false; continue; }
      if (ch === '\\' && inString) { escaped = true; continue; }
      if (ch === '"') { inString = !inString; continue; }
      if (inString) continue;
      if (ch === '{' || ch === '[') depth++;
      else if (ch === '}' || ch === ']') { depth--; if (depth === 0) { end = i + 1; break; } }
    }
    if (end === 0) end = cleaned.length;

    // Step 4: Try parsing
    let jsonStr = cleaned.substring(0, end);
    try {
      return JSON.parse(jsonStr);
    } catch(e) {
      console.warn('[parseJSON] Parse attempt 1 failed:', e.message);
      console.warn('[parseJSON] jsonStr first 300:', jsonStr.substring(0, 300));
      // Step 5: Aggressive repair
      let repaired = jsonStr;
      // 5a: Remove trailing commas before } or ]
      repaired = repaired.replace(/,\s*([\]}])/g, '$1');
      // 5b: Fix unescaped quotes inside string values
      repaired = repaired.replace(/\\\\"/g, '\\"');
      // 5c: Fix single quotes used as string delimiters
      repaired = repaired.replace(/([:\[,]\s*)'([^']*)'/g, '$1"$2"');
      // 5d: Remove any BOM or zero-width chars
      repaired = repaired.replace(/[\uFEFF\u200B\u200C\u200D]/g, '');
      // 5e: Escape raw newlines inside JSON string values (common Gemini issue)
      // Walk through the string, track whether we're inside a JSON string, and escape newlines there
      {
        let result = '', inStr = false, esc = false;
        for (let i = 0; i < repaired.length; i++) {
          const c = repaired[i];
          if (esc) { result += c; esc = false; continue; }
          if (c === '\\' && inStr) { result += c; esc = true; continue; }
          if (c === '"') { inStr = !inStr; result += c; continue; }
          if (inStr && c === '\n') { result += '\\n'; continue; }
          if (inStr && c === '\r') { result += '\\r'; continue; }
          if (inStr && c === '\t') { result += '\\t'; continue; }
          result += c;
        }
        repaired = result;
      }
      // 5f: Remove comments (// style) outside strings
      repaired = repaired.replace(/(?<=[,\{\[\n])\s*\/\/[^\n]*/g, '');
      try {
        return JSON.parse(repaired);
      } catch(e2) {
        console.error('[parseJSON] Parse failed after repair. Error:', e2.message);
        const posMatch = e2.message.match(/position (\d+)/);
        if (posMatch) {
          const pos = parseInt(posMatch[1]);
          console.error('[parseJSON] Around error position:', repaired.substring(Math.max(0, pos - 80), pos + 80));
          console.error('[parseJSON] Char at position:', JSON.stringify(repaired[pos]), 'code:', repaired.charCodeAt(pos));
        }
        console.error('[parseJSON] First 500 chars:', repaired.substring(0, 500));
        throw new Error('JSON 파싱 실패: ' + e.message + ' (자동 수리도 실패). 응답 시작: ' + jsonStr.substring(0, 80));
      }
    }
  };

  // ======== STEP 4: Generate Panel Images ========
  const runStep4 = async (storyboardData, refsData) => {
