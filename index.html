<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹툰 프로덕션</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#f5f5fa;--surface:#ffffff;--surface2:#f0f0f8;--surface3:#e8e8f0;
--border:#d0d0e0;--text:#1a1a2e;--text2:#666688;
--accent:#6c5ce7;--accent2:#7c6cf7;
--success:#00a8a8;--warn:#d4a017;--err:#e74c3c;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),#e0457b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-tabs{display:flex;gap:4px;margin-left:24px;flex:1;}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.api-key-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;}
.api-key-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);}
.status-badge.running{background:#fff3cd;color:#856404;}
.status-badge.done{background:#d4edda;color:#155724;}
.status-badge.error{background:#f8d7da;color:#721c24;}
.main-content{max-width:1400px;margin:0 auto;padding:20px;display:flex;flex-direction:column;height:calc(100vh - 64px);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,92,231,.4);}
.btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:#e74c3c;color:#fff;}
.btn-success{background:#27ae60;color:#fff;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.1);}
.form-textarea{resize:vertical;min-height:200px;font-family:inherit;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.log-panel{background:#1a1a2e;color:#a0a0cc;padding:12px 16px;border-radius:8px;font-family:'Fira Code',monospace;font-size:12px;max-height:180px;overflow-y:auto;line-height:1.6;}
.log-entry{white-space:pre-wrap;word-break:break-all;}
.log-entry.error{color:#e74c3c;}.log-entry.success{color:#27ae60;}.log-entry.info{color:#3498db;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal-box{background:var(--surface);border-radius:16px;padding:32px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.modal-desc{color:var(--text2);font-size:13px;margin-bottom:20px;}
.modal-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);margin-bottom:4px;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn-cancel{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-weight:600;}
.btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;}
.key-status{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12px;color:var(--text2);}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;}.dot.on{background:#27ae60;}
/* Step indicator */
.step-bar{display:flex;gap:2px;margin-bottom:16px;}
.step-item{flex:1;text-align:center;padding:10px 4px;font-size:12px;font-weight:600;border-radius:8px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;position:relative;}
.step-item.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.step-item.done{background:#d4edda;color:#155724;}
.step-item.current{background:#fff3cd;color:#856404;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
/* Grid layouts */
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;}
.ref-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(108,92,231,.15);}
.ref-card img{width:100%;aspect-ratio:1;object-fit:cover;}
.ref-card-info{padding:10px;font-size:12px;}
.ref-card-name{font-weight:700;margin-bottom:2px;}
.ref-card-desc{color:var(--text2);font-size:11px;line-height:1.4;max-height:44px;overflow:hidden;}
/* Panel grid */
.panel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;}
.panel-card img{width:100%;aspect-ratio:3/4;object-fit:cover;}
.panel-card .panel-num{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.panel-card .panel-info{padding:8px;font-size:11px;color:var(--text2);line-height:1.4;}
.panel-placeholder{aspect-ratio:3/4;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:12px;}
/* Webtoon preview */
.webtoon-strip{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:4px;}
.webtoon-strip img{width:100%;display:block;}
.placeholder{padding:40px;text-align:center;color:var(--text2);font-size:13px;}
/* Tag */
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-right:4px;}
.tag-mood{background:#e8d5f5;color:#6c3483;}
.tag-char{background:#d5e8f5;color:#2471a3;}
.tag-loc{background:#d5f5e3;color:#1e8449;}
/* Episode Bar */
.episode-bar{display:flex;align-items:center;gap:8px;padding:12px 0;overflow-x:auto;white-space:nowrap;}
.episode-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px;position:relative;}
.episode-pill:hover{border-color:var(--accent);color:var(--accent);}
.episode-pill.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
.episode-pill.complete{border-color:var(--success);color:var(--success);}
.episode-pill.active.complete{background:linear-gradient(135deg,var(--success),#00c9a7);color:#fff;}
.episode-add{padding:6px 14px;border-radius:20px;border:1px dashed var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
.episode-add:hover{border-color:var(--accent);color:var(--accent);}
.project-title-bar{font-weight:700;font-size:14px;color:var(--text);margin-right:12px;display:flex;align-items:center;gap:8px;}
.episode-delete{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--err);color:#fff;border:none;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;}
.episode-pill:hover .episode-delete{display:flex;}
/* Asset Library */
.asset-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;}
.asset-panel{width:min(90vw,800px);margin:auto;background:var(--surface);border-radius:16px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:24px;}
.asset-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:8px;}
.asset-tab{padding:6px 16px;border-radius:8px 8px 0 0;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.asset-tab.active{background:var(--accent);color:#fff;}
.asset-item{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;align-items:flex-start;transition:all .2s;}
.asset-item:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(108,92,231,.1);}
.asset-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;}
.asset-item-info{flex:1;min-width:0;}
.asset-item-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.asset-item-desc{font-size:12px;color:var(--text2);line-height:1.4;max-height:36px;overflow:hidden;}
.asset-item-meta{font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;}
.asset-item-actions{display:flex;gap:4px;flex-shrink:0;align-items:center;}
.asset-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:#e8f4e8;color:#1e8449;}
.asset-badge.prop{background:#ffeaa7;color:#636e72;}
.asset-badge.bg{background:#dfe6e9;color:#2d3436;}
.asset-placeholder{width:80px;height:80px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:11px;flex-shrink:0;}
.outfit-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#fff3cd;color:#856404;margin-left:4px;}
</style>

<body>
<div id="root"></div>
<script type="text/babel">

// ============================================================
// Firebase / Firestore Project Management (Enhanced for Episodes)
// ============================================================
let _db = null;
function getFirebaseConfig() { try { const raw = localStorage.getItem('firebase_config'); if (raw) return JSON.parse(raw); } catch(e) {} return null; }
function saveFirebaseConfig(cfg) { localStorage.setItem('firebase_config', JSON.stringify(cfg)); _db = null; initFirebase(); }
function initFirebase() { const cfg = getFirebaseConfig(); if (!cfg || !cfg.apiKey || !cfg.projectId) return null; try { if (!firebase.apps.length) firebase.initializeApp(cfg); _db = firebase.firestore(); return _db; } catch(e) { return null; } }
function getDb() { if (_db) return _db; return initFirebase(); }

async function fbListProjects() { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const snap = await db.collection('webtoon_projects').orderBy('updatedAt','desc').get(); return snap.docs.map(d => ({id: d.id, ...d.data()})); }
async function fbSaveProject(projectId, data) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); await db.collection('webtoon_projects').doc(projectId).set({...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true}); return projectId; }
async function fbLoadProject(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const doc = await db.collection('webtoon_projects').doc(projectId).get(); if (!doc.exists) throw new Error('Not found'); return {id:doc.id,...doc.data()}; }
async function fbDeleteProject(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const episodes = await db.collection('webtoon_projects').doc(projectId).collection('episodes').get(); const batch = db.batch(); episodes.docs.forEach(d => batch.delete(d.ref)); batch.delete(db.collection('webtoon_projects').doc(projectId)); await batch.commit(); }

// Episode-level CRUD
async function fbListEpisodes(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const snap = await db.collection('webtoon_projects').doc(projectId).collection('episodes').orderBy('number','asc').get(); return snap.docs.map(d => ({number: d.id, ...d.data()})); }
async function fbSaveEpisode(projectId, episodeNum, data) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); await db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).set({...data, number: episodeNum, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true}); }
async function fbDeleteEpisode(projectId, episodeNum) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const phases = await db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').get(); const batch = db.batch(); phases.docs.forEach(d => batch.delete(d.ref)); batch.delete(db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum))); await batch.commit(); }

// Phase-level with episode support
async function fbSavePhase(projectId, episodeNum, phaseName, phaseData) {
  const db = getDb(); if (!db) return;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').doc(phaseName);
  const imgs = []; const safe = stripBase64(phaseData, imgs);
  await ref.set({...safe, imageCount:imgs.length, savedAt:firebase.firestore.FieldValue.serverTimestamp()});
  const imgColl = ref.collection('images');
  const old = await imgColl.get(); if(old.docs.length>0){const b=db.batch();old.docs.forEach(d=>b.delete(d.ref));await b.commit();}
  for(let i=0;i<imgs.length;i+=5){const b=db.batch();for(let j=i;j<Math.min(i+5,imgs.length);j++){const im=imgs[j];if(im.data.length>900000){const cs=800000,cn=Math.ceil(im.data.length/cs);b.set(imgColl.doc(im.id),{key:im.key,chunks:cn});for(let c=0;c<cn;c++)b.set(imgColl.doc(im.id+'_c'+c),{data:im.data.substring(c*cs,(c+1)*cs),idx:c});}else b.set(imgColl.doc(im.id),{key:im.key,data:im.data});}await b.commit();}
}
async function fbLoadPhase(projectId, episodeNum, phaseName) {
  const db = getDb(); if (!db) return null;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').doc(phaseName);
  const doc = await ref.get(); if (!doc.exists) return null;
  const d = doc.data(); const snap = await ref.collection('images').get();
  const map={}, cmeta={}, cdata={};
  snap.docs.forEach(s=>{const sd=s.data();if(s.id.includes('_c')){const pid=s.id.split('_c')[0];if(!cdata[pid])cdata[pid]={};cdata[pid][sd.idx]=sd.data;}else if(sd.chunks)cmeta[s.id]=sd;else if(sd.data)map[s.id]=sd.data;});
  for(const [id,m] of Object.entries(cmeta)){let a='';for(let i=0;i<m.chunks;i++)a+=(cdata[id]?.[i]||'');if(a)map[id]=a;}
  return restoreBase64(d, map);
}

function stripBase64(obj, imgs) {
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(item => stripBase64(item, imgs));
  const out = {};
  for (const [k,v] of Object.entries(obj)) {
    if (typeof v === 'string' && v.startsWith('data:') && v.length > 500) { const id='img_'+Math.random().toString(36).slice(2,10); out[k]='[img:'+id+']'; if(imgs) imgs.push({id,data:v,key:k}); }
    else if (typeof v === 'object' && v !== null) out[k] = stripBase64(v, imgs);
    else out[k] = v;
  }
  return out;
}
function restoreBase64(obj, map) {
  if (!obj || typeof obj !== 'object') { if (typeof obj === 'string' && obj.startsWith('[img:') && obj.endsWith(']')) return map[obj.slice(5,-1)] || obj; return obj; }
  if (Array.isArray(obj)) return obj.map(item => restoreBase64(item, map));
  const out = {}; for (const [k,v] of Object.entries(obj)) out[k] = restoreBase64(v, map); return out;
}

// ============================================================
// Shared Asset CRUD (Project-level)
// ============================================================
async function fbSaveAsset(projectId, assetType, assetId, data) {
  const db = getDb(); if (!db) return;
  const docId = assetType + '_' + assetId;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('shared_assets').doc(docId);
  const imgs = []; const safe = stripBase64({...data, type: assetType, assetId}, imgs);
  await ref.set({...safe, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
  const imgColl = ref.collection('images');
  const old = await imgColl.get(); if(old.docs.length>0){const b=db.batch();old.docs.forEach(d=>b.delete(d.ref));await b.commit();}
  for(let i=0;i<imgs.length;i++){const b=db.batch();const im=imgs[i];
    if(im.data.length>900000){const cs=800000,cn=Math.ceil(im.data.length/cs);b.set(imgColl.doc(im.id),{key:im.key,chunks:cn});for(let c=0;c<cn;c++)b.set(imgColl.doc(im.id+'_c'+c),{data:im.data.substring(c*cs,(c+1)*cs),idx:c});}
    else b.set(imgColl.doc(im.id),{key:im.key,data:im.data});await b.commit();}
}

async function fbLoadAllAssets(projectId) {
  const db = getDb(); if (!db) return {characters:{}, backgrounds:{}, props:{}};
  const snap = await db.collection('webtoon_projects').doc(projectId).collection('shared_assets').get();
  const result = {characters:{}, backgrounds:{}, props:{}};
  for (const doc of snap.docs) {
    const d = doc.data();
    const imgSnap = await doc.ref.collection('images').get();
    const map={}, cmeta={}, cdata={};
    imgSnap.docs.forEach(s=>{const sd=s.data();if(s.id.includes('_c')){const pid=s.id.split('_c')[0];if(!cdata[pid])cdata[pid]={};cdata[pid][sd.idx]=sd.data;}else if(sd.chunks)cmeta[s.id]=sd;else if(sd.data)map[s.id]=sd.data;});
    for(const [id,m] of Object.entries(cmeta)){let a='';for(let i=0;i<m.chunks;i++)a+=(cdata[id]?.[i]||'');if(a)map[id]=a;}
    const restored = restoreBase64(d, map);
    const t = restored.type || 'characters';
    if (result[t]) result[t][restored.assetId] = restored;
  }
  return result;
}

async function fbDeleteAsset(projectId, assetType, assetId) {
  const db = getDb(); if (!db) return;
  const docId = assetType + '_' + assetId;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('shared_assets').doc(docId);
  const imgs = await ref.collection('images').get();
  const batch = db.batch(); imgs.docs.forEach(d => batch.delete(d.ref)); batch.delete(ref); await batch.commit();
}

async function autoLoadServerConfig() {
  try { const res = await fetch('/api/firebase-config'); if (!res.ok) throw new Error(''); const data = await res.json();
    if (data.firebase) saveFirebaseConfig(data.firebase);
    if (data.vertex) { if(data.vertex.projectId)localStorage.setItem('VERTEX_PROJECT_ID',data.vertex.projectId); if(data.vertex.location)localStorage.setItem('VERTEX_LOCATION',data.vertex.location); if(data.vertex.accessToken)localStorage.setItem('VERTEX_ACCESS_TOKEN',data.vertex.accessToken); if(data.vertex.grokApiKey)localStorage.setItem('GROK_API_KEY',data.vertex.grokApiKey); }
  } catch(e) { try{initFirebase();}catch(e2){} }
}
autoLoadServerConfig();

const {useState,useCallback,useRef,useEffect,useMemo} = React;

// ============================================================
// TOKEN & API KEY MANAGEMENT (preserved)
// ============================================================
let _cachedToken = null, _tokenExpiry = 0;
async function fetchFreshToken() { const now=Date.now(); if(_cachedToken&&_tokenExpiry>now+300000)return _cachedToken; try{const res=await fetch('/api/vertex-token');if(res.ok){const d=await res.json();if(d.access_token){_cachedToken=d.access_token;_tokenExpiry=now+(d.expires_in||3600)*1000;localStorage.setItem('VERTEX_ACCESS_TOKEN',d.access_token);return _cachedToken;}}}catch(e){} return localStorage.getItem('VERTEX_ACCESS_TOKEN'); }
async function getVertexConfig() { const p=localStorage.getItem('VERTEX_PROJECT_ID'),l=localStorage.getItem('VERTEX_LOCATION')||'us-central1',t=await fetchFreshToken(); if(!p||!t)throw new Error('Vertex AI config not set'); return{projectId:p,location:l,accessToken:t}; }
function hasGeminiKey(){return !!(localStorage.getItem('VERTEX_PROJECT_ID')||localStorage.getItem('GEMINI_API_KEY'));}
function hasXaiKey(){return !!localStorage.getItem('XAI_API_KEY');}
function getXaiKey(){const k=localStorage.getItem('XAI_API_KEY');if(!k)throw new Error('XAI key missing');return k;}

// ============================================================
// API CLIENTS (preserved)
// ============================================================
function extractBase64(u){if(!u||typeof u!=='string')return null;const m=u.match(/^data:image\/\w+;base64,(.+)$/);return m?m[1]:null;}

async function callGemini(systemPrompt, userPrompt, opts={}) {
  const model=opts.model||'gemini-2.5-flash'; const {projectId,location,accessToken}=await getVertexConfig();
  const url=`https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:generateContent`;
  const body={systemInstruction:{parts:[{text:systemPrompt}]},contents:[{role:'user',parts:[{text:userPrompt}]}],generationConfig:{temperature:opts.temperature||0.7,topP:opts.topP||0.9,maxOutputTokens:opts.maxTokens||8192,thinkingConfig:{thinkingBudget:opts.thinkBudget??0}}};
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.text();throw new Error('Gemini '+res.status+': '+e.substring(0,200));}
  const data=await res.json(); const parts=data.candidates?.[0]?.content?.parts||[]; return parts.filter(p=>p.text&&!p.thought).map(p=>p.text).join('');
}

async function callImagen(prompt, opts={}) {
  const {projectId,location,accessToken}=await getVertexConfig();
  const model=opts.model||'imagen-4.0-generate-001';
  const url=`https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:predict`;
  const instance={prompt};
  if(opts.referenceImages?.length>0){instance.referenceImages=opts.referenceImages.slice(0,3).map(r=>({referenceImage:{bytesBase64Encoded:extractBase64(r.image)||''},referenceType:'REFERENCE_TYPE_SUBJECT',subjectDescription:r.description||''})).filter(r=>r.referenceImage.bytesBase64Encoded);}
  const body={instances:[instance],parameters:{sampleCount:opts.sampleCount||1,aspectRatio:opts.aspectRatio||'3:4',personGeneration:'allow_all'}};
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.text();
    if(e.includes('referenceImages')||e.includes('REFERENCE_TYPE')){delete instance.referenceImages;const r2=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify({instances:[instance],parameters:body.parameters})});if(!r2.ok)throw new Error('Imagen '+r2.status);const d2=await r2.json();if(!d2.predictions?.length)throw new Error('No predictions');return d2.predictions.map(p=>`data:image/png;base64,${p.bytesBase64Encoded}`);}
    throw new Error('Imagen '+res.status+': '+e.substring(0,200));}
  const data=await res.json(); if(!data.predictions?.length)throw new Error('No predictions'); return data.predictions.map(p=>`data:image/png;base64,${p.bytesBase64Encoded}`);
}

async function callNanoBanana(prompt, opts={}) {
  const {projectId,location,accessToken}=await getVertexConfig();
  const model=opts.model||'gemini-2.0-flash-preview-image-generation';
  const url=`https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:generateContent`;
  const parts=[];
  if(opts.referenceImages?.length>0){parts.push({text:'Reference images for visual consistency:'});for(const ref of opts.referenceImages.slice(0,3)){const b=extractBase64(ref.image);if(b){parts.push({inlineData:{mimeType:'image/png',data:b}});if(ref.description)parts.push({text:'[Ref: '+ref.description.substring(0,200)+']'});}}}
  parts.push({text:prompt});
  const body={contents:[{role:'user',parts}],generationConfig:{responseModalities:['TEXT','IMAGE'],temperature:1.0}};
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(body)});
  if(!res.ok)throw new Error('NanoBanana '+res.status+': '+(await res.text()).substring(0,200));
  const data=await res.json(); const rp=(data.candidates?.[0]?.content?.parts)||[]; const ip=rp.filter(p=>p.inlineData?.mimeType?.startsWith('image/'));
  if(!ip.length)throw new Error('No image generated'); return ip.map(p=>`data:${p.inlineData.mimeType};base64,${p.inlineData.data}`);
}

function App() {
  const [showApiModal, setShowApiModal] = useState(false);
  const [logs, setLogs] = useState([]);
  const [step, setStep] = useState(0);
  const [running, setRunning] = useState(false);
  const [errorMsg, setErrorMsg] = useState('');
  const abortRef = useRef(false);

  // Episode Management
  const [episodes, setEpisodes] = useState([]);
  const [currentEpisode, setCurrentEpisode] = useState(null);

  // Data state (per episode)
  const [sourceText, setSourceText] = useState('');
  const [analysis, setAnalysis] = useState(null);
  const [references, setReferences] = useState({characters:{}, backgrounds:{}});
  const [storyboard, setStoryboard] = useState([]);
  const [panels, setPanels] = useState([]);
  const [imageProvider, setImageProvider] = useState('imagen4');

  // Shared assets (project-level)
  const [sharedAssets, setSharedAssets] = useState({characters:{}, backgrounds:{}, props:{}});
  const [showAssetLibrary, setShowAssetLibrary] = useState(false);
  const [assetTab, setAssetTab] = useState('characters');

  // Project management
  const [projectId, setProjectId] = useState(null);
  const [projectTitle, setProjectTitle] = useState('');
  const [projectList, setProjectList] = useState([]);
  const [showProjects, setShowProjects] = useState(false);

  // Completed steps tracking
  const [completedSteps, setCompletedSteps] = useState(new Set());

  const log = useCallback((msg, type='info') => {
    const ts = new Date().toLocaleTimeString();
    setLogs(prev => [...prev, {msg: `[${ts}] ${msg}`, type}]);
  }, []);

  const callText = useCallback(async (system, user) => {
    return await callGemini(system, user, {maxTokens: 16384, thinkBudget: 1024});
  }, []);

  const callImage = useCallback(async (prompt, opts={}) => {
    if (imageProvider === 'nanoBanana') return await callNanoBanana(prompt, opts);
    return await callImagen(prompt, {...opts, aspectRatio: opts.aspectRatio || '3:4'});
  }, [imageProvider]);

  const parseJSON = (text) => {
    let cleaned = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const arrStart = cleaned.indexOf('[');
    const objStart = cleaned.indexOf('{');
    if (arrStart >= 0 && (objStart < 0 || arrStart < objStart)) cleaned = cleaned.substring(arrStart);
    else if (objStart >= 0) cleaned = cleaned.substring(objStart);
    let depth = 0, end = 0;
    const opener = cleaned[0];
    const closer = opener === '[' ? ']' : '}';
    for (let i = 0; i < cleaned.length; i++) {
      if (cleaned[i] === opener) depth++;
      else if (cleaned[i] === closer) { depth--; if (depth === 0) { end = i + 1; break; } }
    }
    return JSON.parse(cleaned.substring(0, end));
  };

  // Create new episode
  const createNewEpisode = useCallback(async () => {
    const newEpisodeNum = episodes.length > 0 ? Math.max(...episodes.map(e => e.number)) + 1 : 1;
    setCurrentEpisode(newEpisodeNum);
    setSourceText('');
    setAnalysis(null);
    setReferences({characters:{}, backgrounds:{}});
    setStoryboard([]);
    setPanels([]);
    setCompletedSteps(new Set());
    setStep(0);
    const newEp = {number: newEpisodeNum, title: `${newEpisodeNum}화`, createdAt: new Date().toISOString()};
    setEpisodes(prev => [...prev, newEp]);
    log(`새 화 ${newEpisodeNum}화 생성됨`, 'success');
  }, [episodes, log]);

  // Load episode
  const loadEpisode = useCallback(async (episodeNum) => {
    try {
      if (!projectId) return;
      log(`${episodeNum}화 로드 중...`);

      // Clear current state before loading
      setSourceText('');
      setAnalysis(null);
      setReferences({characters:{}, backgrounds:{}});
      setStoryboard([]);
      setPanels([]);
      setCompletedSteps(new Set());
      setStep(0);

      // Load each phase and detect completed steps from actual data
      const detected = new Set();
      let lastStep = 0;

      const s1 = await fbLoadPhase(projectId, episodeNum, 'step1_analysis');
      if (s1 && s1.analysis) {
        setAnalysis(s1.analysis);
        setSourceText(s1.sourceText || '');
        detected.add(0);
        lastStep = 1;
        log(`  Step 1 (분석) 로드됨`, 'info');
      }

      const s2 = await fbLoadPhase(projectId, episodeNum, 'step2_references');
      if (s2 && (Object.keys(s2.characters || {}).length > 0 || Object.keys(s2.backgrounds || {}).length > 0)) {
        setReferences(s2);
        detected.add(1);
        lastStep = 2;
        log(`  Step 2 (레퍼런스) 로드됨`, 'info');
      }

      const s3 = await fbLoadPhase(projectId, episodeNum, 'step3_storyboard');
      if (s3 && s3.storyboard?.length > 0) {
        setStoryboard(s3.storyboard);
        detected.add(2);
        lastStep = 3;
        log(`  Step 3 (스토리보드) 로드됨: ${s3.storyboard.length}개 패널`, 'info');
      }

      const s4 = await fbLoadPhase(projectId, episodeNum, 'step4_panels');
      if (s4 && s4.panels?.some(p => p)) {
        setPanels(s4.panels);
        detected.add(3);
        lastStep = 4;
        const generated = s4.panels.filter(p => p).length;
        log(`  Step 4 (패널 이미지) 로드됨: ${generated}/${s4.panels.length}개`, 'info');
      }

      // Also check episode doc for completedSteps (merge with detected)
      const episodeDoc = episodes.find(e => e.number === episodeNum);
      if (episodeDoc?.completedSteps) {
        episodeDoc.completedSteps.forEach(s => detected.add(s));
      }

      setCompletedSteps(detected);
      setStep(episodeDoc?.step !== undefined ? episodeDoc.step : lastStep);
      setCurrentEpisode(episodeNum);

      if (detected.size === 0) {
        log(`${episodeNum}화 로드 완료 (저장된 데이터 없음)`, 'success');
      } else {
        log(`${episodeNum}화 로드 완료 (${detected.size}개 단계 복원됨)`, 'success');
      }
    } catch(e) { log(`${episodeNum}화 로드 실패: ${e.message}`, 'error'); }
  }, [projectId, episodes, log]);

  // Delete episode
  const deleteEpisode = useCallback(async (episodeNum) => {
    if (!projectId) return;
    if (!confirm(`${episodeNum}화를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
    try {
      log(`${episodeNum}화 삭제 중...`);
      await fbDeleteEpisode(projectId, episodeNum);
      setEpisodes(prev => prev.filter(e => e.number !== episodeNum));
      if (currentEpisode === episodeNum) {
        const remaining = episodes.filter(e => e.number !== episodeNum);
        if (remaining.length > 0) {
          await loadEpisode(remaining[0].number);
        } else {
          setCurrentEpisode(null);
          setSourceText('');
          setAnalysis(null);
          setReferences({characters:{}, backgrounds:{}});
          setStoryboard([]);
          setPanels([]);
          setCompletedSteps(new Set());
          setStep(0);
        }
      }
      log(`${episodeNum}화 삭제 완료`, 'success');
    } catch(e) { log(`삭제 실패: ${e.message}`, 'error'); }
  }, [projectId, episodes, currentEpisode, loadEpisode, log]);

  // Helper: update local episode state after auto-save
  const updateEpisodeState = (stepNum, newCompletedSteps) => {
    setEpisodes(prev => prev.map(e =>
      e.number === currentEpisode
        ? {...e, step: stepNum, completedSteps: newCompletedSteps}
        : e
    ));
  };

    // ======== STEP 1: Analyze Story ========
  const runStep1 = async () => {
    log('Step 1: 스토리 분석 시작...', 'info');
    setStep(0);

    // Build existing assets context for the AI
    let existingAssetsContext = '';
    const sa = sharedAssets;
    const existingChars = Object.values(sa.characters);
    const existingBgs = Object.values(sa.backgrounds);
    const existingProps = Object.values(sa.props);
    if (existingChars.length > 0 || existingBgs.length > 0 || existingProps.length > 0) {
      existingAssetsContext = '\n\n--- EXISTING PROJECT ASSETS (reuse these IDs if the same character/background/prop appears) ---\n';
      if (existingChars.length > 0) {
        existingAssetsContext += 'Characters:\n' + existingChars.map(c => `  ${c.assetId}: ${c.name} (${c.role}) - appearance: ${c.appearance} - default outfit: ${c.outfit}`).join('\n') + '\n';
      }
      if (existingBgs.length > 0) {
        existingAssetsContext += 'Backgrounds:\n' + existingBgs.map(b => `  ${b.assetId}: ${b.name} - ${b.description}`).join('\n') + '\n';
      }
      if (existingProps.length > 0) {
        existingAssetsContext += 'Props:\n' + existingProps.map(p => `  ${p.assetId}: ${p.name} - ${p.description}`).join('\n') + '\n';
      }
      existingAssetsContext += '--- END EXISTING ASSETS ---\n';
    }

    const result = await callText(PROMPTS.ANALYZE_STORY, sourceText + existingAssetsContext);
    const parsed = parseJSON(result);
    // Mark existing assets
    if (parsed.characters) parsed.characters.forEach(c => { if (sa.characters[c.id]) c.isExisting = true; });
    if (parsed.backgrounds) parsed.backgrounds.forEach(b => { if (sa.backgrounds[b.id]) b.isExisting = true; });
    if (parsed.props) parsed.props?.forEach(p => { if (sa.props[p.id]) p.isExisting = true; });
    log(`분석 완료: 캐릭터 ${parsed.characters?.length || 0}명 (기존 ${parsed.characters?.filter(c=>c.isExisting).length || 0}), 배경 ${parsed.backgrounds?.length || 0}개, 소품 ${parsed.props?.length || 0}개, 플롯 ${parsed.plotBeats?.length || 0}개`, 'success');
    setAnalysis(parsed);
    setCompletedSteps(prev => new Set([...prev, 0]));
    setStep(1);
    // Auto-save step 1
    if (projectId && currentEpisode) {
      try {
        const cs = [...new Set([...completedSteps, 0])];
        await fbSavePhase(projectId, currentEpisode, 'step1_analysis', {analysis: parsed, sourceText});
        await fbSaveEpisode(projectId, currentEpisode, {step: 1, completedSteps: cs});
        updateEpisodeState(1, cs);
        log('Step 1 자동 저장 완료', 'info');
      } catch(e) { log('Step 1 자동 저장 실패: ' + e.message, 'error'); }
    }
    return parsed;
  };

  // ======== STEP 2: Generate Reference Images (uses shared assets) ========
  const runStep2 = async (analysisData) => {
    const data = analysisData || analysis;
    if (!data) throw new Error('분석 데이터 없음');
    log('Step 2: 레퍼런스 이미지 생성 시작 (공유 에셋 활용)...', 'info');
    setStep(1);
    const refs = {characters:{}, backgrounds:{}};
    const sa = {...sharedAssets};

    // Characters
    for (let i = 0; i < data.characters.length; i++) {
      if (abortRef.current) throw new Error('중단됨');
      const char = data.characters[i];
      // Check shared asset first
      if (sa.characters[char.id]?.image) {
        refs.characters[char.id] = sa.characters[char.id].image;
        log(`${char.name} — 공유 에셋에서 로드 ✓`, 'success');
        setReferences({...refs});
        continue;
      }
      log(`캐릭터 레퍼런스 생성 (${i+1}/${data.characters.length}): ${char.name}`);
      try {
        const images = await callImage(char.refPrompt + ', character reference sheet, full body, front view, clean background, manhwa art style, high quality, detailed');
        refs.characters[char.id] = images[0];
        // Save to shared assets
        const assetData = {name: char.name, role: char.role, age: char.age, gender: char.gender, appearance: char.appearance, outfit: char.outfit, personality: char.personality, refPrompt: char.refPrompt, image: images[0]};
        sa.characters[char.id] = {...assetData, assetId: char.id, type: 'characters'};
        if (projectId) await fbSaveAsset(projectId, 'characters', char.id, assetData);
        log(`${char.name} 레퍼런스 생성 → 공유 에셋 저장 완료`, 'success');
      } catch(e) {
        log(`${char.name} 레퍼런스 실패: ${e.message}`, 'error');
      }
      setReferences({...refs});
    }

    // Backgrounds
    for (let i = 0; i < data.backgrounds.length; i++) {
      if (abortRef.current) throw new Error('중단됨');
      const bg = data.backgrounds[i];
      if (sa.backgrounds[bg.id]?.image) {
        refs.backgrounds[bg.id] = sa.backgrounds[bg.id].image;
        log(`${bg.name} — 공유 에셋에서 로드 ✓`, 'success');
        setReferences({...refs});
        continue;
      }
      log(`배경 레퍼런스 생성 (${i+1}/${data.backgrounds.length}): ${bg.name}`);
      try {
        const images = await callImage(bg.refPrompt + ', no characters, manhwa background art, detailed environment, wide shot', {aspectRatio: '16:9'});
        refs.backgrounds[bg.id] = images[0];
        const assetData = {name: bg.name, bgType: bg.type, description: bg.description, refPrompt: bg.refPrompt, image: images[0]};
        sa.backgrounds[bg.id] = {...assetData, assetId: bg.id, type: 'backgrounds'};
        if (projectId) await fbSaveAsset(projectId, 'backgrounds', bg.id, assetData);
        log(`${bg.name} 배경 생성 → 공유 에셋 저장 완료`, 'success');
      } catch(e) {
        log(`${bg.name} 배경 실패: ${e.message}`, 'error');
      }
      setReferences({...refs});
    }

    // Props
    if (data.props?.length > 0) {
      for (let i = 0; i < data.props.length; i++) {
        if (abortRef.current) throw new Error('중단됨');
        const prop = data.props[i];
        if (sa.props[prop.id]?.image) {
          log(`${prop.name} — 공유 에셋에서 로드 ✓`, 'success');
          continue;
        }
        log(`소품 레퍼런스 생성 (${i+1}/${data.props.length}): ${prop.name}`);
        try {
          const images = await callImage(prop.refPrompt + ', single object, centered, clean white background, detailed illustration, manhwa style', {aspectRatio: '1:1'});
          const assetData = {name: prop.name, description: prop.description, refPrompt: prop.refPrompt, image: images[0]};
          sa.props[prop.id] = {...assetData, assetId: prop.id, type: 'props'};
          if (projectId) await fbSaveAsset(projectId, 'props', prop.id, assetData);
          log(`${prop.name} 소품 생성 → 공유 에셋 저장 완료`, 'success');
        } catch(e) {
          log(`${prop.name} 소품 실패: ${e.message}`, 'error');
        }
      }
    }

    setSharedAssets({...sa});
    setCompletedSteps(prev => new Set([...prev, 1]));
    setStep(2);
    // Auto-save step 2
    if (projectId && currentEpisode) {
      try {
        const cs = [...new Set([...completedSteps, 0, 1])];
        await fbSavePhase(projectId, currentEpisode, 'step2_references', refs);
        await fbSaveEpisode(projectId, currentEpisode, {step: 2, completedSteps: cs});
        updateEpisodeState(2, cs);
        log('Step 2 자동 저장 완료', 'info');
      } catch(e) { log('Step 2 자동 저장 실패: ' + e.message, 'error'); }
    }
    return refs;
  };

  // ======== STEP 3: Create Storyboard ========
  const runStep3 = async (analysisData) => {
    const data = analysisData || analysis;
    if (!data) throw new Error('분석 데이터 없음');
    log('Step 3: 스토리보드 생성 시작...', 'info');
    setStep(2);

    const charContext = data.characters.map(c => `${c.id}: ${c.name} (${c.role}) - appearance: ${c.appearance} - DEFAULT OUTFIT: ${c.outfit}`).join('\n');
    const bgContext = data.backgrounds.map(b => `${b.id}: ${b.name} - ${b.description}`).join('\n');
    const propContext = (data.props||[]).map(p => `${p.id}: ${p.name} - ${p.description}`).join('\n');
    const plotContext = data.plotBeats.map(p => {
      let s = `Beat ${p.beat}: ${p.summary} [mood: ${p.mood}, chars: ${p.characters.join(',')}, loc: ${p.location}`;
      if (p.props?.length) s += `, props: ${p.props.join(',')}`;
      if (p.outfitOverrides && Object.keys(p.outfitOverrides).length > 0) s += `, OUTFIT CHANGES: ${JSON.stringify(p.outfitOverrides)}`;
      return s + ']';
    }).join('\n');

    const userPrompt = `Story title: ${data.title}
Synopsis: ${data.synopsis}

Characters:
${charContext}

Backgrounds:
${bgContext}

Props/Objects:
${propContext || '(none)'}

Plot beats:
${plotContext}

Original story text:
${sourceText.substring(0, 6000)}

Create a complete webtoon storyboard with 20-40 panels. Each panel's imagePrompt must include FULL character appearance descriptions AND EXACT outfit details (not just IDs).
CRITICAL: Characters must wear their DEFAULT OUTFIT unless an outfitOverride is explicitly specified in the plot beat. Include prop descriptions when they appear in a scene.`;

    const result = await callText(PROMPTS.CREATE_STORYBOARD, userPrompt);
    const parsed = parseJSON(result);
    log(`스토리보드 완료: ${parsed.length}개 패널`, 'success');
    setStoryboard(parsed);
    setPanels(new Array(parsed.length).fill(null));
    setCompletedSteps(prev => new Set([...prev, 2]));
    setStep(3);
    // Auto-save step 3
    if (projectId && currentEpisode) {
      try {
        const cs = [...new Set([...completedSteps, 0, 1, 2])];
        await fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard: parsed});
        await fbSaveEpisode(projectId, currentEpisode, {step: 3, completedSteps: cs});
        updateEpisodeState(3, cs);
        log('Step 3 자동 저장 완료', 'info');
      } catch(e) { log('Step 3 자동 저장 실패: ' + e.message, 'error'); }
    }
    return parsed;
  };

  // ======== STEP 4: Generate Panel Images ========
  const runStep4 = async (storyboardData, refsData) => {
    const sb = storyboardData || storyboard;
    const refs = refsData || references;
    if (!sb.length) throw new Error('스토리보드 없음');
    log('Step 4: 패널 이미지 생성 시작...', 'info');
    setStep(3);

    const newPanels = [...(panels.length === sb.length ? panels : new Array(sb.length).fill(null))];

    for (let i = 0; i < sb.length; i++) {
      if (abortRef.current) throw new Error('중단됨');
      if (newPanels[i]) { log(`패널 ${i+1} 이미 생성됨, 건너뜀`); continue; }

      const panel = sb[i];
      log(`패널 ${i+1}/${sb.length} 생성 중... (${panel.type}, ${panel.shotSize})`);

      const refImages = [];
      const sa = sharedAssets;
      if (panel.characters && analysis) {
        for (const pc of panel.characters) {
          const charId = pc.id || pc;
          // Prefer shared asset image, fall back to episode refs
          const charImg = sa.characters[charId]?.image || refs.characters[charId];
          if (charImg) {
            const charInfo = analysis.characters.find(c => c.id === charId);
            const outfitDesc = pc.outfitOverride || charInfo?.outfit || '';
            refImages.push({image: charImg, description: (charInfo?.appearance || charId) + (outfitDesc ? ', wearing: ' + outfitDesc : '')});
          }
        }
        if (panel.background) {
          const bgImg = sa.backgrounds[panel.background]?.image || refs.backgrounds[panel.background];
          if (bgImg) refImages.push({image: bgImg, description: 'background environment'});
        }
        // Include prop references
        if (panel.props) {
          for (const propId of panel.props) {
            if (sa.props[propId]?.image) {
              refImages.push({image: sa.props[propId].image, description: sa.props[propId].name + ': ' + (sa.props[propId].description || '')});
            }
          }
        }
      }

      try {
        const images = await callImage(panel.imagePrompt, {referenceImages: refImages, aspectRatio: '3:4'});
        newPanels[i] = images[0];
        log(`패널 ${i+1} 완료`, 'success');
      } catch(e) {
        log(`패널 ${i+1} 실패: ${e.message}`, 'error');
        try {
          const images = await callImage(panel.imagePrompt, {aspectRatio: '3:4'});
          newPanels[i] = images[0];
          log(`패널 ${i+1} 레퍼런스 없이 재생성 완료`, 'success');
        } catch(e2) {
          log(`패널 ${i+1} 최종 실패: ${e2.message}`, 'error');
        }
      }
      setPanels([...newPanels]);
    }

    setCompletedSteps(prev => new Set([...prev, 3]));
    setStep(4);
    // Auto-save step 4
    if (projectId && currentEpisode) {
      try {
        const cs = [...new Set([...completedSteps, 0, 1, 2, 3])];
        await fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels: newPanels});
        await fbSaveEpisode(projectId, currentEpisode, {step: 4, completedSteps: cs});
        updateEpisodeState(4, cs);
        log('Step 4 자동 저장 완료', 'info');
      } catch(e) { log('Step 4 자동 저장 실패: ' + e.message, 'error'); }
    }
    return newPanels;
  };

  // ======== Full Pipeline ========
  const runFullPipeline = async () => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      const a = await runStep1();
      if (abortRef.current) return;
      const r = await runStep2(a);
      if (abortRef.current) return;
      const s = await runStep3(a);
      if (abortRef.current) return;
      await runStep4(s, r);
      setCompletedSteps(prev => new Set([...prev, 4]));
      // Final save after full pipeline
      if (projectId && currentEpisode) {
        try {
          await fbSaveEpisode(projectId, currentEpisode, {step: 4, completedSteps: [0,1,2,3,4]});
          log('전체 파이프라인 저장 완료', 'info');
        } catch(e) { log('저장 실패: ' + e.message, 'error'); }
      }
      log(`웹툰 ${currentEpisode || 1}화 생성 완료!`, 'success');
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Run Single Step ========
  const runSingleStep = async (stepIdx) => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      if (stepIdx === 0) await runStep1();
      else if (stepIdx === 1) await runStep2();
      else if (stepIdx === 2) await runStep3();
      else if (stepIdx === 3) await runStep4();
      else if (stepIdx === 4) { setStep(4); setCompletedSteps(prev => new Set([...prev, 4])); }
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Regenerate single panel ========
  const regeneratePanel = async (idx) => {
    if (!storyboard[idx]) return;
    setRunning(true);
    try {
      const panel = storyboard[idx];
      const refImages = [];
      const sa = sharedAssets;
      if (panel.characters && analysis) {
        for (const pc of panel.characters) {
          const charId = pc.id || pc;
          const charImg = sa.characters[charId]?.image || references.characters[charId];
          if (charImg) {
            const charInfo = analysis.characters.find(c => c.id === charId);
            refImages.push({image: charImg, description: charInfo?.appearance || ''});
          }
        }
        if (panel.background) {
          const bgImg = sa.backgrounds[panel.background]?.image || references.backgrounds[panel.background];
          if (bgImg) refImages.push({image: bgImg, description: 'background'});
        }
        if (panel.props) {
          for (const propId of panel.props) {
            if (sa.props[propId]?.image) refImages.push({image: sa.props[propId].image, description: sa.props[propId].name});
          }
        }
      }
      log(`패널 ${idx+1} 재생성 중...`);
      const images = await callImage(panel.imagePrompt, {referenceImages: refImages, aspectRatio: '3:4'});
      const newPanels = [...panels];
      newPanels[idx] = images[0];
      setPanels(newPanels);
      // Auto-save updated panels
      if (projectId && currentEpisode) {
        try { await fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels: newPanels}); } catch(e) {}
      }
      log(`패널 ${idx+1} 재생성 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single character reference (updates shared asset) ========
  const regenerateCharRef = async (charId) => {
    if (!analysis) return;
    const char = analysis.characters.find(c => c.id === charId);
    if (!char) return;
    setRunning(true);
    try {
      log(`${char.name} 레퍼런스 재생성 중...`);
      const images = await callImage(char.refPrompt + ', character reference sheet, full body, front view, clean background, manhwa art style, high quality');
      setReferences(prev => ({...prev, characters: {...prev.characters, [charId]: images[0]}}));
      // Update shared asset
      const assetData = {name: char.name, role: char.role, age: char.age, gender: char.gender, appearance: char.appearance, outfit: char.outfit, personality: char.personality, refPrompt: char.refPrompt, image: images[0]};
      setSharedAssets(prev => ({...prev, characters: {...prev.characters, [charId]: {...assetData, assetId: charId, type: 'characters'}}}));
      if (projectId) await fbSaveAsset(projectId, 'characters', charId, assetData);
      log(`${char.name} 레퍼런스 재생성 → 공유 에셋 업데이트 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single asset from library ========
  const regenerateAsset = async (assetType, assetId) => {
    const asset = sharedAssets[assetType]?.[assetId];
    if (!asset) return;
    setRunning(true);
    try {
      log(`${asset.name} 에셋 재생성 중...`);
      let suffix = '', opts = {};
      if (assetType === 'characters') suffix = ', character reference sheet, full body, front view, clean background, manhwa art style, high quality';
      else if (assetType === 'backgrounds') { suffix = ', no characters, manhwa background art, detailed environment, wide shot'; opts.aspectRatio = '16:9'; }
      else if (assetType === 'props') { suffix = ', single object, centered, clean white background, detailed illustration, manhwa style'; opts.aspectRatio = '1:1'; }
      const images = await callImage(asset.refPrompt + suffix, opts);
      const updated = {...asset, image: images[0]};
      setSharedAssets(prev => ({...prev, [assetType]: {...prev[assetType], [assetId]: updated}}));
      if (assetType === 'characters') setReferences(prev => ({...prev, characters: {...prev.characters, [assetId]: images[0]}}));
      if (assetType === 'backgrounds') setReferences(prev => ({...prev, backgrounds: {...prev.backgrounds, [assetId]: images[0]}}));
      if (projectId) await fbSaveAsset(projectId, assetType, assetId, updated);
      log(`${asset.name} 에셋 재생성 완료`, 'success');
    } catch(e) { log(`에셋 재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // Save Project & Episodes
  const saveProject = async () => {
    try {
      if (!projectId || !projectTitle) {
        const id = projectId || 'proj_' + Date.now();
        if (!projectId) setProjectId(id);
        await fbSaveProject(id, {title: projectTitle || '무제'});
      }

      // If no episode selected, create first one
      if (!currentEpisode) {
        await createNewEpisode();
        return;
      }

      // Save episode metadata
      const episodeTitle = analysis?.title || `${currentEpisode}화`;
      const episodeData = {
        title: episodeTitle,
        number: currentEpisode,
        step,
        completedSteps: [...completedSteps],
        createdAt: episodes.find(e => e.number === currentEpisode)?.createdAt || new Date().toISOString(),
      };
      await fbSaveEpisode(projectId, currentEpisode, episodeData);

      // Save phases
      if (analysis) await fbSavePhase(projectId, currentEpisode, 'step1_analysis', {analysis, sourceText});
      if (Object.keys(references.characters).length > 0) await fbSavePhase(projectId, currentEpisode, 'step2_references', references);
      if (storyboard.length > 0) await fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard});
      if (panels.some(p => p)) await fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels});

      // Update episodes state with saved info
      setEpisodes(prev => prev.map(e =>
        e.number === currentEpisode
          ? {...e, title: episodeTitle, step, completedSteps: [...completedSteps]}
          : e
      ));

      log('프로젝트 저장 완료', 'success');
    } catch(e) { log('저장 실패: ' + e.message, 'error'); }
  };

  const loadProject = async (pid) => {
    try {
      log('프로젝트 로드 중...');
      const proj = await fbLoadProject(pid);
      setProjectId(pid);
      setProjectTitle(proj.title || '');

      // Load shared assets
      try {
        const assets = await fbLoadAllAssets(pid);
        setSharedAssets(assets);
        const totalAssets = Object.keys(assets.characters).length + Object.keys(assets.backgrounds).length + Object.keys(assets.props).length;
        if (totalAssets > 0) log(`공유 에셋 ${totalAssets}개 로드 완료`, 'success');
      } catch(e) { log('공유 에셋 로드 실패: ' + e.message, 'error'); }

      // Load episodes
      const episodeList = await fbListEpisodes(pid);
      setEpisodes(episodeList);

      if (episodeList.length > 0) {
        await loadEpisode(episodeList[0].number);
      } else {
        // Create first episode if none exist
        const newEpisode = {number: 1, title: '1화', createdAt: new Date().toISOString()};
        setEpisodes([newEpisode]);
        setCurrentEpisode(1);
      }

      setShowProjects(false);
      log('프로젝트 로드 완료', 'success');
    } catch(e) { log('로드 실패: ' + e.message, 'error'); }
  };

  const loadProjectList = async () => {
    try { setProjectList(await fbListProjects()); } catch(e) { log('목록 로드 실패: ' + e.message, 'error'); }
  };

  // ======== RENDER ========
  return (
    <div>
      {/* Header */}
      <div className="app-header">
        <div className="app-logo">웹툰 프로덕션</div>
        <div className="nav-tabs">
          <select className="form-select" style={{width:140,padding:'6px 10px',fontSize:12}} value={imageProvider} onChange={e=>setImageProvider(e.target.value)}>
            <option value="imagen4">Imagen 4</option>
            <option value="nanoBanana">Gemini Image</option>
          </select>
        </div>
        {projectId && <button className="api-key-btn" onClick={()=>setShowAssetLibrary(true)} style={{background:'linear-gradient(135deg,#00b894,#00cec9)',color:'#fff',borderColor:'transparent'}}>에셋 라이브러리 ({Object.keys(sharedAssets.characters).length + Object.keys(sharedAssets.backgrounds).length + Object.keys(sharedAssets.props).length})</button>}
        <button className="api-key-btn" onClick={()=>setShowApiModal(true)}>API 설정</button>
      </div>

      {showApiModal && <ApiKeyModal onClose={()=>setShowApiModal(false)} />}

      {/* Asset Library Modal */}
      {showAssetLibrary && (
        <div className="asset-overlay" onClick={()=>setShowAssetLibrary(false)}>
          <div className="asset-panel" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:18}}>에셋 라이브러리</div>
              <button className="btn-cancel" onClick={()=>setShowAssetLibrary(false)}>닫기</button>
            </div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>프로젝트 전체에서 공유되는 캐릭터, 배경, 소품 에셋입니다. 화가 바뀌어도 동일한 이미지가 사용됩니다.</div>

            <div className="asset-tabs">
              <button className={`asset-tab ${assetTab==='characters'?'active':''}`} onClick={()=>setAssetTab('characters')}>캐릭터 ({Object.keys(sharedAssets.characters).length})</button>
              <button className={`asset-tab ${assetTab==='backgrounds'?'active':''}`} onClick={()=>setAssetTab('backgrounds')}>배경 ({Object.keys(sharedAssets.backgrounds).length})</button>
              <button className={`asset-tab ${assetTab==='props'?'active':''}`} onClick={()=>setAssetTab('props')}>소품 ({Object.keys(sharedAssets.props).length})</button>
            </div>

            {Object.keys(sharedAssets[assetTab]).length === 0 && (
              <div className="placeholder">등록된 {assetTab === 'characters' ? '캐릭터' : assetTab === 'backgrounds' ? '배경' : '소품'} 에셋이 없습니다. 스토리 분석 후 레퍼런스를 생성하면 자동으로 등록됩니다.</div>
            )}

            {Object.entries(sharedAssets[assetTab]).map(([id, asset]) => (
              <div key={id} className="asset-item">
                {asset.image ? (
                  <img src={asset.image} alt={asset.name} style={assetTab==='backgrounds'?{width:120,height:80,aspectRatio:'16/9'}:assetTab==='props'?{width:80,height:80,aspectRatio:'1/1'}:{}} />
                ) : (
                  <div className="asset-placeholder">미생성</div>
                )}
                <div className="asset-item-info">
                  <div className="asset-item-name">
                    {asset.name}
                    {assetTab === 'characters' && asset.role && <span className="asset-badge" style={{marginLeft:6}}>{asset.role}</span>}
                    {assetTab === 'backgrounds' && <span className="asset-badge bg">{asset.bgType || 'scene'}</span>}
                    {assetTab === 'props' && <span className="asset-badge prop">소품</span>}
                  </div>
                  <div className="asset-item-desc">
                    {assetTab === 'characters' ? asset.appearance : asset.description}
                  </div>
                  {assetTab === 'characters' && asset.outfit && (
                    <div className="asset-item-meta">
                      <span>기본 의상: {asset.outfit}</span>
                    </div>
                  )}
                  <div className="asset-item-meta">
                    <span>ID: {id}</span>
                  </div>
                </div>
                <div className="asset-item-actions">
                  <button className="btn btn-outline btn-sm" onClick={()=>regenerateAsset(assetTab, id)} disabled={running}>재생성</button>
                  <button className="btn btn-outline btn-sm" style={{color:'var(--err)',borderColor:'var(--err)'}} onClick={async ()=>{
                    if(!confirm(`${asset.name} 에셋을 삭제하시겠습니까?`)) return;
                    if(projectId) await fbDeleteAsset(projectId, assetTab, id);
                    setSharedAssets(prev => {const n={...prev};const t={...n[assetTab]};delete t[id];n[assetTab]=t;return n;});
                    log(`${asset.name} 에셋 삭제됨`, 'success');
                  }}>삭제</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="main-content">
        {/* Episode Bar */}
        {projectId && (
          <div className="episode-bar">
            <span className="project-title-bar">{projectTitle}</span>
            {episodes.map(ep => {
              const isActive = ep.number === currentEpisode;
              const stepsDone = ep.completedSteps ? ep.completedSteps.length : 0;
              const isComplete = stepsDone >= 4;
              return (
                <div
                  key={ep.number}
                  className={`episode-pill ${isActive ? 'active' : ''} ${isComplete ? 'complete' : ''}`}
                  onClick={() => loadEpisode(ep.number)}
                  title={`${ep.title || ep.number + '화'} — ${stepsDone}/5 단계 완료`}
                >
                  {ep.number}화 {stepsDone > 0 && !isComplete && <span style={{fontSize:10,opacity:.7}}>({stepsDone}/5)</span>}{isComplete && '✓'}
                  <button
                    className="episode-delete"
                    onClick={(e) => { e.stopPropagation(); deleteEpisode(ep.number); }}
                  >
                    ×
                  </button>
                </div>
              );
            })}
            <button className="episode-add" onClick={createNewEpisode}>+ 새 화</button>
          </div>
        )}

        {/* Step Bar */}
        <div className="step-bar">
          {STEPS.map((s, i) => (
            <div key={i}
              className={`step-item ${completedSteps.has(i) ? 'done' : ''} ${step === i && running ? 'current' : ''} ${step === i && !running ? 'active' : ''}`}
              onClick={() => !running && setStep(i)}
            >
              {STEP_LABELS[i]}
              {completedSteps.has(i) && ' ✓'}
            </div>
          ))}
        </div>

        {/* Error */}
        {errorMsg && <div style={{padding:'8px 16px',background:'#f8d7da',color:'#721c24',borderRadius:8,marginBottom:12,fontSize:13}}>{errorMsg}</div>}

        {/* Content area */}
        <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',gap:16}}>

          {!projectId ? (
            // Project selection screen
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div className="card">
                <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
                  <button className="btn btn-outline btn-sm" onClick={()=>{setShowProjects(!showProjects);if(!showProjects)loadProjectList();}}>프로젝트 목록</button>
                  <button className="btn btn-primary btn-sm" onClick={async () => {
                    const newId = 'proj_' + Date.now();
                    const newTitle = '새로운 프로젝트';
                    await fbSaveProject(newId, {title: newTitle});
                    setProjectId(newId);
                    setProjectTitle(newTitle);
                    const newEpisode = {number: 1, title: '1화', createdAt: new Date().toISOString()};
                    setEpisodes([newEpisode]);
                    setCurrentEpisode(1);
                    log('새 프로젝트 생성됨', 'success');
                  }}>새 프로젝트</button>
                </div>

                {showProjects && (
                  <div style={{marginBottom:12,padding:12,background:'var(--surface2)',borderRadius:8}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>저장된 프로젝트</div>
                    {projectList.map(p => (
                      <div key={p.id} style={{padding:'6px 0',borderBottom:'1px solid var(--border)',cursor:'pointer',fontSize:13}} onClick={()=>loadProject(p.id)}>
                        {p.title || p.id}
                      </div>
                    ))}
                    {projectList.length === 0 && <div style={{fontSize:12,color:'var(--text2)'}}>저장된 프로젝트 없음</div>}
                  </div>
                )}
              </div>
            </div>
          ) : (
            // Production workflow
            <>
              {/* ===== STEP 0: Source Input & Analysis ===== */}
              {step === 0 && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  <div className="card">
                    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
                      <button className="btn btn-primary" onClick={runFullPipeline} disabled={!sourceText.trim() || running}>
                        {running ? '생성 중...' : '전체 자동 생성'}
                      </button>
                      <button className="btn btn-outline btn-sm" onClick={()=>runSingleStep(0)} disabled={!sourceText.trim() || running}>Step 1만 실행</button>
                      {running && <button className="btn btn-danger btn-sm" onClick={()=>{abortRef.current=true;}}>중지</button>}
                      <div style={{marginLeft:'auto',display:'flex',gap:6}}>
                        <button className="btn btn-outline btn-sm" onClick={saveProject} disabled={running}>저장</button>
                      </div>
                    </div>

                    <textarea className="form-textarea" value={sourceText} onChange={e=>setSourceText(e.target.value)}
                      placeholder={`웹툰으로 만들 소설/스토리 텍스트를 입력하세요. 이 텍스트가 웹툰 ${currentEpisode || 1}화로 변환됩니다.`}
                      style={{minHeight:250}} disabled={running} />
                    <div style={{textAlign:'right',fontSize:11,color:'var(--text2)',marginTop:4}}>{sourceText.length} chars</div>
                  </div>

                  {/* Analysis result preview */}
                  {analysis && (
                    <div className="card">
                      <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>분석 결과: {analysis.title}</div>
                      <div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>{analysis.synopsis}</div>
                      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                        <div>
                          <div style={{fontWeight:600,fontSize:12,color:'var(--text2)',marginBottom:6}}>캐릭터 ({analysis.characters?.length})</div>
                          {analysis.characters?.map(c => (
                            <div key={c.id} style={{marginBottom:4}}><span className="tag tag-char">{c.role}</span> <strong>{c.name}</strong> — {c.personality} {c.isExisting && <span className="outfit-tag">공유 에셋</span>}</div>
                          ))}
                        </div>
                        <div>
                          <div style={{fontWeight:600,fontSize:12,color:'var(--text2)',marginBottom:6}}>배경 ({analysis.backgrounds?.length})</div>
                          {analysis.backgrounds?.map(b => (
                            <div key={b.id} style={{marginBottom:4}}><span className="tag tag-loc">{b.type}</span> {b.name}</div>
                          ))}
                        </div>
                        {analysis.props?.length > 0 && (
                          <div>
                            <div style={{fontWeight:600,fontSize:12,color:'var(--text2)',marginBottom:6}}>소품 ({analysis.props?.length})</div>
                            {analysis.props?.map(p => (
                              <div key={p.id} style={{marginBottom:4}}><span className="tag" style={{background:'#ffeaa7',color:'#636e72'}}>소품</span> {p.name} {p.isExisting && <span className="outfit-tag">공유</span>}</div>
                            ))}
                          </div>
                        )}
                        <div>
                          <div style={{fontWeight:600,fontSize:12,color:'var(--text2)',marginBottom:6}}>플롯 ({analysis.plotBeats?.length})</div>
                          {analysis.plotBeats?.map(p => (
                            <div key={p.beat} style={{marginBottom:4,fontSize:12}}>
                              <span className="tag tag-mood">{p.mood}</span> {p.summary}
                              {p.outfitOverrides && Object.keys(p.outfitOverrides).length > 0 && <span className="outfit-tag">의상변경</span>}
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ===== STEP 1: Character/Background References ===== */}
              {step === 1 && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <button className="btn btn-primary btn-sm" onClick={()=>runSingleStep(1)} disabled={!analysis || running}>레퍼런스 생성</button>
                    {running && <span className="status-badge running">생성 중...</span>}
                  </div>

                  {!analysis && <div className="placeholder">먼저 Step 1 (스토리 분석)을 실행하세요</div>}

                  {analysis && (
                    <div>
                      <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>캐릭터 레퍼런스</div>
                      <div className="ref-grid">
                        {analysis.characters?.map(c => (
                          <div key={c.id} className="ref-card">
                            {references.characters[c.id] ? (
                              <img src={references.characters[c.id]} alt={c.name} />
                            ) : (
                              <div className="panel-placeholder">미생성</div>
                            )}
                            <div className="ref-card-info">
                              <div className="ref-card-name">{c.name} <span className="tag tag-char" style={{fontSize:10}}>{c.role}</span></div>
                              <div className="ref-card-desc">{c.appearance}</div>
                              <button className="btn btn-outline btn-sm" style={{marginTop:6,width:'100%',justifyContent:'center'}}
                                onClick={()=>regenerateCharRef(c.id)} disabled={running}>재생성</button>
                            </div>
                          </div>
                        ))}
                      </div>

                      <div style={{fontWeight:700,fontSize:14,marginTop:20,marginBottom:12}}>배경 레퍼런스</div>
                      <div className="ref-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))'}}>
                        {analysis.backgrounds?.map(b => (
                          <div key={b.id} className="ref-card">
                            {references.backgrounds[b.id] ? (
                              <img src={references.backgrounds[b.id]} alt={b.name} style={{aspectRatio:'16/9'}} />
                            ) : (
                              <div className="panel-placeholder" style={{aspectRatio:'16/9'}}>미생성</div>
                            )}
                            <div className="ref-card-info">
                              <div className="ref-card-name">{b.name}</div>
                              <div className="ref-card-desc">{b.description}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ===== STEP 2: Storyboard ===== */}
              {step === 2 && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <button className="btn btn-primary btn-sm" onClick={()=>runSingleStep(2)} disabled={!analysis || running}>스토리보드 생성</button>
                    {storyboard.length > 0 && <span style={{fontSize:12,color:'var(--text2)'}}>{storyboard.length}개 패널</span>}
                    {running && <span className="status-badge running">생성 중...</span>}
                  </div>

                  {storyboard.length === 0 && <div className="placeholder">스토리보드를 생성하면 패널별 구성이 표시됩니다</div>}

                  {storyboard.length > 0 && (
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {storyboard.map((panel, i) => (
                        <div key={i} className="card" style={{padding:12,display:'flex',gap:12,alignItems:'flex-start'}}>
                          <div style={{minWidth:36,height:36,borderRadius:'50%',background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14}}>
                            {panel.panelNumber || i+1}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:4}}>
                              <span className="tag tag-mood">{panel.type}</span>
                              <span className="tag" style={{background:'#ffeaa7',color:'#636e72'}}>{panel.shotSize}</span>
                              <span className="tag" style={{background:'#dfe6e9',color:'#636e72'}}>{panel.cameraAngle}</span>
                              <span className="tag tag-mood">{panel.mood}</span>
                            </div>
                            <div style={{fontSize:13,marginBottom:4}}>{panel.description}</div>
                            {panel.dialogue?.map((d, di) => (
                              <div key={di} style={{fontSize:12,color:'var(--accent)',marginLeft:8}}>💬 {d.speaker}: "{d.text}"</div>
                            ))}
                            {panel.narration && <div style={{fontSize:12,color:'var(--text2)',fontStyle:'italic',marginLeft:8}}>📝 {panel.narration}</div>}
                            <details style={{marginTop:6}}>
                              <summary style={{fontSize:11,color:'var(--text2)',cursor:'pointer'}}>이미지 프롬프트</summary>
                              <div style={{fontSize:11,color:'var(--text2)',padding:'4px 0',lineHeight:1.5}}>{panel.imagePrompt}</div>
                            </details>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* ===== STEP 3: Panel Generation ===== */}
              {step === 3 && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <button className="btn btn-primary btn-sm" onClick={()=>runSingleStep(3)} disabled={storyboard.length===0 || running}>패널 이미지 생성</button>
                    {panels.filter(Boolean).length > 0 && <span style={{fontSize:12,color:'var(--text2)'}}>{panels.filter(Boolean).length}/{storyboard.length} 완료</span>}
                    {running && <span className="status-badge running">생성 중...</span>}
                  </div>

                  {storyboard.length === 0 && <div className="placeholder">먼저 스토리보드를 생성하세요</div>}

                  <div className="panel-grid">
                    {storyboard.map((panel, i) => (
                      <div key={i} className="panel-card">
                        <div className="panel-num">{i+1}</div>
                        {panels[i] ? (
                          <img src={panels[i]} alt={`Panel ${i+1}`} />
                        ) : (
                          <div className="panel-placeholder">{running ? '생성 대기...' : '미생성'}</div>
                        )}
                        <div className="panel-info">
                          <span className="tag tag-mood" style={{fontSize:10}}>{panel.type}</span> {panel.description?.substring(0, 40)}
                          {panels[i] && (
                            <div style={{marginTop:4}}>
                              <button className="btn btn-outline btn-sm" style={{fontSize:10,padding:'2px 8px'}} onClick={()=>regeneratePanel(i)} disabled={running}>재생성</button>
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ===== STEP 4: Webtoon Preview ===== */}
              {step === 4 && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontWeight:700,fontSize:15}}>웹툰 미리보기: {analysis?.title || ''}</span>
                    <span style={{fontSize:12,color:'var(--text2)'}}>({panels.filter(Boolean).length}개 패널)</span>
                  </div>

                  {panels.filter(Boolean).length === 0 && <div className="placeholder">패널 이미지를 먼저 생성하세요</div>}

                  <div className="webtoon-strip">
                    {storyboard.map((panel, i) => {
                      if (!panels[i]) return null;
                      return (
                        <div key={i} style={{position:'relative'}}>
                          <img src={panels[i]} alt={`Panel ${i+1}`} />
                          {/* Dialogue overlay */}
                          {panel.dialogue?.length > 0 && (
                            <div style={{position:'absolute',bottom:8,left:8,right:8,display:'flex',flexDirection:'column',gap:4}}>
                              {panel.dialogue.map((d, di) => (
                                <div key={di} style={{background:'rgba(255,255,255,0.92)',padding:'6px 12px',borderRadius:16,fontSize:13,fontWeight:500,boxShadow:'0 2px 8px rgba(0,0,0,.15)',maxWidth:'80%',alignSelf:di%2===0?'flex-start':'flex-end'}}>
                                  <span style={{fontSize:10,color:'var(--accent)',fontWeight:700}}>{d.speaker}</span><br/>{d.text}
                                </div>
                              ))}
                            </div>
                          )}
                          {panel.narration && (
                            <div style={{position:'absolute',top:8,left:8,right:8,background:'rgba(0,0,0,0.7)',color:'#fff',padding:'6px 12px',borderRadius:8,fontSize:12,fontStyle:'italic'}}>
                              {panel.narration}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}
        </div>

        {/* Log Panel */}
        <div style={{marginTop:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>로그</span>
            <button className="btn btn-outline" style={{padding:'2px 8px',fontSize:10}} onClick={()=>setLogs([])}>초기화</button>
          </div>
          <LogPanel logs={logs} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
