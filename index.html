  : `Create a complete webtoon storyboard with 20-40 panels. Each panel's imagePrompt must include FULL character appearance descriptions AND EXACT outfit details (not just IDs).
CRITICAL: Characters must wear their DEFAULT OUTFIT unless an outfitOverride is explicitly specified in the plot beat. Include prop descriptions when they appear in a scene.`);

    const storyboardPrompt = inputMode === 'scene' ? PROMPTS.CREATE_SCENE_STORYBOARD : PROMPTS.CREATE_STORYBOARD;
    log(`스토리보드 모드: ${inputMode === 'scene' ? '씬 설명 기반' : '웹소설 기반'}`, 'info');

    let parsed;
    const BATCH_SIZE = 15;
    const beatCount = data.plotBeats?.length || 0;

    if (inputMode === 'scene' && beatCount > BATCH_SIZE) {
      // Chunked generation for large scene counts
      parsed = [];
      let panelNum = 1;
      for (let i = 0; i < beatCount; i += BATCH_SIZE) {
        const batchBeats = data.plotBeats.slice(i, i + BATCH_SIZE);
        const batchPlotContext = batchBeats.map(p => {
          let s = `Beat ${p.beat}: ${p.summary} [mood: ${p.mood}, chars: ${p.characters.join(',')}, loc: ${p.location}`;
          if (p.props?.length) s += `, props: ${p.props.join(',')}`;
          if (p.outfitOverrides && Object.keys(p.outfitOverrides).length > 0) s += `, OUTFIT CHANGES: ${JSON.stringify(p.outfitOverrides)}`;
          return s + ']';
        }).join('\n');
        const batchPrompt = `Story title: ${data.title}\nSynopsis: ${data.synopsis}\n\nCharacters:\n${charContext}\n\nBackgrounds:\n${bgContext}\n\nProps/Objects:\n${propContext || '(none)'}\n\nPlot beats (batch ${Math.floor(i/BATCH_SIZE)+1}, beats ${batchBeats[0].beat}-${batchBeats[batchBeats.length-1].beat}):\n${batchPlotContext}\n\nCreate EXACTLY ${batchBeats.length} panels — one panel per plotBeat listed above. Start panelNumber at ${panelNum}. Do NOT create more or fewer panels than plotBeats. Each panel captures one scene entirely.\nEach panel's imagePrompt must include FULL character appearance descriptions AND EXACT outfit details. Include ALL dialogue in the dialogue array.`;
        log(`  배치 ${Math.floor(i/BATCH_SIZE)+1}/${Math.ceil(beatCount/BATCH_SIZE)}: Beat ${batchBeats[0].beat}-${batchBeats[batchBeats.length-1].beat} 생성 중...`, 'info');
        const batchResult = await callText(storyboardPrompt, batchPrompt, {maxTokens: 32768});
        const batchParsed = parseJSON(batchResult);
        // Re-number panels sequentially
        batchParsed.forEach(p => { p.panelNumber = panelNum++; });
        parsed.push(...batchParsed);
        log(`  배치 완료: ${batchParsed.length}개 패널 생성`, 'success');
      }
    } else {
      const result = await callText(storyboardPrompt, userPrompt, {maxTokens: 32768});
      parsed = parseJSON(result);
    }
    // Scene mode: validate and log panel count vs plotBeat count
    if (inputMode === 'scene') {
      const expectedCount = data.plotBeats?.length || 0;
      if (parsed.length !== expectedCount) {
        log(`⚠️ 패널 수(${parsed.length})가 씬 수(${expectedCount})와 다릅니다. 조정 중...`, 'warn');
        // If fewer panels, add placeholder entries for missing ones
        while (parsed.length < expectedCount) {
          const missingBeat = data.plotBeats[parsed.length];
          parsed.push({
            panelNumber: parsed.length + 1,
            plotBeat: missingBeat?.beat || parsed.length + 1,
            type: 'establishing', shotSize: 'medium', cameraAngle: 'eye_level',
            characters: missingBeat?.characters?.map(c => ({id: c, pose: 'standing', expression: 'neutral', position: 'center'})) || [],
            background: missingBeat?.location || 'bg_1',
            props: missingBeat?.props || [],
            dialogue: [],
            narration: '',
            mood: missingBeat?.mood || 'calm',
            description: missingBeat?.summary || '',
            imagePrompt: `${missingBeat?.summary || 'Scene'}, manhwa/webtoon style, detailed illustration, vibrant colors`
          });
        }
        // If more panels, trim to expected count
        if (parsed.length > expectedCount) parsed.length = expectedCount;
        log(`조정 완료: ${parsed.length}개 패널`, 'info');
      }
      log(`씬 모드 검증: ${expectedCount}개 씬 → ${parsed.length}개 패널 (1:1 매칭)`, 'success');
    } else {
      log(`스토리보드 완료: ${parsed.length}개 패널`, 'success');
    }
    setStoryboard(parsed);
    setPanels(new Array(parsed.length).fill(null));
    setCompletedSteps(prev => new Set([...prev, 2]));
    setStep(3);
    // Auto-save step 3
    if (projectId && currentEpisode) {
      try {
        const cs = [...new Set([...completedSteps, 0, 1, 2])];
        await fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard: parsed});
        await fbSaveEpisode(projectId, currentEpisode, {step: 3, completedSteps: cs});
        updateEpisodeState(3, cs);
        log('Step 3 자동 저장 완료', 'info');
      } catch(e) { log('Step 3 자동 저장 실패: ' + e.message, 'error'); }
    }
    return parsed;
  };

  // ======== STEP 4: Generate Panel Images ========
  const runStep4 = async (storyboardData, refsData) => {
    const sb = storyboardData || storyboard;
    const refs = refsData || references;
    if (!sb.length) throw new Error('스토리보드 없음');
    log('Step 4: 패널 이미지 생성 시작...', 'info');
    setStep(3);

    const newPanels = [...(panels.length === sb.length ? panels : new Array(sb.length).fill(null))];

    for (let i = 0; i < sb.length; i++) {
      if (abortRef.current) throw new Error('중단됨');
      if (newPanels[i]) { log(`패널 ${i+1} 이미 생성됨, 건너뜀`); continue; }

      const panel = sb[i];
      log(`패널 ${i+1}/${sb.length} 생성 중... (${panel.type}, ${panel.shotSize})`);

      const {refImages, assetDescriptions, charIds: panelCharIds} = buildPanelRefs(panel, sharedAssets, analysis, refs);
      log(`패널 ${i+1}: 레퍼런스 이미지 ${refImages.length}개, 에셋 설명 ${assetDescriptions.length}개, 캐릭터 ${panelCharIds.length}명`);

      try {
        const images = await callImage(panel.imagePrompt, {referenceImages: refImages, assetDescriptions, aspectRatio: '3:4', characterIds: panelCharIds});
        newPanels[i] = images[0];
        log(`패널 ${i+1} 완료 (레퍼런스 ${refImages.length}개 사용)`, 'success');
      } catch(e) {
        log(`패널 ${i+1} 실패: ${e.message}`, 'error');
        if (e.message.includes('429')) await new Promise(r => setTimeout(r, 10000));
        try {
          // Retry without reference images but keep asset descriptions
          const images = await callImage(panel.imagePrompt, {assetDescriptions, aspectRatio: '3:4', characterIds: panelCharIds});
          newPanels[i] = images[0];
          log(`패널 ${i+1} 레퍼런스 없이 재생성 완료`, 'success');
        } catch(e2) {
          log(`패널 ${i+1} 최종 실패: ${e2.message}`, 'error');
        }
      }
      setPanels([...newPanels]);
      // Delay between panels to avoid API rate limits
      if (i < sb.length - 1) await new Promise(r => setTimeout(r, 3000));
    }

    setCompletedSteps(prev => new Set([...prev, 3]));
    setStep(4);
    log(`패널 ${newPanels.filter(Boolean).length}개 생성 완료! Firebase 저장 버튼으로 저장하세요.`, 'success');
    return newPanels;
  };

  // ======== Full Pipeline ========
  const runFullPipeline = async () => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      const a = await runStep1();
      if (abortRef.current) return;
      const r = await runStep2(a);
      if (abortRef.current) return;
      const s = await runStep3(a);
      if (abortRef.current) return;
      await runStep4(s, r);
      setCompletedSteps(prev => new Set([...prev, 4]));
      // Final save after full pipeline
      if (projectId && currentEpisode) {
        try {
          await fbSaveEpisode(projectId, currentEpisode, {step: 4, completedSteps: [0,1,2,3,4]});
          log('전체 파이프라인 저장 완료', 'info');
        } catch(e) { log('저장 실패: ' + e.message, 'error'); }
      }
      log(`웹툰 ${currentEpisode || 1}화 생성 완료!`, 'success');
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Run Single Step ========
  const runSingleStep = async (stepIdx) => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      if (stepIdx === 0) await runStep1();
      else if (stepIdx === 1) await runStep2();
      else if (stepIdx === 2) await runStep3();
      else if (stepIdx === 3) await runStep4();
      else if (stepIdx === 4) { setStep(4); setCompletedSteps(prev => new Set([...prev, 4])); }
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Regenerate single panel ========
  const regeneratePanel = async (idx, customPrompt) => {
    if (!storyboard[idx]) return;
    setRunning(true);
    try {
      const panel = storyboard[idx];
      const usePrompt = customPrompt || panel.imagePrompt;
      // Update storyboard prompt if custom
      if (customPrompt) {
        const newSb = [...storyboard];
        newSb[idx] = {...newSb[idx], imagePrompt: customPrompt};
        setStoryboard(newSb);
      }
      const {refImages, assetDescriptions, charIds: panelCharIds} = buildPanelRefs(panel, sharedAssets, analysis, references);
      log(`패널 ${idx+1} 재생성 중... (asset ${assetDescriptions.length}개 참조)`);
      const images = await callImage(usePrompt, {referenceImages: refImages, assetDescriptions, aspectRatio: '3:4', characterIds: panelCharIds});
      const newPanels = [...panels];
      newPanels[idx] = images[0];
      setPanels(newPanels);
      log(`패널 ${idx+1} 재생성 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single character reference (updates shared asset) ========
  const regenerateCharRef = async (charId, customPrompt) => {
    if (!analysis) return;
    const char = analysis.characters.find(c => c.id === charId);
    if (!char) return;
    setRunning(true);
    try {
      const basePrompt = customPrompt || char.refPrompt;
      // Add differentiation context from other characters
      let contrastSuffix = '';
      if (!customPrompt) {
        const otherChars = analysis.characters.filter(c => c.id !== charId);
        if (otherChars.length > 0) {
          const otherDescs = otherChars.map(oc =>
            `${oc.name}: ${oc.appearance?.substring(0, 100)}${oc.distinctFeatures ? ' [distinct: ' + oc.distinctFeatures + ']' : ''}`
          ).join('; ');
          contrastSuffix = `\n\nIMPORTANT: This character must look COMPLETELY DIFFERENT from: ${otherDescs}. Ensure distinct hair color, hairstyle, face shape, and body type.`;
        }
        const distinctInfo = char.distinctFeatures ? `\nThis character's unique visual identity: ${char.distinctFeatures}.` : '';
        contrastSuffix = distinctInfo + contrastSuffix;
      }
      const finalPrompt = customPrompt ? customPrompt : (basePrompt + getCharSuffix() + contrastSuffix);
      log(`${char.name} 레퍼런스 재생성 중...`);
      const images = await callImage(finalPrompt);
      setReferences(prev => ({...prev, characters: {...prev.characters, [charId]: images[0]}}));
      const updatedRefPrompt = customPrompt || char.refPrompt;
      const assetData = {name: char.name, role: char.role, age: char.age, gender: char.gender, appearance: char.appearance, outfit: char.outfit, personality: char.personality, refPrompt: updatedRefPrompt, image: images[0]};
      setSharedAssets(prev => ({...prev, characters: {...prev.characters, [charId]: {...assetData, assetId: charId, type: 'characters'}}}));
      if (projectId) await fbSaveAsset(projectId, 'characters', charId, assetData);
      log(`${char.name} 레퍼런스 재생성 → 공유 에셋 업데이트 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single asset from library ========
  const regenerateAsset = async (assetType, assetId, customPrompt) => {
    const asset = sharedAssets[assetType]?.[assetId];
    if (!asset) return;
    setRunning(true);
    try {
      log(`${asset.name} 에셋 재생성 중...`);
      let finalPrompt, opts = {};
      if (customPrompt) {
        finalPrompt = customPrompt;
        if (assetType === 'backgrounds') opts.aspectRatio = '16:9';
        else if (assetType === 'props') opts.aspectRatio = '1:1';
      } else {
        let suffix = '';
        if (assetType === 'characters') suffix = getCharSuffix();
        else if (assetType === 'backgrounds') { suffix = getBgSuffix(); opts.aspectRatio = '16:9'; }
        else if (assetType === 'props') { suffix = getPropSuffix(); opts.aspectRatio = '1:1'; }
        finalPrompt = asset.refPrompt + suffix;
      }
      const images = await callImage(finalPrompt, opts);
      const updated = {...asset, image: images[0], refPrompt: customPrompt || asset.refPrompt};
      setSharedAssets(prev => ({...prev, [assetType]: {...prev[assetType], [assetId]: updated}}));
      if (assetType === 'characters') setReferences(prev => ({...prev, characters: {...prev.characters, [assetId]: images[0]}}));
      if (assetType === 'backgrounds') setReferences(prev => ({...prev, backgrounds: {...prev.backgrounds, [assetId]: images[0]}}));
      if (projectId) await fbSaveAsset(projectId, assetType, assetId, updated);
      log(`${asset.name} 에셋 재생성 완료`, 'success');
    } catch(e) { log(`에셋 재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // Save Project & Episodes
  const saveProject = async () => {
    try {
      if (!projectId || !projectTitle) {
        const id = projectId || 'proj_' + Date.now();
        if (!projectId) setProjectId(id);
        await fbSaveProject(id, {title: projectTitle || '무제'});
      }

      // If no episode selected, create first one
      if (!currentEpisode) {
        await createNewEpisode();
        return;
      }

      // Save episode metadata
      const episodeTitle = analysis?.title || `${currentEpisode}화`;
      const episodeData = {
        title: episodeTitle,
        number: currentEpisode,
        step,
        completedSteps: [...completedSteps],
        createdAt: episodes.find(e => e.number === currentEpisode)?.createdAt || new Date().toISOString(),
      };
      await fbSaveEpisode(projectId, currentEpisode, episodeData);

      // Save phases
      if (analysis) await fbSavePhase(projectId, currentEpisode, 'step1_analysis', {analysis, sourceText, inputMode});
      if (Object.keys(references.characters).length > 0) await fbSavePhase(projectId, currentEpisode, 'step2_references', {characterIds: Object.keys(references.characters), backgroundIds: Object.keys(references.backgrounds), hasImages: true}, true);
      if (storyboard.length > 0) await fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard});
      if (panels.some(p => p)) await fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels});

      // Update episodes state with saved info
      setEpisodes(prev => prev.map(e =>
        e.number === currentEpisode
          ? {...e, title: episodeTitle, step, completedSteps: [...completedSteps]}
          : e
      ));

      log('프로젝트 저장 완료', 'success');
    } catch(e) { log('저장 실패: ' + e.message, 'error'); }
  };

  const loadProject = async (pid) => {
    try {
      log('프로젝트 로드 중...');
      const proj = await fbLoadProject(pid);
      setProjectId(pid);
      setProjectTitle(proj.title || '');

      // Load shared assets
      try {
        const assets = await fbLoadAllAssets(pid);
        setSharedAssets(assets);
        const totalAssets = Object.keys(assets.characters).length + Object.keys(assets.backgrounds).length + Object.keys(assets.props).length;
        if (totalAssets > 0) log(`공유 에셋 ${totalAssets}개 로드 완료`, 'success');
      } catch(e) { log('공유 에셋 로드 실패: ' + e.message, 'error'); }

      // Load LoRA models
      try { await loadLoraModels(pid); } catch(e) { /* ignore */ }

      // Load episodes
      const episodeList = await fbListEpisodes(pid);
      setEpisodes(episodeList);

      if (episodeList.length > 0) {
        await loadEpisode(episodeList[0].number, pid);
      } else {
        // Create first episode if none exist
        const newEpisode = {number: 1, title: '1화', createdAt: new Date().toISOString()};
        setEpisodes([newEpisode]);
        setCurrentEpisode(1);
      }

      setShowProjects(false);
      log('프로젝트 로드 완료', 'success');
    } catch(e) { log('로드 실패: ' + e.message, 'error'); }
  };

  const loadProjectList = async () => {
    try { setProjectList(await fbListProjects()); } catch(e) { /* Firebase not configured yet */ }
  };

  // Auto-load project list when no project is selected
  useEffect(() => {
    if (!projectId) loadProjectList();
  }, [projectId]);

  // Auto-load API keys from Firestore on mount (cross-browser sync)
  const [, forceUpdate] = useState(0);
  useEffect(() => {
    waitForApiKeySync().then(synced => {
      if (synced > 0) {
        log(`API 키 ${synced}개가 서버에서 동기화되었습니다`, 'success');
        forceUpdate(n => n + 1); // re-render to reflect key status
      }
    });
  }, []);

  // ======== Save Panel Image (delegates to shared downloadDataUrl) ========
  const savePanelImage = (dataUrl, filename) => downloadDataUrl(dataUrl, filename || 'panel.png');

  // Firebase에 전체 패널 명시적 저장
  const savePanelsToFirebase = async () => {
    if (!projectId || !currentEpisode) { log('프로젝트/에피소드를 먼저 선택하세요', 'error'); return; }
    const count = panels.filter(Boolean).length;
    if (count === 0) { log('저장할 패널 이미지가 없습니다', 'error'); return; }
    try {
      setRunning(true);
      log(`패널 ${count}개 Firebase 저장 중...`, 'info');
      await fbSavePhase(projectId, currentEpisode, 'step4_panels', {panels, bubbleOverlays});
      // 스토리보드도 함께 저장 (프롬프트 수정사항 포함)
      if (storyboard.length > 0) {
        await fbSavePhase(projectId, currentEpisode, 'step3_storyboard', {storyboard});
      }
      const cs = [...new Set([...completedSteps, 0, 1, 2, 3])];
      await fbSaveEpisode(projectId, currentEpisode, {step: 4, completedSteps: cs});
      updateEpisodeState(4, cs);
      log(`✓ 패널 ${count}개 Firebase 저장 완료! 다시 불러올 수 있습니다.`, 'success');
    } catch(e) { log(`Firebase 저장 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // PDF 내보내기
  // 새 창으로 보기: 현재 앱 데이터를 직접 전달 (Firebase 불필요)
  const openViewerLocal = () => {
    window.__webtoonData = {
      panels: [...panels],
      storyboard: [...storyboard],
      bubbleOverlays: [...bubbleOverlays],
      analysis,
      title: analysis?.title || projectTitle || '웹툰',
      episodeNum: currentEpisode || 1,
      projectId,
    };
    window.open('/viewer.html?source=local', '_blank');
  };

  const exportWebtoonPDF = async () => {
    const validPanels = storyboard.map((sb, i) => panels[i] ? {img: panels[i], sb, idx: i} : null).filter(Boolean);
    if (validPanels.length === 0) { log('내보낼 패널 이미지가 없습니다', 'error'); return; }
    try {
      setRunning(true);
      log(`PDF 내보내기 시작... (${validPanels.length}개 패널, 말풍선 합성 포함)`, 'info');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({orientation: 'portrait', unit: 'mm', format: 'a4'});
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const margin = 5;
      const contentW = pageW - margin * 2;

      for (let i = 0; i < validPanels.length; i++) {
        if (i > 0) pdf.addPage();
        const {img, sb, idx} = validPanels[i];

        // 말풍선 오버레이가 있으면 합성된 이미지 사용
        let finalImg = img;
        if (bubbleOverlays.length > 0) {
          try {
            const merged = await flattenPanelWithBubbles(idx);
            if (merged && merged !== img) finalImg = merged;
          } catch(e) { /* use original */ }
        }

        const image = await new Promise((resolve, reject) => {
          const im = new Image(); im.crossOrigin = 'anonymous';
          im.onload = () => resolve(im); im.onerror = reject; im.src = finalImg;
        });

        const imgRatio = image.width / image.height;
        let drawW = contentW;
        let drawH = drawW / imgRatio;
        const maxH = pageH - margin * 2 - 4;
        if (drawH > maxH) { drawH = maxH; drawW = drawH * imgRatio; }
        const x = (pageW - drawW) / 2;
        const y = margin;

        const format = finalImg.startsWith('data:image/png') ? 'PNG' : 'JPEG';
        pdf.addImage(finalImg, format, x, y, drawW, drawH);

        log(`패널 ${idx + 1}/${validPanels.length} 추가 완료`, 'info');
      }

      const title = analysis?.title || 'webtoon';
      const epLabel = currentEpisode ? `_ep${currentEpisode}` : '';
      pdf.save(`${title}${epLabel}.pdf`);
      log(`✓ PDF 내보내기 완료! (${validPanels.length}개 패널)`, 'success');
    } catch(e) {
      log(`PDF 내보내기 실패: ${e.message}`, 'error');
      console.error('PDF export error:', e);
    } finally { setRunning(false); }
  };

  // ======== RENDER ========
  const showPreview = (src, title) => { setPreviewImage(src); setPreviewTitle(title || ''); };

  // Helper: get full prompt for asset type (uses current art style)
  const getCharSuffix = () => ', character reference sheet, full body, front view, clean background' + (artStyle === 'custom' ? (customStylePrompt ? ', ' + customStylePrompt : '') : ((ART_STYLES[artStyle] || ART_STYLES.naverWebtoon).charSuffix || ''));
  const getBgSuffix = () => ', no characters, detailed environment, wide shot' + (artStyle === 'custom' ? (customStylePrompt ? ', ' + customStylePrompt : '') : ((ART_STYLES[artStyle] || ART_STYLES.naverWebtoon).bgSuffix || ''));
  const getPropSuffix = () => ', single object, centered, clean white background, detailed illustration' + (artStyle === 'custom' ? (customStylePrompt ? ', ' + customStylePrompt : '') : ((ART_STYLES[artStyle] || ART_STYLES.naverWebtoon).propSuffix || ''));

  const getAssetFullPrompt = (assetType, refPrompt) => {
    if (assetType === 'characters') return refPrompt + getCharSuffix();
    if (assetType === 'backgrounds') return refPrompt + getBgSuffix();
    if (assetType === 'props') return refPrompt + getPropSuffix();
    return refPrompt;
  };

  return (
    <div>
      {/* Prompt Editor Modal */}
      {promptEditor && (
        <div className="prompt-editor-overlay" onClick={closePromptEditor}>
          <div className="prompt-editor-box" onClick={e => e.stopPropagation()}>
            <h3>프롬프트 편집: {promptEditor.title}</h3>
            <textarea value={editedPrompt} onChange={e => setEditedPrompt(e.target.value)} placeholder="이미지 생성 프롬프트를 입력하세요..." />
            <div className="btn-row">
              <button className="btn btn-outline btn-sm" onClick={closePromptEditor}>취소</button>
              {promptEditor.onSaveOnly && (
                <button className="btn btn-outline btn-sm" onClick={() => {
                  const p = editedPrompt.trim();
                  if (!p) return;
                  closePromptEditor();
                  promptEditor.onSaveOnly(p);
                }}>프롬프트만 저장</button>
              )}
              <button className="btn btn-primary btn-sm" disabled={running} onClick={() => {
                const p = editedPrompt.trim();
                if (!p) return;
                closePromptEditor();
                promptEditor.onSubmit(p);
              }}>저장 후 이미지 생성</button>
            </div>
          </div>
        </div>
      )}

      {/* Image Preview Modal */}
      {previewImage && (
        <div className="img-modal-overlay" onClick={() => setPreviewImage(null)}>
          <div className="img-modal-content" onClick={e => e.stopPropagation()}>
            <button className="img-modal-close" onClick={() => setPreviewImage(null)}>×</button>
            <img src={previewImage} alt={previewTitle} />
            <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:12,padding:'8px 0'}}>
              {previewTitle && <span className="img-modal-title" style={{padding:0,margin:0}}>{previewTitle}</span>}
              <button onClick={()=>savePanelImage(previewImage, (previewTitle || 'image').replace(/[^a-zA-Z0-9가-힣]/g,'_') + '.png')} style={{background:'#27ae60',color:'#fff',border:'none',borderRadius:8,padding:'6px 16px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>💾 이미지 저장</button>
            </div>
          </div>
        </div>
      )}
      {/* Header */}
      <div className="app-header">
        <div className="app-logo">웹툰 프로덕션</div>
        <div style={{flex:1}}></div>
        {projectId && <button className="api-key-btn" onClick={()=>setShowAssetLibrary(true)} style={{background:'linear-gradient(135deg,#00b894,#00cec9)',color:'#fff',borderColor:'transparent'}}>에셋 라이브러리 ({Object.keys(sharedAssets.characters).length + Object.keys(sharedAssets.backgrounds).length + Object.keys(sharedAssets.props).length})</button>}
        <button className="api-key-btn" onClick={()=>setShowApiModal(true)}>API 설정</button>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <label>이미지 생성</label>
        <select className="form-select" style={{width:160}} value={imageProvider} onChange={e=>setImageProvider(e.target.value)}>
          <option value="falAI">FLUX + ControlNet (fal.ai)</option>
          <option value="stableDiffusion">Stable Diffusion 3.5</option>
          <option value="imagen4">Imagen 4 (고품질)</option>
          <option value="nanoBanana">Gemini (레퍼런스 반영)</option>
        </select>
        <label style={{marginLeft:16}}>아트 스타일</label>
        <select className="form-select" style={{width:150,background:'linear-gradient(135deg,#ffecd2,#fcb69f)',borderColor:'#f8a879'}} value={artStyle} onChange={e=>setArtStyle(e.target.value)}>
          {Object.entries(ART_STYLES).map(([key, style]) => (
            <option key={key} value={key}>{style.name}</option>
          ))}
        </select>
        {artStyle === 'custom' && (
          <div style={{position:'relative',display:'inline-flex',alignItems:'center'}}>
            <input className="form-input" value={customStylePrompt} onChange={e=>setCustomStylePrompt(e.target.value)} placeholder="스타일 프롬프트 입력..." style={{width:280,borderColor:'#f8a879',background:'#fff8f0'}} />
            {customStylePrompt && <span style={{position:'absolute',right:8,fontSize:10,color:'var(--success)',fontWeight:600}}>적용됨</span>}
          </div>
        )}
      </div>

      {/* ===== Webtoon Bubble Editor ===== */}
      {bubbleEditorOpen && editorPages.length > 0 && (
        <div className="be-overlay">
          <input ref={imageInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImageFileInsert} />

          {/* Header */}
          <div className="be-header">
            <span className="be-title">페이지 기반 웹툰 에디터</span>
            <div className="be-divider" />
            {Object.entries(BUBBLE_TYPES).map(([key, bt]) => (
              <button key={key} className="btn btn-outline btn-sm be-btn" onClick={() => addBubbleToPage(key)}>+ {bt.name}</button>
            ))}
            <div className="be-divider" />
            <button className="btn btn-outline btn-sm be-btn-img" onClick={() => imageInputRef.current?.click()}>+ 이미지 삽입</button>
            <div style={{flex:1}} />
            <div className="be-ctrl">
              <label className="be-ctrl-label">줌</label>
              <input type="range" min="50" max="200" value={editorPanelScale} onChange={e => setEditorPanelScale(parseInt(e.target.value))} style={{width:60,height:3}} />
              <span className="be-ctrl-val" style={{minWidth:24}}>{editorPanelScale}%</span>
            </div>
            <div className="be-divider" />
            <button className="btn btn-outline btn-sm be-btn-export" onClick={async () => {
              for (let i = 0; i < editorPages.length; i++) {
                const jpegUrl = await exportPageAsJpeg(i);
                if (jpegUrl) downloadDataUrl(jpegUrl, `${analysis?.title || 'page'}_${i+1}.jpg`);
              }
              log(`전체 ${editorPages.length}페이지 JPG 내보내기 완료`, 'success');
            }}>전체 페이지 JPG 내보내기</button>
            <button className="btn btn-success btn-sm" onClick={closeBubbleEditor} style={{fontSize:12}}>완료</button>
          </div>

          <div className="be-body">
            {/* Main canvas area — all pages stacked vertically */}
            <div className="be-canvas" ref={editorCanvasRef}>
              {editorPages.map((page, pageIdx) => {
                const scale = editorPanelScale / 100;
                const displayW = PAGE_W * scale;
                const displayH = PAGE_H * scale;
                const isFocused = pageIdx === currentPageIdx;
                return (
                  <React.Fragment key={page.id}>
                    {/* Page header bar */}
                    <div className={`be-page-bar${isFocused ? ' focused' : ''}`}
                      onClick={() => setCurrentPageIdx(pageIdx)}>
                      <span style={{fontWeight:700}}>페이지 {pageIdx + 1}</span>
                      <span style={{fontSize:10,color:'#888'}}>({page.objects.length}개 객체)</span>
                      <div style={{flex:1}} />
                      <button className="be-page-bar-btn" onClick={async (e) => {
                        e.stopPropagation();
                        const jpegUrl = await exportPageAsJpeg(pageIdx);
                        if (jpegUrl) { downloadDataUrl(jpegUrl, `${analysis?.title || 'page'}_${pageIdx+1}.jpg`); log(`페이지 ${pageIdx+1} JPG 내보내기 완료`, 'success'); }
                      }}>JPG 저장</button>
                      {editorPages.length > 1 && (
                        <button className="be-page-bar-btn del" onClick={(e) => { e.stopPropagation(); deletePage(pageIdx); }}>삭제</button>
                      )}
                    </div>
                    {/* Page canvas */}
                    <div className={`be-page-canvas${isFocused ? ' focused' : ''}`}
                      style={{width: displayW, height: displayH, position:'relative'}}
                      onClick={() => setCurrentPageIdx(pageIdx)}>
                      {/* Render all objects in z-order */}
                      {[...page.objects].sort((a, b) => (a.zIndex || 1) - (b.zIndex || 1)).map(obj => {
                        const isSelected = selectedObjectId === obj.id;
                        if (obj.type === 'panel' || obj.type === 'image') {
                          return (
                            <div key={obj.id} className={`be-obj${isSelected ? ' selected' : ''}`}
                              style={{
                                left: obj.x * scale, top: obj.y * scale, width: obj.w * scale, height: obj.h * scale,
                                zIndex: obj.zIndex || 1
                              }}
                              onMouseDown={(e) => {
                                setCurrentPageIdx(pageIdx);
                                setSelectedObjectId(obj.id);
                                setSelectedObjectType(obj.type);
                                if (['TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.dataset.resize) return;
                                e.preventDefault();
                                dragRef.current = {type:'move', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origX:obj.x, origY:obj.y};
                              }}>
                              <img src={obj.src} className="be-obj-img" draggable={false} />
                              {isSelected && <>
                                <div data-resize="true" className="be-resize"
                                  onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                    dragRef.current = {type:'resize', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origW:obj.w, origH:obj.h};
                                  }}/>
                                <button className="be-delete" onClick={(e) => {e.stopPropagation(); deletePageObject(pageIdx, obj.id);}}>×</button>
                              </>}
                            </div>
                          );
                        } else if (obj.type === 'bubble') {
                          const bt = BUBBLE_TYPES[obj.bubbleStyle] || BUBBLE_TYPES.speech;
                          const tailPos = obj.tailPos ?? 0.3;
                          const tailSz = obj.tailSize ?? 1.0;
                          const svgH = (obj.h + (bt.tail ? 18 * tailSz : 0)) * scale;
                          return (
                            <div key={obj.id} className={`be-bubble${isSelected ? ' selected' : ''}`}
                              style={{left: obj.x * scale, top: obj.y * scale, width: obj.w * scale, height: svgH, zIndex: obj.zIndex || 1}}
                              onMouseDown={(e) => {
                                setCurrentPageIdx(pageIdx);
                                setSelectedObjectId(obj.id);
                                setSelectedObjectType('bubble');
                                if (['TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.dataset.resize) return;
                                e.preventDefault();
                                dragRef.current = {type:'move', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origX:obj.x, origY:obj.y};
                              }}>
                              <svg width={obj.w * scale} height={svgH} className="be-bubble-svg" style={{filter: bt.shadow ? 'drop-shadow(0 2px 4px rgba(0,0,0,0.4))' : 'none'}}>
                                {bt.plainText ? (
                                  <rect x="0" y="0" width={obj.w*scale} height={obj.h*scale} rx="3" ry="3"
                                    fill={bt.bg} stroke="none"/>
                                ) : bt.spiky ? (() => {
                                  const cx=obj.w*scale/2, cy=obj.h*scale/2, pts=[];
                                  for(let s=0;s<24;s++){const a=(Math.PI*s)/12-Math.PI/2,rx=s%2===0?obj.w*scale/2:obj.w*scale/2.6,ry=s%2===0?obj.h*scale/2:obj.h*scale/2.6;pts.push(`${cx+Math.cos(a)*rx},${cy+Math.sin(a)*ry}`);}
                                  return <polygon points={pts.join(' ')} fill={bt.bg} stroke={bt.border} strokeWidth={bt.borderWidth||2}/>;
                                })() : bt.ellipse ? (() => {
                                  const cx = obj.w*scale/2, cy = obj.h*scale/2;
                                  const rx = obj.w*scale/2 - 2, ry = obj.h*scale/2 - 2;
                                  const bw = bt.borderWidth || 2;
                                  const strokeColor = bt.border==='none'?'transparent':bt.border;
                                  const dash = bt.dashed ? '6 4' : 'none';
                                  if (bt.tail) {
                                    const tx = obj.w*scale*tailPos;
                                    const tw = 12*tailSz*scale, th = 18*tailSz*scale;
                                    const tailTipX = tx, tailTipY = obj.h*scale + th;
                                    // Tail base contact points on ellipse bottom
                                    const tlx = tx - tw, trx2 = tx + tw * 0.8;
                                    const tly = cy + ry * Math.sqrt(Math.max(0, 1 - Math.pow((tlx - cx) / rx, 2)));
                                    const trry = cy + ry * Math.sqrt(Math.max(0, 1 - Math.pow((trx2 - cx) / rx, 2)));
                                    return (<>
                                      {/* Fill layers: ellipse + tail, same color, overlapping */}
                                      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={bt.bg} stroke="none"/>
                                      <path d={`M ${tlx} ${tly} Q ${(tlx+tailTipX)/2} ${tly+th*0.4} ${tailTipX} ${tailTipY} Q ${(trx2+tailTipX)/2} ${trry+th*0.4} ${trx2} ${trry} Z`} fill={bt.bg} stroke="none"/>
                                      {/* Border: ellipse outline */}
                                      <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill="none" stroke={strokeColor} strokeWidth={bw} strokeDasharray={dash}/>
                                      {/* Border: tail outer edges only (no base line) */}
                                      <path d={`M ${tlx} ${tly} Q ${(tlx+tailTipX)/2} ${tly+th*0.4} ${tailTipX} ${tailTipY} Q ${(trx2+tailTipX)/2} ${trry+th*0.4} ${trx2} ${trry}`} fill="none" stroke={strokeColor} strokeWidth={bw} strokeDasharray={dash}/>
                                      {/* Cover junction: white fill strip to hide ellipse border where tail meets */}
                                      <path d={`M ${tlx+1} ${tly-1} L ${trx2-1} ${trry-1} L ${trx2-1} ${trry+3} L ${tlx+1} ${tly+3} Z`} fill={bt.bg} stroke="none"/>
                                    </>);
                                  } else {
                                    return <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={bt.bg} stroke={strokeColor} strokeWidth={bw} strokeDasharray={dash}/>;
                                  }
                                })() : (
                                  <>
                                    <rect x="1" y="1" width={obj.w*scale-2} height={obj.h*scale-2} rx={(bt.radius||8)*scale} ry={(bt.radius||8)*scale}
                                      fill={bt.bg} stroke={bt.border==='none'?'transparent':bt.border} strokeWidth={bt.borderWidth||2}
                                      strokeDasharray={bt.dashed?'6 4':'none'}/>
                                    {bt.tail && (() => {
                                      const tx=obj.w*scale*tailPos, tw=8*tailSz*scale, th=16*tailSz*scale;
                                      return <polygon points={`${tx-tw},${obj.h*scale-2} ${tx},${obj.h*scale+th} ${tx+tw*1.5},${obj.h*scale-2}`} fill={bt.bg} stroke={bt.border==='none'?'transparent':bt.border} strokeWidth={bt.borderWidth||2}/>;
                                    })()}
                                  </>
                                )}
                              </svg>
                              <textarea className="be-bubble-text" value={obj.text} onChange={(e) => updatePageObject(pageIdx, obj.id, {text: e.target.value})}
                                placeholder={bt.name+'...'} onClick={() => { setCurrentPageIdx(pageIdx); setSelectedObjectId(obj.id); }}
                                style={{width:obj.w*scale-12, height:obj.h*scale-8, fontWeight:bt.fontWeight, fontSize:(obj.fontSize||14)*scale, color:bt.color||'#111', fontFamily:obj.fontFamily||"'Noto Sans KR',sans-serif"}}/>
                              {isSelected && <>
                                <div data-resize="true" className="be-resize"
                                  onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                    dragRef.current = {type:'resize', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origW:obj.w, origH:obj.h};
                                  }}/>
                                <button className="be-delete" onClick={(e) => {e.stopPropagation(); deletePageObject(pageIdx, obj.id);}}>×</button>
                              </>}
                            </div>
                          );
                        }
                      })}
                    </div>
                  </React.Fragment>
                );
              })}
              {/* Add page button at bottom */}
              <div className="be-add-page-bottom" onClick={addPage}>
                + 새 페이지 추가
              </div>
            </div>

            {/* Right sidebar — shows focused page objects */}
            <div className="be-sidebar">
              <div className="be-sidebar-title">페이지 {currentPageIdx + 1} 객체</div>
              {editorPages[currentPageIdx]?.objects.length === 0 && <div className="be-sidebar-empty">상단 버튼으로 말풍선이나 이미지를 추가하세요.</div>}
              {editorPages[currentPageIdx]?.objects.map((obj, oi) => {
                const isSelected = selectedObjectId === obj.id;
                if (obj.type === 'bubble') {
                  const bt = BUBBLE_TYPES[obj.bubbleStyle] || BUBBLE_TYPES.speech;
                  return (
                    <div key={obj.id} className={`be-item${isSelected?' selected':''}`} onClick={() => setSelectedObjectId(obj.id)}>
                      <div className="be-item-header">
                        <span className={`be-item-label${isSelected?' selected':''}`}>{oi+1}. 말풍선 ({bt.name})</span>
                        <button className="be-item-del" onClick={(e) => {e.stopPropagation(); deletePageObject(currentPageIdx, obj.id);}}>삭제</button>
                      </div>
                      <textarea className="be-textarea" value={obj.text} onChange={(e) => updatePageObject(currentPageIdx, obj.id, {text: e.target.value})}
                        placeholder="텍스트 입력..." onClick={(e) => e.stopPropagation()} />
                      <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>폰트</label>
                        <select className="be-select" value={obj.fontFamily || "'Noto Sans KR',sans-serif"} onClick={e=>e.stopPropagation()}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {fontFamily: e.target.value})}>
                          {FONT_LIST.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
                        </select>
                      </div>
                      <div className="be-ctrl-row">
                        <label className="be-ctrl-label">크기</label>
                        <input type="range" min="8" max="48" value={obj.fontSize||14} onChange={e => updatePageObject(currentPageIdx, obj.id, {fontSize: parseInt(e.target.value)})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:20}}>{obj.fontSize||14}</span>
                      </div>
                      {bt.tail && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>꼬리위치</label>
                        <input type="range" min="10" max="90" value={Math.round((obj.tailPos??0.3)*100)}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {tailPos: parseInt(e.target.value)/100})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:24}}>{Math.round((obj.tailPos??0.3)*100)}%</span>
                      </div>}
                      {bt.tail && <div className="be-ctrl-row">
                        <label className="be-ctrl-label" style={{flexShrink:0}}>꼬리크기</label>
                        <input type="range" min="30" max="250" value={Math.round((obj.tailSize??1.0)*100)}
                          onChange={e => updatePageObject(currentPageIdx, obj.id, {tailSize: parseInt(e.target.value)/100})} style={{flex:1,height:4}}/>
                        <span className="be-ctrl-val" style={{minWidth:24}}>{Math.round((obj.tailSize??1.0)*100)}%</span>
                      </div>}
                      <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                        {Object.entries(BUBBLE_TYPES).map(([key, t]) => (
                          <button key={key} className={`be-type-btn${obj.bubbleStyle===key?' active':''}`}
                            onClick={(e) => {e.stopPropagation(); updatePageObject(currentPageIdx, obj.id, {bubbleStyle: key});}}>{t.name}</button>
                        ))}
                      </div>
                    </div>
                  );
                } else {
                  return (
                    <div key={obj.id} className={`be-item${isSelected?' selected':''}`} onClick={() => setSelectedObjectId(obj.id)}>
                      <div className="be-item-header">
                        <span className={`be-item-label${isSelected?' selected':''}`}>{oi+1}. {obj.type === 'panel' ? '패널' : '이미지'}</span>
                        <button className="be-item-del" onClick={(e) => {e.stopPropagation(); deletePageObject(currentPageIdx, obj.id);}}>삭제</button>
                      </div>
                      <div style={{fontSize:11,color:'#aaa',padding:6}}>크기: {Math.round(obj.w)}×{Math.round(obj.h)} | 위치: ({Math.round(obj.x)}, {Math.round(obj.y)})</div>
                    </div>
                  );
                }
              })}
            </div>
          </div>
        </div>
      )}

      {showApiModal && <ApiKeyModal onClose={()=>setShowApiModal(false)} />}

      {/* Asset Library Modal */}
      {showAssetLibrary && (
        <div className="asset-overlay" onClick={()=>setShowAssetLibrary(false)}>
          <div className="asset-panel" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:18}}>에셋 라이브러리</div>
              <button className="btn-cancel" onClick={()=>setShowAssetLibrary(false)}>닫기</button>
            </div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>프로젝트 전체에서 공유되는 캐릭터, 배경, 소품 에셋입니다. 화가 바뀌어도 동일한 이미지가 사용됩니다.</div>

            <div className="asset-tabs">
              <button className={`asset-tab ${assetTab==='characters'?'active':''}`} onClick={()=>setAssetTab('characters')}>캐릭터 ({Object.keys(sharedAssets.characters).length})</button>
              <button className={`asset-tab ${assetTab==='backgrounds'?'active':''}`} onClick={()=>setAssetTab('backgrounds')}>배경 ({Object.keys(sharedAssets.backgrounds).length})</button>
              <button className={`asset-tab ${assetTab==='props'?'active':''}`} onClick={()=>setAssetTab('props')}>소품 ({Object.keys(sharedAssets.props).length})</button>
            </div>

            {Object.keys(sharedAssets[assetTab]).length === 0 && (
              <div className="placeholder">등록된 {assetTab === 'characters' ? '캐릭터' : assetTab === 'backgrounds' ? '배경' : '소품'} 에셋이 없습니다. 스토리 분석 후 레퍼런스를 생성하면 자동으로 등록됩니다.</div>
            )}

            {Object.entries(sharedAssets[assetTab]).map(([id, asset]) => (
              <div key={id} className="asset-item">
                {asset.image ? (
                  <img className="clickable-img" src={asset.image} alt={asset.name} style={assetTab==='backgrounds'?{width:120,height:80,aspectRatio:'16/9'}:assetTab==='props'?{width:80,height:80,aspectRatio:'1/1'}:{}} onClick={() => showPreview(asset.image, asset.name)} />
                ) : (
                  <div className="asset-placeholder">미생성</div>
                )}
                <div className="asset-item-info">

                        <div className="panel-num">{i+1}</div>
                        {panels[i] ? (
                          <img className="clickable-img" src={panels[i]} alt={`Panel ${i+1}`} onClick={() => showPreview(panels[i], `패널 ${i+1}: ${panel.description?.substring(0,60) || ""}`)} />
                        ) : (
                          <div className="panel-placeholder">{running ? '생성 대기...' : '미생성'}</div>
                        )}
                        <div className="panel-info">
                          <span className="tag tag-mood" style={{fontSize:10}}>{panel.type}</span> <span className="text-xs">{panel.description?.substring(0, 40)}</span>
                          <details style={{marginTop:2}}>
                            <summary className="prompt-badge">프롬프트</summary>
                            <div className="text-xs" style={{padding:'4px 0',lineHeight:1.4,fontFamily:'monospace',maxHeight:80,overflow:'auto'}}>{panel.imagePrompt?.substring(0,300)}</div>
                          </details>
                          <div className="action-bar">
                            <button className="btn btn-outline btn-xs"
                              onClick={() => openPromptEditor('panel', i, panel.imagePrompt, `패널 ${i+1}`,
                                (p) => regeneratePanel(i, p),
                                (p) => { const newSb=[...storyboard]; newSb[i]={...newSb[i],imagePrompt:p}; setStoryboard(newSb); log(`패널 ${i+1} 프롬프트 저장됨`,'success'); }
                              )} disabled={running}>수정</button>
                            {panels[i] ? (<>
                              <button className="btn btn-outline btn-xs" onClick={()=>regeneratePanel(i)} disabled={running}>재생성</button>
                              <button className="btn btn-success btn-xs" onClick={()=>savePanelImage(panels[i], `panel_${i+1}.png`)}>저장</button>
                            </>) : (
                              <button className="btn btn-primary btn-xs" onClick={()=>regeneratePanel(i)} disabled={running}>생성</button>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ===== STEP 4: Webtoon Preview ===== */}
              {step === 4 && (
                <div className="flex-col">
                  <div className="flex-row gap-8">
                    <span style={{fontWeight:700,fontSize:15}}>웹툰 미리보기: {analysis?.title || ''}</span>
                    <span className="text-muted">({panels.filter(Boolean).length}개 패널)</span>
                    {panels.filter(Boolean).length > 0 && <>
                      <button className="btn btn-success btn-sm" onClick={savePanelsToFirebase} disabled={running} style={{display:'flex',alignItems:'center',gap:4}}>💾 Firebase 저장</button>
                      <button className="btn btn-primary btn-sm" onClick={openBubbleEditor} style={{display:'flex',alignItems:'center',gap:4}}>💬 웹툰 에디터</button>
                      <button className="btn btn-outline btn-sm" onClick={exportWebtoonPDF} disabled={running} style={{display:'flex',alignItems:'center',gap:4}}>📄 PDF 내보내기</button>
                      <button className="btn btn-outline btn-sm" onClick={() => openViewerLocal()} style={{display:'flex',alignItems:'center',gap:4}}>🔗 새 창으로 보기</button>
                      {projectId && currentEpisode &&
                        <button className="btn btn-outline btn-sm" onClick={() => {
                          const url = `${window.location.origin}/viewer.html?project=${encodeURIComponent(projectId)}&episode=${currentEpisode}`;
                          navigator.clipboard.writeText(url).then(() => log('공유 URL이 클립보드에 복사되었습니다!', 'success')).catch(() => { window.prompt('공유 URL을 복사하세요:', url); });
                        }} style={{display:'flex',alignItems:'center',gap:4}}>📋 공유 URL 복사</button>
                      }
                    </>}
                  </div>

                  {panels.filter(Boolean).length === 0 && <div className="placeholder">패널 이미지를 먼저 생성하세요</div>}

                  <div className="webtoon-strip">
                    {storyboard.map((panel, i) => {
                      if (!panels[i]) return null;
                      return (
                        <div key={i} style={{position:'relative'}}>
                          <img className="clickable-img" src={panels[i]} alt={`Panel ${i+1}`} onClick={() => showPreview(panels[i], `패널 ${i+1}: ${panel.description?.substring(0,60) || ""}`)} />
                          <button onClick={()=>savePanelImage(panels[i], `${analysis?.title || 'webtoon'}_panel_${i+1}.png`)} style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,0.7)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4,transition:'background 0.2s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(39,174,96,0.9)'} onMouseOut={e=>e.currentTarget.style.background='rgba(0,0,0,0.7)'}>💾 저장</button>
                          {/* Dialogue overlay */}
                          {panel.dialogue?.length > 0 && (
                            <div style={{position:'absolute',bottom:8,left:8,right:8,display:'flex',flexDirection:'column',gap:4}}>
                              {panel.dialogue.map((d, di) => (
                                <div key={di} style={{background:'rgba(255,255,255,0.92)',padding:'6px 12px',borderRadius:16,fontSize:13,fontWeight:500,boxShadow:'0 2px 8px rgba(0,0,0,.15)',maxWidth:'80%',alignSelf:di%2===0?'flex-start':'flex-end'}}>
                                  <span style={{fontSize:10,color:'var(--accent)',fontWeight:700}}>{d.speaker}</span><br/>{d.text}
                                </div>
                              ))}
                            </div>
                          )}
                          {panel.narration && (
                            <div style={{position:'absolute',top:8,left:8,right:8,background:'rgba(0,0,0,0.7)',color:'#fff',padding:'6px 12px',borderRadius:8,fontSize:12,fontStyle:'italic'}}>
                              {panel.narration}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}
        </div>

        {/* Log Panel */}
        <div style={{marginTop:12}}>
          <div className="log-toggle" onClick={() => setLogCollapsed(!logCollapsed)}>
            <span>{logCollapsed ? '▶' : '▼'}</span>
            <span>로그 ({logs.length})</span>
            <button className="btn btn-xs" onClick={(e) => {e.stopPropagation(); setLogs([]);}} style={{marginLeft:'auto'}}>초기화</button>
          </div>
          {!logCollapsed && <LogPanel logs={logs} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
