<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹툰 프로덕션</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#f5f5fa;--surface:#ffffff;--surface2:#f0f0f8;--surface3:#e8e8f0;
--border:#d0d0e0;--text:#1a1a2e;--text2:#666688;
--accent:#6c5ce7;--accent2:#7c6cf7;
--success:#00a8a8;--warn:#d4a017;--err:#e74c3c;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),#e0457b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-tabs{display:flex;gap:4px;margin-left:24px;flex:1;}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.api-key-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;}
.api-key-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.api-key-btn.connected{border-color:#27ae60;color:#27ae60;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);}
.status-badge.running{background:#fff3cd;color:#856404;}
.status-badge.done{background:#d4edda;color:#155724;}
.status-badge.error{background:#f8d7da;color:#721c24;}
.main-content{max-width:1400px;margin:0 auto;padding:20px;display:flex;flex-direction:column;height:calc(100vh - 80px);}
.tabs-container{display:flex;gap:12px;height:100%;min-height:0;}
.tab-content{flex:1;display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.tab-content.active{display:flex;}
.tab-content.inactive{display:none;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.1);}
.form-textarea{resize:vertical;min-height:200px;font-family:inherit;}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,92,231,.4);}
.btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-success{background:#27ae60;color:#fff;}
.btn-danger{background:var(--err);color:#fff;}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-block{width:100%;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.scene-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;overflow:hidden;}
.scene-card h3{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--accent);}
.scene-card .scene-num{font-size:11px;color:var(--text2);}
.scene-card .scene-summary{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:10px;}
.scene-card .scene-prompt{background:var(--surface2);border-radius:4px;padding:8px;font-size:11px;font-family:monospace;color:var(--text2);max-height:100px;overflow-y:auto;margin-bottom:8px;}
.scene-card .scene-image{width:100%;aspect-ratio:16/9;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);margin-bottom:8px;font-size:12px;}
.scene-card .scene-image img{width:100%;height:100%;object-fit:cover;}
.scene-card .scene-actions{display:flex;gap:6px;flex-wrap:wrap;}
.scene-card .scene-actions button{flex:1;min-width:60px;padding:6px 8px;font-size:11px;}
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;text-align:center;}
.char-card img{width:100%;height:200px;object-fit:cover;}
.char-card .card-content{padding:10px;}
.char-card .char-name{font-weight:700;color:var(--text);font-size:12px;}
.char-card .char-role{font-size:10px;color:var(--accent);margin-top:2px;}
.char-card .char-desc{font-size:10px;color:var(--text2);margin-top:4px;}
.bg-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;text-align:center;}
.bg-card img{width:100%;height:180px;object-fit:cover;}
.bg-card .card-content{padding:10px;}
.bg-card .bg-name{font-weight:700;color:var(--text);font-size:12px;}
.bg-card .bg-type{font-size:10px;color:var(--accent);margin-top:2px;}
.progress-bar{height:4px;border-radius:2px;background:var(--surface3);overflow:hidden;margin-bottom:12px;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--success));transition:width .5s ease;}
.log-panel{background:#1a1a2e;border-radius:8px;padding:12px;max-height:150px;overflow-y:auto;font-family:'Consolas','Monaco',monospace;font-size:11px;color:#a0a0c0;border:1px solid var(--border);}
.log-entry{margin-bottom:2px;line-height:1.4;}
.log-entry.info{color:#69db7c;}
.log-entry.warn{color:#ffd43b;}
.log-entry.error{color:#ff6b6b;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal-box{background:var(--surface);border-radius:16px;padding:28px;width:460px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.modal-desc{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5;}
.modal-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:var(--surface2);color:var(--text);font-family:monospace;margin-bottom:12px;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end;}
.modal-actions button{padding:10px 20px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:13px;}
.modal-actions .btn-save{background:var(--accent);color:#fff;}
.modal-actions .btn-cancel{background:var(--surface2);color:var(--text2);}
.key-status{display:flex;align-items:center;gap:6px;margin:10px 0;font-size:12px;color:var(--text2);}
.key-status .dot{width:8px;height:8px;border-radius:50%;background:#e03030;}
.key-status .dot.on{background:#27ae60;}
.edit-prompt-area{display:flex;flex-direction:column;gap:8px;background:var(--surface2);padding:10px;border-radius:6px;}
.edit-prompt-area textarea{padding:8px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:monospace;min-height:80px;}
.edit-prompt-area .edit-btns{display:flex;gap:6px;}
.edit-prompt-area button{padding:6px 12px;border-radius:4px;border:none;font-size:11px;cursor:pointer;font-weight:600;}
.placeholder{padding:40px;text-align:center;color:var(--text2);font-size:13px;background:var(--surface);border-radius:8px;border:1px dashed var(--border);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text2);}
@media(max-width:900px){
.grid-2,.grid-3{grid-template-columns:1fr;}
.scene-grid{grid-template-columns:1fr;}
.nav-tabs{flex-wrap:wrap;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ============================================================
// Firebase / Firestore Project Management
// ============================================================
let _db = null;
function getFirebaseConfig() {
  try {
    const raw = localStorage.getItem('firebase_config');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function saveFirebaseConfig(cfg) {
  localStorage.setItem('firebase_config', JSON.stringify(cfg));
  _db = null;
  initFirebase();
}
function initFirebase() {
  const cfg = getFirebaseConfig();
  if (!cfg || !cfg.apiKey || !cfg.projectId) return null;
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(cfg);
    }
    _db = firebase.firestore();
    return _db;
  } catch(e) { console.error('Firebase init error:', e); return null; }
}
function getDb() {
  if (_db) return _db;
  return initFirebase();
}

async function fbListProjects() {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const snap = await db.collection('webtoon_projects').orderBy('updatedAt','desc').get();
  return snap.docs.map(d => ({id: d.id, ...d.data()}));
}

async function fbSaveProject(projectId, data) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const ref = db.collection('webtoon_projects').doc(projectId);
  const payload = {
    ...data,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  if (payload.scenes) {
    payload.sceneCount = payload.scenes.length;
  }
  await ref.set(payload, {merge: true});
  return projectId;
}

async function fbLoadProject(projectId) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const doc = await db.collection('webtoon_projects').doc(projectId).get();
  if (!doc.exists) throw new Error('Project not found');
  return {id: doc.id, ...doc.data()};
}

async function fbDeleteProject(projectId) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const phases = await db.collection('webtoon_projects').doc(projectId).collection('phases').get();
  const batch = db.batch();
  phases.docs.forEach(d => batch.delete(d.ref));
  batch.delete(db.collection('webtoon_projects').doc(projectId));
  await batch.commit();
}

async function fbSavePhase(projectId, phaseName, phaseData) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const ref = db.collection('webtoon_projects').doc(projectId).collection('phases').doc(phaseName);
  await ref.set({
    ...phaseData,
    savedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function fbLoadPhase(projectId, phaseName) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const doc = await db.collection('webtoon_projects').doc(projectId).collection('phases').doc(phaseName).get();
  if (!doc.exists) return null;
  return doc.data();
}

async function fbListPhases(projectId) {
  const db = getDb();
  if (!db) throw new Error('Firebase not configured');
  const snap = await db.collection('webtoon_projects').doc(projectId).collection('phases').orderBy('savedAt','desc').get();
  return snap.docs.map(d => ({id: d.id, ...d.data()}));
}

async function autoLoadServerConfig() {
  try {
    const res = await fetch('/api/firebase-config');
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    console.log('[Config] Server config loaded:', data.status);
    if (data.firebase) {
      saveFirebaseConfig(data.firebase);
      console.log('[Config] Firebase auto-configured from server');
    }
    if (data.vertex) {
      if (data.vertex.projectId) localStorage.setItem('VERTEX_PROJECT_ID', data.vertex.projectId);
      if (data.vertex.location) localStorage.setItem('VERTEX_LOCATION', data.vertex.location);
      if (data.vertex.accessToken) localStorage.setItem('VERTEX_ACCESS_TOKEN', data.vertex.accessToken);
      if (data.vertex.grokApiKey) localStorage.setItem('GROK_API_KEY', data.vertex.grokApiKey);
      console.log('[Config] Vertex AI auto-configured from server');
    }
  } catch(e) {
    console.log('[Config] Server config not available, using localStorage:', e.message);
    try { initFirebase(); } catch(e2) {}
  }
}
autoLoadServerConfig();

const {useState,useCallback,useRef,useEffect,useMemo} = React;

// ============================================================
// TOKEN & API KEY MANAGEMENT
// ============================================================

let _cachedToken = null;
let _tokenExpiry = 0;

async function fetchFreshToken() {
  const now = Date.now();
  if (_cachedToken && _tokenExpiry > now + 300000) {
    return _cachedToken;
  }
  try {
    const res = await fetch('/api/vertex-token');
    if (res.ok) {
      const data = await res.json();
      if (data.access_token) {
        _cachedToken = data.access_token;
        _tokenExpiry = now + (data.expires_in || 3600) * 1000;
        localStorage.setItem('VERTEX_ACCESS_TOKEN', data.access_token);
        console.log('[Token] Fresh token obtained from server');
        return _cachedToken;
      }
    }
  } catch(e) {
    console.warn('[Token] Server token fetch failed, falling back to localStorage:', e.message);
  }
  return localStorage.getItem('VERTEX_ACCESS_TOKEN');
}

async function getVertexConfig() {
  const projectId = localStorage.getItem('VERTEX_PROJECT_ID');
  const location = localStorage.getItem('VERTEX_LOCATION') || 'us-central1';
  const accessToken = await fetchFreshToken();
  if (!projectId || !accessToken) throw new Error('Vertex AI config not set');
  return {projectId, location, accessToken};
}

async function getGeminiKey() {
  return (await getVertexConfig()).accessToken;
}

function setGeminiKey(k) { localStorage.setItem('GEMINI_API_KEY', k); }
function hasGeminiKey() { return !!(localStorage.getItem('VERTEX_PROJECT_ID') || localStorage.getItem('GEMINI_API_KEY')); }

function getXaiKey() {
  const k = localStorage.getItem('XAI_API_KEY');
  if (!k) throw new Error('XAI_KEY_MISSING');
  return k;
}

function setXaiKey(k) { localStorage.setItem('XAI_API_KEY', k); }
function hasXaiKey() { return !!localStorage.getItem('XAI_API_KEY'); }

// ============================================================
// API CLIENTS
// ============================================================

async function callGemini(systemPrompt, userPrompt, opts={}) {
  const model = opts.model || 'gemini-2.5-flash';
  const thinkBudget = opts.thinkBudget ?? 0;
  const {projectId, location, accessToken} = await getVertexConfig();
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:generateContent`;
  const body = {
    systemInstruction: {parts:[{text:systemPrompt}]},
    contents: [{role:'user',parts:[{text:userPrompt}]}],
    generationConfig: {
      temperature: opts.temperature || 0.7,
      topP: opts.topP || 0.9,
      maxOutputTokens: opts.maxTokens || 8192,
      thinkingConfig: {thinkingBudget: thinkBudget}
    }
  };
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(body)});
  if(!res.ok) {
    const errText = await res.text();
    throw new Error('Gemini API ' + res.status + ': ' + errText.substring(0,200));
  }
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const textParts = parts.filter(p => p.text && !p.thought);
  return textParts.map(p => p.text).join('');
}

async function callImagen(prompt, opts = {}) {
  const {projectId, location, accessToken} = await getVertexConfig();
  const model = opts.model || 'imagen-4.0-ultra-generate-001';
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:predict`;
  const body = {instances:[{prompt}], parameters:{sampleCount: opts.sampleCount||1, aspectRatio: opts.aspectRatio||'1:1', personGeneration:'allow_all'}};
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(body)});
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('Imagen API ' + res.status + ': ' + errText.substring(0, 200));
  }
  const data = await res.json();
  const predictions = data.predictions;
  if (!predictions || predictions.length === 0) throw new Error('No predictions returned');
  return predictions.map(p => `data:image/png;base64,${p.bytesBase64Encoded}`);
}

async function callNanoBanana(prompt, opts = {}) {
  const {projectId, location, accessToken} = await getVertexConfig();
  const model = opts.model || 'gemini-2.0-flash-preview-image-generation';
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:generateContent`;
  const body = {
    contents: [{role:'user', parts:[{text: prompt}]}],
    generationConfig: {responseModalities: ['TEXT','IMAGE'], temperature: 1.0}
  };
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(body)});
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('NanoBanana API ' + res.status + ': ' + errText.substring(0, 200));
  }
  const data = await res.json();
  const parts = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) || [];
  const imgParts = parts.filter(p => p.inlineData && p.inlineData.mimeType && p.inlineData.mimeType.startsWith('image/'));
  if (imgParts.length === 0) throw new Error('No image generated');
  return imgParts.map(p => `data:${p.inlineData.mimeType};base64,${p.inlineData.data}`);
}

async function callGrokImage(prompt, opts={}) {
  const xaiKey = getXaiKey();
  const url = 'https://api.x.ai/v1/images/generations';
  const body = {
    model: opts.model || 'grok-imagine-image',
    prompt: prompt,
    n: opts.n || 1,
    response_format: 'url'
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + xaiKey
    },
    body: JSON.stringify(body)
  });
  if(!res.ok) {
    const errText = await res.text();
    throw new Error(`Grok Image API ${res.status}: ${errText}`);
  }
  const data = await res.json();
  const images = data.data || [];
  if(images.length === 0) throw new Error('Grok 이미지 생성 결과가 없습니다.');
  return images.map(img => img.url || `data:image/jpeg;base64,${img.b64_json}`);
}

async function callGrok(systemPrompt, userPrompt, opts={}) {
  const xaiKey = getXaiKey();
  const model = opts.model || 'grok-3-mini-fast';
  const url = 'https://api.x.ai/v1/chat/completions';
  const body = {
    model: model,
    messages: [
      {role: 'system', content: systemPrompt},
      {role: 'user', content: userPrompt}
    ],
    temperature: opts.temperature || 0.7,
    stream: false
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + xaiKey
    },
    body: JSON.stringify(body)
  });
  if(!res.ok) {
    const errText = await res.text();
    throw new Error(`Grok API ${res.status}: ${errText}`);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

async function callVeo(prompt, imageBase64, opts={}) {
  const {projectId, location, accessToken} = await getVertexConfig();
  const model = opts.model || 'veo-2.0-generate-001';
  const url = `https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:predictLongRunning`;
  const instances = [{prompt: prompt}];
  if(imageBase64) {
    let b64 = imageBase64.replace(/^data:image\/[^;]+;base64,/,'');
    if (b64.length > 5000000) {
      console.warn('[callVeo] Image base64 too large');
    } else {
      instances[0].image = {bytesBase64Encoded: b64, mimeType: 'image/png'};
    }
  }
  const body = {
    instances,
    parameters: {
      aspectRatio: opts.aspectRatio || '16:9',
      personGeneration: 'allow_all',
      durationSeconds: opts.duration || 5
    }
  };
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken}, body:JSON.stringify(body)});
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('Veo API ' + res.status + ': ' + errText.substring(0, 200));
  }
  const opData = await res.json();
  if (!opData.name) throw new Error('No operation name returned');
  const pollUrl = `https://${location}-aiplatform.googleapis.com/v1/${opData.name}`;
  let attempt = 0;
  while(attempt < 30) {
    await new Promise(r => setTimeout(r, 2000));
    const pollRes = await fetch(pollUrl, {method:'GET', headers:{'Authorization':'Bearer '+accessToken}});
    if (!pollRes.ok) throw new Error('Poll failed: ' + pollRes.status);
    const pollData = await pollRes.json();
    if (pollData.done) {
      if (pollData.response) {
        const predictions = pollData.response.predictions || [];
        if (predictions.length > 0 && predictions[0].mpeg4Bytes) {
          return predictions[0].mpeg4Bytes;
        }
      }
      throw new Error('No video generated');
    }
    attempt++;
  }
  throw new Error('Veo generation timeout');
}

function LongFormOrchestrator({log, activeTab, setActiveTab}) {
  const [phase, setPhase] = useState('IDLE');
  const [sourceText, setSourceText] = useState('');
  const [projectTitle, setProjectTitle] = useState('');
  const [globalAsset, setGlobalAsset] = useState(null);
  const [lfScenes, setLfScenes] = useState([]);
  const lfScenesRef = useRef([]);
  const [phaseHistory, setPhaseHistory] = useState([]);
  const [errorMsg, setErrorMsg] = useState('');
  const [running, setRunning] = useState(false);
  const [currentSceneIdx, setCurrentSceneIdx] = useState(-1);
  const abortRef = useRef(false);
  const [textProvider, setTextProvider] = useState('gemini');
  const [imageProvider, setImageProvider] = useState('imagen4');
  const [enableWebtoon, setEnableWebtoon] = useState(true);
  const [editingPromptIdx, setEditingPromptIdx] = useState(-1);
  const [editingPromptText, setEditingPromptText] = useState('');

  const [projectList, setProjectList] = useState([]);
  const [currentProjectId, setCurrentProjectId] = useState('');
  const [showProjectPanel, setShowProjectPanel] = useState(false);
  const [fbConfig, setFbConfig] = useState(getFirebaseConfig() || {});
  const [fbStatus, setFbStatus] = useState(getDb() ? 'connected' : 'not configured');
  const [savingStatus, setSavingStatus] = useState('');

  useEffect(() => {
    const checkConfig = () => {
      if (getDb()) {
        fbListProjects().then(list => setProjectList(list)).catch(e => console.warn('FB list error:', e));
        setFbStatus('connected');
      }
    };
    checkConfig();
    const timer = setTimeout(checkConfig, 2000);
    return () => clearTimeout(timer);
  }, []);

  const callTextLF = useCallback(async (systemPrompt, userPrompt, opts={}) => {
    if (textProvider === 'grok') {
      return await callGrok(systemPrompt, userPrompt, opts);
    } else {
      return await callGemini(systemPrompt, userPrompt, opts);
    }
  }, [textProvider]);

  const callImageLF = useCallback(async (prompt, opts) => {
    opts = opts || {};
    if (imageProvider === 'grok') {
      return await callGrokImage(prompt);
    } else if (imageProvider === 'nanoBananaPro') {
      return await callNanoBanana(prompt, {model: 'gemini-2.0-pro-preview-image-generation'});
    } else if (imageProvider === 'nanoBanana') {
      return await callNanoBanana(prompt, {model: 'gemini-2.0-flash-preview-image-generation'});
    } else {
      const model = imageProvider === 'imagen4ultra' ? 'imagen-4.0-ultra-generate-001' : 'imagen-4.0-generate-001';
      return await callImagen(prompt, Object.assign({aspectRatio:'9:16', model}, opts));
    }
  }, [imageProvider]);

  const phaseRef = useRef('IDLE');
  useEffect(() => { phaseRef.current = phase; }, [phase]);
  const transition = useCallback((newPhase, errorMessage='') => {
    const cur = phaseRef.current;
    const allowed = STATE_TRANSITIONS[cur];
    if (!allowed || !allowed.includes(newPhase)) { log('[FSM] Invalid: '+cur+' -> '+newPhase, 'error'); return false; }
    phaseRef.current = newPhase;
    setPhase(newPhase);
    setPhaseHistory(prev => [...prev, { phase: newPhase, stamp: new Date().toISOString(), ...(errorMessage && { error: errorMessage }) }]);
    if (newPhase === 'ERROR') setErrorMsg(errorMessage || 'Unknown error');
    log('[FSM] '+cur+' -> '+newPhase, newPhase === 'ERROR' ? 'error' : 'info');
    return true;
  }, [log]);

  const runPhase1 = useCallback(async () => {
    transition('PHASE_1_ANALYZING');
    log('[Phase 1-A] Extracting characters from story...');
    const charRaw = await callTextLF(PROMPTS.CHARACTER_EXTRACTION, sourceText);
    let characters;
    try { characters = JSON.parse(charRaw.replace(/```json\n?|```/g, '').trim()); }
    catch(e) { throw new Error('Character JSON parse failed: '+e.message); }
    log('[Phase 1-A] '+characters.length+' characters extracted');
    if (abortRef.current) throw new Error('Aborted');

    log('[Phase 1-A] Extracting locations...');
    const locRaw = await callTextLF(PROMPTS.LOCATION_EXTRACTION, sourceText);
    let backgrounds;
    try { backgrounds = JSON.parse(locRaw.replace(/```json\n?|```/g, '').trim()); }
    catch(e) { throw new Error('Location JSON parse failed: '+e.message); }
    log('[Phase 1-A] '+backgrounds.length+' locations extracted');
    if (abortRef.current) throw new Error('Aborted');

    transition('PHASE_1_GENERATING_ASSETS');
    for (let i=0; i<characters.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      log('[Phase 1-B] Character image '+(i+1)+'/'+characters.length+': '+characters[i].name);
      try { const urls = await callImageLF(characters[i].referencePrompt+', character sheet, multiple angles, white background, manhwa style');
        characters[i].referenceImageUrl = urls[0]; }
      catch(e) { log('[Phase 1-B] Char image failed: '+e.message, 'warn'); characters[i].referenceImageUrl = null; }
    }
    for (let i=0; i<backgrounds.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      log('[Phase 1-B] Background image '+(i+1)+'/'+backgrounds.length+': '+backgrounds[i].name);
      try { const urls = await callImageLF(backgrounds[i].referencePrompt+', detailed background, no characters, manhwa style');
        backgrounds[i].referenceImageUrl = urls[0]; }
      catch(e) { log('[Phase 1-B] BG image failed: '+e.message, 'warn'); backgrounds[i].referenceImageUrl = null; }
    }
    const asset = { characters, backgrounds, styleGuide:{artStyle:'manhwa',colorPalette:[],moodBoard:''}, createdAt:new Date().toISOString(), version:1 };
    setGlobalAsset(asset);
    transition('PHASE_1_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase1_assets', {globalAsset: asset, sourceTextFull: sourceText}); log('[AutoSave] Phase 1 saved'); } catch(e){log('[AutoSave] Phase 1 error: '+e.message,'warn');} }
    log('[Phase 1] Complete: '+characters.length+' characters, '+backgrounds.length+' backgrounds');
  }, [sourceText, callTextLF, callImageLF, transition, log, currentProjectId]);

  const runPhase2 = useCallback(async () => {
    transition('PHASE_2_SPLITTING');
    log('[Phase 2-A] Splitting story into scenes...');
    const sceneRaw = await callTextLF(PIPELINE_A_SYSTEM.sceneSplit, sourceText, {maxTokens: 16384});
    let scenes;
    try {
      let cleaned = sceneRaw.replace(/```json\n?|```/g, '').trim();
      const arrStart = cleaned.indexOf('[');
      const arrEnd = cleaned.lastIndexOf(']');
      if (arrStart >= 0 && arrEnd > arrStart) { cleaned = cleaned.substring(arrStart, arrEnd + 1); }
      try { scenes = JSON.parse(cleaned); } catch(e1) {
        const lastBrace = cleaned.lastIndexOf('}');
        if (lastBrace > 0) { cleaned = cleaned.substring(0, lastBrace+1) + ']'; scenes = JSON.parse(cleaned); log('[Phase 2] Recovered truncated JSON','warn'); }
        else { throw e1; }
      }
    } catch(e) { throw new Error('Scene split JSON parse failed: ' + e.message); }
    log('[Phase 2-A] '+scenes.length+' scenes identified');
    if (abortRef.current) throw new Error('Aborted');

    transition('PHASE_2_DIRECTING');
    for (let i=0; i<scenes.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = scenes[i];
      log('[Phase 2-B] DP analysis for scene '+(i+1)+'/'+scenes.length);
      const charInfo = (globalAsset?.characters||[]).filter(c=>(sc.keyCharacters||[]).includes(c.id)).map(c=>c.name+': '+c.referencePrompt).join('\n');
      const bgInfo = (globalAsset?.backgrounds||[]).filter(b=>b.id===sc.primaryLocation).map(b=>b.name+': '+b.referencePrompt)[0]||'generic background';
      const dpInput = 'Scene: '+sc.summary+'\nDialogues: '+JSON.stringify(sc.dialogues)+'\nMood: '+sc.narrativeMood+'\n\nAvailable Characters:\n'+charInfo+'\n\nBackground:\n'+bgInfo;
      try { const compRaw = await callTextLF(PROMPTS.DP_COMPOSITION, dpInput, {maxTokens: 16384});
        sc.compositionData = JSON.parse(compRaw.replace(/```json\n?|```/g, '').trim()); }
      catch(e) { log('[Phase 2-B] DP failed scene '+(i+1)+': '+e.message, 'warn'); sc.compositionData = null; }
      sc.status = 'composed';
    }
    lfScenesRef.current = scenes; setLfScenes(scenes);
    transition('PHASE_2_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase2_scenes', {scenes}); log('[AutoSave] Phase 2 saved'); } catch(e){log('[AutoSave] Phase 2 error: '+e.message,'warn');} }
    log('[Phase 2] Complete: '+scenes.length+' scenes with composition data');
  }, [sourceText, globalAsset, callTextLF, transition, log, currentProjectId]);

  const runPhase3 = useCallback(async () => {
    transition('PHASE_3_GENERATING');
    log('[Phase 3] Generating image prompts...');
    const updated = [...lfScenesRef.current];
    for (let i=0; i<updated.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = updated[i];
      log('[Phase 3] Prompt ' + (i+1) + '/' + updated.length);
      if (!sc.compositionData) { log('[Phase 3] Scene ' + (i+1) + ' no composition - skip'); continue; }
      try {
        const comp = sc.compositionData;
        const charDescs = (comp.characterPoses||[]).map(cp => {
          const cr = (globalAsset||{}).characters ? globalAsset.characters.find(ch=>ch.id===cp.characterId) : null;
          return (cr ? cr.referencePrompt : '') + ' ' + (cp.pose||'') + ' pose, ' + (cp.expression||'') + ' expression';
        }).filter(Boolean).join('; ');
        const bgRef = (globalAsset||{}).backgrounds ? globalAsset.backgrounds.find(b=>b.id===sc.primaryLocation) : null;
        const bgDesc = bgRef ? bgRef.referencePrompt : 'detailed background';
        const userMsg = 'Scene: ' + sc.summary + '\nComposition: ' + JSON.stringify(comp) + '\nCharacter prompts: ' + charDescs + '\nBackground: ' + bgDesc;
        const pRaw = await callTextLF(PIPELINE_A_SYSTEM.imagePrompt, userMsg, {maxTokens:4096});
        try { sc.imagePrompt = JSON.parse(pRaw.replace(/```json|\n|```/g,'')); } catch { sc.imagePrompt = {prompt: pRaw}; }
        sc.status = 'prompt_ready';
        log('[Phase 3] Scene ' + (i+1) + ' prompt generated');
      } catch(e) { log('[Phase 3] Scene ' + (i+1) + ' prompt failed: ' + e.message, 'warn'); }
    }
    lfScenesRef.current = updated;
    setLfScenes([...updated]);
    transition('PHASE_3_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase3_prompts', {scenes: updated}); log('[AutoSave] Phase 3 saved'); } catch(e){log('[AutoSave] Phase 3 error: '+e.message,'warn');} }
    log('[Phase 3] Complete - prompts ready');
  }, [globalAsset, callTextLF, transition, log, currentProjectId]);

  const runPhase4 = useCallback(async () => {
    transition('PHASE_4_GENERATING');
    log('[Phase 4] Preparing video motion prompts...');
    const updated = [...lfScenesRef.current];
    for (let i=0; i<updated.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = updated[i];
      log('[Phase 4] Video prompt ' + (i+1) + '/' + updated.length);
      try {
        const sceneInfo = 'Scene: ' + sc.summary + '\nComposition: ' + JSON.stringify(sc.compositionData||{});
        const motionRaw = await callTextLF(PIPELINE_B_SYSTEM.motionPrompt, sceneInfo, {maxTokens:2048});
        sc.videoPrompt = { motionPrompt: motionRaw.trim(), aspectRatio:'9:16', duration:5 };
        log('[Phase 4] Scene ' + (i+1) + ' video prompt ready');
      } catch(e) { log('[Phase 4] Scene ' + (i+1) + ' failed: ' + e.message, 'warn'); }
    }
    lfScenesRef.current = updated;
    setLfScenes([...updated]);
    transition('PHASE_4_COMPLETE');
    if (getDb() && currentProjectId) { try { await fbSavePhase(currentProjectId, 'phase4_video', {scenes: updated}); log('[AutoSave] Phase 4 saved'); } catch(e){log('[AutoSave] Phase 4 error: '+e.message,'warn');} }
    log('[Phase 4] Complete - video prompts ready');
  }, [callTextLF, transition, log, currentProjectId]);

  const runPhase5 = useCallback(async () => {
    if (!enableWebtoon) { log('[Phase 5] Webtoon disabled, skipping'); transition('COMPLETED'); return; }
    transition('PHASE_5_EXPANDING');
    log('[Phase 5] Expanding to webtoon panels...');
    const updated = [...lfScenesRef.current];
    for (let i=0; i<updated.length; i++) {
      if (abortRef.current) throw new Error('Aborted');
      setCurrentSceneIdx(i);
      const sc = updated[i];
      if (!sc.anchorImage) continue;
      log('[Phase 5] Panels for scene '+(i+1)+'/'+updated.length);
      const variations = [
        {type:'close_up', suffix:', extreme close up, face detail, manhwa style'},
        {type:'reaction', suffix:', reaction shot, dramatic expression, manhwa panel style'},
        {type:'wide_establishing', suffix:', wide establishing shot, environment detail, manhwa style'}
      ];
      sc.webtoonAssets = [];
      for (const v of variations) {
        try { const urls = await callImageLF((sc.imagePrompt?.prompt||sc.summary)+v.suffix);
          sc.webtoonAssets.push({templateId:v.type, url:urls[0]}); }
        catch(e) { log('[Phase 5] Panel '+v.type+' failed: '+e.message, 'warn'); }
      }
      sc.status = 'complete';
    }
    lfScenesRef.current = updated; setLfScenes(updated);
    transition('PHASE_5_COMPLETE');
    transition('COMPLETED');
    log('[Phase 5] Complete');
  }, [enableWebtoon, callImageLF, transition, log]);

  const runFullPipeline = useCallback(async () => {
    if (!sourceText.trim()) { log('Source text empty', 'error'); return; }
    setRunning(true); abortRef.current = false; setErrorMsg('');
    try {
      await runPhase1(); if(abortRef.current)return;
      await runPhase2(); if(abortRef.current)return;
      await runPhase3(); if(abortRef.current)return;
      await runPhase4(); if(abortRef.current)return;
      await runPhase5();
    } catch(e) { if(e.message!=='Aborted'){transition('ERROR',e.message);setErrorMsg(e.message);log('Pipeline error: '+e.message,'error');} }
    finally { setRunning(false); }
  }, [sourceText, runPhase1, runPhase2, runPhase3, runPhase4, runPhase5, transition, log]);

  const stopPipeline = () => { abortRef.current=true; setRunning(false); };

  // === Per-scene image generation ===
  const generateSceneImage = useCallback(async (idx) => {
    const scenes = lfScenesRef.current;
    const sc = scenes[idx];
    if (!sc) { setErrorMsg('Scene data not ready'); return; }
    if (!sc.imagePrompt && !sc.compositionData) { setErrorMsg('씬 분할과 P3을 먼저 실행하세요'); return; }
    log('[GenImg] Generating image for scene ' + (idx+1));
    sc.status = 'generating_image';
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    try {
      let prompt;
      if (sc.imagePrompt && typeof sc.imagePrompt === 'object' && sc.imagePrompt.prompt) { prompt = sc.imagePrompt.prompt; }
      else if (typeof sc.imagePrompt === 'string') { prompt = sc.imagePrompt; }
      else { prompt = 'manhwa webtoon style, ' + sc.summary; }
      const comp = sc.compositionData || {};
      const charRefs = ((comp.characterPoses||[]).map(cp => { const cr = (globalAsset||{}).characters ? globalAsset.characters.find(ch=>ch.id===cp.characterId) : null; return cr ? cr.referencePrompt : ''; })).filter(Boolean);
      if (charRefs.length > 0) { prompt += '\nCharacter details: ' + charRefs.join('; '); }
      if (!charRefs.length && sc.keyCharacters && (globalAsset||{}).characters) {
        const kcRefs = sc.keyCharacters.map(cid => { const cr = globalAsset.characters.find(ch=>ch.id===cid); return cr ? cr.referencePrompt : ''; }).filter(Boolean);
        if (kcRefs.length > 0) { prompt += '\nCharacter details: ' + kcRefs.join('; '); }
      }
      const bgRef = (globalAsset||{}).backgrounds ? globalAsset.backgrounds.find(b=>b.id===sc.primaryLocation) : null;
      if (bgRef && bgRef.referencePrompt) { prompt += '\nBackground: ' + bgRef.referencePrompt; }
      const imgResult = await callImageLF(prompt);
      const imgUrl = Array.isArray(imgResult) ? imgResult[0] : imgResult;
      sc.anchorImage = { url: imgUrl, prompt };
      sc.status = sc.video ? 'complete' : 'image_done';
      log('[GenImg] Scene ' + (idx+1) + ' image done');
    } catch(e) { log('[GenImg] Error: ' + e.message); sc.status = 'error'; setErrorMsg('Image gen failed: ' + e.message); }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
  }, [callImageLF, globalAsset, log]);

  // === Regenerate image with edited prompt ===
  const regenerateSceneImageWithPrompt = useCallback(async (idx, newPrompt) => {
    const scenes = lfScenesRef.current;
    const sc = scenes[idx];
    if (!sc) { setErrorMsg('Scene data not ready'); return; }
    log('[RegenImg] Regenerating image for scene ' + (idx+1));
    sc.status = 'generating_image';
    if (sc.imagePrompt && typeof sc.imagePrompt === 'object') { sc.imagePrompt.prompt = newPrompt; }
    else { sc.imagePrompt = { prompt: newPrompt }; }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    try {
      let prompt = newPrompt;
      const comp = sc.compositionData || {};
      const charRefs = ((comp.characterPoses||[]).map(cp => { const cr = (globalAsset||{}).characters ? globalAsset.characters.find(ch=>ch.id===cp.characterId) : null; return cr ? cr.referencePrompt : ''; })).filter(Boolean);
      if (charRefs.length > 0) { prompt += '\nCharacter details: ' + charRefs.join('; '); }
      if (!charRefs.length && sc.keyCharacters && (globalAsset||{}).characters) {
        const kcRefs = sc.keyCharacters.map(cid => { const cr = globalAsset.characters.find(ch=>ch.id===cid); return cr ? cr.referencePrompt : ''; }).filter(Boolean);
        if (kcRefs.length > 0) { prompt += '\nCharacter details: ' + kcRefs.join('; '); }
      }
      const bgRef = (globalAsset||{}).backgrounds ? globalAsset.backgrounds.find(b=>b.id===sc.primaryLocation) : null;
      if (bgRef && bgRef.referencePrompt) { prompt += '\nBackground: ' + bgRef.referencePrompt; }
      const imgResult = await callImageLF(prompt);
      const imgUrl = Array.isArray(imgResult) ? imgResult[0] : imgResult;
      sc.anchorImage = { url: imgUrl, prompt: newPrompt };
      sc.status = sc.video ? 'complete' : 'image_done';
      log('[RegenImg] Scene ' + (idx+1) + ' image regenerated');
    } catch(e) { log('[RegenImg] Error: ' + e.message); sc.status = 'error'; setErrorMsg('Image regen failed: ' + e.message); }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    setEditingPromptIdx(-1);
  }, [callImageLF, globalAsset, log]);

  // === Per-scene video generation ===
  const generateSceneVideo = useCallback(async (idx) => {
    const scenes = lfScenesRef.current;
    const sc = scenes[idx];
    if (!sc) { setErrorMsg('Scene data not ready'); return; }
    if (!sc.anchorImage) { setErrorMsg('이미지를 먼저 생성하세요'); return; }
    log('[GenVid] Generating video for scene ' + (idx+1));
    sc.status = 'generating_video';
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
    try {
      const motionPrompt = (sc.videoPrompt && sc.videoPrompt.motionPrompt) || (sc.compositionData && sc.compositionData.motionHint) || sc.summary;
      let imageB64 = null;
      if (sc.anchorImage && sc.anchorImage.url) {
        const imgUrl = typeof sc.anchorImage.url === 'string' ? sc.anchorImage.url : String(sc.anchorImage.url || '');
        if (imgUrl.startsWith('data:')) { imageB64 = imgUrl.split(',')[1]; }
        else if (imgUrl) { try { const resp = await fetch(imgUrl); const blob = await resp.blob(); imageB64 = await new Promise(resolve => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result.split(',')[1]); reader.readAsDataURL(blob); }); } catch(fe) { log('[GenVid] Image convert failed: ' + fe.message); } }
      }
      const videoUrls = await callVeo(motionPrompt, imageB64, {aspectRatio:'9:16', duration:5});
      if (videoUrls && videoUrls.length > 0) { sc.video = { url: videoUrls[0], durationSec: 5, motionPrompt }; sc.status = 'complete'; log('[GenVid] Scene ' + (idx+1) + ' video done'); }
      else { sc.status = sc.anchorImage ? 'image_done' : 'pending'; log('[GenVid] No video returned'); }
    } catch(e) { log('[GenVid] Error: ' + e.message); sc.status = 'error'; setErrorMsg('Video gen failed: ' + e.message); }
    lfScenesRef.current = [...scenes]; setLfScenes([...scenes]);
  }, [log]);

  // === Download media ===
  const downloadMedia = useCallback((dataUrl, filename) => {
    const a = document.createElement('a'); a.href = dataUrl; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }, []);

  // === localStorage save/load ===
  const SAVE_KEY = 'LF_PIPELINE_STATE';
  useEffect(() => {
    try { const s = localStorage.getItem(SAVE_KEY); if (s) { const saved = JSON.parse(s);
      if (saved.projectTitle) setProjectTitle(saved.projectTitle);
      if (saved.sourceText) setSourceText(saved.sourceText);
      if (saved.globalAsset) setGlobalAsset(saved.globalAsset);
      if (saved.lfScenes && saved.lfScenes.length > 0) { lfScenesRef.current = saved.lfScenes; setLfScenes(saved.lfScenes); }
      if (saved.phaseHistory) setPhaseHistory(saved.phaseHistory);
      if (saved.phase && saved.phase !== 'IDLE') setPhase(saved.phase.includes('COMPLETE') || saved.phase === 'COMPLETED' ? saved.phase : 'IDLE');
      log('[System] restored pipeline state');
    }} catch(e) {}
  }, []);
  useEffect(() => {
    if (lfScenesRef.current.length > 0 || globalAsset || projectTitle) {
      try { localStorage.setItem(SAVE_KEY, JSON.stringify({ projectTitle, sourceText, globalAsset, lfScenes: lfScenesRef.current, phase, phaseHistory })); } catch(e) {}
    }
  }, [phase, projectTitle, globalAsset, lfScenes]);

  const phaseNum = phase.startsWith('PHASE_') ? parseInt(phase.split('_')[1]) : phase==='COMPLETED' ? 6 : 0;
  const progressPct = phase==='COMPLETED' ? 100 : phase==='IDLE' ? 0 : Math.round((phaseNum/5)*100);

  return (
    <div style={{flex: 1, display: 'flex', flexDirection: 'column', gap: 12, overflow: 'hidden'}}>
      {/* Tab Content */}
      <div style={{flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden'}}>
        {activeTab === 'source' && (
          <div style={{display: 'flex', flexDirection: 'column', gap: 12, flex: 1, overflow: 'hidden'}}>
            {/* Project Bar */}
            <div style={{display: 'flex', gap: 8, flexWrap: 'wrap', padding: 12, background: '#f0f0f8', borderRadius: 8, alignItems: 'center'}}>
              <span style={{fontSize: 11, fontWeight: 600, color: 'var(--text2)'}}>📁 프로젝트</span>
              {currentProjectId && <span style={{fontSize: 11, color: 'var(--text2)', background: 'white', padding: '2px 8px', borderRadius: 4}}>{projectTitle || currentProjectId}</span>}
              <button onClick={()=>setShowProjectPanel(!showProjectPanel)} className="btn btn-secondary btn-sm">프로젝트 목록</button>
              <button onClick={async()=>{if(currentProjectId && projectTitle) {setSavingStatus('저장 중...'); try {await fbSaveProject(currentProjectId, {title: projectTitle, phase, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}); setSavingStatus('✅ 저장됨'); setTimeout(()=>setSavingStatus(''), 2000);} catch(e){setSavingStatus('❌ 저장 실패');}}}} disabled={!projectTitle} className="btn btn-primary btn-sm">💾 저장</button>
              <button onClick={()=>{setCurrentProjectId('');setProjectTitle('');setSourceText('');}} className="btn btn-secondary btn-sm">+ 새 프로젝트</button>
              {savingStatus && <span style={{fontSize: 11, color: savingStatus.includes('실패')?'var(--err)':'var(--success)'}}>  {savingStatus}</span>}
              {showProjectPanel && projectList.length > 0 && (
                <div style={{position: 'absolute', top: 200, left: 20, background: 'white', border: '1px solid var(--border)', borderRadius: 8, maxWidth: 300, maxHeight: 250, overflow: 'auto', zIndex: 10}}>
                  {projectList.map(p => (
                    <div key={p.id} style={{padding: '8px 12px', borderBottom: '1px solid var(--border)', cursor: 'pointer', fontSize: 12}} onClick={()=>{setCurrentProjectId(p.id);setProjectTitle(p.title||p.id);setShowProjectPanel(false);}}>
                      <div style={{fontWeight: 600}}>{p.title||p.id}</div>
                      <div style={{fontSize: 10, color: 'var(--text2)'}}>{p.phase} · {p.sceneCount||0} scenes</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Pipeline Controls */}
            <div style={{display: 'flex', gap: 12, alignItems: 'center', padding: 12, background: 'linear-gradient(135deg,#e8e8f4,#dde0f0)', borderRadius: 10, flexWrap: 'wrap'}}>
              <span style={{color: 'var(--accent)', fontWeight: 700, fontSize: 14}}>LongForm Pipeline</span>
              <select value={textProvider} onChange={e=>setTextProvider(e.target.value)} disabled={running} style={{padding: '4px 8px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 12}}>
                <option value="gemini">Text: Gemini</option>
                <option value="grok">Text: Grok</option>
              </select>
              <select value={imageProvider} onChange={e=>setImageProvider(e.target.value)} disabled={running} style={{padding: '4px 8px', borderRadius: 6, border: '1px solid var(--border)', fontSize: 12}}>
                <option value="imagen4">Image: Imagen 4</option>
                <option value="imagen4ultra">Image: Imagen 4 Ultra</option>
                <option value="nanoBananaPro">Image: Nano Banana Pro</option>
                <option value="grok">Image: Grok Aurora</option>
              </select>
              <label style={{display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, cursor: 'pointer'}}>
                <input type="checkbox" checked={enableWebtoon} onChange={e=>setEnableWebtoon(e.target.checked)} disabled={running} />
                P5 웹툰확장
              </label>
              <span style={{marginLeft: 'auto', padding: '3px 10px', borderRadius: 12, fontSize: 11, fontWeight: 600, background: phase==='COMPLETED'?'#238636':phase==='ERROR'?'#da3633':running?'#1f6feb':'#d0d0e0', color: '#fff'}}>
                {PHASE_LABELS[phase]||phase}
              </span>
            </div>

            {/* Progress Bar */}
            <div style={{height: 32, background: 'var(--surface2)', borderRadius: 8, overflow: 'hidden', position: 'relative'}}>
              <div style={{height: '100%', width: progressPct+'%', transition: 'width 0.5s ease', background: phase==='ERROR'?'linear-gradient(90deg,#da3633,#f85149)':'linear-gradient(90deg,var(--accent),var(--success))', borderRadius: 8}}></div>
              <div style={{position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, display: 'flex', alignItems: 'center', justifyContent: 'space-around', padding: '0 8px', fontSize: 10, fontWeight: 600}}>
                {['P1 분석','씬','P3 앵커','P4 영상','P5 웹툰'].map((label, i) => (
                  <span key={i} style={{color: phaseNum > i ? '#fff' : '#999', textShadow: phaseNum > i ? '0 0 4px rgba(0,0,0,0.5)' : 'none'}}>
                    {label}
                  </span>
                ))}
              </div>
            </div>

            {/* Source Input Section */}
            <div style={{flex: 1, display: 'flex', flexDirection: 'column', gap: 10, overflow: 'hidden'}}>
              <input placeholder="Project Title" value={projectTitle} onChange={e=>setProjectTitle(e.target.value)} disabled={running} style={{padding: '8px 12px', border: '1px solid var(--border)', borderRadius: 8, fontSize: 13}} />
              <textarea placeholder="Enter full story/web novel text here..." value={sourceText} onChange={e=>setSourceText(e.target.value)} disabled={running} style={{flex: 1, padding: 12, border: '1px solid var(--border)', borderRadius: 8, fontSize: 12, lineHeight: 1.6, resize: 'none', fontFamily: 'inherit'}} />
              <div style={{fontSize: 11, color: 'var(--text2)', textAlign: 'right'}}>{sourceText.length.toLocaleString()} chars</div>

              {/* Action Buttons */}
              <div style={{display: 'flex', gap: 8, flexWrap: 'wrap'}}>
                {!running && phase==='IDLE' && <button onClick={runFullPipeline} disabled={!sourceText.trim()} className="btn btn-primary btn-block">🚀 Full Pipeline Start</button>}
                {!running && phase==='ERROR' && <button onClick={runFullPipeline} className="btn btn-primary btn-block">Retry Pipeline</button>}
                {!running && phase==='COMPLETED' && <button onClick={()=>{setPhase('IDLE');setPhaseHistory([]);setGlobalAsset(null);lfScenesRef.current=[];setLfScenes([]);}} className="btn btn-success btn-block">New Project</button>}
                {running && <button onClick={stopPipeline} className="btn btn-danger btn-block">⏹ Stop Pipeline</button>}
              </div>

              {errorMsg && <div style={{padding: 12, background: '#3d1f1f', border: '1px solid var(--err)', borderRadius: 8, color: '#f85149', fontSize: 12, wordBreak: 'break-all'}}>{errorMsg}</div>}
            </div>
          </div>
        )}

        {activeTab === 'phase1' && (
          <div style={{flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 12}}>
            <div style={{display: 'flex', gap: 8}}>
              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase1();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={!sourceText.trim() || running} className="btn btn-primary btn-sm">P1 스토리분석 재실행</button>
            </div>
            {!globalAsset && <div className="placeholder">Phase 1을 실행하면 캐릭터와 배경이 추출됩니다</div>}
            {globalAsset && (
              <>
                <div>
                  <h3 style={{fontSize: 13, fontWeight: 700, marginBottom: 12}}>캐릭터 ({globalAsset.characters?.length||0})</h3>
                  <div className="scene-grid">
                    {(globalAsset.characters||[]).map((ch, i) => (
                      <div key={i} className="char-card">
                        {ch.referenceImageUrl && <img src={ch.referenceImageUrl} alt={ch.name} />}
                        <div className="card-content">
                          <div className="char-name">{ch.name}</div>
                          <div className="char-role">{ch.role}</div>
                          <div className="char-desc">{ch.appearance?.hair} | {ch.appearance?.build}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <h3 style={{fontSize: 13, fontWeight: 700, marginBottom: 12}}>배경 ({globalAsset.backgrounds?.length||0})</h3>
                  <div className="scene-grid">
                    {(globalAsset.backgrounds||[]).map((bg, i) => (
                      <div key={i} className="bg-card">
                        {bg.referenceImageUrl && <img src={bg.referenceImageUrl} alt={bg.name} />}
                        <div className="card-content">
                          <div className="bg-name">{bg.name}</div>
                          <div className="bg-type">{bg.locationType}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </>
            )}
          </div>
        )}

        {activeTab === 'scenes' && (
          <div style={{flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 12}}>
            <div style={{display: 'flex', gap: 8}}>
              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase2();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={!sourceText.trim() || running} className="btn btn-primary btn-sm">씬 분할 재실행</button>
            </div>
            {lfScenes.length === 0 && <div className="placeholder">Phase 2를 실행하면 씬이 생성됩니다</div>}
            {lfScenes.length > 0 && (
              <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(350px, 1fr))', gap: 12}}>
                {lfScenes.map((scene, i) => (
                  <div key={i} className="scene-card">
                    <h3>씬 #{scene.sceneNumber}</h3>
                    <div className="scene-summary">{scene.summary}</div>
                    <div style={{fontSize: 11, color: 'var(--text2)', marginBottom: 8}}>
                      분위기: {scene.narrativeMood} | 소요시간: {scene.duration}초
                    </div>
                    {scene.compositionData && (
                      <div className="scene-prompt">
                        <strong>구도:</strong> {scene.compositionData.shotSize}<br/>
                        <strong>조명:</strong> {scene.compositionData.lighting}<br/>
                        <strong>카메라:</strong> {scene.compositionData.cameraAngle}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {activeTab === 'images' && (
          <div style={{flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 12}}>
            <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase3();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={lfScenes.length === 0 || running} className="btn btn-primary btn-sm">P3 이미지프롬프트 재실행</button>
              {running && <span className="spinner" />}
            </div>
            {lfScenes.length === 0 && <div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>Phase 3을 실행하면 이미지 프롬프트가 생성됩니다</div>}
            {lfScenes.length > 0 && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:12}}>
                {lfScenes.map((scene, i) => {
                  const promptText = scene.imagePrompt ? (typeof scene.imagePrompt === 'object' ? scene.imagePrompt.prompt : scene.imagePrompt) : (scene.anchorImage?.prompt || '');
                  return (
                  <div key={i} className="card" style={{marginBottom:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                      <span style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:scene.anchorImage?'#238636':scene.imagePrompt?'var(--accent)':'var(--border)',color:'#fff',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</span>
                      <span style={{fontSize:13,fontWeight:600,flex:1}}>{scene.summary?.substring(0,60)}</span>
                      <span style={{padding:'2px 8px',borderRadius:4,fontSize:10,background:scene.status==='generating_image'?'var(--warn)':scene.anchorImage?'#238636':'var(--border)',color:'#fff'}}>{scene.status||'pending'}</span>
                    </div>
                    {/* Image Prompt Section */}
                    {promptText && (
                      <div style={{background:'#fafaff',borderRadius:6,border:'1px solid #e0e0f0',padding:8,marginBottom:8}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                          <span style={{fontSize:11,fontWeight:600,color:'var(--accent)'}}>🎨 이미지 프롬프트</span>
                          {editingPromptIdx !== i && <button onClick={()=>{setEditingPromptIdx(i);setEditingPromptText(promptText);}} style={{padding:'2px 8px',fontSize:10,borderRadius:4,border:'1px solid var(--accent)',background:'transparent',color:'var(--accent)',cursor:'pointer'}}>✏️ 수정</button>}
                        </div>
                        {editingPromptIdx === i ? (
                          <div style={{display:'flex',flexDirection:'column',gap:6}}>
                            <textarea value={editingPromptText} onChange={e=>setEditingPromptText(e.target.value)} style={{width:'100%',minHeight:80,padding:8,fontSize:11,border:'1px solid var(--accent)',borderRadius:6,resize:'vertical',fontFamily:'monospace',lineHeight:1.5,boxSizing:'border-box'}} />
                            <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                              <button onClick={()=>setEditingPromptIdx(-1)} className="btn btn-secondary btn-sm">취소</button>
                              <button onClick={()=>{const scenes=lfScenesRef.current;const s=scenes[i];if(s.imagePrompt&&typeof s.imagePrompt==='object'){s.imagePrompt.prompt=editingPromptText;}else{s.imagePrompt={prompt:editingPromptText};}lfScenesRef.current=[...scenes];setLfScenes([...scenes]);setEditingPromptIdx(-1);}} style={{padding:'4px 12px',fontSize:11,borderRadius:4,border:'1px solid #f0883e',background:'transparent',color:'#f0883e',cursor:'pointer',fontWeight:600}}>💾 저장만</button>
                              <button onClick={()=>regenerateSceneImageWithPrompt(i,editingPromptText)} disabled={running} className="btn btn-primary btn-sm">🔄 저장 & 재생성</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{fontSize:10,color:'var(--text2)',lineHeight:1.5,maxHeight:60,overflow:'auto',fontFamily:'monospace',wordBreak:'break-all'}}>{promptText}</div>
                        )}
                      </div>
                    )}
                    {/* Anchor Image */}
                    {scene.anchorImage?.url && <div style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',marginBottom:8}}><img src={scene.anchorImage.url} style={{width:'100%',display:'block'}} /></div>}
                    {/* Action Buttons */}
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <button onClick={()=>generateSceneImage(i)} disabled={scene.status==='generating_image'||running} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid var(--accent)',background:scene.status==='generating_image'?'var(--accent)':'transparent',color:scene.status==='generating_image'?'#fff':'var(--accent)',cursor:'pointer',fontWeight:600}}>{scene.status==='generating_image'?'생성 중...':'🖼️ 이미지 생성'}</button>
                      {scene.anchorImage && <button onClick={()=>downloadMedia(scene.anchorImage.url,'scene_'+(i+1)+'_image.png')} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid #238636',background:'transparent',color:'#238636',cursor:'pointer'}}>⬇ 저장</button>}
                    </div>
                  </div>
                );})}
              </div>
            )}
          </div>
        )}

        {activeTab === 'videos' && (
          <div style={{flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 12}}>
            <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase4();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={lfScenes.length === 0 || running} className="btn btn-primary btn-sm">P4 영상프롬프트 재실행</button>
              {running && <span className="spinner" />}
            </div>
            {lfScenes.length === 0 && <div style={{textAlign:'center',padding:40,color:'var(--text2)'}}>Phase 4를 실행하면 영상 프롬프트가 생성됩니다</div>}
            {lfScenes.length > 0 && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:12}}>
                {lfScenes.map((scene, i) => (
                  <div key={i} className="card" style={{marginBottom:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                      <span style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:scene.video?'#238636':scene.videoPrompt?'var(--accent)':'var(--border)',color:'#fff',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</span>
                      <span style={{fontSize:13,fontWeight:600,flex:1}}>{scene.summary?.substring(0,60)}</span>
                      <span style={{padding:'2px 8px',borderRadius:4,fontSize:10,background:scene.status==='generating_video'?'var(--warn)':scene.video?'#238636':'var(--border)',color:'#fff'}}>{scene.status||'pending'}</span>
                    </div>
                    {scene.videoPrompt && (
                      <div style={{background:'#fafaff',borderRadius:6,border:'1px solid #e0e0f0',padding:8,marginBottom:8}}>
                        <span style={{fontSize:11,fontWeight:600,color:'var(--romance)'}}>🎬 모션 프롬프트</span>
                        <div style={{fontSize:10,color:'var(--text2)',lineHeight:1.5,marginTop:4,fontFamily:'monospace',wordBreak:'break-all'}}>{scene.videoPrompt.motionPrompt}</div>
                      </div>
                    )}
                    {scene.anchorImage?.url && <div style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',marginBottom:8}}><img src={scene.anchorImage.url} style={{width:'100%',height:120,objectFit:'cover',display:'block'}} /></div>}
                    {scene.video?.url && (
                      <div style={{borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',marginBottom:8}}>
                        <video src={scene.video.url} controls muted style={{width:'100%',display:'block'}} />
                      </div>
                    )}
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      <button onClick={()=>generateSceneVideo(i)} disabled={scene.status==='generating_video'||!scene.anchorImage||running} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid var(--romance)',background:scene.status==='generating_video'?'var(--romance)':'transparent',color:scene.status==='generating_video'?'#fff':'var(--romance)',cursor:'pointer',fontWeight:600}}>{scene.status==='generating_video'?'생성 중...':'🎬 영상 생성'}</button>
                      {scene.video?.url && <button onClick={()=>downloadMedia(scene.video.url,'scene_'+(i+1)+'_video.mp4')} style={{padding:'4px 10px',fontSize:11,borderRadius:6,border:'1px solid #238636',background:'transparent',color:'#238636',cursor:'pointer'}}>⬇ 저장</button>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {activeTab === 'webtoon' && (
          <div style={{flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: 12}}>
            <div style={{display: 'flex', gap: 8}}>
              <button onClick={async()=>{setRunning(true);setErrorMsg('');try{await runPhase5();}catch(e){setErrorMsg(e.message);}finally{setRunning(false);}}} disabled={lfScenes.length === 0 || !enableWebtoon || running} className="btn btn-primary btn-sm">P5 웹툰확장 재실행</button>
            </div>
            {!enableWebtoon && <div className="placeholder">Phase 5 웹툰확장을 활성화해주세요</div>}
            {lfScenes.length === 0 && <div className="placeholder">Phase 5를 실행하면 웹툰 패널이 생성됩니다</div>}
            {lfScenes.length > 0 && (
              <div className="scene-grid">
                {lfScenes.map((scene, i) => (
                  <div key={i} className="scene-card">
                    <h3>씬 #{scene.sceneNumber}</h3>
                    <div className="scene-summary">{scene.summary}</div>
                    {scene.webtoonAssets && scene.webtoonAssets.length > 0 && (
                      <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, marginTop: 8}}>
                        {scene.webtoonAssets.map((asset, j) => (
                          <div key={j} style={{borderRadius: 4, overflow: 'hidden', border: '1px solid var(--border)'}}>
                            {asset.url && <img src={asset.url} alt={asset.templateId} style={{width: '100%', height: 80, objectFit: 'cover'}} />}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// RENDER APP
// ============================================================

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
