<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹툰 프로덕션</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gaegu:wght@400;700&family=Gothic+A1:wght@400;700&family=Jua&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#f5f5fa;--surface:#ffffff;--surface2:#f0f0f8;--surface3:#e8e8f0;
--border:#d0d0e0;--text:#1a1a2e;--text2:#666688;
--accent:#6c5ce7;--accent2:#7c6cf7;
--success:#00a8a8;--warn:#d4a017;--err:#e74c3c;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),#e0457b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-tabs{display:flex;gap:4px;margin-left:24px;flex:1;}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.api-key-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;}
.api-key-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);}
.status-badge.running{background:#fff3cd;color:#856404;}
.status-badge.done{background:#d4edda;color:#155724;}
.status-badge.error{background:#f8d7da;color:#721c24;}
.main-content{max-width:1400px;margin:0 auto;padding:20px;display:flex;flex-direction:column;height:calc(100vh - 140px);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,92,231,.4);}
.btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:#e74c3c;color:#fff;}
.btn-success{background:#27ae60;color:#fff;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.1);}
.form-textarea{resize:vertical;min-height:200px;font-family:inherit;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.log-panel{background:#1a1a2e;color:#a0a0cc;padding:12px 16px;border-radius:8px;font-family:'Fira Code',monospace;font-size:12px;max-height:180px;overflow-y:auto;line-height:1.6;}
.log-entry{white-space:pre-wrap;word-break:break-all;}
.log-entry.error{color:#e74c3c;}.log-entry.success{color:#27ae60;}.log-entry.info{color:#3498db;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal-box{background:var(--surface);border-radius:16px;padding:32px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.modal-desc{color:var(--text2);font-size:13px;margin-bottom:20px;}
.modal-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);margin-bottom:4px;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn-cancel{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-weight:600;}
.btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;}
.key-status{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12px;color:var(--text2);}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;}.dot.on{background:#27ae60;}
/* Step indicator */
.step-bar{display:flex;gap:2px;margin-bottom:16px;}
.step-item{flex:1;text-align:center;padding:10px 4px;font-size:12px;font-weight:600;border-radius:8px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;position:relative;}
.step-item.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.step-item.done{background:#d4edda;color:#155724;}
.step-item.current{background:#fff3cd;color:#856404;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
/* Grid layouts */
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;}
.ref-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(108,92,231,.15);}
.ref-card img{width:100%;aspect-ratio:1;object-fit:cover;}
.ref-card-info{padding:10px;font-size:12px;}
.ref-card-name{font-weight:700;margin-bottom:2px;}
.ref-card-desc{color:var(--text2);font-size:11px;line-height:1.4;max-height:44px;overflow:hidden;}
/* Panel grid */
.panel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;}
.panel-card img{width:100%;aspect-ratio:3/4;object-fit:cover;}
.panel-card .panel-num{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.panel-card .panel-info{padding:8px;font-size:11px;color:var(--text2);line-height:1.4;}
.panel-placeholder{aspect-ratio:3/4;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:12px;}
/* Webtoon preview */
.webtoon-strip{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:4px;}
.webtoon-strip img{width:100%;display:block;}
.placeholder{padding:40px;text-align:center;color:var(--text2);font-size:13px;}
/* Tag */
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-right:4px;}
.tag-mood{background:#e8d5f5;color:#6c3483;}
.tag-char{background:#d5e8f5;color:#2471a3;}
.tag-loc{background:#d5f5e3;color:#1e8449;}
/* Episode Bar */
.episode-bar{display:flex;align-items:center;gap:8px;padding:12px 0;overflow-x:auto;white-space:nowrap;}
.episode-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px;position:relative;}
.episode-pill:hover{border-color:var(--accent);color:var(--accent);}
.episode-pill.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
.episode-pill.complete{border-color:var(--success);color:var(--success);}
.episode-pill.active.complete{background:linear-gradient(135deg,var(--success),#00c9a7);color:#fff;}
.episode-add{padding:6px 14px;border-radius:20px;border:1px dashed var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
.episode-add:hover{border-color:var(--accent);color:var(--accent);}
.project-title-bar{font-weight:700;font-size:14px;color:var(--text);margin-right:12px;display:flex;align-items:center;gap:8px;}
.episode-delete{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--err);color:#fff;border:none;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;}
.episode-pill:hover .episode-delete{display:flex;}
/* Unified Storyboard + Panel */
.sb-unified-list{display:flex;flex-direction:column;gap:0;}
.sb-unified-card{display:flex;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;transition:all .2s;position:relative;}
.sb-unified-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(108,92,231,.08);}
.sb-unified-card.dragging{opacity:.4;border-style:dashed;}
.sb-card-handle{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px;cursor:grab;user-select:none;}
.sb-card-handle:active{cursor:grabbing;}
.sb-panel-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.sb-drag-icon{font-size:12px;color:var(--text2);opacity:.4;letter-spacing:-2px;}
.sb-card-info{flex:1;min-width:0;}
.sb-card-image{width:160px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-card-image img{width:100%;border-radius:8px;object-fit:cover;max-height:220px;cursor:pointer;}
.sb-img-placeholder{width:100%;height:120px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);border:1px dashed var(--border);}
.sb-img-actions{display:flex;gap:4px;flex-wrap:wrap;}
.sb-drop-zone{height:8px;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;margin:2px 0;}
.sb-drop-zone.active{height:40px;background:rgba(108,92,231,.08);border:2px dashed var(--accent);border-radius:8px;}
.sb-insert-btn{position:absolute;opacity:0;width:24px;height:24px;border-radius:50%;border:1px dashed var(--border);background:var(--surface);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2;}
.sb-drop-zone:hover .sb-insert-btn,.sb-drop-zone.active .sb-insert-btn{opacity:1;}
.sb-insert-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.sb-insert-end{position:relative;opacity:1;width:auto;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;}
.sb-edit-form{display:flex;flex-direction:column;gap:6px;}
.sb-edit-row{display:flex;gap:8px;align-items:flex-start;font-size:12px;}
.sb-edit-row label{min-width:80px;font-weight:600;color:var(--text2);padding-top:4px;flex-shrink:0;}
.sb-edit-row input,.sb-edit-row textarea,.sb-edit-row select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-family:inherit;}
.sb-edit-row textarea{resize:vertical;min-height:48px;}
.sb-edit-row select{max-width:180px;}
@media(max-width:700px){.sb-card-image{width:100px;}.sb-unified-card{flex-wrap:wrap;}}
/* Batch Run */
.batch-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;}
.batch-modal{background:var(--surface);border-radius:16px;width:min(500px,90vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.batch-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.batch-modal-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px;}
.batch-modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid var(--border);}
.batch-config-section{display:flex;flex-direction:column;gap:6px;}
.batch-config-label{font-size:12px;font-weight:600;color:var(--text2);}
.batch-episode-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;}
.batch-episode-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .15s;}
.batch-episode-item:hover{background:var(--surface2);}
.batch-episode-item.selected{background:rgba(108,92,231,.1);}
.batch-episode-item input[type=checkbox]{accent-color:var(--accent);}
.batch-ep-num{font-weight:700;min-width:36px;}
.batch-ep-title{flex:1;color:var(--text2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.batch-ep-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#d5f5e3;color:#1e8449;font-weight:600;}
.batch-progress-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:250;background:var(--surface);border:1px solid var(--accent);border-radius:12px;box-shadow:0 8px 32px rgba(108,92,231,.3);padding:12px 20px;min-width:360px;max-width:90vw;}
.batch-progress-inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.batch-progress-text{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;}
.batch-progress-step{font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap;}
.batch-progress-track{flex:1;min-width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.batch-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease;}
/* Asset Library */
.asset-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;}
.asset-panel{width:min(90vw,800px);margin:auto;background:var(--surface);border-radius:16px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:24px;}
.asset-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:8px;}
.asset-tab{padding:6px 16px;border-radius:8px 8px 0 0;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.asset-tab.active{background:var(--accent);color:#fff;}
.asset-item{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;align-items:flex-start;transition:all .2s;}
.asset-item:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(108,92,231,.1);}
.asset-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;}
.asset-item-info{flex:1;min-width:0;}
.asset-item-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.asset-item-desc{font-size:12px;color:var(--text2);line-height:1.4;max-height:36px;overflow:hidden;}
.asset-item-meta{font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;}
.asset-item-actions{display:flex;gap:4px;flex-shrink:0;align-items:center;}
.asset-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:#e8f4e8;color:#1e8449;}
.asset-badge.prop{background:#ffeaa7;color:#636e72;}
.asset-badge.bg{background:#dfe6e9;color:#2d3436;}
.asset-placeholder{width:80px;height:80px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:11px;flex-shrink:0;}
.outfit-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#fff3cd;color:#856404;margin-left:4px;}
.img-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.img-modal-content{max-width:90vw;max-height:90vh;position:relative;}
.img-modal-content img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px;}
.img-modal-title{color:#fff;text-align:center;padding:8px;font-size:14px;}
.img-modal-close{position:absolute;top:-12px;right:-12px;background:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.clickable-img{cursor:pointer;transition:opacity 0.2s;}
.clickable-img:hover{opacity:0.85;}
.prompt-editor-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9998;display:flex;align-items:center;justify-content:center;}
.prompt-editor-box{background:var(--surface);border-radius:12px;padding:20px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.prompt-editor-box h3{margin:0;font-size:16px;color:var(--text);}
.prompt-editor-box textarea{width:100%;min-height:180px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:monospace;resize:vertical;line-height:1.6;background:var(--surface2);color:var(--text);}
.prompt-editor-box .btn-row{display:flex;gap:8px;justify-content:flex-end;}
.prompt-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:var(--surface2);color:var(--accent);cursor:pointer;border:1px solid var(--border);transition:all 0.2s;}
.prompt-badge:hover{background:var(--accent);color:#fff;}
/* Refactoring classes */
.flex-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.flex-col{display:flex;flex-direction:column;gap:16px;}
.flex-wrap{flex-wrap:wrap;}
.section-title{font-weight:700;font-size:14px;margin-bottom:12px;}
.text-muted{font-size:12px;color:var(--text2);}
.text-xs{font-size:11px;color:var(--text2);}
.btn-xs{padding:2px 8px;font-size:10px;}
.toolbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.toolbar label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.toolbar select,.toolbar input{padding:6px 10px;font-size:12px;}
.log-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);}
.log-toggle:hover{background:var(--surface3);}
.action-bar{display:flex;gap:4px;margin-top:4px;}
.gap-4{gap:4px;}.gap-8{gap:8px;}.gap-12{gap:12px;}.gap-16{gap:16px;}
.mt-4{margin-top:4px;}.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}
.mb-4{margin-bottom:4px;}.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}
/* Panel control hover */
.panel-ctrl{opacity:0 !important;transition:opacity 0.2s;}
div:hover > .panel-ctrl{opacity:1 !important;}
/* ===== Bubble Editor Styles ===== */
.be-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;flex-direction:column;overflow:hidden;}

<body>
<div id="root"></div>
<script type="text/babel">

// ============================================================
// Firebase / Firestore Project Management (Enhanced for Episodes)
// ============================================================
let _db = null;
function getFirebaseConfig() { try { const raw = localStorage.getItem('firebase_config'); if (raw) return JSON.parse(raw); } catch(e) {} return null; }
function saveFirebaseConfig(cfg) { localStorage.setItem('firebase_config', JSON.stringify(cfg)); _db = null; initFirebase(); }
function initFirebase() { const cfg = getFirebaseConfig(); if (!cfg || !cfg.apiKey || !cfg.projectId) return null; try { if (!firebase.apps.length) firebase.initializeApp(cfg); _db = firebase.firestore(); return _db; } catch(e) { return null; } }
function getDb() { if (_db) return _db; return initFirebase(); }

async function fbListProjects() { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const snap = await db.collection('webtoon_projects').orderBy('updatedAt','desc').get(); return snap.docs.map(d => ({id: d.id, ...d.data()})); }
async function fbSaveProject(projectId, data) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); await db.collection('webtoon_projects').doc(projectId).set({...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true}); return projectId; }
async function fbLoadProject(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const doc = await db.collection('webtoon_projects').doc(projectId).get(); if (!doc.exists) throw new Error('Not found'); return {id:doc.id,...doc.data()}; }
async function fbDeleteProject(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const episodes = await db.collection('webtoon_projects').doc(projectId).collection('episodes').get(); const batch = db.batch(); episodes.docs.forEach(d => batch.delete(d.ref)); batch.delete(db.collection('webtoon_projects').doc(projectId)); await batch.commit(); }

// API Keys sync via Firestore
async function fbSaveApiKeys(keys) {
  const db = getDb(); if (!db) return;
  await db.collection('webtoon_config').doc('api_keys').set({...keys, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
}
async function fbLoadApiKeys() {
  const db = getDb(); if (!db) return null;
  try {
    const doc = await db.collection('webtoon_config').doc('api_keys').get();
    if (!doc.exists) return null;
    return doc.data();
  } catch(e) { return null; }
}

// Episode-level CRUD
async function fbListEpisodes(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const snap = await db.collection('webtoon_projects').doc(projectId).collection('episodes').orderBy('number','asc').get(); return snap.docs.map(d => ({number: d.id, ...d.data()})); }
async function fbSaveEpisode(projectId, episodeNum, data) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); await db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).set({...data, number: episodeNum, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true}); }
async function fbDeleteEpisode(projectId, episodeNum) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const phases = await db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').get(); const batch = db.batch(); phases.docs.forEach(d => batch.delete(d.ref)); batch.delete(db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum))); await batch.commit(); }

// Phase-level with episode support (skipImages: save metadata only, no base64 images)
async function fbSavePhase(projectId, episodeNum, phaseName, phaseData, skipImages) {
  const db = getDb(); if (!db) return;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').doc(phaseName);
  const imgs = []; const safe = stripBase64(phaseData, imgs);
  const retryWrite = async (fn, attempts) => {
    for (let a = 0; a < (attempts||3); a++) {
      try { await fn(); return; } catch(e) {
        if (a < (attempts||3)-1 && (e.code === 'resource-exhausted' || e.message?.includes('exhausted'))) {
          console.warn(`[fbSavePhase] resource-exhausted, retry ${a+1}/${attempts||3} after ${3*(a+1)}s...`);
          await new Promise(r => setTimeout(r, 3000*(a+1)));
        } else throw e;
      }
    }
  };
  await retryWrite(() => ref.set({...safe, imageCount: skipImages ? 0 : imgs.length, savedAt: firebase.firestore.FieldValue.serverTimestamp()}));
  if (skipImages || imgs.length === 0) return;
  const imgColl = ref.collection('images');
  // Delete old images in small batches (max 10 per batch)
  try {
    const old = await imgColl.get();
    if (old.docs.length > 0) {
      for (let d = 0; d < old.docs.length; d += 10) {
        const b = db.batch();
        old.docs.slice(d, d + 10).forEach(doc => b.delete(doc.ref));
        await b.commit();
        await new Promise(r => setTimeout(r, 500));
      }
    }
  } catch(e) { console.warn('[fbSavePhase] old image cleanup failed:', e.message); }
  // Save images ONE at a time to avoid write stream exhaustion
  const CHUNK_SIZE = 800000;
  for (let i = 0; i < imgs.length; i++) {
    const im = imgs[i];
    await retryWrite(async () => {
      if (im.data.length > 900000) {
        // Large image: save metadata doc + chunk docs sequentially
        const cn = Math.ceil(im.data.length / CHUNK_SIZE);
        await imgColl.doc(im.id).set({key: im.key, chunks: cn});
        for (let c = 0; c < cn; c++) {
          await imgColl.doc(im.id + '_c' + c).set({data: im.data.substring(c * CHUNK_SIZE, (c + 1) * CHUNK_SIZE), idx: c});
          await new Promise(r => setTimeout(r, 200)); // Throttle between chunks
        }
      } else {
        await imgColl.doc(im.id).set({key: im.key, data: im.data});
      }
    }, 4);
    await new Promise(r => setTimeout(r, 500)); // Throttle between images
    console.log(`[fbSavePhase] 이미지 ${i+1}/${imgs.length} 저장 완료`);
  }
}

async function fbLoadPhase(projectId, episodeNum, phaseName) {
  const db = getDb(); if (!db) return null;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').doc(phaseName);
  const doc = await ref.get(); if (!doc.exists) return null;
  const d = doc.data(); const snap = await ref.collection('images').get();
  const map={}, cmeta={}, cdata={};
  snap.docs.forEach(s=>{const sd=s.data();if(s.id.includes('_c')){const pid=s.id.split('_c')[0];if(!cdata[pid])cdata[pid]={};cdata[pid][sd.idx]=sd.data;}else if(sd.chunks)cmeta[s.id]=sd;else if(sd.data)map[s.id]=sd.data;});
  for(const [id,m] of Object.entries(cmeta)){let a='';for(let i=0;i<m.chunks;i++)a+=(cdata[id]?.[i]||'');if(a)map[id]=a;}
  return restoreBase64(d, map);
}

function stripBase64(obj, imgs, parentKey) {
  // Handle bare strings (e.g. array elements that are data URLs)
  if (typeof obj === 'string' && obj.startsWith('data:') && obj.length > 500) {
    const id = 'img_' + Math.random().toString(36).slice(2, 10);
    if (imgs) imgs.push({id, data: obj, key: parentKey || id});
    return '[img:' + id + ']';
  }
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map((item, i) => stripBase64(item, imgs, (parentKey || 'arr') + '_' + i));
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    out[k] = stripBase64(v, imgs, k);
  }
  return out;
}
function restoreBase64(obj, map) {
  if (!obj || typeof obj !== 'object') { if (typeof obj === 'string' && obj.startsWith('[img:') && obj.endsWith(']')) return map[obj.slice(5,-1)] || obj; return obj; }
  if (Array.isArray(obj)) return obj.map(item => restoreBase64(item, map));
  const out = {}; for (const [k,v] of Object.entries(obj)) out[k] = restoreBase64(v, map); return out;
}

// ============================================================
// Shared Asset CRUD (Project-level)
// ============================================================
async function fbSaveAsset(projectId, assetType, assetId, data) {
  const db = getDb(); if (!db) return;
  const docId = assetType + '_' + assetId;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('shared_assets').doc(docId);
  const imgs = []; const safe = stripBase64({...data, type: assetType, assetId}, imgs);
  await ref.set({...safe, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
  const imgColl = ref.collection('images');
  const old = await imgColl.get(); if(old.docs.length>0){const b=db.batch();old.docs.forEach(d=>b.delete(d.ref));await b.commit();}
  for(let i=0;i<imgs.length;i++){const b=db.batch();const im=imgs[i];
    if(im.data.length>900000){const cs=800000,cn=Math.ceil(im.data.length/cs);b.set(imgColl.doc(im.id),{key:im.key,chunks:cn});for(let c=0;c<cn;c++)b.set(imgColl.doc(im.id+'_c'+c),{data:im.data.substring(c*cs,(c+1)*cs),idx:c});}
    else b.set(imgColl.doc(im.id),{key:im.key,data:im.data});await b.commit();}
}

async function fbLoadAllAssets(projectId) {
  const db = getDb(); if (!db) return {characters:{}, backgrounds:{}, props:{}};
  const snap = await db.collection('webtoon_projects').doc(projectId).collection('shared_assets').get();
  const result = {characters:{}, backgrounds:{}, props:{}};
  for (const doc of snap.docs) {
    const d = doc.data();
    const imgSnap = await doc.ref.collection('images').get();
    const map={}, cmeta={}, cdata={};
    imgSnap.docs.forEach(s=>{const sd=s.data();if(s.id.includes('_c')){const pid=s.id.split('_c')[0];if(!cdata[pid])cdata[pid]={};cdata[pid][sd.idx]=sd.data;}else if(sd.chunks)cmeta[s.id]=sd;else if(sd.data)map[s.id]=sd.data;});
    for(const [id,m] of Object.entries(cmeta)){let a='';for(let i=0;i<m.chunks;i++)a+=(cdata[id]?.[i]||'');if(a)map[id]=a;}
    const restored = restoreBase64(d, map);
    const t = restored.type || 'characters';
    if (result[t]) result[t][restored.assetId] = restored;
  }
  return result;
}

async function fbDeleteAsset(projectId, assetType, assetId) {
  const db = getDb(); if (!db) return;
  const docId = assetType + '_' + assetId;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('shared_assets').doc(docId);
  const imgs = await ref.collection('images').get();
  const batch = db.batch(); imgs.docs.forEach(d => batch.delete(d.ref)); batch.delete(ref); await batch.commit();
}

// API key sync: promise that resolves after Firestore keys are loaded
let _apiKeySyncResolve;
const _apiKeySyncPromise = new Promise(r => { _apiKeySyncResolve = r; });
function waitForApiKeySync() { return _apiKeySyncPromise; }

const API_KEY_NAMES = ['VERTEX_PROJECT_ID','VERTEX_LOCATION','VERTEX_ACCESS_TOKEN','XAI_API_KEY','STABILITY_API_KEY','FAL_API_KEY','A2E_API_KEY','NINJACHAT_API_KEY'];

async function syncApiKeysFromFirestore() {
  const db = getDb();
  if (!db) { console.warn('[KeySync] Firebase not ready, skipping Firestore key sync'); return 0; }
  try {
    const keys = await fbLoadApiKeys();
    if (!keys) { console.log('[KeySync] No keys found in Firestore'); return 0; }
    let synced = 0;
    API_KEY_NAMES.forEach(name => {
      if (keys[name] && !localStorage.getItem(name)) {
        localStorage.setItem(name, keys[name]);
        synced++;
        console.log('[KeySync] Synced:', name);
      }
    });
    return synced;
  } catch(e) { console.warn('[KeySync] Firestore load failed:', e); return 0; }
}

async function autoLoadServerConfig() {
  let serverKeySynced = 0;
  try { const res = await fetch('/api/firebase-config'); if (!res.ok) throw new Error(''); const data = await res.json();
    if (data.firebase) saveFirebaseConfig(data.firebase);
    if (data.vertex) { if(data.vertex.projectId)localStorage.setItem('VERTEX_PROJECT_ID',data.vertex.projectId); if(data.vertex.location)localStorage.setItem('VERTEX_LOCATION',data.vertex.location); if(data.vertex.accessToken)localStorage.setItem('VERTEX_ACCESS_TOKEN',data.vertex.accessToken); if(data.vertex.grokApiKey)localStorage.setItem('GROK_API_KEY',data.vertex.grokApiKey); if(data.vertex.stabilityApiKey)localStorage.setItem('STABILITY_API_KEY',data.vertex.stabilityApiKey); }

  if (!data.candidates?.length) {
    console.error('[callGemini] No candidates in response:', JSON.stringify(data).substring(0, 500));
    const blockReason = data.promptFeedback?.blockReason || data.candidates?.[0]?.finishReason;
    throw new Error('Gemini 응답 없음' + (blockReason ? ` (이유: ${blockReason})` : '') + '. 프롬프트가 너무 길거나 안전 필터에 차단되었을 수 있습니다.');
  }
  const parts=data.candidates[0]?.content?.parts||[];
  const textParts = parts.filter(p=>p.text&&!p.thought);
  if (textParts.length === 0) {
    console.error('[callGemini] No text parts in response. All parts:', parts.map(p => ({hasText:!!p.text, thought:!!p.thought, keys:Object.keys(p)})));
    const finishReason = data.candidates[0]?.finishReason;

  for (let attempt = 0; attempt < maxRetries; attempt++) {

      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},

function getStabilityKey() { const k=localStorage.getItem('STABILITY_API_KEY'); if(!k)throw new Error('Stability AI API 키가 설정되지 않았습니다. 설정에서 입력해주세요.'); return k; }
function hasStabilityKey() { return !!localStorage.getItem('STABILITY_API_KEY'); }

async function callStableDiffusion(prompt, opts={}) {
  const apiKey = getStabilityKey();
  const model = opts.model || 'sd3.5-large-turbo';

  // Map aspect ratios - SD supports: 1:1, 16:9, 21:9, 2:3, 3:2, 4:5, 5:4, 9:16, 9:21
  const arMap = {'3:4':'2:3', '4:3':'3:2'};
  const aspectRatio = arMap[opts.aspectRatio] || opts.aspectRatio || '2:3';

  const formData = new FormData();
  formData.append('prompt', prompt.substring(0, 10000));
  formData.append('model', model);
  formData.append('output_format', 'png');

  // Image-to-image mode: use init_image as base for generation
  let url;
  if (opts.initImage && opts.initImage.startsWith('data:')) {
    url = 'https://api.stability.ai/v2beta/stable-image/generate/sd3';
    const b64match = opts.initImage.match(/^data:image\/\w+;base64,(.+)$/);
    if (b64match) {
      const byteString = atob(b64match[1]);
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
      const blob = new Blob([ab], {type: 'image/png'});
      formData.append('image', blob, 'init_image.png');
      formData.append('strength', opts.strength || 0.65);
      formData.append('mode', 'image-to-image');
    } else {
      formData.append('aspect_ratio', aspectRatio);
    }
  } else {
    url = 'https://api.stability.ai/v2beta/stable-image/generate/sd3';
    formData.append('aspect_ratio', aspectRatio);
  }

  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Accept': 'application/json'
      },
      body: formData
    });

    if (res.status === 429) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('StableDiffusion 429 rate limit, waiting '+wait/1000+'s (attempt '+(attempt+1)+'/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }

    if (!res.ok) {
      const e = await res.text();
      throw new Error('StableDiffusion ' + res.status + ': ' + e.substring(0, 300));
    }

    const data = await res.json();
    if (data.image) {
      return [`data:image/png;base64,${data.image}`];
    }
    throw new Error('No image in SD response');
  }
  throw new Error('StableDiffusion 429: Rate limit exceeded after 3 retries');
}

async function callA2eImage(prompt, opts={}) {
  const apiKey = getA2eKey();
  const baseUrl = 'https://video.a2e.ai/api/v1/userText2image';

  // Determine dimensions from aspect ratio
  let width = 768, height = 1024; // default 3:4
  const ar = opts.aspectRatio || '3:4';
  if (ar === '1:1') { width = 1024; height = 1024; }
  else if (ar === '16:9') { width = 1024; height = 576; }
  else if (ar === '9:16') { width = 576; height = 1024; }
  else if (ar === '4:3') { width = 1024; height = 768; }
  else if (ar === '3:4') { width = 768; height = 1024; }
  else if (ar === '3:2') { width = 1024; height = 683; }
  else if (ar === '2:3') { width = 683; height = 1024; }

  // model_type: 'a2e' (default) or 'seedream' (Seedream 5.0)
  const modelType = opts.modelType || 'a2e';

  // req_key: 'high_aes_general_v21_L' (General/Realistic) or 'high_aes' (Manga)
  const reqKey = opts.reqKey || 'high_aes'; // default to Manga style for webtoon

  // Upload reference images to A2E R2 (max 2 for Text to Image)
  const inputImages = [];
  if (opts.referenceImages?.length > 0) {
    console.log('[A2E T2I] Uploading', opts.referenceImages.length, 'reference images to R2 (max 2)...');
    for (const ref of opts.referenceImages.slice(0, 2)) {
      try {
        const imgData = ref.image || ref;
        if (typeof imgData === 'string' && imgData.startsWith('http')) {
          inputImages.push(imgData);
        } else if (typeof imgData === 'string' && imgData.startsWith('data:')) {
          const url = await uploadImageToA2eR2(imgData);
          if (url) inputImages.push(url);
        }
      } catch (e) { console.warn('[A2E T2I] ref upload failed:', e.message); }
    }
    console.log('[A2E T2I] Uploaded', inputImages.length, 'reference images:', inputImages);
  }

  // 1) Start task — send full prompt, let A2E backend handle its own limits
  const finalPrompt = prompt;
  console.log('[A2E T2I] Prompt length:', finalPrompt.length);

  const startBody = {
    name: 'webtoon_panel_' + Date.now(),
    prompt: finalPrompt,
    model_type: modelType,
    width: width,
    height: height
  };
  // Seedream uses aspect_ratio string instead of width/height
  if (modelType.startsWith('seedream')) {
    startBody.aspect_ratio = ar;
  }
  // Only add req_key if not seedream and no reference images
  if (!modelType.startsWith('seedream') && inputImages.length === 0) {
    startBody.req_key = reqKey;
  }
  if (inputImages.length > 0) {
    startBody.input_images = inputImages;
  }

  console.log('[A2E T2I] Request:', JSON.stringify({...startBody, prompt: startBody.prompt.substring(0, 80) + '...', input_images: startBody.input_images?.map(u => u.substring(0, 80) + '...')}));

  const startRes = await fetch(baseUrl + '/start', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify(startBody)
  });

  if (!startRes.ok) {
    const errText = await startRes.text();
    console.error('[A2E T2I] Start failed:', startRes.status, errText.substring(0, 500));
    throw new Error('A2E Start ' + startRes.status + ': ' + errText.substring(0, 300));
  }

  const startData = await startRes.json();
  console.log('[A2E T2I] start response:', JSON.stringify(startData).substring(0, 500));

  // code can be number 0 or string "0" — treat both as success
  if (startData.code != 0) {
    throw new Error('A2E 에러 (code=' + startData.code + '): ' + (startData.msg || JSON.stringify(startData).substring(0, 300)));
  }

  // data can be an object {_id,...} or an array [{_id,...}] — normalize
  let taskObj = startData.data;
  if (Array.isArray(taskObj)) taskObj = taskObj[0];
  if (!taskObj || !taskObj._id) {
    throw new Error('A2E: task ID 없음 — ' + JSON.stringify(startData).substring(0, 300));
  }

  const taskId = taskObj._id;
  console.log('[A2E] task started:', taskId, 'status:', taskObj.current_status);

  // If start response already has completed images, return immediately
  if (taskObj.current_status === 'completed' && taskObj.image_urls?.length > 0) {
    return taskObj.image_urls;
  }

  // 2) Poll for completion
  const maxPolls = 60; // up to 5 minutes (5s intervals)
  for (let i = 0; i < maxPolls; i++) {
    await new Promise(r => setTimeout(r, 5000));

    const pollRes = await fetch(baseUrl + '/' + taskId, {
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + apiKey }
    });

    if (!pollRes.ok) {
      console.warn('A2E poll error:', pollRes.status);
      continue;
    }

    const pollData = await pollRes.json();
    if (pollData.code !== 0 || !pollData.data) continue;

    const pollObj = Array.isArray(pollData.data) ? pollData.data[0] : pollData.data;
    if (!pollObj) continue;

    const status = pollObj.current_status;
    if (status === 'completed') {
      const urls = pollObj.image_urls || [];
      if (urls.length === 0) throw new Error('A2E: 이미지가 생성되지 않았습니다.');
      return urls; // Return array of image URLs
    } else if (status === 'failed') {
      const failMsg = pollObj.failed_message || 'unknown';
      console.error('[A2E T2I] Task failed:', JSON.stringify(pollObj).substring(0, 500));
      // Don't silently retry without refs — let caller decide
      if (inputImages.length > 0) {
        console.error('[A2E T2I] ⚠️ FAILED with reference images:', failMsg);
      }
      throw new Error('A2E 생성 실패: ' + failMsg);
    }
    // else: still processing, continue polling
  }
  throw new Error('A2E: 시간 초과 (5분 이내 완료되지 않음)');
}

  const presignData = await presignRes.json();
  console.log('[A2E R2] presign response:', JSON.stringify(presignData).substring(0, 500));
  if (presignData.code != 0) throw new Error('A2E R2 에러: ' + (presignData.msg || JSON.stringify(presignData).substring(0, 200)));
  const data = presignData.data;
  const uploadUrl = data.uploadUrl || data.upload_url || data.presigned_url || data.url;
  if (!uploadUrl) throw new Error('A2E R2: uploadUrl 필드 없음: ' + JSON.stringify(data).substring(0, 300));
  // 2) Convert base64 to blob and upload via PUT
  const b64 = base64Data.replace(/^data:[^;]+;base64,/, '');
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'image/png' });
  const putRes = await fetch(uploadUrl, { method: 'PUT', body: blob, headers: { 'Content-Type': 'image/png' } });
  if (!putRes.ok) throw new Error('A2E R2 업로드 실패: ' + putRes.status + ' ' + (await putRes.text()).substring(0, 200));
  // 3) Return public URL — prefer explicit public/download URL from response, fallback to key-based
  const publicUrl = data.publicUrl || data.public_url || data.downloadUrl || data.download_url || data.fileUrl || data.file_url;
  if (publicUrl) {
    console.log('[A2E R2] using publicUrl from response:', publicUrl);
    return publicUrl;
  }
  // Fallback: construct URL using key field if available
  if (data.key || data.file_key) {
    const key = data.key || data.file_key;
    // If key is not a full URL, prefix with A2E CDN
    if (!key.startsWith('http')) {
      const cdnUrl = 'https://30days.ai2everyone.com/' + key;
      console.log('[A2E R2] using CDN URL from key:', cdnUrl);
      return cdnUrl;
    }
    console.log('[A2E R2] using key-based URL:', key);
    return key;
  }
  // Last resort: strip query params from presigned URL
  const stripped = uploadUrl.split('?')[0];
  console.log('[A2E R2] using stripped presigned URL:', stripped);
  return stripped;
}

const NB_VERTEX_MODELS = {

  'gemini-3.1-flash': { name: 'Gemini 3.1 Flash', vertexModel: 'gemini-3.1-flash-preview-image-generation', maxRefs: 10 },
  'gemini-3-pro':     { name: 'Gemini 3 Pro (고품질)', vertexModel: 'gemini-3.0-pro-preview-image-generation', maxRefs: 14 },
};

async function callA2eNanoBanana(prompt, opts={}) {
  const apiKey = getA2eKey();
  const maxRefs = 4; // A2E NanoBanana supports up to 4 reference images

  // Upload reference images to A2E R2 if provided
  const inputImages = [];
  if (opts.referenceImages?.length > 0) {
    console.log('[A2E NanoBanana] Uploading', opts.referenceImages.length, 'reference images to R2...');
    for (const ref of opts.referenceImages.slice(0, maxRefs)) {
      try {
        const imgData = ref.image || ref;
        if (imgData.startsWith('http')) {
          inputImages.push(imgData);
        } else if (imgData.startsWith('data:')) {
          const url = await uploadImageToA2eR2(imgData);
          if (url) inputImages.push(url);
        }
      } catch (e) { console.warn('[A2E NanoBanana] ref upload failed:', e.message); }
    }
    console.log('[A2E NanoBanana] Uploaded', inputImages.length, 'reference images:', inputImages);
  }

  // 1) Start task — NanoBanana (Gemini), 2000 char UI limit
  console.log('[A2E NanoBanana] Prompt length:', prompt.length, ', refs:', inputImages.length);
  const startBody = {
    name: 'webtoon_ref_' + Date.now(),
    prompt: prompt.substring(0, 2000)
  };
  if (inputImages.length > 0) {
    startBody.input_images = inputImages;
    // quality_settings: lower creativity = closer to references
    startBody.quality_settings = {
      creativity_level: 'low',
      detail_level: 'detailed',
      style_consistency: true
    };
    startBody.composition_mode = 'blend';
  }

  const baseUrl = 'https://video.a2e.ai/api/v1/userNanoBanana';
  let startData = null;
  let usedBaseUrl = baseUrl;
  {
    const body = {...startBody};
    console.log('[A2E NanoBanana] trying endpoint:', baseUrl + '/start', JSON.stringify({...body, prompt: body.prompt.substring(0, 80) + '...'}));

    try {
      const startRes = await fetch(baseUrl + '/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify(body)
      });
      if (!startRes.ok) {
        const errText = await startRes.text();
        throw new Error('A2E NanoBanana ' + startRes.status + ': ' + errText.substring(0, 200));
      }
      startData = await startRes.json();
      console.log('[A2E NanoBanana] start response:', JSON.stringify(startData).substring(0, 500));
      if (startData.code != 0) {
        throw new Error('A2E NanoBanana 오류: ' + (startData.msg || 'code ' + startData.code));
      }
    } catch (fetchErr) {
      throw new Error('A2E NanoBanana 연결 실패: ' + fetchErr.message);
    }
  }

  let taskObj = startData.data;
  if (Array.isArray(taskObj)) taskObj = taskObj[0];
  if (!taskObj || !taskObj._id) {
    throw new Error('A2E NanoBanana: task ID 없음 — ' + JSON.stringify(startData).substring(0, 300));
  }
  const taskId = taskObj._id;
  console.log('[A2E NanoBanana] task started:', taskId);

  // If already completed
  if (taskObj.current_status === 'completed' && taskObj.image_urls?.length > 0) {
    return taskObj.image_urls;
  }

  // 2) Poll for completion (5s intervals, max 5min)
  const maxPolls = 60;
  for (let i = 0; i < maxPolls; i++) {
    await new Promise(r => setTimeout(r, 5000));
    const pollRes = await fetch(usedBaseUrl + '/detail/' + taskId, {
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + apiKey }
    });
    if (!pollRes.ok) { console.warn(`A2E NanoBanana poll error:`, pollRes.status); continue; }
    const pollData = await pollRes.json();
    if (pollData.code != 0 || !pollData.data) continue;
    const pollObj = Array.isArray(pollData.data) ? pollData.data[0] : pollData.data;
    if (!pollObj) continue;
    if (pollObj.current_status === 'completed') {
      const urls = pollObj.image_urls || [];
      if (urls.length === 0) throw new Error(`A2E NanoBanana: 이미지가 생성되지 않았습니다.`);
      return urls;
    } else if (pollObj.current_status === 'failed') {
      const failMsg = pollObj.failed_message || 'unknown';
      // If failed due to reference image issue, retry without references
      if (inputImages.length > 0 && (failMsg.includes('400') || failMsg.includes('Bad Request') || failMsg.includes('r2') || failMsg.includes('image'))) {
        console.warn('[A2E NanoBanana] Failed with references, retrying without:', failMsg);
        return await callA2eNanoBanana(prompt, {...opts, referenceImages: undefined, _retryNoRef: true});
      }
      throw new Error(`A2E NanoBanana 실패: ` + failMsg);
    }
  }
  throw new Error(`A2E NanoBanana: 시간 초과 (5분 이내 완료되지 않음)`);
}

// FLUX 2 PRO — fal.ai (reference images via /edit endpoint)
// ============================================================
async function callFlux2Pro(prompt, opts={}) {
  const apiKey = getFalKey();
  if (!apiKey) throw new Error('fal.ai API 키가 필요합니다. 설정에서 입력해주세요.');

  const refs = opts.referenceImages || [];
  const hasRefs = refs.length > 0;

  // Upload reference images: convert data URIs to fal.ai CDN URLs if needed
  const imageUrls = [];
  if (hasRefs) {
    for (const ref of refs.slice(0, 8)) { // Flux 2 Pro supports up to 9 refs
      const imgData = ref.image || ref;
      if (typeof imgData === 'string' && imgData.startsWith('http')) {
        imageUrls.push(imgData);
      } else if (typeof imgData === 'string' && imgData.startsWith('data:')) {
        imageUrls.push(imgData); // fal.ai accepts data URIs directly
      }
    }
    console.log('[Flux2Pro] Reference images:', imageUrls.length);
  }

  // Choose endpoint: edit (with refs) or generate (text-only)
  const endpoint = hasRefs && imageUrls.length > 0
    ? 'https://fal.run/fal-ai/flux-2-pro/edit'
    : 'https://fal.run/fal-ai/flux-2-pro';

  // Build request body
  const body = { prompt: prompt.substring(0, 4000) };

  if (hasRefs && imageUrls.length > 0) {
    // Edit endpoint uses image_urls array
    body.image_urls = imageUrls;
  }

  // Image size
  const ar = opts.aspectRatio || '3:4';
  if (ar === '1:1') body.image_size = { width: 1024, height: 1024 };
  else if (ar === '16:9') body.image_size = { width: 1024, height: 576 };
  else if (ar === '9:16') body.image_size = { width: 576, height: 1024 };
  else if (ar === '4:3') body.image_size = { width: 1024, height: 768 };
  else if (ar === '3:2') body.image_size = { width: 1024, height: 683 };
  else body.image_size = { width: 768, height: 1024 }; // 3:4 default

  body.num_images = 1;
  body.output_format = 'png';
  body.safety_tolerance = 6; // relaxed for creative content

  console.log(`[Flux2Pro] Endpoint: ${endpoint.split('/').slice(-2).join('/')}, refs: ${imageUrls.length}, size: ${body.image_size.width}x${body.image_size.height}`);

  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Authorization': 'Key ' + apiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.status === 429 || res.status === 503) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('[Flux2Pro] ' + res.status + ', waiting ' + wait/1000 + 's (attempt ' + (attempt+1) + '/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (!res.ok) {
      const errText = await res.text();
      console.error('[Flux2Pro] Error:', errText.substring(0, 500));
      // 403 = billing/balance issue
      if (res.status === 403) {
        throw new Error('Flux 2 Pro: fal.ai 잔액 부족 — fal.ai/dashboard/billing 에서 충전해주세요');
      }
      // If edit endpoint fails, retry without references as text-to-image
      if (hasRefs && imageUrls.length > 0 && (res.status === 422 || res.status === 400)) {
        console.warn('[Flux2Pro] Edit failed, retrying as text-to-image...');
        return await callFlux2Pro(prompt, {...opts, referenceImages: undefined});
      }
      throw new Error('Flux 2 Pro ' + res.status + ': ' + errText.substring(0, 300));
    }

    const data = await res.json();
    if (data.images?.length > 0) {
      const imgUrl = data.images[0].url;
      try {
        const imgRes = await fetch(imgUrl);
        const blob = await imgRes.blob();
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
        return [dataUrl];
      } catch (fetchErr) {
        console.warn('[Flux2Pro] Image fetch failed, returning URL:', fetchErr.message);
        return [imgUrl];
      }
    }
    throw new Error('Flux 2 Pro: 이미지가 생성되지 않았습니다.');
  }
  throw new Error('Flux 2 Pro: 재시도 초과');
}

async function callNinjaChat(prompt, opts={}) {
  const apiKey = getNinjaChatKey();
  if (!apiKey) throw new Error('NinjaChat API 키가 필요합니다. 설정에서 입력해주세요.');

  const model = opts.model || 'ninja-vision-1';
  let refImageUrl = null;

  // Step 1: Upload reference image to public hosting (separate API call)
  const refs = opts.referenceImages || [];
  if (refs.length > 0) {
    for (const ref of refs) {
      const imgData = ref.image || ref;
      if (typeof imgData === 'string' && imgData.startsWith('data:')) {
        try {
          console.log('[NinjaChat] Uploading reference image to public hosting...');
          const uploadRes = await fetch('/api/upload-ref-image', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imgData })
          });
          const uploadData = await uploadRes.json();
          if (uploadData.url) {
            refImageUrl = uploadData.url;
            console.log('[NinjaChat] Reference uploaded:', refImageUrl);
          } else {
            console.warn('[NinjaChat] Upload failed:', uploadData.error);
          }
        } catch (e) {
          console.warn('[NinjaChat] Reference upload error:', e.message);
        }
        break;
      }
    }
  }

  // Map aspect ratio to NinjaChat official sizes: 1920x1920, 2560x1440, 1440x2560
  const ar = opts.aspectRatio || '3:4';
  let size = '1440x2560';
  if (ar === '1:1') size = '1920x1920';
  else if (ar === '16:9' || ar === '4:3' || ar === '3:2') size = '2560x1440';

  const body = {
    prompt: prompt.substring(0, 4000),
    model: model,
    size: size,
    n: 1
  };
  if (refImageUrl) body.image = refImageUrl;

  console.log(`[NinjaChat] Model: ${model}, size: ${size}, has_ref: ${!!refImageUrl}`);

  // Step 2: Call NinjaChat API via proxy
  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch('/api/ninjachat-images', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Api-Key': apiKey
      },
      body: JSON.stringify({...body, _apiKey: apiKey})
    });

    if (res.status === 429) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('[NinjaChat] Rate limited, waiting ' + wait/1000 + 's (attempt ' + (attempt+1) + '/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (res.status === 402) {
      throw new Error('NinjaChat: 잔액 부족 — API 계정을 확인해주세요');
    }
    if (!res.ok) {
      const errText = await res.text();
      console.error('[NinjaChat] Error:', errText.substring(0, 500));
      throw new Error('NinjaChat ' + res.status + ': ' + errText.substring(0, 300));
    }

    const data = await res.json();
    if (data._refUploadStatus) console.log('[NinjaChat] Ref upload status:', data._refUploadStatus);
    if (data.images?.length > 0) {
      const imgUrl = data.images[0].url;
      return [imgUrl];
    }
    throw new Error('NinjaChat: 이미지가 생성되지 않았습니다.');
  }
  throw new Error('NinjaChat: 재시도 초과');
}

async function callFalAI(prompt, opts={}) {
  const apiKey = getFalKey();

  // Filter valid CDN-uploaded reference images (exclude data: URLs)
  const validRefImages = (opts.ipAdapterImages || []).filter(img => {
    const url = img.url || img;
    return typeof url === 'string' && url.startsWith('http');
  });
  const hasRefImages = validRefImages.length > 0;
  const hasLoras = opts.loras?.length > 0;

  // Choose endpoint:
  // - flux-lora: when LoRAs are provided
  // - flux-general: when IP-Adapter or ControlNet is needed (requires flux-general)
  // - flux/dev: default text-to-image (fewer content restrictions than flux-general)
  const endpoint = hasLoras
    ? 'https://fal.run/fal-ai/flux-lora'
    : (hasRefImages || opts.controlNetImage)
      ? 'https://fal.run/fal-ai/flux-general'
      : 'https://fal.run/fal-ai/flux/dev';

  // Build request body
  const body = {
    prompt: prompt.substring(0, 4000),
    num_inference_steps: opts.steps || 28,
    guidance_scale: opts.guidanceScale || 3.5,
    num_images: 1,
    enable_safety_checker: false,
    output_format: 'png',
    image_size: opts.imageSize || {width: 768, height: 1024}
  };

  // LoRA support — for character/style consistency (flux-lora endpoint)
  if (hasLoras) {
    body.loras = opts.loras.map(l => ({
      path: l.path || l.url,
      scale: l.scale || 0.8
    }));
    console.log(`[callFalAI] flux-lora 엔드포인트: LoRA ${body.loras.length}개 적용`, body.loras.map(l => l.path.split('/').pop()));
  }

  // IP-Adapter v2: reference images (only with flux-general, not supported by flux-lora)
  if (hasRefImages && !hasLoras) {
    body.ip_adapters = validRefImages.map(img => ({
      path: 'XLabs-AI/flux-ip-adapter-v2',
      weight_name: 'ip_adapter.safetensors',
      image_encoder_path: 'openai/clip-vit-large-patch14',
      image_url: img.url || img,
      scale: 0.6
    }));
    console.log(`[callFalAI] IP-Adapter v2: ${validRefImages.length}개 레퍼런스, scale=0.6`);
  }

  // ControlNet (OpenPose) — for dynamic poses (flux-general only)
  if (opts.controlNetImage && !hasLoras) {
    body.controlnet_unions = [{
      control_image_url: opts.controlNetImage.url || opts.controlNetImage,
      control_mode: opts.controlNetMode || 'openpose',
      conditioning_scale: opts.controlNetScale || 0.7
    }];
  }

  console.log(`[callFalAI] Endpoint: ${endpoint.split('/').pop()}, body keys:`, Object.keys(body));

  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Authorization': 'Key ' + apiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.status === 429 || res.status === 503) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('fal.ai ' + res.status + ', waiting ' + wait/1000 + 's (attempt ' + (attempt+1) + '/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (!res.ok) {
      const e = await res.text();
      console.error('[callFalAI] Error response:', e.substring(0, 500));
      // 422 fallback: step 1) remove IP-Adapter, keep image-to-image
      // 422 fallback: remove IP-Adapter, retry as pure text-to-image
      if (res.status === 422) {
        // Step 1: remove IP-Adapter
        if (body.ip_adapters) {
          console.warn('[callFalAI] 422 — IP-Adapter 제거 후 재시도...');
          delete body.ip_adapters;
          continue;
        }
        // Step 2: remove LoRAs
        if (body.loras) {
          console.warn('[callFalAI] 422 — LoRA 제거 후 재시도...');
          delete body.loras;
          continue;
        }
      }
      throw new Error('fal.ai ' + res.status + ': ' + e.substring(0, 300));
    }

    const data = await res.json();
    // Check for NSFW flag in response (fal.ai returns has_nsfw_concepts array)
    if (data.has_nsfw_concepts && data.has_nsfw_concepts.some(v => v === true)) {
      console.warn('[callFalAI] NSFW flag detected in response — image may be black/blank');
    }
    if (data.images?.length > 0) {
      // fal.ai returns image URLs, need to fetch and convert to data URL
      const imgUrl = data.images[0].url;
      try {
        const imgRes = await fetch(imgUrl);
        const blob = await imgRes.blob();
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
        // Detect black/blank images by checking pixel data
        const isBlack = await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const sz = 64; // sample at small size for speed
            canvas.width = sz; canvas.height = sz;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, sz, sz);
            const pixels = ctx.getImageData(0, 0, sz, sz).data;
            let totalBrightness = 0;
            for (let i = 0; i < pixels.length; i += 4) {
              totalBrightness += pixels[i] + pixels[i+1] + pixels[i+2]; // R+G+B
            }
            const avgBrightness = totalBrightness / (sz * sz * 3); // avg per channel
            resolve(avgBrightness < 5); // nearly all black if avg < 5/255
          };
          img.onerror = () => resolve(false);
          img.src = dataUrl;
        });
        if (isBlack) {
          console.warn('[callFalAI] Black/blank image detected (content filter likely applied)');
          throw new Error('fal.ai: 블랙 이미지 감지됨 (콘텐츠 필터 적용). 다른 모델을 시도하세요.');
        }
        return [dataUrl];
      } catch(fetchErr) {
        if (fetchErr.message?.includes('블랙 이미지')) throw fetchErr;
        // If can't fetch image, return URL directly
        return [imgUrl];
      }
    }
    throw new Error('No image in fal.ai response');
  }
  throw new Error('fal.ai: Rate limit exceeded after 3 retries');
}

// Helper: upload base64 image to fal.ai CDN via server proxy (uses fal SDK server-side)
async function uploadToFalCDN(base64DataUrl) {
  const apiKey = getFalKey();
  // Extract base64 data and mime type
  const match = base64DataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
  if (!match) return null;
  const mimeType = match[1];
  const base64Data = match[2];

  try {
    console.log(`[uploadToFalCDN] Uploading via /api/fal-upload (SDK proxy, ${(base64Data.length / 1024).toFixed(0)}KB)...`);
    const res = await fetch('/api/fal-upload', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Fal-Key': apiKey
      },
      body: JSON.stringify({ base64: base64Data, mimeType })
    });
    if (res.ok) {
      const data = await res.json();
      const url = data.url || data.file_url;
      if (url) {
        console.log(`[uploadToFalCDN] ✓ Upload succeeded: ${url.substring(0, 80)}...`);
        return url;
      }
    }
    const errText = await res.text().catch(() => '');
    console.warn(`[uploadToFalCDN] Proxy returned ${res.status}: ${errText.substring(0, 200)}`);
  } catch(e) {
    console.warn('[uploadToFalCDN] Proxy failed:', e.message);
  }

  console.warn('[uploadToFalCDN] Upload failed, returning data URL as fallback');
  return base64DataUrl;
}

// ============================================================
// FAL.AI LoRA TRAINING (Character Consistency)
// ============================================================
async function createTrainingZip(base64Images) {
  // Create a zip file containing training images
  const zip = new JSZip();
  for (let i = 0; i < base64Images.length; i++) {
    const match = base64Images[i].match(/^data:image\/(\w+);base64,(.+)$/);
    if (!match) continue;
    const ext = match[1] === 'jpeg' ? 'jpg' : match[1];
    const byteChars = atob(match[2]);
    const byteArr = new Uint8Array(byteChars.length);
    for (let j = 0; j < byteChars.length; j++) byteArr[j] = byteChars.charCodeAt(j);
    zip.file(`image_${i}.${ext}`, byteArr);
  }
  return await zip.generateAsync({type: 'blob'});
}

async function uploadTrainingZipToFal(zipBlob) {
  const apiKey = getFalKey();
  // Step 1: Initiate upload — get presigned upload_url and final file_url
  const initRes = await fetch('https://rest.fal.ai/storage/upload/initiate?storage_type=fal-cdn-v3', {
    method: 'POST',
    headers: {
      'Authorization': 'Key ' + apiKey,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      content_type: 'application/zip',
      file_name: 'training_images.zip'
    })
  });
  if (!initRes.ok) throw new Error('Upload initiate failed: ' + initRes.status + ' ' + await initRes.text().catch(()=>''));
  const { upload_url, file_url } = await initRes.json();
  if (!upload_url || !file_url) throw new Error('Upload initiate returned no URLs');

  // Step 2: PUT the actual file to the presigned URL
  const putRes = await fetch(upload_url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/zip' },
    body: zipBlob
  });
  if (!putRes.ok) throw new Error('Upload PUT failed: ' + putRes.status);
  return file_url;
}

async function submitLoraTraining(imagesUrl, triggerWord, opts={}) {
  const apiKey = getFalKey();
  // Submit to queue endpoint for async training
  const body = {
    images_data_url: imagesUrl,
    trigger_word: triggerWord || 'ohwx',
    steps: opts.steps || 1000,
    is_style: false,
    create_masks: true,
    rank: opts.rank || 16
  };
  const res = await fetch('https://queue.fal.run/fal-ai/flux-lora-fast-training', {
    method: 'POST',
    headers: {
      'Authorization': 'Key ' + apiKey,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const e = await res.text();
    throw new Error('LoRA training submit failed: ' + res.status + ' ' + e.substring(0, 200));
  }
  return await res.json(); // {request_id, ...}
}

async function pollLoraTraining(requestId, onProgress) {
  const apiKey = getFalKey();
  const statusUrl = `https://queue.fal.run/fal-ai/flux-lora-fast-training/requests/${requestId}/status?logs=1`;
  const resultUrl = `https://queue.fal.run/fal-ai/flux-lora-fast-training/requests/${requestId}`;

  // Poll every 10 seconds for up to 15 minutes
  let lastLogIdx = 0;
  for (let i = 0; i < 90; i++) {
    await new Promise(r => setTimeout(r, 10000));
    try {
      const sRes = await fetch(statusUrl, {
        headers: { 'Authorization': 'Key ' + apiKey }
      });
      if (!sRes.ok) {
        if (onProgress) onProgress({status: 'POLL_ERROR', httpStatus: sRes.status, attempt: i});
        continue;
      }
      const data = await sRes.json();
      // Forward new logs if available
      if (data.logs?.length > lastLogIdx) {
        for (let li = lastLogIdx; li < data.logs.length; li++) {
          if (onProgress) onProgress({status: data.status, logMessage: data.logs[li]?.message || data.logs[li]});
        }
        lastLogIdx = data.logs.length;
      } else {
        if (onProgress) onProgress(data);
      }
      if (data.status === 'COMPLETED') {
        const rRes = await fetch(resultUrl, {
          headers: { 'Authorization': 'Key ' + apiKey }
        });
        if (!rRes.ok) throw new Error('Failed to fetch training result: ' + rRes.status);
        return await rRes.json();
      }
      if (data.status === 'FAILED') {
        throw new Error('LoRA training failed: ' + (data.error || JSON.stringify(data).substring(0,200)));
      }
    } catch(e) {
      if (e.message.includes('LoRA training failed')) throw e;
      if (onProgress) onProgress({status: 'POLL_EXCEPTION', error: e.message, attempt: i});
    }
  }
  throw new Error('LoRA training timed out (15 minutes)');
}

    const SCROLL_EDGE = 60; // px from edge to trigger auto-scroll

      const d = dragRef.current;
      if (!d || d.type !== 'move' || !d.crossPage) { autoScrollTimerRef.current = null; return; }
      const canvas = editorCanvasRef.current;
      if (!canvas) { autoScrollTimerRef.current = null; return; }
      const rect = canvas.getBoundingClientRect();
      const mouseY = d.lastClientY || d.startY;
      let scrolled = false;
      if (mouseY > rect.bottom - SCROLL_EDGE && canvas.scrollTop < canvas.scrollHeight - canvas.clientHeight) {
        canvas.scrollTop += SCROLL_SPEED;
        scrolled = true;
      } else if (mouseY < rect.top + SCROLL_EDGE && canvas.scrollTop > 0) {
        canvas.scrollTop -= SCROLL_SPEED;
        scrolled = true;
      }
      if (scrolled) {
        autoScrollTimerRef.current = requestAnimationFrame(doAutoScroll);
      } else {
        autoScrollTimerRef.current = null;
      }
    };

    const onMouseMove = (e) => {
      const d = dragRef.current;
      if (!d) return;
      const scale = editorPanelScale / 100;
      const dx = (e.clientX - d.startX) / scale;
      const dy = (e.clientY - d.startY) / scale;
      d.lastClientX = e.clientX;
      d.lastClientY = e.clientY;
      if (d.type === 'move') {
        updatePageObject(d.pageIdx, d.objId, {x: Math.max(0, d.origX + dx), y: Math.max(0, d.origY + dy)});
        // Cross-page drag: auto-scroll + highlight drop target
        if (d.crossPage) {
          // Auto-scroll near edges
          if (!autoScrollTimerRef.current) {
            const canvas = editorCanvasRef.current;
            if (canvas) {
              const rect = canvas.getBoundingClientRect();
              if (e.clientY > rect.bottom - SCROLL_EDGE || e.clientY < rect.top + SCROLL_EDGE) {
                autoScrollTimerRef.current = requestAnimationFrame(doAutoScroll);
              }
            }
          }
          // Highlight drop target page
          const hoverPage = detectDropPage(d);
          if (hoverPage !== null && hoverPage !== d.pageIdx) {
            setDropTargetPageIdx(hoverPage);
          } else {
            setDropTargetPageIdx(null);
          }
        }
      } else if (d.type === 'resize') {
        if (d.aspectRatio) {
          const newW = Math.max(30, d.origW + dx);
          const newH = newW / d.aspectRatio;
          updatePageObject(d.pageIdx, d.objId, {w: newW, h: Math.max(30, newH)});
        } else {
          updatePageObject(d.pageIdx, d.objId, {w: Math.max(30, d.origW + dx), h: Math.max(30, d.origH + dy)});
        }

        const newPos = Math.max(0.05, Math.min(0.95, d.origTailPos + dx / d.objW));

        updatePageObject(d.pageIdx, d.objId, {tailPos: newPos, tailLength: newLen});

        const newWidth = Math.max(0.2, Math.min(4.0, d.origTailWidth + dx / 30));
        updatePageObject(d.pageIdx, d.objId, {tailWidth: newWidth});

        }
      }
      dragRef.current = null;
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
